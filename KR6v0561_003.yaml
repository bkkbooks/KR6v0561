body:
  text: 大乘伽耶山頂經講記二十六年九月在重慶佛學社講懸論一大乘與一切佛法甲內證離言應機巧説法乙當機聞説隨根得益法二伽耶山頂與佛教史甲釋尊轉法輪及經略史乙佛寂後教法結集流傳略史三經與佛教圖像經籍甲佛滅後以經像為住持佛寶法寶乙佛教之圖像丙佛教之經籍釋經甲一敘起分乙一證信序丙一聞時主處丙二法會部衆乙二緣起序丙一三昧分丙二能觀清淨分丙三所觀法分丁一審觀三法丁二身不可得丁三心不可得丁四菩提不可得丁五無得而得甲二答問分乙一文殊問丙一起分丙二説分乙二文殊答丙一答淨月威光丁一依何處修何行丁二發菩提心因果戊一法説戊二喻説丙二答決定光明丁一問速疾道行丁二答四種二道丙三答勇修智信丁一問菩薩義智丁二答所問義智丁三説六種十法丁四説實不實行甲三流通分乙一如來印成乙二會衆奉行懸論一大乘與一切佛法大乘伽耶山頂經是以大乘伽耶山頂經三個名詞構成的先講大乘乘即是車乘乘字作名詞講車乘有由此至彼運載之功能佛法有度衆生由苦海此岸到涅槃彼岸等義故將佛法喻之於乘乘有大小等之分今欲明大乘須泛論一切佛法甲內證離言應機巧説法何謂佛法概括解之有證法與教法證法乃佛內證離言智境所謂惟佛與佛乃能知之即如來大圓滿覺心所證超過一切言説思議之無上法界聲聞緣覺雖能分證不能究竟圓滿此是佛內證的佛法惟佛自受用諸聖菩薩分能受用至於六道凡夫則須依佛之慈力方便開示譬喻解説方能知之佛以本願力故方便為諸衆生而説一法故佛法必應衆生機感因緣而説若不契機即失於説法功用但又要不違內證之理若但契機而不契理未為巧説若但契理而不契機亦未為巧説均不能圓滿説法功德要契機而又契理方為應機巧説也此證法與教法總攝一切佛法一味一相無有勝劣差別乙當機聞説隨根得益法若就聞法衆生而説則有無量差別佛雖一音演説衆生隨類得益所謂三草二木各得滋潤因此古德有四教五教三乘五乘等判教的差別今可分三類來説一五乘共法佛法中常説因緣生法此為最基本之佛法此法在明因果業報種種不同要有情注重三世輪回業果相續知善升惡墮不可幸得幸免生起決定信心皈依三寶止惡行善受五戒行十善乃至修四禪八定發勝進向上心捨劣趣勝以至引生出世聖果此為人乘天乘聲聞乘獨覺乘菩薩乘所共行之道故稱五乘共法此中尤以保持人天身為向上增進之基本二三乘共法由此五乘共法而上超為人天乘所不共之三乘法即出世法了生死的法此觀十二緣起法而有輪回知三界無安有情皆苦皆不究竟人有三苦八苦無量諸苦天有行苦壞苦五衰現苦不但人中是苦是無常即生天上由定力所成之果報乃至非非想天能經八萬大劫長時安住亦業盡報終還歸墮落仍不免有微細行苦及最後壞苦由此發究竟出離生死之心以出離三界六道世間生死而入涅槃此由觀知苦由集起欲求滅苦必先斷集所謂知苦斷集慕滅修道而得真解脫也三唯大乘法此又超乎五乘三乘共法之上依佛所證平等性智觀一切平等平等無二無別諸衆生皆我無量劫來父母親眷今皆在輪回苦惱之中欲求普為度脫非廣集福德智慧資糧成就無上菩提不可因發大菩提心以大無畏精神廣度大衆故稱大乘所謂大乘小乘者即可以今之車相比如人力車腳踏車電車汽車火車等車有大小不同其功用亦廣狹有差然同有運載之用故統名之曰車人力車腳踏車可比人乘僅載一人唯堪自利馬車可比天乘載人較多行亦較速有更勝進之功用電車公共汽車可比聲聞乘自備汽車可比辟支佛乘行駛既速又不但在此一區之內行動可出三界以外自由運載然汽車等雖能致遠行速而功用猶不甚大至鐵路火車乃可比於大乘以能普利一切人故未聞有人專為自己修鐵路造火車者菩薩為利一切衆生廣學無量法門隨一切衆生之需要各取其用各得其益本經之所謂大乘者亦以此也大乘法有境行果皆大乘之通義就其別義可分三種一特勝大乘專顯大乘第一義諦究竟勝義將前三乘五乘之漸次法超而破之以顯大乘之殊勝二普為大乘顯大乘普度一切衆生之大用前聲聞不能度獨覺獨覺不能度聲聞各有所偏不能圓滿而普為大乘非為一類人一時機而説自住大乘而亦令人天聲緣乘共得其益普為攝受一切應度衆生三適應大乘一法即一切法一剎那即無量劫以佛證無礙法界適應衆生機宜而用大用現前不存軌則所謂藥無貴賤愈病者妙即毒藥運用得當亦成妙品貴能隨機而用遇緣即宗無定相亦無不定相攝一有情或攝一類機如是攝一時代機或攝一方所機皆為適應大乘隨以一法而為最勝即可以餘法為非勝如專崇密咒者即以密咒為最勝而低抑一切專弘禪宗者即以禪宗為最勝而呵棄一切專修淨土者即以淨土為最勝而放捨一切皆為適應一時一類機宜之方便本經為特勝大乘而兼有普為大乘之義故以此三種義觀察一切大乘法二伽耶山頂與佛教史甲釋尊轉法輪及説此經略史大乘是通名屬於大乘之經甚多伽耶山頂是此經別名伽耶是梵音義即是身梵文本義原為積聚之義蓋身為四大五蘊積聚而成之體又有象義那伽可譯龍亦可名象是龍象之通稱而伽耶則但譯為象以此山如象頭之形山頂有塔或精舍佛住於中説此經故即以之立為經名故隋譯亦名象頭精舍經也至於説經歷史即二千數百年前有釋迦世尊降生印度從生王宮厭棄五欲出家苦行降魔成佛而説此經考其一代應化事迹成佛未久之間由菩提場而鹿苑而伽耶山先度三迦葉得一千弟子為常隨衆三迦葉者一優樓頻那此云木瓜癃胸有肉包如木瓜形故迦葉有弟子五百人二伽耶此即以住在伽耶山故名迦葉有弟子二百五十人三那提此云江住江邊故迦葉亦有弟子二百五十人此三人為親弟兄皆苦行娑羅門住近於伽耶山此山有一火龍窟龍常為人害諸外道無敢近龍窟者一日佛為降伏火龍入窟而宿優樓頻那迦葉見而慮之恐佛為龍所害翌日往視龍已為佛降伏逐敬信皈投佛前與諸徒衆皆聞法證果鬚髮自落袈裟著身將外道所用之物棄之江中隨流而下伽耶那提迦葉住江之下流見而異之恐其兄為人所害率弟子往探因亦見佛出家此三迦葉次第率其弟子均從佛成阿羅漢常隨於佛佛此時説法乃在伽耶山頂精舍後有頻婆娑羅王之竹林精舍及給孤獨長者之祇樹給孤獨園與靈鷲山等皆佛常説法之處乙佛寂後教法結集流傳略史佛在世説法聞者雖有大小顯密之差別而皆以佛為法本信受奉行一相一味無有爭執佛滅度後則以結集佛之言教為依歸既經數次之結集而各部所遵奉之經律亦漸有不同矣佛法在印度之轉變大概可分三大時期初五百年純行三乘共法的小乘佛教第二五百年有龍樹菩薩等出發揮大乘性相而萌芽密法可謂小大顯密並弘之時期第三五百年則偏重於密法矣今流行各地亦以此三大時期為準初五百年三乘共教流傳於錫蘭緬暹第二五百年由摩騰至不空大小顯密經論譯來中國而轉傳朝鮮日本第三五百年密法之傳於西藏為盛轉傳於中國北部之蒙古青海等今則西洋各國更採取上述各地之佛法而學習之殆將傳遍全世界矣丙本經傳入中國翻譯史此經傳入中國歷史甚久共有四種譯本第一次乃東晉時姚秦三藏鳩摩羅什法師所譯名文殊師利問菩提經第二次即北魏時菩提流支三藏法師所譯名伽耶山頂經無大乘二字第三次即隋時毗尼多流支三藏法師所譯名象頭精舍經第四次翻譯者即本經是乃唐中宗時即武則天時譯成譯師是南天竺之菩提留志三藏於華嚴經寶積經等皆在場參譯其文義較前數譯簡單明顯故今取此本講之三經與佛教圖像經籍甲佛滅後以經像為住持佛寶法寶經梵語修多羅又云素怛纜在十二分教中譯曰契經常住不變契理契機不偏不倚乃佛依內證真理隨衆生根機而説之法如是之法即所謂經常大法修多羅有線之義能貫串攝持使如來一代教法不散不失流萬古傳各國佛滅度後法有正法像法末法之分佛在世時佛為一切法本由佛教導開示或因事制戒弟子無不遵之信之行之佛滅度後即依結集流通之典籍為法寶修塔供佛舍利或修廟塑佛形像為佛寶有經像流傳於世即是有佛法住持於世但經中有畫佛像者有説佛之相好莊嚴者像中亦有表法者因此而令衆生起信則是像亦含有法之義經亦攝有像之用也乙佛教之圖像一佛像及佛本生與化迹圖今之錫蘭等處尚有原始圖像可見其所設之像皆釋迦佛當時形狀無他變像或佛本行菩薩道事迹或降魔涅槃等之佛或彩畫或泥塑或金石雕刻皆表現佛寶之住於世二三乘聖衆與八部天神後因教法流傳之深遠信仰之普遍所行區域之廣大因信衆根器之差別遂依經而增塑佛教各種形像由佛像而至於三乘聖衆菩薩羅漢之像以及天龍八部護法神衆之像其雕刻繪塑之巧妙精良又開世界美術之先導三曼怛囉與諸奇變圖像更進而至於密教發達之時由佛菩薩等為中心而成為曼怛囉此云壇城即壇場國土此種集為團體的圖像其中有無量諸佛菩薩金剛聖衆天龍八部等像如極樂世界圖以阿彌陀佛為主觀音勢至及無量往生衆圍繞左右池花園林悉皆具足以一圖而攝一淨佛國土或毗盧遮那或觀音或文殊等密壇皆以一佛或一菩薩或一金剛為中心所有部衆眷屬統攝其中廣繁衆多而成為一大團體乃至現淫怒癡種種恢奇譎變圖像皆繼之而出丙佛教之經籍一二藏三藏四藏五藏六藏與十二分教佛教典籍衆多總編成一大藏就藏中分類又有種種區別由佛説結集出者原只有經律二藏但佛在世時即有由弟子解釋或著述之論結集時同結為論藏即有經律論三藏佛法住世既久即有繼續發展之著作或傳記或規約典章或辭典法數則非三藏所能都攝因之又另成雜藏即為四藏逮密教發達後有密部經咒儀軌之結集又加祕密藏即有五藏或分大乘三藏與小乘三藏即成六藏今此經字顯攝在經藏而非其他各藏所攝又在經藏中此乃大乘經而非小乘經故經題標名大乘伽耶山頂經若就十二分教中分之此又屬於契經長行此種分法更為繁細茲不贅述二南北傳與原説所用文語近人研究佛典之範圍更為寬廣了因交通便利人類知識發達非拘守一地一種文字可以塞其責矣論者多以巴利文為原始記載佛法之通俗文流傳於南印度而漸及錫蘭暹緬梵文則為印度典雅之古文流傳於中印度北印度漸及於中國此乃近代西洋人研究巴梵文所分別實則不盡然蓋中國佛法亦有由南方傳來者如此經即南天竺之菩提留志所傳譯又考不空三藏等曾住錫蘭南洋馬來群島古時亦盛行過密乘且盛行小乘一切有部之迦濕彌羅國亦在北印度故若謂南傳純巴利文小乘北傳梵文皆大乘者殊不然也要之佛法於印度大小顯密皆曾普遍流行過不過盛衰時期有早遲不同耳至於佛説法所用文語亦是隨機而用對典雅人即用典雅文語而説對普通人即用通俗文語而説故亦應梵巴文同時並用三現行佛典之主要文字大概原始佛教主要文字即梵文與巴利文後由梵巴文而成漢文即新疆等地古時亦有文字翻譯經典流行又由漢文而成日本文朝鮮文等由梵文漢文而譯成西藏文藏文而成蒙滿文等此乃佛典流傳於世之主要文字致成種種經教典籍之差別中國佛經乃會合南北傳梵文巴利文而成之一大藏此大藏中可分經律論雜四藏經藏中即有此大乘伽耶山頂經此經即在伽耶山頂精舍説因以為名釋經甲一敘起分乙一證信序丙一聞時主處如是我聞一時婆伽婆住伽耶城山頂精舍此中有四種證信一如是我聞為親聞證信要結集流傳此經必須是從佛親聞説法之弟子然後方見確有淵源如是者即如此之義謂如此之一部經也我者乃結集之人對大衆自稱以區別之假名非有我執之我蓋佛法深明無我諸阿羅漢皆已除我執故聞者由耳根發耳識而緣聲塵謂如此一經是我從佛親聞非道聽途説或輾轉傳聞者可比二一時為説時證信此一時正是佛在伽耶山頂諸大弟子聚集一處機教相叩之時不確定其年月日時者以佛法遍傳於人間天上而人世各國亦曆法不同縱記年月日仍難為標準故但云一時以明説此經確有年月日時耳三婆伽婆為説主證信婆伽婆是梵音或譯為婆伽梵或譯為婆伽筏帝乃佛尊稱之一因含義甚廣故不翻譯智度論説含有德有名聲巧分別能破四義佛地論説含名稱端嚴熾盛尊貴自在吉祥六義常誦佛十號中之世尊即此譯義也婆伽婆或世尊等名本通稱十方諸佛蓋佛佛道同諸佛皆圓滿自利利他功德同具十號然此世界為釋迦世尊化土祇有此獨一無二之釋迦佛故但稱佛或世尊即知是釋迦牟尼佛也四伽耶城山頂精舍為説處證信此經在何處説即在伽耶山頂精舍中説城依山建以山名城佛即住於山城頂上之精舍中也本經之世親釋論科為九分此當其序分丙二法會部衆與大比丘衆一千人俱其先悉是長髮梵志皆阿羅漢諸漏已盡所作已辦捨諸重擔逮得己利盡諸有結正知解脫心得自在到於彼岸復與無量諸菩薩摩訶薩衆俱此為同聞證信前面雖有四重證信但皆就結集者一人所歷之境而言假使有人對彼聞法者根本懷疑則彼所説之證據俱為無效必須更有同聞之人為證譬如今之會議録有地點有時間有主席有記録有會衆凡到會之大衆均須簽名完備此必不可少之條件方可令人生信此中部衆分二一比丘衆為佛內眷屬衆常隨佛學與佛同住同威儀故且皆已證阿羅漢果故云大比丘也二菩薩衆為佛大眷屬衆以大智大悲助佛弘化故比丘含義甚廣諸經論中解釋有三種義或五種義其本義為乞士捨離世間親族資産乞食以資生命然此為乞士之外相其內涵深義在常隨佛學乞法以資慧命換言之即出家求法之士佛教譬一學校出家衆猶遵校規之住校學生在家衆猶走讀旁聽學生衆即僧伽有和合之組織各成部衆非同一故此中一千比丘即三迦葉及其弟子其先皆是長髮梵志梵志即婆羅門教中出家修苦行以求生梵天為志者現已從佛聞法得證阿羅漢果阿羅漢果為無學果如學滿畢業之學生初二三果名為有學如已獲入學之學生阿羅漢亦有三種義或五種義乃至法華論中説十九種義而根本義為應如云多他阿伽陀阿羅訶三藐三佛陀即如來應正遍知應有應供之義平常誤解應供之義以為施主設供我們即去應酬接受彼之供養其實為有德者應當受供之義蓋佛與阿羅漢所修功德圓滿堪為世間福田應當受人天供養也諸漏已盡以下言阿羅漢功德之相所應斷之煩惱已斷所應得之功德已得所作已辦不受後有所有心思行為離一切顛倒得大自在而已達到究竟彼岸按此經有天親菩薩所造釋論名文殊師利菩薩問菩提經論元魏菩提留支譯於此無學列有八種功德一者所作畢竟即此經諸漏已盡二者畢竟於應作者已作即經所作已辦三者遠離三昧障即經捨諸重擔四者捨離所受五陰業報即經逮得己利五者證涅槃即經盡諸有結六者過三界即經正知解脫七者依不顛倒受教修行即經心得自在八者如實修行四如意足即經到於彼岸論又云阿羅漢者能受信者所施物故故名應供復與無量諸菩薩摩訶薩衆俱此為大眷屬衆其他譯本並列有文殊師利菩薩觀世音菩薩得大勢菩薩香象菩薩勇施菩薩勇修行智菩薩等名及天龍八部等此譯略也然無量二字即可以略文而概括其廣菩薩二字常人亦多誤解以凡泥塑木雕者為菩薩甚至於玩具類之泥像等亦呼為泥菩薩或以為必如觀音地藏等方可稱為菩薩不知菩薩是梵語之菩提薩埵菩提譯覺薩埵譯有情此覺有情有二義一是自求大覺悟之有情二是以大慈大悲覺悟他有情所謂普度衆生者是菩薩亦有程度高低不一初發菩薩心即得稱菩薩此中乃有大威德神通智慧之大菩薩故云摩訶薩梵語摩訶薩埵此云大有情以上明同聞證信中之比丘衆與菩薩衆此二衆在今世佛教徒猶倣佛存之依比丘律儀結成僧團乞食而住者今錫蘭緬暹等處行之此可稱為比丘衆西藏僧俗稱喇嘛其黃帽派亦先受持比丘戒律但於學密法後及紅衣白衣派多有不依比丘律制依大乘法廣修利世濟人行者此即近於菩薩衆在中國漢地常稱出家人為和尚實為尊敬出家人之稱從古即將沙彌戒比丘戒菩薩戒在數旬間頓時接受從不專遵行沙彌比丘戒生活而百丈立清規自云不離大小乘戒不即大小乘戒而自成為一種特殊之出家衆規範今自其特殊處即可稱為和尚衆至於日本通稱寺院僧侶為蒲塞彼蒲塞一名本為坊主今可即作優婆塞夷之義解彼雖寺僧亦為一寺區信衆之教化主但非出家比丘而略同在家菩薩故皆娶妻置産而從事於社會文化公益事業此可稱為蒲塞衆今中國在家佛徒如居士林等最應充分學習日本佛教徒尤應學其淨土真宗以積極之精神護教弘法發揚文化建設社會各種事業至於中國出家僧衆若單是和尚衆今已覺太空疏散弱不足以應今世需要之佛教而生存故出家者應先經過如錫蘭等比丘生活及西藏之喇嘛生活以為基礎乃可成端拱無為之和尚衆生活豫嘗謂出家者須經過最少二年多則十二年之學僧生活完全在沙彌比丘戒律僧團中修學佛法次學喇嘛僧廣修諸自利利他功德能為社會國家作息災增益除魔度亡禱雨祈晴等法事中國應赴經懺僧改良之即攝屬喇嘛僧乃至醫藥工巧等事皆可隨力為之如此數十年後方可成一和尚衆長老僧清高無事而為人供養之福田否則空腹高心於佛法無以自利亦無可利於人徒為社會詬病而遺害於佛教此當論所應聞弟子成就分乙二緣起序丙一三昧分爾時世尊得成正覺其日未久寂然宴坐久於三昧觀察法界爾時即在伽耶山頂諸阿羅漢無量菩薩聚集一堂之時世尊指釋迦世尊即前之婆伽婆為人間天上最所尊崇故稱世尊正覺梵語中之三菩提具云阿耨多羅三藐三菩提此云無上遍正覺成正覺即是成佛中國古時以為最尊最貴而不可思議者莫過於道故又譯為成道向未得者今已得向未成者今已成故云得成正覺無上遍正覺與通稱之覺不同若迷途之人忽得一知之見即以為覺如覺今是而昨非此種覺仍不免顛倒錯誤隨時變更不能稱為正覺要到聲聞初果二果三果四果及辟支佛果等方可以稱正覺但其覺猶未逼不能普覺一切有情不能覺過去未來長劫之事不能知無量世界之事故雖可稱正覺未能稱遍正覺至於諸大菩薩普度衆生則可稱遍正覺矣但其覺雖遍其功德猶未臻圓極如月光雖亦能遍全界而不及日光之熾盛透明不能謂之無上要到成佛方名無上遍正覺蓋羅漢所得之智不過妙觀察智之一部分而菩薩亦於妙觀察平等性智未圓滿合成所作智大圓鏡智名四智惟佛一人圓滿具足證得修行是要斷二障得四智障斷盡智圓成果滿三身恩及群品如是謂之成佛依此而言成佛實大不易世尊説此經時成正覺尚不久自在菩提場金剛座上得成正覺已三七日或云五七日七七日受諸法樂即到鹿野苑度五比丘漸遊化至伽耶山度三迦葉此經即在度三迦葉以後所説故有大比丘衆一千人俱大約在成佛後一年或數月之內故云其日未久寂然宴坐此外形之定相謂六根寂默威儀寧靜也入於三昧此內心之定境三昧具云三摩地正譯為定義是等持等者入定時心不浮不沉不昏不散住於平等持者能保持心平等住故此是定之通義而定相應之德慧有深淺大小不同佛有海印三昧首楞嚴三昧等由此引生名詞甚多因定由止息諸妄想得成故又名奢摩他又名三摩鉢底此云等至三摩呬哆此云等引禪那此云靜慮禪定通於凡夫外道二乘菩薩及佛此中是佛之定但依佛之心而説本常住於定無有出入此就現於人中之化身言故亦同人類有行住坐臥語默動靜此時正入於靜默之三昧觀察法界此明定中智慧所起觀察之境超乎言説思量之上不同普通散亂或錯誤的觀察盡宇宙凡一切可言説思量若有形若無形若有為若無為皆名曰法法界有三種義一界即性義一切法性畢竟空此法空性即法界二界即因義法性本空不生不滅而此萬有諸法差別皆因緣生宇宙無量諸法緣起之因因即種子一切種子即法界三法界即一切法總和相以一法而總一切法統一切法又非另有一法為統為總即每一法皆總統一法不即不離不一不異界即界限之義諸法皆不能越出每一法界限之外丙二能觀清淨分作是念言我已證菩提已得聖智慧已辦所應作已捨諸重擔已出生死曠野已捨於無明獲於智明已拔毒箭已盡渴愛已證法界已擊法鼓已吹法螺已建法幢已捨離生死眼説於法眼已閉惡道開衆善道已捨非田示諸福田此能觀清淨者即反省能觀察之自己已究竟證阿耨多羅三藐三菩提故作是念言我已證菩提然在三昧何以有念蓋念即正念佛常在三昧亦常相應正願正念正知等故已得聖智慧者即已得超出世間凡外等之出世間無漏智慧已辦所應作等即自利功德圓滿已斷盡貪瞋癡慢無明煩惱出於生死曠野得證法界真如重擔即心中對於五蘊我我所之取求不能放下如重擔在身毒箭即是凡外邪見或二乘之偏見渴愛即猛利之欲貪心此所謂所應斷者皆已斷所應得者皆已得也已擊法鼓等即利他功德圓滿擊法鼓即轉法輪吹法螺即降魔梵建法幢即摧邪外生死眼即妄想分別能引人到生死之路故法眼即涅槃第一義諦所謂涅槃妙心正法眼藏也惡道謂三惡道善道謂人天道及出世道之三十七品道戒定慧道六波羅密道非田謂非福田諸邪外犯諸過失不能福利群生者若自利功德圓滿能使衆生起信心以生諸功德者故名福田又按天親釋論以證得菩提得聖智慧為總將已辦所應作以下分成十七種智慧以示佛之所證得一者本願滿足故如此經已辦所應得二者捨離所取重擔如經已捨諸重擔三者善斷一切諸煩惱障如經已出生死曠野四者善斷一切智障如經已捨無明五者證如實妙法如經獲於智明六者離一切邪箭如經已拔毒箭七者離諸願如經已斷渴愛八者成就出世間慧如經已證法界九者轉妙法輪如經已擊法鼓十者出無我妙聲善能降伏一切諸魔如經已吹法螺十一者善能降伏一切外道如經已建法幢十二者善斷一切諸結因緣如經已捨離生死眼十三者説世間出世間妙法如經説於法眼十四者善能遠離顛倒取相如經已閉惡道十五者轉八聖道如經開衆善道十六者善能遠離外道福田如經已捨非田十七者示現三寶福田如經示諸福田如此依論對觀則其文義更明顯矣丙三所觀法分丁一審觀三法我今審觀如是之法誰能現證已證當證為身證耶為心證乎再將所成就之菩提反省觀察如是之法即前所得之菩提功德法誰能者謂何法能證何法曾證何法今證將來還有何法來證是用身證還用心證如是應於能證所證身心菩提三法遍審諦觀丁二身不可得若身證者身是頑鈍無覺無思猶如草木牆壁瓦石從於四大父母所生無常敗壞散滅之法必假塗洗衣食等緣而得存立若謂身能證菩提者猶世執即身成佛然身是物質如草木瓦石頑鈍無知覺無思想造作之力且由四大和合托於父母精血不淨而起危弱不堅污穢不淨必假飲食湯藥衣食房屋資生衆具乃暫得存立何能得彼清淨無染常住真如之無上菩提按釋論列八種法示身不能證菩提惟與本經次第稍異一者無作者如經身是頑鈍二者虛妄取相成就如經猶如草木牆壁瓦石三者遠離諸想如經無覺無思四者以諸因緣和合故生如經從於四大五者體不淨如經父母所生六者念不住如經無常七者如危朽物不可常保如經必假塗洗衣食等緣而得成立八者體是不實如經敗壞散滅之法故丁三心不可得若心證者心如幻化無相無形無所依處無所容受若謂心能證菩提者猶世執即心是佛但心無形相無處所虛幻無實覓心了不可得又何從能證菩提如神光二祖請達摩安心達摩云將心來與汝安神光當下覓心了不可得而所有煩惱妄想心即消滅豁然大悟又如楞嚴經佛因阿難七處徵心心不在內不在外不在中間心在何處皆不可得以上就身心二法明無能證者丁四菩提不可得又菩提者隨於世間而立名字無音響無形色無成實無相狀無來無去不出不入過於三界無有處所不可見聞不可憶念離攀緣處非戲論境無所入無文字不可動搖不可安立絶於一切語言之道既無能證亦無所證以菩提的名字亦是隨世間假立依名求之亦是虛妄分別無有實體可得況又無音響無形色無相狀等猶不及物質聽之有聲音視之有形色等故似有生成實質及一定相狀占有處所有處所故可言去來今此菩提者過於三界非見聞思憶境界不可以善不善諸法分別攀緣即妄念分別戲論即假名分別言語道斷心行處滅故云不可安立絶於一切言語之道豫此次到重慶時説有四句偈首兩句是身空莫即方成佛佛本無成始即身成佛即此中證菩提若了身心空無可即方成佛慧佛菩提性本無成實始即身空適契此經無能所證之義丁五無得而得而言現證已證當證但惟名字虛妄分別無生無起無有體性不可取不可説不可愛著是中實無已成正覺現成正覺及當成者若能如是無證無成乃得名為成正覺耳何以故菩提者離於一切變動相故前言能證之身心不可得所證之菩提不可得然則如何而言證菩提耶所言證者亦是依世俗而説之假名虛妄分別無有實體如是通達無能證之身心無所證之菩提無生無起無相無性不取不説不愛不著心緣寂寂境智如如一切無得即是得阿耨多羅三藐三菩提以菩提清淨寂靜離一切變動相故豫偈之後二句云顯密間名今謝矣不須明鏡更添塵甲二答問分乙一文殊問丙一起分爾時文殊師利菩薩摩訶薩知佛所念而作是言世尊若菩提如是相者諸善男子善女人發菩提心應云何住佛言文殊師利如菩提相應如是住文殊菩薩以他心智知佛心中起了如是觀察菩提之念而發此問若不知即不發問不發問即無説此經之因緣故曰起分文殊師利或譯曼殊室利都是梵語此云妙德玄奘法師翻妙吉祥文殊表大乘之根本無分別智諸菩薩皆依之發心修行故經中稱文殊為七佛之師或諸佛之師蓋大乘根本無分別智即摩訶般若般若為諸佛之母不依般若不能成無漏福智雖修諸善功德不能證得清淨法身然佛心念境界甚深所謂惟佛與佛乃能知之何以文殊菩薩亦能知耶蓋大乘聖位可現菩薩身亦可現佛身故經中亦説文殊菩薩是過去劫龍種上尊王佛久已成佛今特現菩薩身以助釋迦宣化此中文殊能知佛念可作兩種義解一文殊已成佛故二佛為利益衆生故加持文殊令知起問以便説法又佛有時現身相或起心念能令各類有情見知如説有一次佛在山中起念令一獼猴知之而生敬信而作是言世尊若菩提如是相者指前佛心中所觀菩提相此時佛在入定文殊忽於衆中發此問他人皆莫明其妙惟文殊與佛心心相印了了明知耳善男子善女人乃具有善根之男子女人善根者即信進念定慧五根或無貪無瞋無癡三善根或指過去或由現生已修有此善之根基而言菩提心既無體性何以能發起又何以能令不退失不壞滅而相續安住欲除時疑因發此問佛言如菩提相應如是住先總答一句如菩提相無生無起不可取著不可安立今發菩提心亦應如是住若別有心趣菩提境即住妄想非住菩提此時問答亦惟文殊與佛能知大衆仍不知所説何事雖有問答等於無説故須下文重為問答方入説分丙二説分文殊師利菩薩言世尊何者是菩提相佛言文殊師利菩提相者獨超三界雖隨世俗而有名字遠離一切音聲言説諸菩薩衆發趣菩提從初發心則無所趣是故文殊師利諸善男子善女人應以遠離發趣之心而住菩提文殊師利若諸菩薩能發趣於無所趣者是則趣向菩提之道文殊師利趣於無自性是趣向菩提趣於無處所是趣向菩提趣於法界性是趣向菩提趣於一切法中無所執著是趣向菩提趣於實際無差別是趣向菩提趣於如鏡中像如光中影如水中月如熱時焰是趣向菩提佛在上面總答一句文殊已可了知今為大衆故再發問佛言文殊師利先呼其名而後告者示親切也菩提相者獨超三界以三界皆是名言假立也顯義名言此對高等有情而用至禽獸類亦是有言説聲音表顯其意義然至蟲蟻之類聲音亦無無色界天身器俱無然各有心識表顯其境此心識為顯境名言故凡三界所表現者皆虛妄分別識之相此菩提相則非虛妄分別識相故云獨超三界然既無相何以又有此菩提名言為隨順世俗有情之習慣假立此名義而攝受化導但詮旨之所在則遠離於一切言説如指指月月不在指諸菩薩發菩提心者此心當體空性即是菩提故從初發心即遠離發起心趣求心以無所趣而住菩提昔有一學人問一禪師云如何是佛禪師很鄭重的説我為你説了你信不信呢學人説師乃大善知識今既為説何敢不信禪師説你就是佛此學人當下了然承當又問禪師如何保任禪師説一翳在目空華亂墜彼云保任即此中所説住菩提能遠離發起趣求等妄分別心即住菩提前文總説下文佛又再呼文殊之名而歷舉七義以告之一能趣於無所趣者是趣向菩提蓋第一義中一切衆生與諸佛本來平等性空無二無別體即是佛若執凡聖差別謂佛勝我劣我趣佛果者即是妄想昧卻本性即非是趣菩提二趣於無自性即達因緣生法自性皆空三趣無處所者明遍一切無別在處四趣於法界者證真如法性得無分別智即菩提心五趣於一切法中無所執著者法即是物凡可言説想念皆名為法所謂言之有物執一物即有一實在自體如一棹子一茶杯或一草一花乃至一地球一太陽皆各有實體有自性故有自他分立可取著可趣向此落於虛妄想相之遍計所執然諸法乃因緣所現幻相由識心分別而設立假名不可執為實有若固執各自有實體此法即不通於彼法彼法亦不通於此法互相障礙如今之科學哲學必先有一基本安立之空間時間格架然後依之而發揮其原子電子等説又如造屋必依地畫圖而後建立之一有依據處所即有立足之地落於數量有礙有對故於法無所執著乃趣菩提矣六趣於觀一切法如鏡中像如光中影如水中月如熱時焰者雖觀境相了了分明而知是幻現不執為實物或就四大五陰觀察以破人我執或知一切法畢竟空不存絲毫能所取心除法我執如金剛經觀有為如夢幻泡影露電不取於相如如不動即是趣向無上菩提此一段為佛答文殊根本要義下皆文殊應問而答之差別説乙二文殊答丙一答淨月威光丁一依何處修何行爾時衆中有天子名淨月威光白文殊師利菩薩言大士諸菩薩摩訶薩修習何行依何處修文殊師利菩薩言天子諸菩薩摩訶薩修大悲行依於一切衆生處修淨月天子又問言菩薩大悲依何心起文殊師利菩薩言菩薩大悲依無諂誑心起又問言無諂誑心依何而起答言無諂誑心依於一切衆生平等心起又問於一切衆生平等心依何而起答言依於入非一非異法性心起又問入非一非異法性心依何而起答言依深信心起又問深信心依何而起答言依菩提心起又問菩提心依何而起答言依六波羅密起又問六波羅密依何而起答言依方便慧起又問方便慧依何而起答言依不放逸起又問不放逸依何而起答言依三種淨行起又問三種淨行依何而起答言依十善業道起又問十善業道依何而起答言依持淨戒起又問持淨戒依何而起答言依如理思惟起又問如理思惟依何而起答言依觀察心起又問觀察心依何而起答言從憶持不忘起此中先問後答如文可知文殊以無礙樂説辨才答淨月威光天子問以十四種次第説上上勝勝之法此中天子亦是已發菩提心者因聞佛告文殊發趣菩提之義心猶有疑故發此問謂菩提既然如是則初發菩提心者究竟依於何處修何種行呢文殊答以修大悲行依於一切衆生而修即觀察無我以一切衆生為我衆生之苦即我之苦起大悲心修利他行此即菩薩依衆生修大乘行之方便至於佛則不假方便任運利生所謂無功用道不須有所依也大悲依無諂誑心而起無諂誑心即是直心真實無偽不欺誑衆生所謂直心是道場等無諂誑心依平等心而起心若平等則對一切衆生無自他親疏厚薄之分乃能直心無諂平等心依於入非一非異法性心而起能通達諸法因緣生平等性空一異不可得因此對衆生起平等心非一非異法性心依深信心而起此深信心即信佛説諸法因緣生法性平等非依佛無上菩提不能起深信心故深信心又依菩提心而起有發趣阿耨多羅三藐三菩提心者即能起深信心而菩提心又依修習六波羅密起六者即布施持戒忍辱精進禪定智慧修此六種波羅密行而起菩提心又六波羅密行依方便慧而起方便慧即是能知對治法之智如慳貪即以布施對治惡行即以持戒對治瞋恚即以忍辱對治懈怠即以精進對治散亂即以禪定對治愚癡即以智慧對治方便慧依不放逸而起不放逸者不放任其身心令生過惡起向上精進心以求對治故修六波羅密不放逸依三種淨行而起三種淨行者即身業清淨語業清淨意業清淨也三淨行依十善業道而起十善者即身不殺生不偷盜不邪淫口不兩舌不惡口不妄言不綺語意不貪不瞋不癡此為人天正道故稱十善業道又為世出世間正行道之根本十善業道依持淨戒而起淨戒即佛各種戒律其目的亦不外清淨三業圓滿十善持淨戒依如理思惟而起以合於真理之思惟如何能使身心行為清淨得到解脫於是有持戒之行為生起如理思惟依觀察心而起能明徹觀察諸法前因後果毫不糊亂方能如理思惟觀察心依憶持不忘而起憶即憶念持即保持憶持不忘即是聞所成慧如理觀察思惟即思所成慧從持淨戒至修大悲行皆修所成慧統觀以上即修習聞思修三慧三慧中尤以聽聞憶持正法為根本然此十四種法展轉相因展轉生起按釋論係以憶持不忘為第一倒為次第乃至修大悲行為第十四論十四法者一者受持不忘二者善取正教觀有為法三者無彼處過四者不隨順諸過五者善修十善業道六者身口意業三法清淨七者戒清淨八者隨順利益一切衆生九者滿足一切助菩提法十者不疲倦十一者業果清淨十二者修行清淨十三者作利益一切衆生清淨十四者心清淨如此十四法以完成大悲心為主由修習諸行而圓滿大悲乃成真正發菩提心丁二發菩提心因果戊一法説爾時淨月威光天子復問文殊師利菩薩言大士諸菩薩發菩提心凡有幾種於因於果而得成就文殊師利菩薩言天子諸菩薩發菩提心凡有四種於因於果而得成就何等為四一者初發心二者解行住發心三者不退轉發心四者一生補處發心應知初發心為解行住因解行住發心為不退轉因不退轉發心為一生補處因一生補處為一切智因淨月威光天子聞文殊開示修於大悲行已接著又問發菩提心的因果成就大士乃菩薩之尊稱此發菩提心因果概括言之約有幾種發菩提心四字稍聞佛法的人都會説而能確切解釋者恐還不多菩提即阿耨多羅三藐三菩提為佛果所成就初發心即對此境而發起故云發菩提心然心是總名有八識心王及心心所法皆屬於心究竟對菩提果境所發起者屬於何心試觀初發心即是立志願欲求達到阿耨多羅三藐三菩提願是心所法乃第六意識上相應五別境中之欲心所與彼相應起者有六識心王及五遍行十一善等心所法由此展轉相依相託之根本依種子依等之衆緣以及等流而起之善行功德乃至能了達緣生性空等皆總攝為菩提心矣此就十信位發心而言到十住位此心展轉增盛由願欲而起決定不可引轉心又成以勝解為主的菩提心到十向位念念回向菩提念念回向衆生念念回向真如二六時中念茲在茲念力增勝又成以念為主的菩提心再進而至四加行位此心又恆與定相應即成以定為主的菩提心又由加行無分別慧觀所取境空達能觀心空心境俱空而發根本無分別慧之時則菩提心即是菩提此時方名真菩提心亦是以慧為主的菩提心此心無發而發菩提亦無得而得矣文殊答有四種發心於因於果而得成就一者初發心即是最初對無上菩提立起志願能確定明了菩提之境以發心趣求即十信位趣初住位之心此趣求菩提之志願即四宏願所謂衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成佛道無上即阿耨多羅三藐三菩提之佛果二者解行住發心即前欲勝解念定之發心由十住十行十回向以至四加行上二皆因位發心三者不退轉發心梵音所謂阿鞞跋致此入初地得證不退故名不退轉發心也四者一生補處發心補處者補處佛位此是最後身發心發心即成佛如釋迦世尊於金剛座上而發願曰若不證菩提終不起此座正所謂發阿耨多羅三藐三菩提心也此二皆為果位發心應知此四種發心依修行次第而言亦是展轉相因而起謂如初發心為解行住因乃至一生補處發心為一切智因一切智又名一切智智即正遍知為如來德號之一梵語三藐三菩提是也戊二喻説復次天子應知初發心如田中下種解行住發心如芽漸增長不退轉發心如枝葉花果次第出生一生補處發心如果實成熟文殊菩薩為普利一切衆生故將前四種發心用十一種譬喻詳為解釋因衆生之根機行業有種種之不同非一種譬喻能遍曉一切人故用種種譬喻來説第一以種田為喻謂四種發心因果次第如下種發芽開花結果果實成熟如文易知復次天子第一發心如造車人先集於材第二發心如得材已各別治淨第三發心如彼匠人造車成就第四發心如以其車引重致遠第二以造車為喻治淨者去其枝節各別分配某材為輪某材為軸引重致遠喻成佛度生復次天子第一發心猶如初月第二發心如五日夜至七夜月第三發心如十日夜月第四發心如十四夜月應知如來所有智慧譬如明月至十五夜一切光明悉皆圓滿第三以明月為喻月光喻智慧智慧即覺覺即菩提初發菩提心如初月其光未露漸至成佛如十五夜光色圓滿復次天子第一發心超聲聞地第二發心超支佛地第三發心超不定地第四發心住決定地第四以三乘行果為喻初發心雖未斷生死煩惱而其心已超過聲聞地所謂迦陵在殼其聲已超群鳥蓋聲聞終不成佛也辟支佛即是獨覺不定地尚有退轉此中第三即是不退轉發心故云超不定也住決定地即是成佛復次天子第一發心譬如有人初學字母第二發心如彼學人漸解分析第三發心如學已久善知算數第四發心如學成熟了達諸論第五以求學次第為喻此字母即指印度梵文字母大概除中國漢文外其餘世界各種文字皆從字母拚音學起漸解分析即明了文法集字成句集句成章第三如文已成章算已知數第四則已了達究竟畢業可以運用矣復次天子第一發心菩薩住因第二發心菩薩住智第三發心菩薩住斷第四發心菩薩住果第六以菩薩住位為喻初二為因三四為果若細分之第一為純因乃因中之因第二為因中之果又初二能伏二障第三方能徹底斷除二障一分故能不退乃果中之因第四一生補處以鄰近於阿耨多羅三藐三菩提則是果中之果矣復次天子第一發心因所攝第二發心智所攝第三發心斷所攝第四發心果所攝第七以所攝為喻因果次第與上義同復次天子第一發心從因而起第二發心從智而起第三發心從斷而起第四發心從果而起第八以所從起為喻義亦同上復次天子第一發心因差別分第二發心智差別分第三發心斷差別分第四發心果差別分第九以差別為喻顯發心差別之相復次天子第一發心如採集衆藥第二發心如分別藥性第三發心如隨病合藥第四發心如服藥除愈第十以採藥治病為喻五明中有醫藥明行菩薩道者應能採藥合方藥服病除如最後發心達到斷煩惱證菩提之目的矣復次天子第一發心生法王家第二發心學法王法第三發心學得了解第四發心學得自在第十一以學法王為喻法王即指佛又法王有泛正二義泛論則一切法皆因緣所生成一切即攝一切法無論果法因法世法出世法佛法衆生法一一皆平等性空隨以一法為主可對衆法而稱王法法皆可為王所謂於一微塵出大千經卷於一芥子納無量須彌皆顯法王之義又一切諸法真實性空如此普遍常住空真如性即為法王王即是空所謂空王又一切法皆心所變應以心為諸法之王王以能自在轉變為義故然此上猶未能正顯法王之義而最正確之真法王即阿耨多羅三藐三菩提能轉有漏成無漏轉雜染流轉成清淨常住轉無明妄想識成圓明遍照智故得菩提者曰佛唯佛是真正法王此中生法王家即初發菩提心時皈投於佛也第二第三即對佛法已得勝解明了第四學得自在自在即王義謂得成佛也如法華經佛謂我為法王於法自在是也丙二答決定光明丁一問速疾道行爾時會中有天子名決定光明白文殊師利菩薩言大士何者是菩薩摩訶薩速疾道諸菩薩摩訶薩行此道疾得阿耨多羅三藐三菩提爾時者答淨月威光已畢之時會中者即伽耶山法會之中有天子名決定光明為區別天王故稱天子此中天子大概以欲界天者為多因欲界天與人較近又不常在定能多聞法上二界的天人則多定境故少赴法會天子有凡夫亦有證初二果者證三果即上生色界五不還天又如華嚴等説初二地菩薩現生人間作轉輪聖王三地於忉利天應化為王四地夜摩天五地兜率天六地化樂天七地他化自在天八地大梵或二禪天九地三禪天十地四禪或色究竟天各各應化為王故天王天子中亦多菩薩應化速疾道即速疾成佛之捷徑發菩提心者雖可決定成佛但要經三大阿僧祇劫之長時間五十五位或四十五位之階梯及捨頭目腦髓種種難行之事故有退轉之過患因此請為説速疾成佛之方便以鼓勵其萎弱畏退之心由此大乘各宗都以不涉階梯之頓超方便稱勝如禪宗見性即成佛密宗三密相應即身成佛乃至淨土宗橫超三界等皆為修菩薩行者此一要求而設之方便使初學之人制心一處由所習一法門中憶念專持集修一切菩薩功德日進有功孜孜不倦然此經所明乃修菩薩行平正通行之道亦即法華經所謂大白牛車其疾如風也真實成佛須斷盡二障圓成四智恩普群生滿足自利利他斷智恩德方成佛果不是偷心取巧所能幸致即淨土念佛法雖云簡便速疾可以橫超當知此不過是超此世界而遷移一較便於修行的環境而已並非往生即已成佛仍須歷位修習增進以求圓滿斷智功德方成佛果平常所謂橫超豎超其義並不正確凡夫雖可帶業往生極樂世界因帶有漏業故不能算出三界不過彼世界環境好有勝緣增上使其易進不退耳仍非斷盡三界惑業不能了脫生死各宗設方便令其心有所專注如此恆久專一即于其中勇猛集修衆行故云易速成佛若徒貪方便便宜而不能恆久學此法稍久不見功效又改學彼法學彼法稍久不見功效又改學他法見異思遷逐偷惰之情以流蕩則反塞方便之門終無成佛之望矣丁二答四種二道文殊師利菩薩言天子菩薩摩訶薩速疾道有二種諸菩薩摩訶薩行此道疾得阿耨多羅三菩提云何為二一者方便道二者般若道方便道者攝諸善法般若道者了知簡擇方便道者不捨衆生般若道者能捨諸法方便道者知法和合般若道者知不和合方便道者能為因緣般若道者能至寂滅方便道者能知諸法差別之相般若道者能知法界無差別理方便道者能具莊嚴諸佛國土般若道者能知諸佛國土平等方便道者能知衆生根行不同般若道者能知根行空無所有方便道者令諸菩薩詣於道場般若道者能令菩薩逮無所覺此第一種二道以方便與般若二種為速疾成佛之道維摩經云方便以為父般若以為母方便是福德資糧般若是智慧資糧福慧圓滿兩足尊者即是成佛菩薩無父母以方便般若為父母世父母所生者是四大假和之衆生非是菩薩佛亦無父母以方便般若為父母達一切法因緣所生自性本空如幻如化而修諸方便行所謂建水月道場作空花佛事度陽焰衆生降鏡像魔軍一切法皆唯心所變空無自性以此常行上求下化自利利他之法而至成佛方便與般若不可或離或缺故維摩經謂有方便慧解無方便慧縛有慧方便解無慧方便縛即此義也方便道者攝諸善法一切法可分善不善無記此中善法通世出世間善法大概六度中前五度可以攝之般若道者了知簡擇諸法般若即慧能決擇諸法之善惡邪正方便能攝諸衆生不捨一有情般若能了達諸法空性不執一法方便能知諸法因緣所生相應和合般若能知諸法性空虛偽不實無可和合方便能如實知可化衆生為施設諸教法生起因緣般若能集種種助道為衆生至寂滅因緣論云已上説功德清淨道次説因清淨道方便能分別解釋諸法知其差別之相般若能知諸法平等法界無差別相方便能廣修福德莊嚴佛土般若能知諸佛國土平等如維摩經謂諸佛淨土亦復皆空方便能知衆生根性不同有隨信行者有隨法行者分別觀察隨機施教般若能了知衆生畢竟空無不見有一衆生可度方便能令諸菩薩詣於道場由初地至二地乃至十地以及等覺入妙覺佛果地般若空慧能令菩薩逮無所覺所謂無眼耳鼻舌身意無色聲香味觸法無智亦無得也此方便與般若乃大乘菩薩之總行不可須臾相離菩薩依不離方便之般若速得成佛所謂三世諸佛依般若波羅密多故得阿耨多羅三藐三菩提故稱為速疾道天子菩薩摩訶薩復有二種速疾道云何為二一者資糧道二者決擇道資糧道者謂施等五波羅密決擇道者謂般若波羅密有著道無著道有漏道無漏道皆如是説此第二種二道以資糧與決擇明二種速疾成佛之道菩薩資糧本通修六度但以前五度正為福德資糧到四加行位時常在定中引發般若慧即為決擇道義亦同於前方便般若相依不可相離有著無著等亦如是説者即有著道者謂施等五波羅密無著道者即般若波羅密有漏道者謂施等五波羅密無漏道者謂般若波羅密故前五離般若不成無著無漏亦即不成為波羅密復有二種速疾道云何為二一者有量道二者無量道有量道者謂有相位無量道者是無相位此第三種二道以有量與無量明二種速疾成佛之道有量道者遍取諸識境界著相而修六度因著相故則所得功德即有限量無量道者初地以上菩薩已得無分別智超過諸識境界但初地菩薩尚假功用八地以上則可任運修無相行無功用道故云無量復有二種速疾道所謂智道以及斷道智道者謂從初地至第七地斷道者從於八地至第十地此第四種二道以智道與斷道明速疾成佛之道初地至七地明智道者以初地乃如實知法界故然煩惱等尚現纏繞初地以上此智地地展轉增盛至八地乃如實斷除諸煩惱不現行以上明發菩提心修速疾成佛道之次第丙三答勇修智信丁一問菩薩義智爾時會中有菩薩名勇修智信白文殊師利菩薩言大士云何為菩薩摩訶薩所知義云何為菩薩摩訶薩所修智先明菩提心次第次明發了菩提心之菩薩又當如何修菩薩行此第三段答菩薩境智乃經十信十住等位而至入於初地證智之境雖有此三種問答淺深不同而各從其主題仍皆貫攝從初發心以至成佛一切行果所知義者義即義相諸法實相之第一義所修智者下明菩薩十種智等丁二答所問義智文殊師利菩薩言善男子義非和合智是和合勇修智信菩薩言大士以何因故義非和合智是和合文殊師利菩薩言善男子義是無為無為則非義非義中無有法若和合若不和合義是無變異無成實不可取不可捨皆如是説善男子智名為道道與心和合非不和合復次善男子智惟是和合非不和合勇修智信菩薩言大士何因緣故智唯是和合非不和合文殊師利菩薩言善男子智善能觀察蘊處界善觀察緣起法善觀察處非處以是故惟和合非不和合義非因緣和合智是和合相應義是第一義諦不生不滅無為無相故無和合相應可得無前後變遷無彼此差異無定實物非作成事不可取捨故非和合智名為道智是智慧智慧即是心所以慧相應心清淨故能證法界能觀察五蘊十二處十八界諸緣起法能觀察處非處者即知是處非處乃佛十力之一故智惟和合非不和合丁三説六種十法復次善男子菩薩摩訶薩有十種智何等為十一者因智二者果智三者義智四者方便智五者般若智六者攝智七者波羅密智八者大悲智九者教化衆生智十者於一切法無所著智善男子如是名為菩薩摩訶薩十種智第一説菩薩十種智義非和合智是和合有種種差別相有相應之心心所法有所緣境界有因緣增上緣所緣緣等無間緣故有種種智相由智成菩薩行大菩薩有十種智而十者又互相攝一者因智二者果智此二智對待而説大概從菩薩初發心所起之勝解加行十信十住十回向都可説是因智初地以上登聖果位即可是果智然此乃一往之分別若細分別究竟真實果智要得阿耨多羅三藐三菩提等覺以前皆為因智從初聞法了解勝義以至等覺皆為成就無上菩提之因又有重重果智所謂伏斷一分煩惱即得一分菩提而唯一的因智乃十信位最初發心尚未真正發起菩提心之十信為因智初住以上即為果智又十住為因十行為果至等覺為因佛為果因果相對有此種種差別且果智從因智生因智從果智起如凡夫生信由聞大乘法為因法是由佛清淨果智流出華嚴經中明凡夫初心皆因佛智而發起所有菩薩皆住於佛智位中所謂果徹因源也而佛果智慧又從菩薩所修因行得來展轉增盛而成佛果之大圓覺所謂因該果海也因果重重交相為用此菩薩所具修之智也按論云一因智者以善知無始世來解脫種子故二果智者以如實知無始來種種業報故則以知因知果為菩薩因果二智也三義智者即以無差別義而成種種因果差別相則重重因果差別皆現起於第一義智如鳥依虛空成重重飛行若離虛空則不能飛四方便智者以大慈悲願修方便行成就無量智上求佛道下化衆生以種諸善根五般若智者能觀察善不善法乃至觀察善不善俱不可得所謂照見五蘊等皆自性空無智亦無得無佛無衆生無煩惱無菩提然般若不離方便方便不離般若此二者又相依不可相離也六攝智者此總攝之智如前因與果相攝方便與般若相攝不即不離以攝取法施資生之益七波羅密智者波羅密此云到彼岸或修六種或修十種以成就種種善根而自利八大悲智者依善根而起大慈大悲大喜大捨之行修四攝法普度利他九教化衆生智者以善能觀察衆生根器及時節因緣而施教也十於一切法無所著智者即遠離二邊修行中道不著斷常有無方便修習諸行以自利利他也復次善男子菩薩摩訶薩有十種發起何等為十一者身發起為一切衆生淨治身業故二者口發起為一切衆生淨治口業故三者心發起為一切衆生淨治意業故四者內發起於一切衆生無所取著故五者外發起於一切衆生行平等行故六者智發起修習一切佛智故七者國土發起示現一切佛剎功德莊嚴故八者教化衆生發起知諸煩惱病藥故九者真實發起能成就決定聚故十者無為智滿足發起於一切三界心無所著故善男子如是名為菩薩摩訶薩十種發起第二説菩薩十種發起即菩薩由本身清淨功德而發起利益衆生之行一身發起者為令一切衆生身業清淨先淨治自身令成清淨功德相好莊嚴二口發起者為令一切衆生口業清淨故正確的説應是語業平常謂口對眼耳而説口確為言之器而言不只口能發如喉舌肺腹皆有關係淨治者離兩舌惡口妄言綺語也三心發起者即令衆生意業清淨除貪瞋癡及所知障諸煩惱四內發起者以無我智不執內身之我亦不見有我外之衆生離虛妄分別不執諸法無所取著五外發起者遍觀一切衆生平等平等遠離憎愛聖凡自他之想六智發起者修習一切清淨佛智乃成就佛果上之無上菩提智七國土發起者以聞慧智不顛倒求法修淨佛國土之行示現一切佛國土清淨莊嚴八教化衆生發起者為度盡衆生斷種種煩惱故修無量法門能觀衆生之根機應病與藥九真實發起者凡夫依外道法門成邪定聚依佛法發心不退成正定聚更有不定性衆生遇大乘人發大乘心遇小乘人發小乘心此真實發起指菩薩決定聚不但不退入凡夫道亦不退取二乘小果決定大菩提心以通達般若慧十無為智滿足發起者了證無為真實法性圓滿證得清淨涅槃不著一切三界虛妄諸法菩薩為利他故依身口意乃至無為而成十種發起復次善男子菩薩摩訶薩有十種行何等為十一者波羅密行二者攝物行三者般若行四者方便行五者大悲行六者求慧資糧行七者求智資糧行八者清淨信心行九者入諸諦行十者不分別愛憎境行善男子如是名為菩薩摩訶薩十種行第三説菩薩十種行行即行為亦即所作事業一波羅密行者乃菩薩正行即修習六度以令菩提法滿足否者即非菩薩正行二攝物行者即行四攝以攝化衆生四攝者布施愛語利行同事此中布施與六度中之布施相異六度中之布施度為度自心慳貪而行捨施此中布施專為攝受貪求之衆生而行惠施同一布施因所為不同故一是自利一為利他貪為衆生通病故自利利他均以布施為先三般若行者即以平等空慧如實觀生滅諸法性空自悟悟他從因至果轉染成淨轉凡成聖四方便行者論云以如實知一切法故即知諸法因緣和合染淨因果之相隨緣而行菩薩事所謂以方便為究竟也五大悲行者觀諸有情生悲愍普度心不求自證涅槃六求慧資糧行者慧即般若乃菩薩之因智從十信十住十行十回向位所修者皆是也七求智資糧行者智是果上之智慧即菩提薩婆若乃十地以上所修為佛果智之資糧八清淨信心行者初發心住十信心滿足亦可名清淨但真實信心清淨要到初地方名信心成就而初住得勝解之信心已於一切法中無有疑惑故九入諸諦行者菩薩觀真諦俗諦或四聖諦以修諸行十不分別愛憎境行者達諸法平等不見有恩怨好惡離憎愛境依平等慧而起妙行如是十種名菩薩行復次善男子菩薩摩訶薩有十種無盡觀何等為十一者身無盡觀二者事無盡觀三者法無盡觀四者愛無盡觀五者見無盡觀六者資糧無盡觀七者取無盡觀八者無所執著無盡觀九者相應無盡觀十者道場識自性無盡觀善男子如是名為菩薩摩訶薩十種無盡觀第四説菩薩十種無盡觀如華嚴宗説理法界事法界理事無礙法界事事無礙法界以無礙故即無有盡平常説佛法無邊以為有神通等法術不能以常情思議其邊際者為無邊然此乃是迷執若不以佛智慧眼來觀察諸法則法法皆有邊際有障礙有限量有窮盡不能稱無盡觀而一以佛眼觀之則法法無邊無盡一身無盡觀者此身無盡人人本具非佛獨有惟非佛智不能觀見也此身指四大五蘊總相之身通於諸佛衆生此一集聚之身雖數尺數十年而前前推之無始後後追之無終衆緣性空等周法界所謂觀身實相觀佛亦然從前有一位學東密者謂密宗明六大緣起吾人與毗盧遮那佛皆當體即以六大為體故吾即身是佛豫當時即破其執云如此則你亦與一堆牛屎同以六大為體所以你亦即是牛屎然觀法法平等無盡亦何差別二事無盡觀者如實觀察實不實義以通達事事無礙三法無盡觀者法義廣通於世出世間有為無為故當相無盡四愛無盡五見無盡者此皆煩惱愛即貪煩惱見即倒邪見應如實觀察善不善法及倒非倒見皆性空無際即貪愛為大慈悲即邪見成大智慧六資糧無盡觀者以如實觀察種種法門修集善根回向大菩提資糧為菩薩因行因行能回向菩提即是因該果海七取無盡觀者取即取著有取有得亦屬煩惱即煩惱而觀自性空八無所執著者即離取著等執故九相應者以如實觀是義非義相應不相應若廣義的相應等于六因中之相應因是十道場識自性無盡觀者道場即成佛之場所謂菩提場此乃金剛道後異熟空時由大圓滿覺相應無垢清淨識所現依佛智觀察一切法法法皆無盡乃至三世諸佛十方剎土重重無盡復次善男子菩薩摩訶薩有十種調伏行何等為十一者調伏慳嫉行捨施如雨故二者調伏破戒行三業清淨故三者調伏瞋恚行修習慈心故四者調伏懈怠行求法無倦故五者調伏不善行得禪解脫神通故六者調伏無明行生決定善巧慧資糧故七者調伏諸煩惱行圓滿一切智資糧故八者調伏顛倒行出生真實不顛倒資糧道故九者調伏不自在行於時非時自在故十者調伏著我行觀察諸法無我故善男子如是名為菩薩摩訶薩十種調伏行第五説菩薩十種調伏行調練三業伏滅諸非乃戒律之功能但此中調伏含有對治意以十波羅密清淨行對治諸煩惱如以布施對治慳貪煩惱過失如病調伏如藥對治結果即是度脫所謂布施度慳貪調練功德伏滅過失是此中之義也一調伏慳嫉行者捨一切所有而為布施普施如雨則貪慳心滅嫉是瞋之流類但此中嫉由貪而起見他人之利益自己不得而生嫉心離慳即能自行布施離嫉即能隨喜人之利益二調伏破戒行者遵守佛戒謹慎三業則身口惡行及種種不合世間道德之行為皆無從現起三調伏瞋恚行者忍辱以慈為本非消極退萎怯弱而屈忍也彼怯弱之忍乃畏退不得已而忍之其瞋心更甚必陰懷報復心而佛法之忍乃明了因果觀衆生顛倒而生憐愍心不使彼造惡因先息自己瞋心以轉人之瞋心如釋迦世尊往昔為歌利王割截身體不生瞋心並發願於成道後令首先得度四調伏懈怠行者以精進求法無倦即能對治懈怠五調伏不善行者不善行多從散亂心生即散心之善其善亦不究竟必須得禪定發神通方得順解脫無漏善禪定有四禪八定通有六種神通凡出世善法皆依定生或從通生而通又由定生故欲除不善須先修禪定六調伏無明行者無明即是愚癡但無明有粗細不同尤以六識相應之無明能感有漏生死果修般若觀明無我理可以斷異熟愚及執我愚則觀空不執空觀有不執有證真如而無明除矣七調伏諸煩惱行者廣行無量方便調伏無量煩惱圓滿一切方便智資糧八調伏顛倒行者有情以苦為樂以不淨為淨以無常為常以無我為我菩薩以願波羅密修集助道諸善法令顛倒不生上求無上菩提下度一切有情九調伏不自在行者自在不自在即是自由不自由此關於有力量無力量若自無力量則一切事皆為他所牽制為他惡緣所勝無力自由菩薩通達諸法性空得大自在福力智力悉皆圓滿十調伏無我行者觀諸法畢竟空斷除法我執則智波羅密圓滿以上十種波羅密即施戒忍進禪慧方願力智以對治貪等諸煩惱是名菩薩十種調伏行復次善男子菩薩摩訶薩有十種寂靜地何等為十一者身寂靜地遠離三種身不善業故二者口寂靜地淨治四種口業故三者心寂靜地永捨三種意惡行故四者內寂靜地不執著自身故五者外寂靜地不執著一切諸法故六者智資糧寂靜地不執著所行道故七者不自高寂靜地觀察聖智自性故八者究竟邊際神通寂靜地出生般若波羅密故九者滅戲論寂靜地不欺誑一切衆生故十者不顧戀身心寂靜地大悲教化衆生故善男子如是名為菩薩摩訶薩十種寂靜地第六説菩薩十種寂靜地與上第二段名義大同惟前者為利益衆生示現發起此就自身所成清淨功德立名一身寂靜者離殺盜淫而得清淨安寧二口寂靜者離兩舌惡口妄言綺語而生清淨功德三心寂靜者離貪瞋癡慢疑不正見而成意善清淨故四內寂靜者不執自身離邪我見故五外寂靜者不執諸法離我我所見故六智資糧寂靜者不執功德過失有物無物及我能修道故七不自高寂靜者不起貢高我慢如實觀察聖地佛菩薩地不見有聖凡生佛高下聖智自性平等故八究竟邊際神通寂靜地者以波羅密慧行得未來邊際寂靜到菩薩究竟地九滅戲論寂靜者能如實知世諦及第一義諦不顛倒説法不欺誑一切衆生也十不顧戀身心寂靜者為教化衆生故以大慈悲心示現三界受生不惜身心疲倦但知有衆生而無我對於世間無戀無求惟為利益衆生而現身也丁四説實不實行復次善男子諸菩薩摩訶薩如實行者能得菩提不如實行則不能得如實行者如其所説則如是行不如實行者但有言説不能信受不能修習先總講能實行與不能實行能如實行則得菩提不如實行則不得菩提次分説二種如實行略説有六類廣説則有無量無邊如實行法復次善男子菩薩摩訶薩有二種如實行何等為二一者道如實行二者斷如實行善男子菩薩摩訶薩復有二種如實行何等為二一者自調伏如實行二者教化衆生如實行善男子菩薩摩訶薩復有二種如實行何等為二一者有功用智如實行二者無功用智如實行善男子菩薩摩訶薩復有二種如實行何等為二一者善建立諸地如實行二者善觀察諸地無差別如實行善男子菩薩摩訶薩復有二種如實行何等為二一者善遠離諸地過失如實行二者善圓滿諸地功德如實行善男子菩薩摩訶薩復有二種如實行何等為二一者善説聲聞辟支佛地如實行二者善説諸佛菩提不退轉法如實行善男子菩薩摩訶薩有如是等無量無邊如實行法若能如是如實行者當知是人不久得阿耨多羅三藐三菩提諸菩薩摩訶薩應勤修學文殊師利菩薩復告勇修智信菩薩謂有二種如實行一道如實行者謂方便道如實修行二斷如實行者謂究竟斷惑證真復有二種如實行一自調伏如實行者謂受持淨戒調伏自身如實修行以取聖果二教化衆生如實行者謂行四攝法化導衆生令入正軌復有二種如實行一者有功用智如實行者謂七地以前有作心而行菩薩道二無功用智如實行者謂八地以上無作心而行菩薩道復有二種如實行一善建立諸地如實行者以方便慧故善知分別諸地及世出世間染淨因果如實修行二善觀諸地無差別如實行者以入一相智故觀察諸地無有差別不取於相如實修行復有二種如實行一善遠離諸地過失如實行二圓滿諸地功德如實行菩薩離二邊不休息精勤修行則斷一地過失即證一地功德地地斷過失地地證功德此斷證同時斷時即證證時即斷復有二種如實行一善説聲聞辟支佛地如實行者菩薩能善知一切法雖修大乘道而不捨聲緣二乘法且能如實修行以度二乘根性二善説諸佛菩提不退轉法如實行者以證真如法永不退轉如實修行大乘法故是名菩薩六類二種如實修行法如是等類更有無量無邊如實修行法能如實修行者不久即能證佛菩提此不久非有一定時間八地以上已入第三阿僧祇劫故云不久又一生補處已階佛位故云不久諸菩薩摩訶薩應勤修學者文殊師利對勇修智信及二天子等作最後總勸之詞也甲三流通分乙一如來印成爾時世尊讚文殊師利菩薩言善哉善哉文殊師利快説此語爾時即文殊答勇修智信已畢之時佛即讚善印可善哉者以不顛倒所説法隨順如來所説故契機契理堪稱善説快説此語者謂如此之語説得甚為暢快痛快也此總印成文殊答問乙二會衆奉行佛説此經已文殊師利菩薩摩訶薩勇修智信菩薩摩訶薩淨月威光天子決定光明天子及餘衆會一切世間天人阿修羅等皆大歡喜信受奉行此經前為文殊問佛説次為天子等問文殊説雖全經文殊所説者比佛説者多但佛是法會主經佛印證後即等於佛説故此結文推功歸主皆稱佛説文殊師利為菩薩中上座應列其名即勇修智信之所問亦顯係初地以上之境界而諸天子亦是已發菩提心者或請法或説法皆為此法會中之主要人故同列其名其餘千比丘及諸天等即略其名阿修羅此云無天德雖生天上享受天福以瞋多喜鬥而無天人之德然亦為佛八部護法之一佛每説法必與其會聞法後得法喜故信受奉行若聞後生厭即不能信受自更不能奉行則雖聞無益佛法重在實行故千言萬語最後結歸奉行佛經能使衆生信受奉行者有三種義一説主清淨佛已離一切過失圓滿一切功德於諸法得自在故決定可信二所説法清淨以佛如實證知清淨法體所説一切法如諸法真實性相究竟清淨三聞所説法者行果清淨如文殊師利及天子等聞法者皆已生大歡喜依之而行證得聖果此等皆可為後世模範作後學導師換言之即佛法僧三寶清淨故堪信受奉行佛法既是如此大衆今聞此法亦皆應信受奉行方是佛法流通於世塵空記重慶佛經流通處印行
