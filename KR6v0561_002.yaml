body:
  text: 大乘理趣六波羅密多經發菩提心品講錄二十四年九月在無錫佛學會講懸論一釋題甲經題乙品題二提要甲經綱乙顯勝釋經甲一敘前啟問乙一敘前乙二啟問甲二受請正說乙一標發五心乙二廣明五心丙一喻說丁一喻初二心丁二喻後三心戊一出其障難戊二正喻三心丙二法合丁一合初二心丁二合後三心戊一合出其障難戊二合正喻後三丁三結成五心懸論一釋題甲經題今天所講的大乘理趣六波羅密多經不是全部是此經十品中第三發菩提心品然要明白一品文義的來龍去脈須先知道全經的大意經題即大乘理趣六波羅密多經凡研究一部經必先知道此經的歷史如在什麼時代流傳到中國來是什麼人經手翻譯這樣方能得到確切的信仰世間以偽亂真的經很多每傳聞某處岩壁墮下一石文義古奧或請乩降鸞綺飾妙語遂即奉為佛經者要知道這些都是假經不可信奉藏經內有開元釋教錄等凡諸經論有疑偽者都擯斥於佛經之外佛經須為釋迦牟尼佛所說或經佛所印證的由佛弟子用通俗的巴利文或典雅的梵文集錄為親承法乳的人所展轉流傳下來不是憑空捏造的故經題有唐罽賓國三藏般若奉詔譯之記載此所說唐乃隋唐之唐罽賓係北印度國之一譯為賤種以初開國的種族不是貴族而是卑賤的種族其國中很流行大乘佛教所用的文字即上述印度的典雅梵文三藏指經律論三藏般若譯為智慧以此法師之智慧能精通汪洋的經律論奧義能自依經律論之法為師又能通達三藏之法以為人之師故稱三藏法師奉詔譯者唐代宗時此法師來到中國受時主的尊崇和信仰於是朝廷詔請翻譯此經地點在唐朝建都的長安城的西明寺貞元四年十二月二十八日譯成於是皇帝以此經公告天下現在講此大乘理趣六波羅密多經題分為五節大乘大乘梵語摩訶衍那乘是一種譬喻如電車汽車火車等等可以運載人物從此到彼從彼到此佛度人之法亦如此運貧賤苦得富貴樂運煩惱苦得清淨樂運生死苦得涅槃樂具有容載眾生運至諸地之功用應機所說之法大別有五乘共三乘共大乘不共之三類一五乘共法人天聲聞緣覺菩薩五乘皆要共修五戒十善四禪八定之法常言欲求如是果必修如是因若有如是因必得如是果吾人欲保持人格之不失己靈之不墮惡道來生仍在人類為人或欲藉善報業之強勝感昇天上而免三途劇苦須行此五戒十善方能有保障也五戒即不殺不盜不邪淫不妄語不沽酒十惡身三惡殺盜淫口四惡妄言兩舌惡口綺語意三惡貪嗔癡棄十惡即為十善修上品十善得生天之報中下品十善得人間福報反之十善不修而造上中下三品十惡則生地獄餓鬼畜生之惡果若儒家之五常與佛教之五戒相合符而十善十惡之義並可知矣概言之法界內四聖六凡莫不由修因而感果地獄餓鬼畜生是造十惡業而感的惡果人天福報是修十善業而感的善果出世聖人依四諦而證羅漢果依十二緣起而證辟支果依四弘六度而證菩薩果佛亦因菩薩修萬行之因成萬德之果因此人天是世間善因果二乘是出世因果菩薩佛是出世間上上因果積極預備福慧資糧以迴向無上佛果菩提所以五乘共法也就是大乘的基本二三乘共法三乘指聲聞緣覺菩薩此乃出世法以三界六道都是有漏的不淨的苦的無常的無我的空的世人處世間不知為苦故不求出離三乘修出世法了知四大五蘊本空假合無我求證涅槃寂靜之樂果世人往往聞說小乘而輕慢這是謬誤的要知二乘人已能在這污穢濁惡之世間超三界脫輪迴斷煩惱證涅槃已是了不得的聖人不過比之菩薩與佛為小故云小乘二乘之小在自利而不利人若能迴小向大廣修四攝六度的菩薩行亦可證大菩提佛果故說三乘共法皆是大乘法之階梯不應輕小而怯大也三大乘不共法菩薩以大悲心求無上覺即是不共法因其不但止息一切惡業增長一切善業斷煩惱結除生死苦而且發心救度一切眾生使離一切苦證無上正遍覺的究竟樂此則非二乘人自了之行所能企及今所講之發菩提心品即是說明修大乘行人要如何發菩提心行菩薩法以圓滿於佛果蓋大乘如車能自運運他至圓滿地凡經上加大乘或方廣二字即簡別餘乘而獨標大乘不共法的意義理趣理趣即經中所云甚深義趣指真如實相言如奘譯理趣般若經別譯則為實相般若然理即諸法實相之理趣即歸趣實相之義單明實相而無趣入實相之行義未澈了今云理趣則從諸法實相而趣入惟理是趣名為理趣趣證實相即成無上正等覺之菩提也波羅密多梵語波羅密多此云到彼岸天竺語為彼岸到順此方文義則為到彼岸即乘六度法而到菩提涅槃之彼岸也大乘理趣六波羅密多乘此大乘真如實相之理趣修布施般若等行而得波羅密多簡別非大乘非惟理是趣非能修到彼岸之一般小乘外道法故標大乘理趣六波羅密多之名大乘理趣六波羅密多經有經只譯波羅密而無多字今經云波羅密多乃讀梵音有長短之別於義無異六波羅密多即六度布施持戒忍辱精進禪定智慧譬如六隻堅固巨大之船筏由此生死岸渡過煩惱河冒煙波越狂瀾而到無漏之彼岸彼岸是什麼即諸聖菩提涅槃之境此岸是什麼即眾生有漏生死之域河流是什麼即貪瞋癡等煩惱漂蕩眾生莫知所之故佛特以大乘六度妙法普為濟渡蓋眾生染習之深無過慳吝邪非瞋恨懈怠散亂惡見今以六度統攝一切清淨法使依此而修行決定能證聖果聲聞緣覺所斷之煩惱即不達生空無我所起之煩惱所到的彼岸即生空無我真如之彼岸菩薩則不但斷人我執煩惱並澈底斷除無明而證法無我真如廣度有情勤求無上佛菩提蓋菩薩即求佛果菩提之大道心眾生也經有契理契機之義凡佛之所說法都有契合諸法實相之理及應利鈍大小之機的功用故名契經梵語修多羅本譯為線能貫穿攝持之義中經緯之經為直線緯為橫線直線橫線義亦相符又中國於經訓常法如來所說救度眾生之法亙古今而不變故云經也除律及論外有經甚多依所詮別能詮此經乃詮顯大乘理趣六波羅密多之經也乙品題全經十品前有歸依三寶及陀羅尼護持國界二品後為不退轉至般若波羅品共七品此為發菩提心品第三品即品類乃一章一節一類之義此品專說發菩提心故標斯名分三叚釋之菩提菩提有聲聞菩提緣覺菩提佛菩提之三種此品所明非聲聞緣覺菩提乃直明菩薩所求之佛菩提也菩提古譯道意取康莊坦途無量百千人皆可同遊然正譯為覺但非是感覺知覺之覺以此為種種錯覺邪覺之所集也三乘菩提聲聞緣覺菩薩佛都是正覺皆覺到五蘊生空真諦故世間凡夫外道不為正覺聲聞緣覺可為正覺未能為遍正覺觀音地藏等菩薩可稱遍正覺還非無上佛為法王於法自在廣為眾生開示悟入佛之知見乃為無上正遍覺也菩提心心的範圍甚廣包括眼等八識心王及一切心所然此菩提心非泛說之心是發大乘信心在十信位起欲得無上菩提之願此為別境五心所中之欲心所欲即願望由茲漸至十住十行十回向以勝解心於諸法實相起殊勝解念念增進至四加行位欲勝解念定具足由此引發加行無分別智起無間道之定慧證入根本無分別智發生後得妙分別智如是願欲定慧為菩提心自性餘善心所為相應所解所證之真如為體發菩提心發有發生發現二義發生如十信位之發生願欲加行位發生定慧發現如勝解之顯明諸法實相根本智之證明真如法性要之發生大乘無漏功德發見真如無為法性皆是發菩提心也二提要甲經綱於世間建立出世法此經共十品第一皈依三寶品之要旨即為於世間建立出世法此云世間括三界欲色無色依正之有情世間及器世間法華云三界無安猶如火宅種種煩惱火焚燒眾生迫之不得安寧在生死險道之中無所依怙三苦八苦無量諸苦如大海之漂蕩無所歸託惟佛法僧三寶在炎炎火宅中為出路滔滔苦海中為舟航漫漫長夜中為光明除三寶外其孰能救度眾生哉六祖惠能大師云佛法在世間不離世間覺離世求菩提猶如覓兔角即依世間而立出世法也世有過去現在未來三世業報皆是有漏無常生滅敗壞之法惟彼此對待是非之種種分別沒有能斷煩惱了生死者佛於法界為度無量無數眾生同登彼岸現身八相成佛宣說所證之理名法依法有修證者名之為僧眾生溺於生死之中迷昧不自覺知若依佛法通達法住法位則世間相常住本不生滅垢淨增減世間法成出世法為救世間故有三寶亦依世間顯現三寶故名於世間建立出世法以出世法護持世間第二陀羅尼護持國界品梵語陀羅尼此云總持謂總持一切法也國界即器世間亦包括有情世間陀羅尼咒總持無漏功德世人受持即由三密加持而成清淨世間由心淨而國土即淨以及所行所為無不清淨是為以出世法護持世間般若此云智慧智慧為出生一切諸佛之母此品明東方不眴世界無盡藏菩薩偕六十俱胝大菩薩放光現瑞來此娑婆世界禮釋迦世尊而答阿難說實相般若此大菩薩淨眾無量功德莊嚴轉此穢土而成淨土繼之以文殊普賢觀音諸天等說咒護持此法若讀誦書寫流通此般若功德咒力呵護使國界清寧令此世界脩行之人安穩脩持於此大炮飛機毒瓦斯戰爭的濁世信奉三寶發菩提心以脩行者有種種困難故於念佛往生淨土之方便外更說此陀羅尼祕密加持功德於此世界即成清淨安寧之佛土也成立菩提心此包括第三第四品要使永不退墮所以繼有第三發菩提心品第四不退轉品如何使之不退一者大悲心二者精進心三者救護心四者如負債心五者懷慚愧心除大悲精進二心外後三種攝為報恩心以報一切有情恩故緣想一切有情於我有大恩德無量劫來未曾報答眼見彼等受種種苦惱逼迫當此之時救濟之任捨我其誰如是於菩提心乃堅牢穩固而不退墮也圓滿菩薩行菩薩要圓滿菩薩行要依大悲行六度行方能福智圓滿而成無上佛果菩提兩足之尊所以此經從第五布施品到最後之般若品明六波羅密多圓滿菩薩行願也乙顯勝發啟勝此經十品除陀羅尼品是他方菩薩放光現瑞來此土說法外其餘從初品至後品皆是本土彌勒菩薩請問釋迦世尊開演之大乘勝妙法彌勒是一生補處之菩薩當來即要成佛他不是不明白聞思脩之法義而請佛宣揚惟欲使眾生得一條脩大乘行的直徑故代為請問既非如法華會上之舍利弗不明佛之開權顯實而啟請於佛亦非如十六觀經之韋提希受逆子悖逆惱迫之苦求生淨土而啟請於佛又非若楞嚴經之阿難受難而懇於佛蓋彌勒菩薩於此會中而作是念此中諸有情類貧窮孤露無所依怙流轉生死沉溺愛河欲達彼岸故發斯問使諸眾生得成堅固不退之菩提心是故於發啟最勝也密壇勝密宗之曼荼那中國譯為壇亦名道場行人於中精進加行脩行之壇場也任修何法即以何法之佛或菩薩為本尊以餘為助伴此經以釋迦為本尊即是毘盧遮那遍法界身一法即一切法一切法即一法法法互融無有隔礙本尊與行人之三業交加相應則其行願必圓成也奉一法即有一法之意義依一人指導即有此人之主義能主伴融化為一致由各個人精誠三業交加相應而造成堅固不壞之團體自有不可思議之力量也淨土勝陀羅尼品無盡藏答阿難顯實相國娑婆世界一劫極樂一日展轉增勝至東方普賢如來淨土無盡功德莊嚴若人觀佛不眴即得念佛三眛生彼淨佛土故於諸淨土為最勝次序勝第一品是三寶品明一切眾生皈依三寶皆可於佛法得其利益行五戒十善得生天福報更依四諦六度而得三乘一乘果第二陀羅尼品令得清淨安寧修行第三發菩提心品發五種心廣度眾生向無上菩提此五種心堅固而不退墮即是不退轉故第四為不退轉品更進而依六波羅密多六品精進修行即成就福智圓滿佛果如是次第即從凡夫而至成佛之次序故於次序為最勝也釋經甲一敘前啟問乙一敘前爾時薄伽梵作獅子吼顯明秘密總持門已時慈氏菩薩摩訶薩即從座起偏袒右肩右膝著地一心合掌而白佛言善哉善哉大聖世尊能以大悲讚說如是秘密甘露勝陀羅尼守護國界爾時指說畢陀羅尼品時薄伽梵亦云婆伽婆為梵語之多含不翻者古云有有德巧分別有名聲能破四義玄奘法師云含自在端嚴熾盛名稱威德尊貴六義亦譯為世尊為世出世所尊故攝義不盡故存梵語作獅子吼獅子為獸中之王一聲哮吼百獸震驚而獅子不驚不怖如佛說法魔外畏之故譬作獅子吼此敘前已說祕密不思議之密咒顯明祕密總持門已敘前已顯明不思議之祕密法露布於世間也慈氏菩薩摩訶薩梵語彌勒此云慈氏姓也名阿逸多此云無能勝也即從座起從所坐的座位上起來佛法閉左道而張右道所以慈氏起座偏袒右肩右膝著地此身業也一心合掌是意業而白佛言世尊是語業三業清淨而請於佛大聖世尊能以大悲等者甘露即不死藥說契理契機之大聖世尊能以大慈大悲無漏平等之心施方便善巧將秘而不宣密而不露之殊勝陀羅尼妙法加持守護國界使諸眾生安穩修行乙二啟問惟願世尊哀愍眾生宣說阿耨多羅三藐三菩提法令諸有情未發心者云何發心已發心者云何修行復何因緣於大乘心得不退轉此是位居補處的彌勒菩薩向佛啟問而請佛哀愍眾生宣說無上正等正覺之法世尊在佛果功德上成就與一切眾生同體之大悲願力遍一切時遍一切處於一切眾生無不哀愍因之佛從哀愍眾生之心中應慈氏菩薩之要求而說此法哀愍是大悲心佛教中所謂慈悲與平常人所講的仁愛或博愛不同蓋仁愛博愛僅慈心而已沒有悲心的作用慈心即所謂利樂人民如慈母愛子心然從愛子女心而推廣愛人民愛國家而成仁愛再推廣而汎愛世間一切諸物而成為博愛儒家所謂老吾老以及人之老由親親仁民而愛物這可以說是仁愛與博愛但是這種愛尚是對於有善與美的事物上面才易生起愛力或施與若遇著可惱的或無用的則不易起愛的作用且可反激動一種厭惡的心念出來所以仁愛與博愛是有對的有差別的佛法中所講的悲心是平等的此悲心是大乘法的根本因為同體大悲哀愍一切眾生故無論可惡的或不可惡的都要救度他尤其是對於可惡的惡人格外的深切施救所以一切平等一切平等故利樂一切眾生無所不用其極在佛法根本上講一切諸佛菩薩以所成就的功德智慧來觀察一切眾生不但墮落在三塗者是痛苦得很即號稱最快樂的人間天上亦在三苦八苦之中我佛見之如慈母見兒子在苦難之中去救拔他們使他們離苦得樂這是大慈大悲的作用所以經云大悲心為根本蓋以大圓鏡智觀一切法無有差別一切法均在大圓鏡智之中實相無相了不可得而世尊本此現身世間為眾生說法由本因地中大悲願力所成就而說此無上遍正覺教的佛陀此云覺者自覺而後能覺悟眾生不是平常的人物可倫比如有學問的人稱為學者一樣此阿耨多羅三藐三菩提即佛所成就的法在座諸君或有信仰佛教者或已皈依三寶者對佛應該有一種正確的認識佛是具足三十二相八十種好十力四無所畏十八不共諸法以福德智慧莊嚴十方國土成就一切眾生的決不可與一般宗教的神同等看待世上有很多宗教信奉著一神或多神以為神是世界的創造者有主宰萬物的威權能管理世界上一切的一切但是佛教的經典決沒有像這樣荒唐的怪論蓋世界一切的一切是因緣和合而生成從因至果事理秩然若有如是因則有如是果無創造世界者亦無主宰萬物者所以佛教一切經論都否認有創造主宰的神須知佛是覺者於一切諸法無不圓明覺知無錯亂無顛倒生死苦報妄業煩惱無不解脫又了知諸法實相真如理性於一切法得大自在所以善能成就最勝的佛果開示自心之覺悟令諸有情皆悟入於佛之知見我佛既不是刱造主宰亦不是作威權的鬼神或天神這些諸天鬼神等還在六道之中雖在天神還是欲界五趣雜居地的一員他們與出三界的羅漢比較相差很遠大乘初地菩薩又超過羅漢之上佛更超越菩薩之上由此觀之三界內的諸天鬼神不必說三界外的羅漢對於佛陀亦望塵莫及即大乘等覺菩薩若彌勒觀音等與佛還有階級之不同由等覺而入妙覺達究竟位才成法界身普利含識普通人每妄想生天成神不知天神還在煩惱的生死流轉之中我們對於天神雖應有相當的恭敬但他們究竟還不能作我們的依止者能從這種種方面分析清楚了再從正面來看超出三聖六凡之上的無上遍正覺者佛他是能覺悟法界諸法宇宙萬有的真理以此覺悟之諸法而開導眾生依此精進修行的即是三乘聖僧此為佛教正信的皈依三寶彌勒菩薩所以請佛說法使從凡夫位經三乘賢聖位而轉證入佛果位的本意在此梵語薩埵此云有情有情即有情感作用的動物若諸草木土石等是無情的沒有情愛的表示照通常講有情就是有喜怒哀樂等情感的但此猶未足以定有情的界說以在欲界有男女財產等故可有喜怒哀樂等七情的作用到色界無色界就沒有了色界還有色身還可以說有情的潛勢力存在無色界既無色根亦無相對的色塵這時的情愛惟是第七識的我愛執念念不斷而已那怕到了非非想天我愛未斷貪瞋癡還是一樣地可再生起作用第八識本不能執以為我而硬當作我看以為可愛這全因七識的錯誤觀念以執第八識為我愛著的心有了側重點便有了中心與邊際則即落分段生死流轉無窮而變化亦無盡苦不堪言此為三界眾生之通病至阿羅漢辟支佛以證得我空超出三界故不包括在有情內了大乘菩薩呢在未成佛之前他的業報還為三界有情所攝不過菩薩已有菩提心為因故云覺有情這就淺近而言若依瑜伽有六十二有情佛亦包括在內在這裏要特別注意有情者就是有心含識含靈之謂為知覺性情等總體此應以第八識為有情體佛轉八識成四智與菩提相應的菴摩羅識總持清淨功德而生起回入三界教化眾生的作用故名無上覺有情怎樣發菩提心信佛的人如決定要發正確的真實的菩提心必須有三種的層次向上好善而求勝進的心在我們的人世間有很多人但以做人為滿足再也想不到百尺竿頭更進一步但有所謂超人的生活進求比較在人世間更善與美的思想與事業之成功如果沒有這種超人間而求進步的志趣則菩提心是不易發起的所以往往有聰敏的人能夠利用他的智慧發起樂善好施向上勝進之心自然享受超人生活否則人格還不保要墮落三塗去呢能夠向上好善求比人世間更進一步自然得保人格而進到天乘以上去了知三界是苦而求出離法華經云三界無安猶如火宅此三界為眾生共業所感亦共同忍氣吞聲的甘心受著這三界一切苦假若我們不願意做地獄裏的眾生亦不願做人世間的落伍者耍快怏地修習四念處觀所以修佛法的人要厭惡這個如火宅的三界而求出離凡有向上心於佛出世法有真正智慧的人視三界皆是五陰和合而成生滅無常隨業流轉無論善與不善都是有漏且苦的也許有時快樂吧但不是永久的所以三界依正諸法不能超出苦字範圍值不得我們貪戀要具足大悲心雖有上二心尚不足發起大乘菩提之心更要有大悲以為基礎大悲心可即從仁愛博愛而擴充大悲心是要救拔遍于法界一切眾生的因為我與一切眾生本是一體我即眾生離了眾生就沒有我了所以我應趕快的脩學一切法門得大解脫好救濟如我一樣沉沒苦海的眾生使他們速斷煩惱我們自身若不能大解脫自救尚且不能那裏還能說到救人所以一定要先脩習一切法門求證無上菩提我們要以大眾的苦樂為苦樂眾生的苦樂比我個人還要關切這才能發菩提心已發了苦提心又怎樣去修行呢如果要去度眾生與斷眾生的煩惱沒有真實的修行唱高調騙人是不對的大乘菩薩所修的行即是六度此六度有福德與智慧如布施持戒忍辱即是福行般若即是慧行精進是通策福慧禪定是總集福慧故稱禪定是福慧的功德若福慧兩足則萬德自然圓滿然而發心修大乘行者古往今來修行者多成就者少如要想成佛一定先要使所發的菩提心永不退轉但這須有良好的環境如發願往生西方修三密加持目的皆在求不退轉修行大乘菩薩行不是容易的事第一先要先行種種布施茲姑就財施而言亦有多種一內財施即犧牲頭目腦髓是如舍利弗昔行菩薩行時有人要眼睛他取下右眼這人說要左眼他就取下左眼這人又說他的眼壞了沒有用處把眼拋棄地下他覺得菩薩行難行乃不行菩薩道自願退做羅漢二外財施即犧牲家中一切財產是但是施之不當或反至使他人受罪過受痛苦三內外財施即犧牲妻子兒女等是總之要難行能行難忍能忍這才可修大乘行而不退轉上面所說總括之如下種向上之心能成就人中聖賢及天等勝進之果種出世之心能成就出世三乘羅漢等果種大悲心乃能成就無上菩提佛果從此經全部文義研究起來此第三品是講云何發心第四品正明以何因緣于大乘心得不退轉而第五品起是明修行的行甲二受請正說乙一標發五心爾時薄伽梵告慈氏菩薩摩訶薩言若有善男子善女人欲為有情脩大乘行欲度有情置大涅槃應當先發五種勝心云何為五一者於諸有情普發平等大慈悲心二者於一切種智心不退轉三者於諸有情起親友想於險難中誓當救護四者常於有情起負債想五者恆懷慚愧何時償畢能發如是五種心者速能證得阿耨多羅三藐三菩提薄伽梵即是世尊善男子善女人是具足善根而能發大乘心的男女們大乘行是為的普濟眾生以普為法界有情謀利益為前提佛告訴彌勒菩薩如果有人發廣大心要把世間眾生度到涅槃去應該先發五種勝心大乘如大火車一樣此火車為運輸一切之用大乘法使一切眾生了知三界是苦而求出離同度生死苦海同登覺岸證大涅槃得大自在涅槃亦云泥洹滅的意思滅即滅度滅煩惱度生死能用智慧之火燒盡煩惱之薪此為三乘之共法若大乘者即是圓滿寂滅之義一切功德無不圓滿一切惑業斷滅無餘然涅槃有有餘涅槃無餘涅槃等生死業因雖滅而業報尚未斷為有餘連業報亦捨離了為無餘此為羅漢辟支所證的大乘則以非苦依在而說為有餘苦依盡說為無餘又真如為本性涅槃大悲般若為無住涅槃云何五種勝心第一以大慈大悲為根本要普遍救濟第二佛所成就的一切種智對于諸法若事若理若相若果無不了知所以學佛的要求得此一切種智此即菩提心之正體第三要把一切眾生當作父母看要立大誓願度脫他們的一切痛苦第四我生生世世曾在六道中流轉生死一切眾生皆與我有恩德一切衣食具都曾仰仗他們的供給我若不報眾生恩好像欠了人家的債務一樣一定要算還清楚第五知果我於眾生不能報恩老實說就是不能還眾生債免不得生生世世受累前二種心即是說明發菩提心的正義後三種是怕中途有什麼變化而謹防失菩提心有了此種為根本而去修大乘行決定證得無上佛果無疑乙二廣明五心丙一喻說丁一喻初二心復次慈氏菩薩摩訶薩云何於大乘中一心修行得不退轉如往昔時有一商人聰慧明達常行仁孝恆見父母宗親貧苦常懷憂惱逼切身心以何方便而能給濟作是思維無過入海採如意寶而供給之得離貧苦以是因緣發勇猛心不惜軀命從家而出種種方便求覓資糧及諸善伴船及船師現在再詳細的說明五種勝心在這裏先以比喻的方式來說明初二心一大慈悲心二求佛種智不退轉心如果發了菩提心而修大乘菩薩行的大菩薩應以何方法使菩提心不退轉呢再以何種方法去修行而能夠證得佛果菩提呢初發心的人初起菩薩願之外凡的凡夫要想成佛的話要經過十信十住十行十回向四加行位而入菩薩地再加功用修行才有成佛的期望現在注重的是要怎樣地去修才不退轉即在十信位中之第六信不退十信菩薩心之修行成功亦非易事起信論謂要經過一萬大劫的修練亦以修六度為成功之母方能到第六信的信心堅固不退又如起信論說以五門修成信心此大乘信心的成就第一要確實信有諸法實相之真理無是非顛倒錯亂之境界第二要確信有能證得諸法實相之無上大覺此由智慧的功能而成就故學佛之人先求智慧而後可破無明煩惱第三要信仰十方諸佛皆從凡夫而成就無上遍正覺一切眾生個個皆可圓成佛果故自身亦決可成佛若能如此信得透澈則能成就大乘信心所以修學大乘佛法的人要具足三種信心乃能生起大乘之心如參禪的人要大澈大悟乃成信心禪宗三祖信心銘即此信心的成立永明壽禪師也說若是有了信心便登了祖位所以依此信心作為趣向無上菩提的基本條件我們學佛人要到行解相應方才成就信心若對於一切語言文字雖能分別了知如沒有此信心和精進心仍無利益總之十信心圓滿之後轉入十住之初發心住位這是修行三大阿僧祇劫之初入阿僧祇劫在此處能夠正確的了解人生世間一切法畢竟是空如金剛經云如是滅度無量無邊眾生已實無眾生得滅度者乃發起真正堅固大菩提心也這裏所謂不退可分五種第一信不退如十信位之第六位此後再不退大乘正信之心而生邪見第二發心不退為初住位第三行不退為十住位之第七位以後再也不退入二乘行裏去四證不退初地以上的菩薩因為證得法空真如更無退失五念不退到了第八地以上不假功用念念流入薩般若海更無退轉經中所講的商人是有智慧觀有慈悲心的人不是重利盤剝的商人可比他能夠明達事理知恩報恩故用以喻菩薩視六道眾生如父母於一切眾生起慈悲心眾生有痛苦在沒有辦法之中而想出一種辦法去救濟他自己雖有痛苦眾生得大安樂如同他得了安樂一樣所以修大乘的菩薩常懷憂悲苦惱如我們為人家謀一件事情如果沒有成功一天到晚行住坐臥總不安這就是大悲心作用但是有什麼方法可以使謀事成功呢這就要用到佛經所說的善巧方便了善巧方便就是世俗常說的權宜之法如我人處世做事有一定的宗旨根據所計劃的方向去做可是有時在事實上不能直達目的只好暫且權宜地用別種巧妙的方式行之但此中所謂方便是指未做之先應有的預備功作所謂功欲善其事必先利其器大日經所謂方便為究竟亦是此意但須以大悲心為因若沒有大悲心生起怎麼會去普濟眾生換言之有了大悲心要救度眾生的痛苦菩提心就不期而然的湧上心頭這位商人這樣的思想親屬既有痛苦我只好不避艱險遠出家門入大海中去採如意寶歸來救濟他們吧因為其他勞力工作所得來的代價都不能使親屬永遠離苦得樂必用此一勞永逸的方法才能徹底解決這人生痛苦的問題因為世間上的財物是有限量的並且是靠不住的決不能夠一得永得成就一切商人經過這樣再四的思維所以決計入於大海採如意寶去了海喻菩薩行如普賢菩薩的行願海六度萬行這是一一菩薩的過往之海如意寶喻一切種智如意寶的意義是求什麼得什麼無求不獲可以滿足你的一切欲望然而如意寶以大悲心去求為大眾利益去求方可獲得若是自利如聲聞辟支佛一樣的恐不需求此也所以菩薩發心從家而出不以人間七情色欲為滿足一心希求向上一著由超人而到於上上勝進諸地資糧如我人出門遠遊應該先要預備飲食以防饑渴善伴就是善知識或是與菩提心相應的善心所法空所顯真如是船以通達法空真如之慧解領導一切善心所去求一切種智這就是船師故學佛之人固然自身要發勝解及精進勇猛之心若沒有善知識為領導者或善友來提攜你要想證佛果的地位恐怕還不是容易事所以有了這二種心還要先知道諸多阻礙有很多困難再想一種善巧的法門打破這個阻礙的難關丁二喻後三心戊一出其障難於其中路遇一異人從海而還乃問此人如是忽遽欲何所之商人具答如上因緣為救貧窮今欲入海求如意寶以相資給彼異人言我昔離家亦復如是為濟親族貧窮諸苦既發家已路經曠野度大砂磧絕無水草多有野象虎豹豺狼毒蛇獅子或遇劫賊大山大河飢渴寒熱驚懼怖畏種種危難與彼船師方至大海又遇大風大魚惡龍雷電雹雨鼓浪洄澓多有留難不可具說雖受如是種種諸苦尚不能獲如意寶珠但得資身粗自供足猶未能濟貧乏之親今勸仁者勿強艱苦徒自疲勞吾欲與仁別為經理所以者何然彼大海有種種難黑風黑山藥叉羅剎摩竭蛟龍眾難非一但曾聞有如意珠名往者千萬獲無一二以是因緣勸於仁者宜速迴還修大乘菩薩行的初發心菩薩在還沒有證入初地菩薩之前在資糧加行位風電也似的向前途奔走不幸的遇著惡魔來了此中的異人即喻魔王他問商人行菩薩道者你僕僕道上為的是什麼商人告以欲入海求如意珠的事他說了許多騙人的話言在路上經過了許多的曠野和沙漠之地既無人煙棲止亦無飲食飽腹而且還遇著許多要食人的惡獸到了大海中被水浪的漩渦幾乎沉沒到大海裏去什麼寶也沒有採得也沒有看見白吃辛苦飽受驚嚇命沒送掉已經是僥倖得很我是過來之人請你聽我忠實的勸告可以做點別種小生意回家去不要想發大財吧魔王也有很大的功德力很大的神通力在維摩經裏講不思議菩薩常現作魔王以逼迫眾生試驗他的能力此經文所說或許是真懷邪惡心起顛倒想的魔王楞嚴經說有五十種陰魔最後二種是定性聲聞羅漢定性辟支第四十八種即在欲界他化自在天的魔王曾修大福德與禪定能阻礙菩薩行大乘行要人退大趣小求二乘涅槃或以求現身之五欲快樂為滿足現在人只要享受現前物質文明不管將來的畢竟何如胡塗的度過此生不自愛惜便是魔王魔子魔孫如意珠是大鵬金翅鳥的心牠以大海中的龍類為食料死的時候展飛高空把身化滅但心不死下至金剛際七下七上龍王取得此心即成為如意珠戊二正喻三心爾時商主聞是語已倍復增進發三勝心入海不退云何為三一者父母兄弟宗親貧苦若斯如何空歸不相救濟二者我之親屬昔時富有惠我衣食憐愍於我今者貧窮命不全濟如何放捨而欲退還三者我在家時處理家務策役驅使大小童僕種種呵責如何貧苦不相賑恤令彼歡喜而欲卻還以是因緣念酬恩德發大勇猛決定前進要當入海求如意寶得已還家濟於親屬恣其所用永離艱窮上面已略把阻礙的事情標述過了這裏更要生起增進之心以求獲無上妙果的成功只可前進不可後退只要給大眾有利益雖赴湯蹈火犧牲了生命亦不畏惜這可以三種勝進之心為勉勵一對於父母二對於親屬三對於童僕都要起孝養恭敬之心以及愛護之心報恩之心因他們於我有大恩德做人要知恩報恩知恩報恩是做人的基本有了這知恩報恩之心鞭策我們自能努力向前百折不回為一切眾生求無上覺丙二法合丁一合初二心菩薩摩訶薩亦復如是發菩提心觀於十方六趣四生皆是我之宿世父母憐愍我故造諸惡業墮於地獄餓鬼畜生受諸苦惱以是因緣而自思惟以何方便濟斯苦難作是念已唯有入於六波羅密多大法海中求佛種智拯濟有情生死之苦如是思已發大勇猛無退屈心精進勤求無有懈倦種種方便求覓資糧菩提善伴法及法師本段文義正合前面所講的五種勝心中的一者於諸有情普發平等大慈悲心及二者於一切種智心不退轉梵語摩訶此云大菩薩摩訶薩即大菩薩之謂大有三種意義一形量比較義如須彌為大芥子為小人比蟻大蟻比人小等二數目比較義如多數為大單位為小三性情比較義如品性高尚為大品性卑劣為小即通常所謂品性佳者為大人品性不良者為小人之類此修菩薩行者亦復如是應勤精進修多功德脩菩薩行實在要到十住十行等的菩薩方能具足此三種意義此中菩薩摩訶薩正合前文中的商主菩薩發菩提心要依於大悲饒益有情而起的上求菩提心乃謂之菩提心菩薩的菩提心要觀於十方六趣四生皆是我之父母普通社會上有許多人由仁慈之心而愛護六親眷屬推而廣之為鄉黨為地方為國家乃至全世界這樣的心祇算是維持人類的仁慈之心還比不上菩薩的大悲菩提心因為菩薩的菩提心是無限量的須依此世界為中心推及東南西北四維上下等十方不僅限此一小千中千大千世界而已普通以為只有上天下地至於邊際即謂之世界現今科學進步證實無量星球即為無量世界不知未經科學家發見的世界還多得很如佛經上所說的無量無數恆河沙世界更遠過科學家所推想再看菩薩所緣的有情如何天人阿修羅地獄餓鬼畜生等六趣就其受生而言有胎卵濕化等四生此皆我之宿世父母既曾作過我們的父母我們作人子的竟可忘恩不報麼從金剛地以至有頂於其中間為人道所居的謂之人趣以上還有天及阿修羅天即平常所說的天人內分欲界天色界天無色界天阿修羅也是生於天中的雖有天福而無天德為諸天人所擯出天界故謂之阿修羅非天若約善惡業而說修上品十善者生天道修中品十善者生人道脩下品十善者生阿修羅道三種總名曰三善道還有作上品十惡者墮地獄道作中品十惡者墮餓鬼道作下品十惡者墮畜生道此三種總名曰三惡道合為六趣又名六道亦有別為五趣的將阿修羅之有福德者攝於天趣無福德者攝於鬼趣楞嚴經上開為七趣別加仙趣此以仙人別有不同的生理別立一趣然此應歸人趣所攝而以說六趣為當地獄梵語泥黎即苦世界的意思如經所說的八寒八熱等地獄現在的南北極即似八寒赤道即似八熱此種寒極熱極地方的動物即是地獄世界的一部分在通常理想上冰中火中決無有生命的有情然由事實證明極寒極熱的冰中火中確有無數的有情這是業報差別的緣故普通人往往誤會人死為鬼故解釋鬼字的意義曰鬼者歸也這是錯解了的其實六道有情在生死流轉中都是隨業受報隨報轉生的故人死後有生天界者有還生人趣者或轉生地獄餓鬼畜生道者皆因其善惡業以為標準而定其生何趣也不過餓鬼多有向人間世求食之事所以世人容易誤認人死為鬼吾人於此宜先打破以為人身中的靈魂離開了軀體即成為鬼之觀念畜生有威福與無威福兩種畜生又名傍生以傍行或傍形而生故有威福者如龍象之類無威福者如蟻蟲之類以上六道有情凡是吾人未了脫生死一天還免不掉隨業受生四生者一胎生人類屬之二卵生鳥類屬之三濕生感受濕氣而生者均謂之濕生蜒蚰之類屬之四化生有二從無而有的若天人等轉易變化的如蚊蠅等化生在六道中均有之茲不贅述十方六趣四生皆是我之父母者我是此菩薩的代名詞皆是我之父母並非推想的我人從無始生死以來受生無量所經過的父母亦無量梵網經云一切男子是我父一切女子是我母也就是這種意思由此而論我與一切有情展轉互為父母兄弟夫婦朋友返觀今日之但喚人類中同種族者曰同胞其窄狹為何如哉為什麼要觀一切有情皆是我父母呢因為父母愛子之心最切譬如為父者對家庭之負擔至重對於子女有教養之責任為母者對於子女哺乳懷抱撫育訓誨更不勝辛苦了以父母懷念我故造諸惡業現在他們墮於地獄餓鬼之中受諸苦惱以是因緣而自思維以何方便濟斯苦難作是念已發起大悲心來最好的方便唯有入六波羅密大法海中求佛種智六波羅密已如前說海是深廣義言六度行之大法如海樣的深廣菩薩要在此深廣之大法海中而求一切種智法華經上的開示悟入佛之知見即此中的一切種智一切種智又名一切智智就是成就無上正遍覺之智要得此智後乃真能拯濟有情生死之苦菩薩如是思已馬上就要發大勇猛沒有絲毫的退屈心並且還要精進勤求無有懈倦以種種方便求覓資糧資糧即是福慧二種資糧如遠行客必先預備川資一般最要緊的還要覓得德相具足的菩提善伴菩提善伴就是修菩薩行的人要與菩提心心心相應的才謂之善伴不但要覓菩提善伴而且還要有法及法師法不外證法教法法師即是要依證教法而住持者謂之法師丁二合後三心戊一合出其障難行至中途遇一魔王領諸眷屬或現天身或現人身婆羅門身或作商主苾芻苾芻尼身或餘種種異類之身而彼魔王問菩薩言汝今匆忙欲詣何所菩薩答言我為一切苦惱眾生今欲入於六度大海求佛種智如意寶珠以救一切貧乏眾生魔王復云我初發心亦復如是為度一切苦惱眾生出生死家度大流轉曠野砂磧備受飢渴盜賊恐怖眾難非一方至六度大法海中或遇乞頭或逢乞眼耳鼻舌身手足肢節心肺腸胃肝膽脾腎國城妻子奴婢僕使如是種種隨乞而施不生慳吝勤求智寶經無量劫生死流轉在於苦海雖受種種諸苦難事猶不能獲無上菩提而但迴求阿羅漢果出離三界寂滅涅槃我今勸汝勿強勞苦應自脩持吾欲與汝共階此果所以者何我念三塗常受飢苦心思吞啗仰面向空誰來入口充我一飽種種苦難逼切身心人命無常過於山水善知識者難遭難遇若不信受後悔何追生死海中流轉不定心如水月何有實耶惡知識者易見易逢恆樂勸人行菩薩道捨財捨命望趣菩提況諸佛出興時乃一現求者千萬得無一二以是勸仁不須勞苦應求解脫自取涅槃又三無數劫受諸勤苦方能獲得佛果菩提此生三生證阿羅漢一種無學何用苦為無智愚人心希佛果備歷艱苦經無量劫尚未聞證阿羅漢果何況能得無上菩提譬如有人獲一小鳥更見有一咖嚕囉王即放手中已所執鳥便前捕捉咖嚕囉王大者飛翔小者復失愚求佛果亦復如是棄此求餘二果俱失既知是已願早迴心於此生中必證羅漢此段文義即合後三心中出其障難之文修菩薩行人既發大悲心拯濟眾生不料行至中路菩薩從初發心來至成佛之期於其中間叫做中路偶然遇一魔王梵語魔羅此云害者以其能害人之慧命故對妨礙修行上說乃謂之魔魔有天魔死魔煩惱魔五陰魔四種一天魔住於他化自在天喜擾害世間名之為魔二菩薩本一心修菩薩行忽遭身命斷絕使其不能繼續修行故謂之死魔三縱不遇天魔擾害又無死魔降臨但偏偏因煩惱熾盛擾亂心神使之不易修行故謂之煩惱魔四五陰魔是由業報所感的五陰之身恆有老病等妨礙他的修行謂之五陰魔魔王亦有具大威福的所以他能領諸眷屬或現天身或現人身婆羅門身或作商主苾芻苾芻尼身或現種種異類之身苾芻苾芻尼即比丘比丘尼尼即女字的意思梵語比丘此云乞士謂外乞食以資色身內乞法以持慧命總之是隨佛證教二法出家的人魔王領諸眷屬現種種身欲何所作呢不外擾害諸修行人使其不能勤修六度而證佛果所以魔王以擾害心而問菩薩汝今匆忙欲詣何所匆忙是菩薩精進的心何所是問菩薩所要到的地方菩薩答言我為一切苦惱眾生今欲入於六度大海求佛種智如意寶珠以救一切貧乏眾生菩薩由大悲心為增上發起精進勇猛之心而行六度廣大難行苦行期求佛之一切種智因為得了佛的一切種智即如如意寶珠權巧方便始能滿足福智以救一切貧乏眾生魔王復云我從最初亦如你這樣發菩提心為度一切眾生出生死家經過幾多生死流轉曠野砂磧之處以及備受飢渴盜賊等種種恐怖種種厄難方能稍行菩薩六度之行但這種行是困難極了不行則已一行即有或乞頭的或乞眼耳鼻舌身乃至手足肢節心肺腸胃肝膽脾腎等內身之生命的更有乞求外物如國城的或有乞求眷屬如妻子或奴婢僕使的如是種種隨乞而施菩薩不但施之而已並且還要不生絲毫慳吝之心一心勤求智寶即如來一切智之寶更要經歷無量劫生死流轉雖在苦海中受種種諸苦難事猶不能即獲無上菩提我想無上菩提既然如此難得不如但迴求阿羅漢果出離三界寂滅涅槃比較容易我勸汝勿強勞苦但求自己修持吾將同汝一同修學共階此果不是很好嗎所以者何因為我念因業報所感的三途果報除常受飢苦心思吞啗仰面向空誰來入口充我一飽種種苦難逼切身心之外別無所有仰面向空是形容餓鬼可憐的情狀修行的人當知道人命無常如白駒過隙四十二章經上說人命在呼吸間人生不過數十寒暑我們的死緣是無定的或因內身四大分散而絕命或因虎狼獅子被人暗害等有情方面的無常或因房屋倒塌車碾雷擊等無情方面的無常不但死緣無定而且時間更無定準今日死明日死是不能預知的所以無常觀便是一個擊破生死關的大鐵椎修行人最為要緊了知人命無常之後常思善知識者是難遭難遇的此時若不信受後悔何追應當知道生死海中流轉不定心如水月何有實耶何不趕此機會隨我修學同時更應知道惡知識易見易逢恆樂勸人行菩薩道捨財捨命望趣菩提爾看行菩薩道甚不容易何況諸佛出興時乃一現求者千萬得無二三所以我今奉勸仁者不須勞苦應求解脫自取涅槃不是萬無一失嗎行菩薩道又要三無數劫即三阿僧祇之譯語在此三大劫中受諸勤苦方能獲得佛果菩提不如勸爾在此最短期間的此生三生證阿羅漢一般是無學果何用苦為在此即能取證阿羅漢果者名曰此生倘是初發二乘心人要經三生乃能證阿羅漢至證阿羅漢時即名無學在我看來只是無智愚人他們的心才會希求佛果從來有許多人修菩薩道的備歷艱苦經無量劫尚未聞證阿漢羅果何況能得無上菩提你不相信我再打個比喻譬如有人獲一小鳥更見有一迦嚕囉王即放手中已所執鳥前去捕捉迦嚕囉王大者飛翔小者復失愚求佛果亦復如是忘此求餘二者俱失豈不可惜嗎迦嚕囉王此云金鳥或妙翅鳥我將這種求佛菩提不易的道理說出來你既然明白了願早早回心於此生中必證羅漢請你無疑的同我修學吧這是魔王自稱為善知識以種種巧妙言詞來阻擾菩薩的菩薩行可見我們行菩薩道的人有多少困難大家要知道我們不發菩提心行菩薩道就永遠不會成佛所以任受何種艱苦均不足畏要艱難的幹去常言道道高一尺魔高一丈其實魔正是來成就我們速速成佛的良伴如提婆達多之於釋迦牟尼一樣只要菩提心行不退便決定成佛戊二合正喻後心爾時菩薩聞是語已轉增勇猛發三種心云何為三一者一切眾生從無始際生死已來皆我所親或為朋友現受苦惱未得免離如何退還二者一切眾生從無始已來給我衣食憐愍我深今受輪迴苦難非一云何未報乃生退心三者一切眾生從無始際皆我眷屬策役驅使轉相呵責未曾少分酬報彼恩以是因緣不應退屈更增勇猛求證菩提若證菩提一切智寶用濟生死苦難眾生是名菩薩摩訶薩於大乘中一心修行得不退轉若無大悲精進之心不能發起菩提心而成為菩薩既發起大心若缺思維善巧的方便必退失菩提大心所以有後三心之方便策發其精進勇往也第一種見得從無始生死以來輪轉三界六道一切眾生或為我父母或為夫婦姊妹兄弟子女師長朋友見得彼等隨業受報受種種極大苦惱未得免離我今不救孰能救度故應策發勇往第二彼諸眾生皆曾對我憐愍恩深我不救度讓誰濟之故須勉勵前進三者此皆是我之親隨眷屬供我策役驅使聽命呵責未曾少分酬報其勞如何可生退屈之心有如是深切鞭策自然更增勇猛精進求大菩提證一切智濟度生死流轉中之苦惱眾生因此發起菩提心之大菩薩修行得不退轉也然應知眾生確是無始不是另外有一主宰之神為肇造之始亦非斷滅此身心即為終了亦非現時科學家執為由原子電子之極微而生起亦非時方虛空等之所生要了知無量無邊有情識之眾生皆由因緣會合而生起緣生性空依性空說故云本來不生不滅若依緣生說則本來生滅相續無始非從不生滅起生滅再歸於不生滅此為學佛之人不可不了知深省者丁三結成五心復次慈氏當知即是菩薩摩訶薩修大乘行發五種心此五心中一者於諸有情起大悲心二者為諸有情求一切智心無退轉此二心者於大乘法精進修行三者一切有情皆我親友四者一切有情於我有恩未有毫釐用相酬報五者一切有情皆我眷屬我曾於彼起不善業種種訶罵非理責罰深心慚愧何時償畢此之三心令諸菩薩勇猛不退乃至證得阿耨多羅三藐三菩提佛對慈氏菩薩說明以上發心策進之理然後結成五心以明不可缺一致失方便而退菩薩之心發起濟度之心先縝密觀察於諸有情邊起親友想酬勞報德想負債想精進勇猛勤行修習乃能證得阿耨多羅三藐三菩提無上佛果也希望諸君聽了此品之後皆去學習發菩提心而從捨己為人之心修養培植大悲以為入手工夫並常將此經文讀誦受持細心觀察精義入神則菩薩心行從此生起如是則聽此經畢即為行此經始展轉流傳盡未來際無有窮盡矣性定記無錫佛學會印行
