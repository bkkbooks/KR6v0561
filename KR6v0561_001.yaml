body:
  text: 大乘理趣六波羅密多經皈依三寶品講錄二十二年六月在漢口佛教正信會講懸論一示宗旨甲皈德依本以定志乙悔過行善以息災二解經題三明品糸四考譯史甲譯人史乙本經譯史丙異譯釋經甲一法會起教分乙一證信敘乙二發起敘丙一慈氏問啟全經丁一觀眾運悲丁二仰佛求覺丁三敬儀丁四請辭丙二釋尊讚發斯品甲二聖教正說分乙一慈氏總問三寶皈依乙二釋尊別說三寶皈依丙一正說三寶丁一佛寶戊一總標戊二別釋己一明佛身己二顯佛德戊三抉擇己一辨一異己二顯三身庚一法身庚二報身庚三化身己三皈法身丁二法寶戊一總標戊二別釋己一第一法寶庚一正明涅槃辛一長行壬一徵壬二釋辛二偈頌庚二結成三德己二第二法寶懸論一示宗旨甲皈德依本以定志近年來全世界人類皆陷於災禍包圍之中尤其是中國竟成一種非常之國難而武漢更瀕於危急險難之境余十九日由上海動身前就有人言武漢現在第二次水災險象已呈武漢人士且皆將紛紛逃避他處勸阻余留滬而勿來鄂者但余雖聞此言而不為動卒如期來武漢講此經者一因允許來漢會講經已久必應踐約二因近年來國內天災人禍繼續發生武漢為全國交通樞紐前年水災之損失現在猶未能恢復其元氣在全國眾人之心理同情意謂萬萬再不可有二次水災之發現而各想辦法以求避免此次險惡之危象在此以言救濟自應以全國及當地政治的社會的力量運用科學的技術的方法為最切要其次則拜菩薩持佛名禮懺諷經設壇念咒乃至祈天求神等等以求免此災難亦為在覺得人力已盡之後的人情之所共趣以上二種救濟一是物質的實地救濟二是精神的感應救濟各各盡以度過此險難危途為目的在此時節因緣中成此莊嚴法會亦即人人成了大慈大悲救苦救難的心理故余亦來講此經之皈依三寶品以參加此共同之救濟中國幾十年來種種的天災人禍國難民困之由來澈底說一句都是由人事之所造成而人事所以造成此種種災難者是因人心失掉了依歸無復中心的信仰一致的趣向各逞私心用其巧力盡其才智分裂為各種敵對的集團相鬥相軋相爭相殺而產生此種種的災難困苦比如吾人一身之五官四肢若能統一而各盡其職各司其事始可裨益自身補充自力成為壯健康強之人若五官四肢各行其事互不知覺甚而兩手相打彼此摧殘則此身力用抵銷殆盡且反有損己身之危險由此觀之以個人言精神上也有一致的依歸方成統一的人格健康的人生國民亦復如是所以古賢孟軻說天下惡乎定定於一即言人民若無殊途同歸百慮一致的趣向全國人心即無由安定而現在中國人心的紛亂亦正需要此安定全國人心之一致同歸的中心信仰但此須由理智的抉擇而以至德為所歸故本經中說一切有情各作是念誰能與我作皈依處除其衰患令得安樂乃至除佛法僧更無有能救護我者令諸有情皈佛法僧三界五道一切處之一切有情皆在生死大海中流轉漂溺涌浪洄澓種種諸難常現在前無皈依處真能為有情所依歸者唯有皈依佛法僧寶此乃顯三寶功德謂三界六道人非人等唯以三寶之究竟圓滿清淨無漏功德為皈依處然三寶功德又皆依無為法性真如為本故經中重頌說如來妙體即法身清淨解脫同真諦如日與光不相離如來功德即涅槃真我與佛無差別一切有情所皈趣所皈佛當以清淨法身為所依根本所依法應以無為法性為所依根本所皈僧應以第一義真實僧為所依根本以顯德而知歸則一切人天有情唯三寶功德為皈依處復究真而窮源則唯無為真如法性為三寶功德所依根本人人依此一本以清淨三寶為一致之皈趣則人心安定矣人心安定則民族國群亦安寧矣是為余此次講經之意望大眾皆能以三寶為皈依而正其信定其志以為根本之救濟乙悔過行善以息災經云我今此身已生人趣若不皈依後悔何及蓋人身難得佛法難聞大眾今日既得人身復聞佛法切不可懈怠自欺空過此生乘此機會修諸功德增進善業常自反省發露懺悔痛改已往之惡非力行將來之善業由是悔過行善之力能對治一切惡業之勢力而損減消滅惡業所生起的天災人禍之苦果所以悔過行善是鞭辟向裏求之在己的根本救災而深合佛說一切法因緣生的正因果之理一切災難皆是吾人共積惡業之結晶若能悔過認罪且皈依三寶奉行眾善實為消災息難之唯一勝妙法門經云然智慧炬能照有情十不善闇使見善道即是以十善業之力對治十不善業之力例如舉不殺生言就是免死傷保壽康之正法若能覺得凡一切有生命者皆同自己之愛生惜命由此自愍愍他不忍殘殺將此同情心廣而大之成為不害一切眾生心即成大悲的善心身三業口四業意三業皆應如是此身口意十業之中尤以意之不貪不瞋不痴為緊要以因緣生之正因果理而言現在之一切砲火刀兵等災不外乎各人心中之瞋心所發生種種殺人的利器皆由瞋心而來復次由各人貪心之活動而積成水旱淫潦等一切天災因吾人貪心之無微不至無孔不入隨成此水災等之苦果如大海吞納百川貪亦如此且心貪之極或愈貪愈甚或愈貪愈無所得水旱天災亦然乃由人之不平均貪心所造成也此貪瞋二心皆由不明事理之無明癡心而生瞋成炮火等災貪成水潦等災而對治此無明癡心邪見顛倒者要以般若波羅密為主故講此經以對治邪見無明愚癡顛倒照破十不善闇息除災難也二解經題此經題總有十字經字顯是佛說佛教典籍有經律論之三藏論藏大抵為佛弟子推闡經中之義理所造律乃世尊因時制宜而成經則佛說或佛弟子說由佛印可者梵語修多羅或云修妬路此即線義以喻如線之能貫諸法義有條不紊而成眾生共遵共行之大法也本經乃大乘經大乘為無量眾生之所乘者如火車為眾人所乘坐為眾生所乘而各達其目的地而設非為個人之小車也故大乘乃一切有情共乘而至究竟圓滿佛果者大乘之發心行證為使一切眾生離苦得樂普度一切眾生究竟成佛但大乘經典眾多此經是大乘中理趣六波羅密多按般若經中奘譯理趣般若菩提流支則譯為實相般若理趣即實相義一切法究竟真理之意趣名理趣同實相之義實相即一切法之真如理即一切法之究竟真實相此理趣依般若為總依依大乘理趣而成六波羅密行波羅密多即到彼岸義理趣即彼岸之實相達彼岸實相之行有六曰六波羅密行六波羅密行即實相例施相空即相離相即是實相實相無相無所不相即實相即理趣即到彼岸之大乘六波羅密多行也此經總有十卷十品今僅講十卷中第一卷之第一皈依三寶品耳三明品系一切經典皆分序分正宗分流通分此品在本經三分中即屬序分然亦不全為序分故慈氏啟問以下即屬正宗分也初發意菩薩不知由何入佛法門彌勒菩薩乃為發問使初發心者得能入門趣向圓滿清淨功德以因地心契果地覺故有此皈依三寶品第二品名陀羅尼品即總持一切三寶功德得免災難而享安寧為佛果上無漏功德之救生方便是回果向因義第三發菩提心品第四不退轉品是在從因趣果之階段上言以既發此大心行此大行不退不失故成第五乃至第十之六度行品也此品乃十品之根本以佛法在應機施教因有此一類初發意者須以皈依三寶之清淨無漏功德為入門故發生彌勒請佛說法之動機也四考譯史甲譯人史梵名般剌若智慧北天竺迦畢試國人姓喬答摩即瞿曇父母早喪七歲依大調伏軍諷四阿含十萬頌阿毘達磨二萬餘偈二十歲具足律儀諷誦薩婆多俱舍大毘婆沙小乘論後轉入那爛陀寺受大乘唯識瑜伽中邊等論金剛般若等經聲明因明醫明工巧明等無不精嫻又去南天竺從法稱受瑜伽教入曼陀羅三密護身五部契印聞牛國支那為文殊教化之所誓願來傳佛教初汛海垂至廣州風飄卻返執獅子國錫蘭修船再垂至廣府舶為風浪所破轉遇順風至岸梵經不知所之至海壖得之於岸上白沙內大竹筒中經仍無恙知大乘理趣波羅密多經之與中國有緣矣建中三年來長安從事翻譯所譯除本經十卷外尚有大華嚴長者而問佛那羅延力經一卷般若波羅密多心經一卷守護國界主陀羅尼經一部十卷本生心地觀經一部十卷等貞元六年敕賜三藏名及紫袈裟乙本經譯史般若三藏於貞元三年初在神策將軍羅好心為三藏舅氏家與大秦寺波羅斯僧景淨依胡本譯成六波羅密經七卷時般若未嫻胡語復未解唐言景淨不識梵文復未明釋教雖稱傳譯未獲半珠錄表奏聞意望流行時帝察其所譯理昧詞疏不許流通貞元四年傳牒京城諸寺圓照道液良秀等在西明寺翻譯開題名曰大乘理趣六波羅密多經其文十卷其品亦然自六月八日創題十月中旬譯文周畢十二月十五日繕寫復終二十八日錄表上奏帝省經表慰有加上依貞元錄丙異譯奘譯六百卷大般若經第五百七十八卷為第十會他化自在天宮說般若理趣分一卷與後譯實相般若本同譯別本奘師別譯實相般若波羅密經一卷與大般若第十會般若理趣分同本異譯西域梵文有廣略二本故實相理趣文意乃同上依法寶標目至元法寶勘同錄實相般若波羅密多經一卷大唐天后時天竺三藏菩提流志譯此經與大般若第十會般若理趣分同本大乘理趣六波羅密多經十卷罽賓三藏般若共利言等譯依至元法寶勘同總錄依此以考理趣般若與本經異同彼為理趣的般若此為理趣的六度彼別此總是其異而明理趣又其同也釋經甲一法會起教分乙一證信敘證信敘者即以聞時主處眾的五種證顯此經真是佛說五種證信其格式通一切大小乘經皆有即敘法會事業使共遵共信故如是我聞一時薄伽梵在王舍大城迦蘭多迦竹林精舍時與眾多菩薩摩訶薩住不退轉位階十地十波羅密多悉已圓滿復有眾多諸大苾芻皆阿羅漢諸漏已盡無復煩惱逮得己利心善解脫慧善解脫復有阿僧企耶諸有情等皆發阿耨多羅三藐三菩提心此證信敘依古來有二釋一龍樹大智度論說為六種成就如是謂信成就我聞謂聞成就一時謂時成就薄伽梵謂主成就王舍大城等謂處成就聽眾謂眾成就也二親光佛地經論作五重證信與六種成就不同者即如是二字作如此一部經而解謂結集經者言如此一部大乘理趣六波羅密多經亦如現在演講之記錄人謂如此記錄耳故如是者亦結集經人指所結集經之代名詞耳下舉五種證信我聞聞是由耳根發耳識同時生起意識而成然現時不言耳聞而言我聞者以我迺總體之假名即顯結集之菩薩從佛親聞即以親聞證信非同道聽途說可比也一時舉說法時以證信譬如開會之記錄須書其年月日時記錄之時間而使有可信之價值故一時者亦是指在某時聞佛所說也又一時者即感應道交機教相扣時也然為何不記出某年某月某日一因法會大眾不限人類有天龍八部等故時間不能指定如人間之年月時即非天等之年月時二則即人類之年月時亦不同如中國古曆有夏曆周曆之不同而現在之陽曆又不同乃至各國猶多不同又如世界通用二十四時印度六時中國十二時等不同故即人間亦有各種曆法之不同不能核其一定說法之日時也薄伽梵者以說法主證信如開會必有其主席者若無主席主持之即不成其正式之開會也佛當時說法亦然說法之主即薄伽梵餘經或言佛世尊等此薄伽梵譯音不同而義有多種如龍樹以四義釋天親以六義釋然皆有尊貴義故亦譯世尊然以其含義多故仍其梵音也世尊者乃世出世間一切賢聖中之最尊貴義薄伽梵即世尊是通名於十方佛者此中乃專指釋尊為此土說法之主但佛佛道同如十力十八不共法等功德同於十方諸佛不一不異故亦通十方佛也舉說法處證信如開會記錄之記開會於某地也以舉說處可稽考而證信故此王舍城迦蘭多迦竹林精舍即佛說此經之處所如說漢口之正信會此王舍城是摩竭陀國之都城王名頻婆娑羅繼其位者為阿闍世王為佛典中有名之王王為當時印度各國之盟主且該國亦印度最大之國也此城何以名王舍以昔有一王先舍於此而人民後集成國故名據近今考察今已成荒土矣此竹林精舍與靈山祇園等同為佛說法最著名之處考竹林精舍之來源傳說不一有云其地多竹迦蘭多迦即迦陵頻伽以竹林中多有此鳥其音最美以之喻佛音亦然故云迦蘭多迦竹林精舍也又云釋迦初出家王即相遇請佛成道後先為說法故佛證大菩提果於鹿苑度五比丘後即先往與王說法王即為佛造精舍於竹林也又有謂迦蘭多迦長者施佛者此長者先是外道後因信佛欲以此林供佛因發心供佛時即感護法神令棲此之外道離去長者遂以供佛但此二說可會通之謂長者之施舍亦由國王之請住也以聽眾證信僅一人聞猶不可靠故以大眾證信也一大乘菩薩類此大乘經以大乘眾為主故先列菩薩眾餘經先列比丘眾者從近至遠而言也菩薩梵音也在中國誤會為一切偶像之代名詞亦有說為普濟之義者但確實言之應云菩提薩埵薩埵是有情義菩提是覺悟義凡在佛法中已有覺悟之人等有情皆可名之為菩薩此為廣義狹義言之菩薩是於佛法中到了有相當程度者而言摩訶薩者摩訶有大多勝三義合言之為大菩薩也言已發菩提心求正覺而不退轉者揀除初發心之易退轉者而言故云住不退轉但不退轉有多種謂十信中第六信為信不退十住之初發心為發心不退進至第七住為行不退初地為證不退第八地無功用道為念不退無功用道如長江水已至大海邊此中不退轉最低者為發心不退多數在證不退是十地菩薩故云位階十地乃菩薩位最高者十波羅密為初發菩薩心乃至十地所共修者初修時祗一度是一度如布施唯是布施不能攝一切在布施中亦只能作一事不能即事而達真理如修財施即非法施至初地則成理事融通之修一攝一切故初地以上能於一度修一切度八地上者念念中於一切度中修一切度故名圓滿即明此中為十地之大菩薩眾也次列聲聞眾苾芻亦云比丘皆梵音也中國讀者以為比於孔丘誤也義為乞士出家不事生產以乞食為生活之人此一義也又乞求學義也士人也即從佛出家而求學佛法之人士也如竹林精舍即佛教專門之學校比丘即遵守律儀之共同規則以乞求佛法之學士也但此指已證阿羅漢果者非初出家新學之苾芻出家有四果如學校之有小學乃至研究院之學位阿羅漢釋為無生又為應供應受人天供養也漏即煩惱有此煩惱故曰有漏諸漏謂欲漏有漏無明漏欲漏唯欲界有漏通上二界無明漏通三界漏既盡一切有漏業果亦盡漏盡故無煩惱逮得己利者即已自了解生死故顯阿羅漢自己解脫生死故名己利心善解脫者心即禪定羅漢之證無生亦有但以智得即增上心之種種禪定四禪八定尚未成就者即不名心善解脫慧善解脫由見道入初果證生空慧時有證生空真如之智慧由此至四果將從人我執所生煩惱斷絕淨盡而成盡智無生智故云解脫也復有諸有情等是列初發心眾此經即為初發心者說故此經當機者即此阿僧祇有情等也阿僧企耶此云無數阿即無義不義非義有情即薩埵一謂有情愛二謂有情性有情愛謂有四根本煩惱有情性以有賴耶為體此等有情皆發菩提心此即初發心菩薩阿耨多羅三藐三菩提合為無上正等正覺覺雖眾生皆有然三菩提之正覺則非凡夫外道所有然此猶可通指四種聖人但羅漢辟支有正覺而無普遍平等正覺故三藐三菩提唯大菩薩及佛也再加阿耨多羅之無上義則唯究竟成佛方得此稱發菩提心即是發成佛之心此須從大悲心起見眾生之苦痛如己之苦痛眾生煩惱業果無量須有無邊智慧能力方可救度不然雖發好心有反害人者雖有智慧而無能力亦心愛而力莫能助故求得無上正遍覺方具足圓滿智慧無邊能力而此心即從大悲而發充分將此心願表示出來者即四弘誓願故綜合應云大悲菩提心當時有此大心凡夫之眾生為本經之當機眾如現在法會大眾發此心亦即此法會之當機眾也乙二發起敘丙一慈氏問啟全經此在全經上講即正宗分但現在唯講皈依三寶品可以作發起敘蓋慈氏菩薩為引導初發心大眾而發問也丁一觀眾運悲爾時慈氏菩薩摩訶薩於此會中而作是念此會眾中諸有情類貧窮孤露無所依怙流轉生死沉溺愛河欲達彼岸為聞法故願見世尊求一切智無有力能爾時慈氏菩薩為欲諮問甚深義趣一切有情云何發菩提心求佛決定三無數劫無有疲倦此即觀眾起悲貧窮謂於諸聖功德法財未具孤露者未證法身未能真為佛子生在佛家流轉生死之中沉溺於貪愛煩惱之河也然欲達到彼岸為聞法而願見世尊而又無此智慧能力故慈氏運大悲心代發心者而起諮問修菩薩行須經三大阿僧祇耶難行故云三無數劫無有疲倦也丁二仰佛求覺今佛世尊意趣難解廣大甚深文句巧妙具足圓滿記別有情因果差別希求速疾無上菩提第二仰佛求覺謂佛所證功德意趣難解唯佛與佛乃能了知廣大甚深文句巧妙者謂佛說法非常微妙一字具足一切字一義具足無量義記別有情者謂能記六凡眾生種種差別上二即證得甚深教義甚深希求速證無上菩提者謂希求於佛自覺境界能速成就丁三敬儀於是彌勒菩薩摩訶薩發如是心即從座起整理衣服善調六根身口意業皆悉寂靜然其六根百福所生妙相莊嚴八十種好三無數劫之所圓滿摩訶般若波羅密多等百千萬日光明相莊嚴其身一切有情瞻仰無厭近無等等佛果菩提以如是身往詣佛所五體投地禮佛雙足又以無量功德莊嚴之手如新生蓮華合掌恭敬而白佛言彌勒梵音此云慈氏善調六根身口意業皆悉寂靜等者謂慈氏寂靜安詳之態度此明彌勒菩薩一生補處之福德圓滿莊嚴也般若智慧顯智慧圓滿無等等者指一切法真如法性無一切法與之等唯佛之無上正遍覺等於無等之真如故云無等等也丁四請詞如來世尊於一念中能知一切有情過去未來現在之心或有有情因諮問時獲清淨心或有有情受記之時獲須陀洹果乃至阿羅漢果辟支佛果或得阿耨多羅三藐三菩提記為此義故仰諮如來唯願世尊分別解說彌勒菩薩啟請世尊說法之前先讚佛德殊勝如來是佛陀十種德號之一十方諸佛之通稱如謂一切法皆真如也來謂若行若住若坐若臥若來若去無不如如繁興大用廣行萬行如如不動是名如來世尊即薄伽梵佛在世出世間最尊最上無能勝者故曰世尊如來世尊是已究竟圓滿一切智智無上正遍覺者故能於一剎那之中遍了知十方三世一切有情之過去的經驗根性現在的心理樂欲及能引生未來的若何業果之事如日照破昏闇萬象昭昭不昧無不正遍了知也如來具足十力十八不共法遍知一切有情三世心性之智力功德故有有情或在問法時即能獲得無漏清淨心或於受記時獲得小乘四聖果中乘辟支佛果或阿耨多羅三藐三菩提記以如是等義故唯願世尊分別解說般若波羅密多甚深之義須陀洹即小乘之初果此翻預流謂得入聖人之流類初證聖果也斯陀含為小乘之二果此譯一來謂證此聖果者猶須從人至天再一來人間受生也阿那含是小乘之第三果此云不還證斯果者生不還天不復再來人間受生也阿羅漢是小乘之第四果亦即小乘之究竟位此含無生應供殺賊等多義謂此位聖者已殺煩惱之賊諸漏皆盡證有餘依涅槃不受後有應當受人天之供養也辟支佛即獨覺乃中乘之極果出於無佛世獨觀萬物之生滅變異而覺悟宇宙人生之一切皆是因緣生滅無常而悟我空理證我空空真如也世尊今為三世有情所依之主或有有情行大乘行其心柔和惟願世尊愍念獲甘露法不獨受用而同其味諸有情類流轉生死貧窮孤露無依無怙深可哀憫若欲出世離生證涅槃者唯佛為依歸之主也有已發大乘之心行大乘行其心柔軟和順者惟願世尊以慈悲心拔苦與樂為說甚深佛所親證大涅槃之不生不滅不變不異最上殊勝究竟安樂之法願佛不獨受用以大慈大悲如證而說令此諸有情同嘗此無上甘露之味證佛之所證也云何令諸有情趣大涅槃安隱正路此等有情當作何事於一切智得不退轉云何圓滿檀波羅密乃至般若波羅密多又此般若波羅密多與前五種波羅密多而為其母云何修習而能圓滿又此大願云何顯發又諸有情云何修習涅槃彼岸惟願世尊分別解說為欲利益安樂一切有情令得歡喜一切智即是無上正遍覺謂於若事若理一切行一切相無不正遍了知也不退轉者謂於大菩提心大菩提行不退不失始可達無上正遍覺之妙果檀波羅密即布施到彼岸般若波羅密即智慧到彼岸此是理趣六波羅密理即一切法之平等普遍絕待之真理此理以大菩提心六波羅密行始可證得然般若波羅密多為一切波羅密多之母為一切佛功德之母能成圓滿清淨無漏之功德者由此智度而得若一切波羅密多無般若波羅密多即不得圓滿如行布施持戒無般若者但能為布施持戒等而不能成為波羅密多也故般若在一切度中為最上為一切度清淨無漏功德之母也般若通加行無分別智根本無分別智後得無分別智然以根本智為般若智之體以其能斷一切無明煩惱故能親證真如故斷惑證真乃般若之力而布施等不能也故契證真如法性成就六波羅密多之無相無分別妙行者以般若波羅密多為母也彌勒菩薩為如是等眾生如是等義請佛世尊分別解說而使眾生同得利益安樂此一段文為引生後十品文之總因故此段不但為皈依三寶品之發啟實即全部理趣六波羅密多經之發啟也丙二釋尊讚發斯品爾時薄伽梵讚慈氏菩薩摩訶薩言善哉善哉善男子汝今乃能利益安樂一切有情問是深義勸諸有情修善業故常為有情勤修習故汝今一心廣為有情頓絕羈鎖勤求法故汝今以此大慈悲心於三阿僧企耶圓滿六種波羅密多大法海故汝今已近菩提道場涅槃岸故猶如明星出已旭日便照汝今亦爾當作佛日汝今諦聽善思念之我今為汝具足分別甚深之義大乘菩提行之第一基礎即皈依三寶慈氏為利益一切有情契理契機而問故世尊雙讚善哉善哉汝今乃能利益安樂一切有情問是甚深勝於二乘微妙之義勸令有情修集一切善業為諸有情頓絕一切煩惱之羈鎖勸求無上甚深之佛法汝今已近菩提道場不久當成佛道如明星已出旭日將興汝今當居補處圓滿菩提汝當諦聽思惟我今分別解說甚深之義如有智人能善思惟觀察生死險道之中莫能過於無所依怙譬比大海舟船而無商主其中有情多所漂溺湧浪洄澓破壞沉沒種種諸難常有憂患求於吉祥無上船師以為依怙又諸有情於生死中常多恐懼所以求於力勢之人而為恃怙不被怨賊之所侵害縱彼怨賊有大狂力為此之人依附王者而彼怨賊必無更能作損害者又彼怨賊既見力勢永捨怨心順從正化一切有情亦復如是各作是念誰能與我作歸依處除其衰患令得安樂於此三界五道之中天龍藥叉阿蘇羅迦嚕囉健達婆緊捺羅摩怙洛迦人非人等諸眾之中而求覓之無有能為作歸依者所有有情於三界生死險道之中無依無怙其苦莫堪如大海險惡浪中之舟無主無棹有情於中漂溺沉沒常患刀兵盜賊水火等災時為生存性命財產生活而起損他利己之心行相爭相鬥五道之中一切人非人等無有能為作皈依者所以者何彼諸天等自未能免生死羈鎖煩惱繫縛流轉三界無量無邊眾苦吞噉諸怖畏事以貪欲網之所纏縛況能與我作歸依處此言欲界六天色界十八天無色界四天乃至摩呼羅伽等其自身尚未能免一切煩惱纏縛生死羈鎖仍在三界流轉受諸無量無邊種種諸苦不能為他作依歸也又諸天等常被甲冑鬥戰之具心懷怖畏彼阿蘇羅而況於人及餘諸趣以是觀察三界六道無有堪能拔濟我者以是應當歸佛法僧除佛法僧更無能救護我者一切有情若欲求於阿耨多羅三藐三菩提涅槃樂者應當歸依佛法僧寶以是因緣令諸有情歸佛法僧諸天人中雖受勝妙快樂而常有與阿蘇羅甲冑鬥戰之苦五衰相現仍復流轉天既如此餘趣可知於斯觀之則三界六道之中無有能救濟我者唯有佛法僧為能救護以是因緣其欲發阿耨多羅三藐三菩提心趣涅槃樂者皆應皈依佛法僧寶佛法僧寶是諸有情真皈依處三寶為一切有情清淨功德之根本如欲發菩提心行菩薩道非先皈三寶不可例如欲作大事為大業非安處於穩固之立場不可空中造樓閣砂中取油必徒勞也甲二聖教正說分乙一慈氏總問三寶皈依爾時慈氏菩薩摩訶薩白佛言世尊云何名為佛法僧寶云何歸依此是慈氏正請問三寶之義及如何去皈依三寶也摩訶薩指菩薩中之勝上者言摩訶即表非初發意及功行尠薄之菩薩也乙二釋尊別說三寶皈依丙一正說三寶丁一佛寶戊一總標佛告慈氏言佛寶者則有二種一則佛身二則佛德三寶功德甚深甚廣難了難知今此總標後再別明也戊二別釋己一明佛身言佛身者所謂如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊已於過去無量無邊阿僧祇劫不惜身命勤修六度萬行圓滿菩提樹下坐金剛座降伏魔軍斷諸結賊獲一切智成等正覺具足如是諸妙功德號之為佛佛身即一切佛法集體之表現是佛法之總集團如吾人念佛即念佛之一切功德三十二相八十種好十力四無畏十八不共法等佛號即佛身佛功德聚之代名詞念佛即具念佛化報法三身之一切功德蓋吾人念佛之三十二相八十種好即是念佛之化身念佛之真如無為法性十八不共法等即念佛之法報身以佛寶一名為總表佛身佛德也佛於無量阿僧祇劫不惜身命難行能行難忍能忍勤修六度教化眾生直至三明備萬德圓諸行滿最後於菩提樹下降伏魔軍斷諸結賊證一切智成無上正遍覺以其具足如是無量清淨功德故號為佛如來應供正遍知明行足善逝世間解無上士調御丈夫天人師世尊也己二顯佛德言佛德者即佛身中具足十力四無所畏十八不共法大慈大悲大喜大捨三解脫門三示導六神通隨心三摩地四智二智離於知境斷煩惱障及所知障離諸習氣無功用道起如如化若遠若近遊止自在無有障礙於一芥子能納無量諸妙高山如是功德無量無邊諸佛如來悉皆具足又從一劫至無量劫壽命自在無能損減於神通境往來變現無有障礙隨意自在諸佛世尊之所經行城邑聚落先放微妙金色光明照耀其處其中眾生遇斯光者身病心病皆得除愈心火滅已身得清涼僂者能伸跛者能行盲者能視聾者能聽啞者能言其心亂者便復本心鬼魅顛狂魍魎所持悉皆除愈裸者得衣憍慢心者而得謙下憂惱者心安穩失道者得正路飢渴者得飲食囚繫者得解脫恐怖者得無畏丘陵坑坎山澗堆阜皆悉平正猶如抵掌門第卑小自然高大衢路隘狹並皆寬廣市肆里自然開豁穢惡不淨應時香潔荊棘毒剌瓦礫沙石悉皆不現日光晃耀而無炎毒香風和暢無諸塵坌白鶴孔雀鸚鵡舍利迦陵頻伽拘枳羅拘那羅共命等鳥其聲美妙出和雅音象馬牛羊水牛犛牛犎牛竹牛各出本音其聲微妙箜篌簫笛琴瑟鼓吹如是樂器不鼓自鳴及餘種種巧妙希奇諸神通事悉皆變現如是種種諸希有事日日各異轉加殊勝皆是如來威神之力此明佛德即佛果上成就之功德言佛身者即佛德之總聚即此佛身所攝之功德是為德聚故佛身即寄在佛德之中但佛德者十力總功德也十力者謂是處非處智力業智力定智力根智力欲智力界智力至處智力宿命智力天眼智力漏盡智力此十力皆由智力而開出乃佛果上之功德也四無畏者謂總持知根決疑答報即能說一切法無所畏也此雖八地以上即有但未圓滿而真正圓滿唯佛一人耳十八不共法者謂身無失口無失意無失無不定心無意想心無不知捨心欲無減念無減精進無減智慧無減解脫無減解脫知見無減身業隨智慧行口業隨智慧行意業隨智慧行知過去世無礙知現在世無礙知未來世無礙此皆佛果上之功德不共凡夫二乘菩薩等四無量者謂大慈大悲大喜大捨大梵天亦有修習四無量心但與佛果有差別一不了眾生是空而觀眾生起此四心尚有眾生相二三乘聖人已了眾生空相而猶有法執之所知障如二乘人我執雖斷法執猶存三佛果無緣無相之大慈大悲大喜大捨之不共成就是絕對圓滿而非相對圓滿又大慈即以眾生之樂為樂大悲即以眾生之苦為苦大喜即以眾生離苦得樂而喜大捨即心無住著運心平等是為佛所成就之四法也三解脫門者一空解脫門謂觀一切法空即空相亦不可得二無相解脫門謂了知諸法畢竟無相三無願解脫門謂不生希求後世之有依此三法能得解脫故云三解脫門也三示導者一身能起變化二語能起教誡三意能觀機宜由此而能開示教導於眾生故六神通者謂神足通亦名如意通天耳通他心通宿命通天眼通漏盡通之六種神即神變莫測通即通達無礙之功用也隨心三摩地者三摩地即定以佛身常在定無有不定時念念與定相應故也隨心者佛常住四禪之最平等定但為利生故隨心之所念欲入何定即入何定如入首楞嚴大光明等三摩地即能證入四智者謂轉八識成四智即轉第八識成大圓鏡智轉第七識成平等性智轉第六識成妙觀察智轉前五識成成所作智也二智者謂根本智後得智亦名如理智如量智以根本智親證真如法性即無分別智觀諸法性也從根本智而起之後得智教化眾生作諸佛事故根本為如理智後得為如量智但初地等菩薩雖得猶是分證而究竟圓滿常惺惺者則惟在佛果離於知境者謂離於能取智與所取境以有能取智與所取境故執障重重不能證得真如法性若離二取分別即能斷二障也依人我為本起貪等煩惱為煩惱障由法執為根起無明等為所知障煩惱為眾生之擾亂惱害者眾生為其所搗亂故沉淪生死之苦海煩惱即障故名煩惱障所知名境本不是障所謂所知本非障是障障所知因法執所起無明無知對所知之境有障此就障境立名故名所知障也此二障在諸宗亦有別名如天台宗則以煩惱障名為見思惑所知障名為無明惑及通塵沙惑要之皆為心心所上之障礙由此起惑造業招感有漏不自在之苦果也但斷障雖斷種現而習氣未盡如壺中置酒雖去酒而酒氣仍留二障習氣亦然若離諸習氣亦若將壺中酒氣去盡也起如如化者以佛果上不假功用任運現行且不論遠近皆能自在拔濟無有障礙所謂理事無礙能以須彌納入芥子中須彌不小芥子不大佛德所起之大功用則謂佛無功用道放微妙金色光明照耀其處者以佛為吉祥中之最吉祥故遇斯光者身病心病悉皆蠲除乃至五濁惡世變為淨土如在維摩詰經中佛曾現清淨莊嚴國土也共命鳥即二鳥共一身命故名共命此為印度之產物牛中有犛牛犎牛水牛等別箜篌等不鼓自鳴此顯佛神力無礙也戊三抉擇己一辨一異若有眾生疑佛世尊及佛功德有一異者當作是說佛與功德不一不異譬如然燈膏炷與明不一不異離於膏炷無別燈明若言燈明離膏炷者明所及處悉應焚熱佛身功德亦復如是此辨一異佛身佛德一耶異耶若一則何如說二若異則離佛身外別有佛德也故云佛身佛德非一異相如燈炷與明非一非異若異則離燈有明若一則明所到處應燒諸物於事不爾故非一亦非異也佛身佛德亦復如是佛身即燈炷佛德即明離明則燈無用離炷則用無體故佛德不離佛身也己二顯三身庚一法身此微妙身是佛功德無漏法身自他受用平等所依然此佛身亦非是體離是體外無別法身若是體者同於外物有四大相故知非相亦非無相若非相者同太虛空同太虛者性即是常無方便過自性清淨無染無著甚深無量無有變易難解難知微妙寂靜具無邊際真常功德絕諸戲論唯佛證知非餘所及亦非譬喻之所校量慈氏當知如此身者即是過去未來現在殑伽沙諸佛世尊法身之相此明三身之微妙功德身即佛之無漏無為法身也為自他受用身之所依止但非指今空間所現之丈六金身為法身然亦非離丈六金身之體另有法身故知所現之體亦即法身但非全同若全同則所現之丈六身可壞而法身常住不變故知法身等虛空遍法界也是以法身無相而無不相既非同物體之佛身亦非離此別有法身是知非相非非相也性即是常等者謂佛法身性本常住不假方便因緣而成自性清淨微妙甚深即諸大菩薩亦不能盡其邊際唯佛與佛乃能究竟常住不變無有轉易其體極微妙離對待之戲論為絕對之功德無法與之相等殑伽即恆河諸恆河之沙譬諸佛數量之多以法身無相而以名句文身方便顯其相也法身非一非異平等不二故無此法身彼法身之別也庚二報身佛報身者謂諸如來三無數劫修集無量福慧資糧所起無邊真實功德常住不變諸根相好智慧光明周遍法界皆從出世無漏善根之所生故不可思議超過世智純熟有情為現茲相演無盡法廣利無邊慈氏當知此即如來報身圓滿第二明報身法身不假緣生任運自然而報身乃由三無數劫修因所感果報又法身為所顯德眾生本具也報身是修德由因行而修得也然其功德亦無量無邊蓋法身功德無邊而此即從法身如如相應遍於虛空等同法界與法身相埒法身常住不變為自性常報身不變為相續常以由真實功德究竟圓滿不受熏習無所轉變諸根相好智慧光明遍滿法界皆從無漏善根之所出生以眾生所具無漏種至初地始起現行依上中下品之遞嬗輾轉增勝但佛所成功德皆不可思議為教化眾生而現他受用身如華嚴佛現他受用身盧舍那相說無礙法界之理利益無邊眾生皆佛之報身所為也念佛者應在心念中觀念佛之相好莊嚴功德分明不亂不知者往往以念佛為稱佛名號且將念字旁加一口字表示口念皆是錯誤之至故真正念佛應觀念佛果之功德莊嚴相好念念不昧了了分明於一心也庚三化身言化身者為彼有情隨所應化故現無量阿僧企耶諸化佛身其所化身或於地獄以現其身度彼有情令離眾苦導以正法令發勝心便生人天受勝快樂於佛法中深生信樂得佛法分獲聖道果或生鬼趣化彼有情令離飢渴種種逼迫化以正法使發勝心便生人天受諸快樂深入佛法得聖道果或化旁生在於彼趣或作迦嚕羅身或作龍身或作師子象馬熊羆虎豹豺狼野犴狐兔蚖蛇蝮蠍魚鱉黿鼉白鶴孔雀鳳凰鴛鴦鸚鵡舍利種種之身令諸有情離相殘害慈心相向能離種種諸怖畏事示以正法令深信樂歸佛法僧得生人天獲諸快樂得佛法分證聖道果或化有情入於餘國土或日月光所不能照如是種種無佛法處建立正法令諸有情歸佛法僧剃除鬚髮受佛禁戒而作芯芻及芯芻尼或作鄔波索迦鄔波斯迦建立僧坊護持正法安立無量無數有情置於人天涅槃彼岸而得果證或生天趣化彼有情令離五欲心無染著導以正法發菩提心歸佛法僧深入正法置於涅槃解脫果證第三明化身佛他受用身亦為應地上菩薩所化現但此化身有三一勝應身謂佛為二乘廻心及三賢眾菩薩現二劣應身謂為欲界人天等所現三隨類身如佛見何趣眾生應得度者即現何身而化度之如佛現獅身鹿身等隨類之身然於每類中必現最殊勝之身如在牛中即現牛王身鹿中即現鹿王身等令心向上但今人心殆皆向下互相殘害私逞機智隨處以雜染心作事故生出種種之苦果欲滅此苦果亦應人人發向上心則世界安寧亦非難致也鄔波索迦等即優婆塞優婆夷譯云近事男與近事女以其能承事供養佛法僧三寶故此為在家眾比丘亦云苾芻即出家眾也或生人趣現處王宮生釋種家以巧方便化諸有情斷除三界煩惱憂患生老病死故現受生踰城出家菩提樹下取吉祥草坐於道場處金剛座降伏魔軍成等正覺為化有情轉正法輪放大光明周遍一切照曜世間自利利他悉皆圓滿或現寂靜入大涅槃是即名為佛化身也如是種種善巧方便無量無邊皆是如來自在神力此即三身體無異相此明應化身即由降兜率生皇宮乃至成道轉法輪等八相也降伏魔軍者謂降伏煩惱魔天魔五蘊魔死魔化身所依即相好莊嚴之報身而報身所依即真如平等法性身要之報化身種種變現皆由神力方便現示故金剛經云若以色見我以音聲求我是人行邪道不得見如來又云如來者無所從來亦無所去故名如來皆顯法身真佛報應二身無其功用此為攝用歸體攝末歸本以法身為佛也是故三身非一非異亦可云體相用謂法身是體報身是相化身是用或法身是理報身是智化身即大悲等流也但三身人等眾生亦有而佛與眾生不同者即在報身耳如人有人報鬼有鬼報但二乘極果之未捨報身亦是凡身菩薩報身雖具功德而亦是異熟果故唯佛報身究竟圓滿也蓋人天等報身皆有限量如人之報身即唯於人中天之報身即唯天中而佛報身則等同法身自在無有限量也法身則眾生與佛平等無二然不同者佛為已光明顯現之法身眾生是黑暗隱昧之法身且佛之法身與莊嚴之報身相應但眾生之報身不與法身相應古德云在大海中渴死皆不得受用之故也化身在人類中似無但亦有之如夢中所化現境界亦能自現他身及整個宇宙等此皆夢中獨頭意識所化現也在佛化身則隨眾生之所感即隨類而現起眾生猶無此功能也故法華經以常現八相成佛謂常作是好夢即所謂夢中佛事是也故三身中眾生與佛異者在報身若眾生能將此業報有漏之身轉識成智轉有漏成無漏則與佛無二法身無得無說報身須真修實行方轉凡夫之報身而為佛之報身故學佛者即應觀三身之區別而發菩提心歸依三寶為修學之初程也己三歸法身爾時薄伽梵告慈氏菩薩摩訶薩言善男子於意云何若有善男子善女人歸依佛者當歸依諸佛清淨法身若欲求於佛法身者當作如是發大誓願願我及彼一切有情當得如是功德法身云何乃令發如是願為佛應身剎那遷變化身佛者疾入涅槃功德法身湛然常住以是歸依清淨法身歸法身者即是歸依過去未來現在諸佛若我捨於眾生取涅槃者即同受於地獄諸苦若與有情同解脫者雖處地獄無異涅槃以是因緣令諸眾生歸佛法身證涅槃樂究竟如如體無增減如是法身是真安樂是故但令歸佛法身此段明歸依佛者應歸依法身以應化身是隨眾生機感而現生滅不久而法身乃常住不滅故應歸依又此即歸依佛與眾生不二之法性身也但亦通自受用身以自受用身亦常住故又歸依法身即歸依諸佛以法身不捨眾生而涅槃謂佛以眾生苦為苦故眾生有苦佛終不捨也是以佛身雖有三種而推功歸本此結文中唯歸依法身也丁二法寶戊一總標復次慈氏云何名為清淨法寶言法寶者亦有三種此段正明三寶之中第二法寶亦有三種世尊親證法界一切諸法之清淨法性所說之種種教法亦即從清淨法界中等流而出一切諸法無一非是清淨法寶此法寶無量無邊然歸納言之可約之為三種也戊二別釋己一第一法寶庚一正明涅槃辛一長行壬一先徵云何為三第一法寶所謂涅槃甘露解脫常樂我淨而為體性能盡一切生死老病憂悲苦惱初句云何為三是總徵三種法寶之詞也以下別釋三種法寶之義法本無異平等一味以度生之善巧方便言之第一法寶是佛果上所親證之法第二法寶是佛因中所行之法第三法寶是佛化生所說教法皈依三寶者應知此三種法寶之概念與內容也涅槃古云滅或滅度又云寂滅此乃依三乘之共教涅槃言若唯大乘涅槃言之則云圓寂謂一切功德圓滿一切過患寂滅即一切無為無漏真如功德無不圓滿五住煩惱二分生死一切過患無不寂靜也然此涅槃義別略有四種一本來自性清淨涅槃謂一切法相之真如理雖有容染而本清淨具足無數無量微妙功德無生無滅湛若虛空一切有情平等共有與一切法不一不異離一切相一切分別尋思路絕名言道斷唯真聖者自內所證其性本寂故名涅槃二有餘依涅槃謂即真如出煩惱障猶有微苦所依未滅而障永寂故名涅槃三無餘依涅槃謂即真如出生死苦煩惱既盡餘依亦滅眾苦永寂故名涅槃四無住處涅槃謂即真如出所知障大悲般若常所輔翼由斯不住生死涅槃利樂有情窮未來際用而常寂故名涅槃第一涅槃一切有情共具共有二乘無學容有前三唯佛世尊四種具有也此四種之涅槃如甘露醍醐之長生藥能解脫一切生死常謂佛所證之涅槃本性即常真如常住一切法常如其性樂謂遠離一切之逼迫我乃指佛之無礙法界出離一切障拘之大自在淨謂一切不淨之法究竟清淨此涅槃法依此常樂我淨四德為體性故能盡一切生老病死憂悲苦惱永盡凡夫之四見四倒也壬二後釋云何生苦謂依父母牉合之時不淨種子處母胎中業力風持時經九月住居黑闇無有光明生熟藏間污穢不淨八萬戶蟲之所和雜出息入息隨母而行口不能言眼不能視饑渴寒熱種種諸苦逼切身心如是諸苦無量無邊令諸眾生不得自在故名生苦雖受此苦而有一德一切怨家所不能見亦不能說是非過惡無比涅槃安樂法中無如是苦此段正明人生受生之痛苦也人由貪色而生在父母交媾之時執持父母所流不淨以為己身處於母胎即由業識風大使此不淨種子漸增漸長經九越月住居於母腹生藏之上熟藏之下污穢不淨黑暗無光與母腹中八萬戶蟲共生雜居饑渴寒熱無量諸苦常逼身心令諸眾生不得自在然此眾生雖受此苦而具一功德即為一切冤家所不能見所不能喪夫此等受生痛苦在無比之清淨解脫涅槃法云何老苦所謂眾生從少至老時節代謝所有充實悉皆損減筋力衰朽行止戰掉髮白面皺眼耳昏暗牙齒疏缺顏貌醜陋身相傴僂人所惡賤所有言教隨說廢忘而以此身為其重擔譬如然燈膏油既盡不久將滅老亦如是壯膏既盡不久將死又如蘇莫遮冒覆人面首會諸有情見即戲弄老蘇莫遮亦復如是從一城邑至一城邑一切眾生被衰老冒見皆戲弄以是因緣老為大苦除非死至無藥能治雖受老苦而不厭之祈禱神祇恆願長壽無比涅槃安樂法中無此老苦此正明人生生期相續中間新陳代謝種種變易生滅不停之痛苦也蘇莫遮謂遊戲場中所帶之鬼面具人之老也膚枯皮皺醜陋之狀如鬼面具令人厭惡被人戲弄種種痛苦莫可言狀但諸眾生雖受此苦而不厭離不於正大無比安樂法中去修而反祈神禱鬼希冀長壽而卒不得此等有情實可憐愍云何病苦所謂地水火風互相違害種種諸苦來集其身一切眾生無問老少皆共有之安樂適身勝妙五欲金銀珍寶家族眷屬悉皆捨離所有教詔男女親戚皆不承順一切怨家詐來親附如此病苦皆不願求以是當知病為大苦安樂涅槃無比法中清淨寂然無斯病苦人身由地水火風之四大元素組合而成此之四大性體各異如四毒蛇二上二下互相違害而有種種病苦來集其身此之病苦無論老少富貴貧賤皆共有之無倖免者是苦到時一切勝妙五欲快樂素日至契家親眷屬悉皆捨離師友教誡男女親戚莫能承順一切怨家詐來親附如此病苦一切有情無願求者復次慈氏云何死苦所謂眾生氣絕識滅無所覺知一切苦中莫過死苦生老病苦五趣之中有無不定此死苦者皆共有之譬如貧苦能劫榮華如怨憎苦能劫親愛死苦若至不揀老少愚智貴賤一切盡劫捨現身已入幽闇處衣服臥具一切財寶莫能用之裸露而行復無伴侶貨財不免披訴無地咄哉無常能作斯害甚大鄙惡不揀怨親三界眾生無能免離皆被死伐何能救之設轉輪王那羅延力皆被擒獲當知死苦無量無邊以是觀之死為大苦解脫涅槃無比法中寂靜安樂無茲死苦壽煖識三法絕滅名之為死是種死苦最上最勝一切苦中無能過者三界五趣一切有情無能免者即如轉輪聖王那羅延天亦被擒獲此苦若至一切榮樂盡劫一切事業悉毀一切財貨俱掠入黑暗處裸露而行無伴無侶披訴無地三界五趣一切有情無能救者如是大苦涅槃法中寂靜無有譬如有人瀑河漂溺登涉高山得免怖畏眾生亦爾常為一切生死瀑河之所漂溺登涅槃山離生死畏亦如天雨能除毒熱塵穢等障人民安樂身意清涼百卉滋茂成就果實如來法雨亦復如是能除一切煩惱毒熱眾生安樂解脫清涼滋長一切白淨善種成就果實令得涅槃以是因緣諸佛世尊捨無常身證涅槃樂一切有情本來具有一切清淨功德無漏種子雖在瀑河漂溺五趣流轉若獲佛法之雨即能滋生增長菩提覺華終得清淨願果斷一切苦得一切樂舍無常身而證常樂我淨之清淨涅槃也辛二偈頌爾時世尊欲重宣此義而說偈言如來妙體即法身清淨解脫同真諦如日與光不相離如來功德即涅槃真我與佛無差別一切有情所歸趣生死涅槃等無二其性不壞無造作如來之真淨妙體法身即涅槃真如之究竟法身即是生死清淨二障解脫之無分別真如法性如日與光不稍相離如來功德即常樂我淨一切法中之真實功德生死涅槃平等一味無異無別真如法性本來平等法爾如是故垢淨如如性不異唯佛世尊獨能了眾生悉有如來藏三寶於是現世間一切有情入佛智以性清淨無別故佛與眾生性不異凡夫見異聖無差一切眾生本清淨三世如來同演說其性垢淨本無二眾生與佛無差別空遍十方無分別心性平等亦復然譬如一切眾生界遍在虛空受生滅諸根生滅亦如是處在無為界亦然譬如虛空火不燒生死不壞無為性地水風輪轉相依虛空無有所依相蘊處界三亦復然恆住業種煩惱性彼業煩惱住何處常居妄想無明源妄想之心何所居恆在無為淨心性蘊處界三假施設一切法性本無住業惑相持如地水妄想轉動猶如風心性本淨如虛空妄想依空無所有煩惱業苦從妄起業苦還為煩惱因惑業循環無定居無因無緣無所會無生無滅性空寂本體光明智清淨垢淨如如性即理佛性此之佛性等覺仍障不能完全顯露唯佛世尊獨所了知如來藏即佛性而此真如佛性一切眾生本來具足然不能了三寶出現世間佛所開示始能悟入佛智見佛性眾生性本來清淨無別以諸凡夫妄起我法二執見有聖凡不同不知其性垢淨不二即同涅槃生之與佛原自無差也此真如佛性如太虛空普遍十方無諸分別一切眾生遍在虛空受諸生滅有情諸根在無為界亦復如是譬如虛空火不能燒生死諸法亦不礙無為性也五蘊十二處十八界恆依業住業依煩惱如地輪依水輪水輪依風輪妄想依無明無明依無為淨心性苦果業惑如地水之相持妄想猶風轉動心性如空惑業苦果循環無定若以空性觀之則惑業苦果當體即空而空所顯即無生無滅無因無緣本自空寂實無生滅差別可得通達此本空性即是般若智光清淨也自性無生無變異煩惱無明垢所覆亦如翳眼見二月眾生二執亦復然煩惱猶如眾蜜蜂其蜜即喻如來藏此蜜眾蜂共圍繞智者護身能取蜜無相六度為方便而能證彼法界身自性本自無生無滅無變無異以眾生為無明煩惱我法二執所覆而妄見生滅如瞖眼人妄見二月也煩惱如群蜂如來藏如蜜此蜜為眾蜂之所包圍而智者能善護身不為眾蜂所螫取獲諸蜜煩惱無明諸障雖使諸善法伏隱蓋覆本有真性而有智者亦能力行無相六波羅蜜舉種種方便而顯如來淨性證清淨法界也譬如五穀𥢶未除不堪與人充美膳菩薩煩惱糠未遣不能施人甘露飯行人遺寶落穢處設經萬歲無損汙天眼見寶之所在收取洗拭隨意用佛見眾生性無二為欲滌除煩惱穢大乘甘露而為水滌盡塵勞佛性現譬如新生五穀芽說米有無未決定佛性不離有無中唯佛自證方明了法寶自性恆清淨諸佛世尊如是說客塵煩惱之所覆如雲能翳日光明無垢法寶眾德備常樂我淨悉圓滿法性清淨云何求無分別智而能證譬如池水淨無垢其中蓮花妙無染如月蝕已重光明亦如皎日出雲翳無垢功德遍莊嚴滌除煩惱光明現夫諸眾生皆有佛性如來之智慧德相無不具足祗以無明妄想所覆而不證得無量大用遂致無現如五穀之𥢶未除焉可為人充美饌煩惱不斷焉能為諸眾生作依作歸但此佛性雖為煩惱隱覆而不能壞如摩尼寶珠落在污池知而取滌之仍為光明燦爛無價寶珠佛性亦然若能以般若法滌盡煩惱則佛性自全體顯露矣然此佛性不離有無唯佛自證了知一切法寶之真實清淨功德性為客塵煩惱之所障唯無分別智之摩訶般若而能證之也庚二結成三德復次慈氏當知第一清淨法寶即是摩訶般若解脫法身佛之自性身常住不滅之法性即法身德也如諸法若性若相本來實際之覺了即般若德也斷盡二分生死見修二惑煩惱所知二障悉皆淨離不為一切所縛得大自在並令眾生亦爾即解脫德又即恩德也己二第二法寶復次慈氏應知第二法寶者謂即戒定智慧諸妙功德所謂三十七菩提分法謂四念住四正斷四神足五根五力七覺分八聖道此三十七法與前清淨法寶而為方便云何方便以修此法而能證彼清淨法身當知此即第二法寶此段明第二法寶前第一法寶謂佛所證常樂我淨之大涅槃解脫果第二法寶明所修之行即依此修行能證前第一法寶之解脫果也但此所修之行即戒定智慧諸妙功德以為證果之方便蓋求佛法先有信解而後起行此行第一即以戒為基礎然戒即包括五戒八關齋戒十善戒沙彌沙彌尼戒比丘戒比丘尼戒等在家之優婆塞夷即受持五戒八關齋戒十善戒等比丘受持二百五十戒比丘尼受持三百五十戒等大乘中菩薩戒為七眾共修共學故菩薩三聚淨戒即以七眾律儀為律儀戒一依律儀戒二攝善法戒謂修習六度等一切善法三饒益有情戒謂行四攝法度一切眾生若不依之而行即不成為菩薩也但佛法為何要學戒受戒耶以證清淨法身須先在平常三業上有修治修練之功夫將一切不合理行為修治改正並修鍊一切合理行為令其增長成熟也以吾人舉心即錯動念即乖故須用佛所制律儀為正當之行軌以改善之此即修證佛法之第一步工夫故經云佛住世時以佛為師佛涅槃後以戒為師戒即調伏調練三業伏治諸過也第二即定依戒而發梵云三摩地此云等持即心一境性為對治掉舉散亂而成寧靜意識等為散亂心所而散亂隨五欲等分別如水搖動即成混濁而不清澈若欲轉散亂成寧靜而為有力之心即須修定由靜而明則發生真正之智慧但定即是將心力集中於一境所謂心境一致即統一心之力量以成安靜和平之定心矣此在佛法中非常重要蓋常人雖亦修善但以無此定心名為散善且不能達色無色天而況出世無漏之聖果以無漏聖果皆依定發慧而證即大乘三資糧四加行亦依定修也故不依無漏智慧則不能成無漏功德若不依定無漏智慧則無由發生故阿羅漢及佛果無漏功德無不依定而生也修定必先持戒不持戒則定必無由清淨所謂依戒生定於戒真能嚴持不犯自然成定以一切行動都能合理身心安然精神充滿故由持戒清淨而發之定即無有過患魔障如種花木必先將土耕淨並加圍牆不使牛羊踐踏而后始發生增長也信解即將土耕淨戒即圍牆而后出生禪定智慧功德也若修定不先從信解持戒清淨譬如種花木不為保護不久即被獸等之所踐踏不但不能增長而種子亦反為失壞矣故佛法於信解戒定同為重要也定心成就依以觀察諸行無常諸法無我有漏皆苦乃至能所分別諸法性相一切皆空了不可得引發真實無分別智如此即成真實智慧而此即由依戒成定之清淨心中所出生此即平常所謂聞思修三慧中之修慧乃戒定相應之慧也若但持戒清淨所成之慧名為思慧思者造作義謂一切造作合於規律能契其理也聞所成慧者謂聞法起信解之智慧也以由聞所成慧思所成慧修所成慧而後方能成真正無漏之智慧所謂應無所住而修布施即不以布施相而布施依無相無分別慧而成無漏微妙不可思議之布施等功德功德圓滿乃成清淨法身也但第二法寶在大乘分六度十度或分戒定慧或分三十七菩提分法則通三乘菩提究竟唯在佛果分即因分此三十七為菩提之因分也四念處者一觀身不淨二觀受是苦三觀心無常四觀法無我即觀不淨等斷除貪等煩惱令心安住於此四念處中則過患不生矣而常人反觀身是淨觀受是樂觀心是常觀法有我而妄執起四種顛倒四念即為對治此故四正勤者一已斷惡令不生二未斷惡令斷三已生善令增長四未生善令生此即持戒也四神足者亦名四如意足即欲念精進慧依戒生定引發觀故五根五力者即信進念定慧謂依四神足而成就故此重在定七覺支者謂念擇進喜輕安定捨之七種覺分也覺即智慧謂由此七種定相應慧抉擇諸法相性而引生無漏無分別智也八正道者謂正見正思維正語正業正精進正定正念正命也無漏聖法名為正通至涅槃名為道此為證聖果之道也方便有二義一善巧權巧義此乃利他度生方便二資糧階梯義此為佛弟子自利修習之方便也前為證得之法此即修行工夫故云為前作方便即由此證得第一法寶故葦舫紹奘合記散見正信二卷十一期至三卷五期附註此下佚
