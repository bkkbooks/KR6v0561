body:
  text: 大乘本生心地觀經講記二十一年十二月在閩南佛學院講懸論一題旨明晰二譯史確實三法義豐富甲法備五乘乙義周十宗四時機合宜五略彰分齊釋經甲一教起因緣分乙一證信序丙一五重證信丁一略敘聞時主處丁二廣列同聞諸衆戊一聖衆己一近眷屬己二大眷屬戊二凡衆己一天龍八部庚一天衆辛一欲界天衆辛一色界天衆庚二龍衆庚三藥叉衆庚四乾闥婆衆庚五阿修羅衆庚六迦樓羅衆庚七緊那羅衆庚八摩睺羅伽衆己二人非人等衆庚一人衆辛一轉輪王衆辛二人王衆辛三王夫人衆辛四僧俗人民衆辛五外道衆庚二非人衆辛一鬼衆辛二畜生衆辛三地獄衆丙二結成法會乙二發起序丙一如來示相丁一處衆入定丁二諸天興供丁三現通益物丁四放光現相戊一胸間放光戊二光中現相己一大千世界己二本生行相庚一總庚二別辛一過去辛二現在辛三未來庚三結己三十方佛會戊三光瑞利益丙二會衆仰法丙三獅吼讚請丁一長行戊一敘獅吼德戊二告海會衆戊三悅會衆意丁二偈頌戊一讚佛戊二重頌戊三請法甲二聖教正說分乙一稱性頓宣乙二應機漸說丙一五乘共法丁一欲界人天乘之五乘共法戊一答妙德等問己一妙德念問己二如來慰答庚一慰許庚二答解辛一標釋四恩壬一總標壬二別釋癸一父母恩癸二衆生恩癸三國王恩癸四三寶恩子一標釋三寶丑一總標丑二別釋寅一佛寶卯一正說卯二問答寅二法寶寅三僧寶子二問答寶義辛二示報恩行己三說法利益戊二答智光等問己一智光趨問庚一趨敬庚二問求己二如來慰答庚一宣慰庚二頌答辛一頌佛二德壬一自證實德壬二化他權德辛二重頌四恩壬一總標壬二別釋癸一父母恩子一重頌子二增頌癸二衆生恩子一重頌子二增頌癸三國王恩子一重頌子二增頌丑一廣明戒德寅一舉因明果寅二辨別戒品寅三標因示果寅四教修懺法卯一勸應懺罪卯二示懺罪法卯三結修懺益寅五示受戒儀寅六喻明戒德丑二勸應受持癸四三寶恩子一增頌總相子二重頌三寶丑一佛寶丑二法寶丑三僧寶寅一重頌總標寅二增頌二聖寅三重頌聖凡辛三總結四恩己三問答報恩己四聞法獲益丁二色無色天乘之三乘共法戊一出家戒之超欲界法十信己一厭捨出家庚一智光陳疑請決辛一敘今所願辛二述昔所聞辛三正陳疑意庚二如來因問廣說辛一因問總非辛二廣說九喻壬一大海不知滿足喻壬二石火能燒草木喻壬三深山戀寶喪身喻壬四飲雜毒露得吐喻壬五妄想猛風不起喻壬六煩惱衆苦生處喻壬七愚一違教敗家喻壬八童女夢子生死喻壬九牝馬口海出險喻庚三當機出家獲益己二修無垢業庚一智光敬問庚二如來許說辛一讚許辛二解說壬一略觀諸出家義癸一長行子一示出家菩薩觀子二別釋旃陀羅行子三略明四無垢性癸二重頌壬二廣說四無垢性癸一著壞色衣子一長行子二重頌癸二常行乞食子一長行子二重頌癸三服所棄藥子一長行子二重頌癸四住阿蘭那子一長行子二重頌庚三說法獲益辛一會衆現益辛二佛記當利戊二離欲定之趨上界法十住己一住阿蘭若庚一常精進疑問庚二薄伽梵慰答辛一慰許辛二答解壬一長行癸一正破其疑癸二廣明所行子一觀無常苦子二發報恩願子三立堅固誓丑一別明三根自誓丑二詳陳諸位自誓寅一得陀羅尼自在誓寅二得諸功德圓成誓癸三結成行願壬二重頌庚三法會衆獲益己二修遠離行庚一菩薩興問辛一樂遠離行白衆辛二樂遠離行正說壬一長行癸一觀世間諸恐怖子一總標子二詳說丑一觀恐怖相寅一略觀諸結寅二別觀五欲寅三別觀貪財寅四廣觀煩惱寅五遍觀雜染丑二示離怖處丑三出恐怖本丑四結應離執癸二觀阿蘭若功德子一示當住阿蘭若相子二示正住阿蘭若行丑一不生一切分別心觀丑二具足一切功德處觀壬二重頌庚二如來印成庚三法衆獲益丙二三乘共法丁一大乘共行二乘法十行戊一彌勒興問戊二世尊許說己一許諾己二解說庚一總標有漏身觀庚二別分三十七觀庚三亦作大乘身觀己三結成戊三法衆獲益丁二二乘回趣大乘法十回向戊一修行諸度己一長行庚一問答偏讚阿蘭若辛一慈氏興問辛二世尊垂答庚二問答具修波羅密辛一慈氏重問辛二釋尊廣答壬一正明修行十度壬二廣明差別諸門壬三結明諸佛修證己二重頌己三法益戊二功德莊嚴己一慈氏啓問己二釋尊啓說庚一以其一德明庚二以離二過明庚三以諸四法明庚四以諸八德明己三結明法益庚一佛說當益庚二經敘現益丙三大乘不共法丁一上根證大乘境加行入根本戊一長行己一文殊啓請己二世尊許說庚一印許樂聞庚二顯能說佛庚三讚所說法庚四正說法本庚五問答抉擇辛一文殊問難辛二世尊解說壬一印許所問壬二喻明其相壬三空顯其性壬四直指法界庚六結應修習戊二重頌戊三咒印丁二中根起大乘行十地入等覺戊一顯能說佛戊二示所說法己一直示當說己二問答抉擇庚一文殊問難庚二世尊解說辛一明說空義辛二彰執空病辛三出不空心己三請說總持庚一正請庚二正說己四觀證三昧戊三獲聞法益丁三下根引大乘果等覺入佛戊一示成佛法己一顯三身佛己二示三密法己三正觀成佛己四喻明勝法戊二讚說勸行己一文殊讚法勸行己二世尊示行令修庚一總示三十二甲庚二別明三十二甲庚三結明修行果利戊三興供發願戊四聞法獲益甲三依教奉行分乙一付囑流通乙二問答持福丙一文殊讚問丙二釋尊廣明丁一喻校持福丁二別明女福丁三經同佛塔丁四法師如佛丁五發心功德丁六命終利益丁七結勸持修乙三會衆信奉懸論一題旨明晰就本經之題目即可以說明本經宗旨之所在依大乘本生心地觀經一題看來本經宗旨似唯在攝化大乘之機而實際上本經通攝五乘及三乘共法惟以其中一分之大乘不共法為尤要耳甲經通指一切經典凡為佛陀所宣說或為佛陀所曾印證者皆名曰經梵音修多羅或修妬路素怛纜有線的意義取能貫穿文義攝化生機之意與華言經字意義相符故譯為經或可稱為契經即是上契真理下契群機乙大乘通指一切大乘經典而言如妙法蓮華經亦題曰大乘及其餘題以方等或大方廣等皆是大乘是對小乘而言乘有運載之義若能觀大乘境修大乘行即能運載凡夫至於無上菩提涅槃之大果自運既圓運他亦無有窮盡故名大乘換言之大乘之義乃在解釋一切凡夫染縛而入無上佛果大乘法不外境行果三義若能於一切諸法性相如實了達即是大乘所觀的境依境而起行即是修學六度十度一切無量無邊法門凡有利於有情的大乘菩薩皆應修學經過十信十住十行十回向十地三阿僧祇劫而得到究竟之佛果即是由行而得果依此境行果法能如實施行即為大乘妙法大乘法不獨限於經藏亦有大乘之論藏及律藏此經是大乘經藏中之一部既超出人天二乘之上而又通攝五乘諸法丙本生是十二分教之一如云長行重頌并授記孤起無問而自說因緣譬喻及本事本生方廣未曾有本生乃指釋迦牟尼佛三世本生之因果而十二分中之本事則是明諸弟子事者此經序品中說釋迦菩薩於往昔時作光明王最初發於阿耨多羅三藐三菩提心乃至菩提樹下得成佛道娑羅林中入於涅槃於其中間三僧企耶百萬劫中所有一切慈悲喜捨八萬四千波羅密根據這些文義可以明白本生是指釋迦牟尼佛本生之事的從過去三祇修行及現在八相成佛乃至未來設立塔廟其間經過無數量劫發菩提心從凡夫地至究竟成佛度生這是顯然把釋尊本生的內容特色都表現出來了丁心地觀當知一切諸法皆從心地而生皆從心地而起在攝境歸心攝用歸體攝事歸理攝相歸性的看法上無論那項事他的出發點都歸於心一切唯心造三界之中無一法而不以心為主的本經的觀心品裏說三界之中以心為主能觀心者究竟解脫不能觀者永處纏縛譬如萬物皆從地生如是心法生世出世善惡五趣有學無學獨覺菩薩及於如來以是因緣三界唯心成佛果是此心迷於生死苦海也是此心總之三界上下法唯此一心作此心普遍於一切諸法之中能有變生轉現的功能所以以地喻心而心名為地然在此中以地喻心者可有兩種意義能生此心能生一切世出世間善惡因果乃至菩薩一切無漏諸法如大地之一切草木叢林皆依大地而生長所依如江河漢海一切之水五嶽千巒一切之山及動物植物與人類所應用之器具種種一切皆以大地為所依而住心亦如是能為一切法之所依止有此能生所依二義所以喻心以地曰心地依此可以明白觀察心地是怎樣的緊要了假若觀心而了知即心自性之諸法實相者則了知心心所法無內無外亦無中間於諸法中求不可得故心性本空不生不滅無來無去無有上下差別之相平等平等以善觀不善觀之不同於是有佛與異生的差別以諸差別之事由心而起依心而住若能善觀心者則能通達諸法之相亦能究竟解脫如經云能觀心者究竟解脫不能觀者永處纏縛若能如此如實觀察名之曰心地觀所以若人善觀此心了知心之本性即能如實了知一切諸法實性所謂不生不滅不垢不淨本來寂靜自性涅槃若人善觀於心亦即能了達世出世間一切因果邪正能了達世出世間一切因果邪正即能了知諸法法相若了知諸法法相即能依如實了解而修集福智乃至即能證得究竟之涅槃依此義故說心地觀此心地觀即是本經之宗旨亦即是觀大乘之境修大乘之行乃至證大乘之果也就是釋迦牟尼佛本生諸事之說明二譯史確實古來諸師所宏揚之一切經典近人從歷史上嚴格的考察起來往往有不明確的地方使人疑惑例如楞嚴經起信論等皆以譯史不明致生疑竇於宏揚流通及人的信仰上亦發生相當的不良影響本經向來少有講釋現在乃從大藏經中特別提出來講若翻譯之史實不明確也不免有不足信今而傳後的遺憾故當一考其譯史經上題唐罽賓三藏般若等譯等者等有其他的人可見其不是一個人譯的唐憲宗的序文說大乘本生心地觀經者釋迦如來於耆闍崛山與文殊師利彌勒等諸大菩薩之所說也其梵夾我烈祖高宗之代師子國之所獻也這可以知本經來歷之確實梵本此經不是憲宗時才有高宗時就已有了所謂師子國者即現在之錫蘭島人每以錫蘭屬於印度然非事實不過印度佛教流傳於錫蘭島最早一直到現在還沒有衰敗自來認錫蘭島為純粹小乘佛教也不盡然過去於大乘之法也有相當的傳布如本經即彼國所獻義淨三藏不空三藏等也曾住於錫蘭可見錫蘭也有大乘佛法而且從海路來華之佛法皆經此島故此可決定是信史又云寶之歷年祕於中禁朕嗣守丕業虔奉昌圖聽政之暇澡心於此以為攝念之旨乃出其梵本於醴泉寺詔京師義學大德罽賓三藏般若等八人翻譯其旨命諫議大夫孟簡等四人潤色其文列為八卷勒成一部這樣的描寫此經的翻譯史實是值得注意的此經翻譯者是罽賓三藏般若等則般若其人的歷史也不可不加考察貞元新定釋教目録卷十七云法師梵名般剌若唐言智慧北天竺境迦畢式國人也言罽賓者訛略姓喬答摩氏言瞿曇者訛略不正穎悟天假七歲發心違侍二親歸依三寶屆於上國矣這段文裏敘說般若法師出家的因緣在天竺求法十八年後來由錫蘭到廣州這是建中三年的事情到了貞元二年法師舅氏之子神策正將羅好心者將法師首先所譯的大乘理趣六波羅密多經表聞於帝於是乃下制曰中書門下牒王希遷牒奉敕釋教深微道俗虔敬皆因梵本法被中華宜令王希遷與所司精選有道行僧就西明寺重更翻譯訖聞奏牒至准敕故牒貞元四年四月十九日牒及牒祠部准敕亦然傳牒京城諸寺大德罽賓三藏沙門般若宣釋梵本翰林待詔光林寺沙門利言譯梵語西明寺沙門圓照筆受道液良秀圓照潤文應真超悟道岸空並同證義敕王希遷王孟涉馬有麟等送梵本經至西明寺翻譯此經翻譯的年代根據貞元新定釋教録是貞元六年歲次庚午譯的此經從釋尊在靈山對諸菩薩說法結集之後流通到錫蘭島在高宗時代再流通來中國後來因憲宗弘護佛法之熱忱及般若等翻譯之努力然後才譯為華文這樣此經翻譯的歷史是十分確實的了三法義豐富此經的譯史已經大體說清楚了這裏更要解述本經構成的要素分兩段來講甲法備五乘此中所謂五乘指人天聲聞緣覺菩薩乘或人天聲聞緣覺菩薩佛乘以人天同以五戒十善運出四趣故還有一樣說法欲界人天乘色無色天乘聲聞緣覺佛乘色無色天乘亦名梵乘梵者淨也謂色界諸天以根本禪運出欲界故此經在題旨上標定是大乘但他的內容是隨順諸乘的機宜而施教的所以經中法義極其宏富也可以說是應諸乘而說的教法怎樣看出此經的法義有五乘呢這可從此經的構成分三方面來說五乘共法分二一欲界人天乘之五乘共法即此經中的報恩品二色無色天乘之五乘共法又分二一出家戒之超欲界法十信即厭捨品和無垢性品二離欲界定之超上界法十住即阿蘭那品和離世間品三乘共法分二一大乘共行二乘法十行即厭身品二二乘回趣大乘法十回向即波羅密多品和功德莊嚴品大乘不共法分三一上根證大乘境加行入初地即觀心品觀空前心相證心空性性相禪密二中根起大乘行十地入等覺即發心品觀空後心相發心妙定相禪密三下根引大乘果等覺入佛即成佛品觀三種祕密即身成佛禪密這樣的看起來自覺此經法義的宏富了雖然有欲界人天乘色無色天乘的差別但從報恩品厭捨品乃至成佛品亦可以明白為聲聞緣覺菩薩乘的階梯雖有諸乘法義的差別實際上皆可以貫攝於大乘法內在應機方面又可有泛應曲當作用這才算是完備滿足的佛法乙義周十宗所謂十宗就中國佛教史來觀察才有這樣地區別本來佛教古今來歷史的不斷發展概括著世出世法的義理假若以十宗去束縛他未免有點不自由現在根據此經義理來分配與十宗相應的法門首先從五乘共法三乘共法方面觀察厭身品中觀諸法無我諸法皆空所以明俱舍成實宗義厭捨品無垢性品與律宗相應又報恩品無垢性品以及功德莊嚴品皆有回向兜率淨土的文義又兼及十方淨土則西方淨土亦可在此中說明矣觀心品先觀心的如幻相次觀心的空寂性則法相法性之義由此表詮又觀心品發心品成佛品皆明一切法究竟真實心性唯證相應即是禪宗又在觀心品發心品成佛品都有陀羅尼都是法身佛表現即有真言宗及華嚴法華義周十宗的道理略述如此要能整個領會斯旨不但依經文探尋推測就可了事要在事實上去親證才能圓滿的解決四時機合宜救濟衆生的佛法於社會人民都有直接或間接的關係因之要明白佛法是應隨時機而設教的既然一切時處都可以與社會人民發生關係這即是佛法應該普及的時期了也即是佛法將要普遍於整個社會的好現象今講此經即是適應這個時代的需要研究佛學的人對這傾向應該重視中國古代和近來所宏揚流通的諸經論大抵以講楞嚴法華彌陀為主要這是因為叢林裏參禪則講楞嚴相應學天台教相則講法華為宜而通俗勸修淨土則講彌陀這確實帶著過去時代的特色如今則不同了無論在寺院或是一般善男信女所組織的講經會都有社會各種人士來參加因此所講的經論要具有法備五乘義周十宗的條件因為聽衆根機不能一致假若沒有法備五乘義周十宗的條件怎能收獲最完善的效果呢所以今講此經不但為普通聽衆講同時亦為研究教理的人所需要故應該對此經作精密的研究此經可為初學佛法的佛法概論可為研究全藏教理之基礎五略彰分齊略彰分齊便是把關於此經全部的綱領提出來使一般人看了極易明白今把此經的大綱圖表於下丙一五重證信乙一證信序甲一教起因緣分丙二結成法會乙二發起序以上序品乙一稱性頓宜報恩品告彌勒段經綱甲二聖教正說分丙一五乘共法乙二應機漸說丙二三乘共法丙三大乘不共法甲三依教奉行分囑纍品丁一欲界人天乘之五乘共法報恩品己一厭捨品五乘共法戊一出家戒之超欲界法十信己二無垢品丁二色無色天乘之三乘共法己一阿蘭若品戊二離欲定之超上界法十住己二離世間品丁一大乘共行妙乘法十行厭身品三乘共法戊一波羅密多品丁二二乘回趣大乘法十回向戊二功德莊嚴品丁一上根證大乘境加行入初地觀空前心相證心空性性相禪密觀心品大乘不共法丁二中根起大來行十地入等覺觀空後心相發心妙定相禪密發心品丁三下根引大乘果等覺入佛觀三種祕密即身成佛禪密成佛品釋經甲一教起因緣分乙一證信序丙一五重證信丁一略敘聞時主處序品第一如是我聞一時佛住王舍城耆闍崛山中如是者中國佛教諸大師略有八種釋義一約信順釋言如是者信順之辭二約法性釋即法性為如唯如為是三約真俗釋真不違俗名之為如俗順於真稱之為是四約弟子釋阿難所說如於佛語故名為如為欲簡去相似之如故稱為是五唯約佛釋阿難道佛所說之法如佛所說不異故名為如如諸佛說是正非邪故復言是六約佛及佛弟子釋言如是者感應之瑞也以言教出於感應故言如是七言如是者如斯之言是佛所說故言如是八言如是者指將傳所聞之一部而言謂如是一部經我親從佛聞也諸家解說不可具述今取如是一部經為如是我聞者依圓測法師說謂傳法菩薩及阿難等五蘊身上假立為我耳根發識聽聞所說故言我聞所以佛地論云我謂諸蘊世俗假者聞謂耳根發識聽受廢別就總故說我聞真諦三藏說親聞名曰如是我聞欲避增減異分諸過失謂如是之法我親從佛聞非他展轉傳來的所以名曰如是我聞一時者據菩提留支所說有其多種有一念時一日時百年時一切時等今言一時者非此等時正是如來說此經時雖言一時而不云某年月日因人間天上的時間各有不同如忉利天一晝夜人間要歷百年又如中國陰曆陽曆併用從陰曆看來今天是十一月草六日從陽曆看來今天是十二月草三日所以佛經上敘述佛說法的時候都是渾然的說一時而不肯定是在某年月日的王舍城是地名梵名曷羅闍姞利呬城在中印度摩伽陀國智度論說是摩伽陀國王有子一頭兩面四臂時人呼為不祥王即裂其身首棄之曠野以大力勢治閻浮提閻浮提人因名此山為王舍城見此五山周匝如城即作宮殿於中止住以是故名王舍城西域記裏關於王舍城的名稱亦有討論恐繁不述耆闍崛山譯鷲台山鷲頭山山頂似鷲頭故古譯靈鷲山亦簡稱曰靈山乃釋尊說法最著名的場所以上聞時佛說法主處共為四重證信丁二廣列同聞諸衆戊一聖衆己一近眷屬與大比丘衆三萬二千人皆是阿羅漢心善解脫慧善解脫所作已辦離諸重擔逮得己利盡諸有結得大自在住清淨戒善巧方便智慧莊嚴證八解脫到於彼岸其名曰具壽阿若憍陳如阿史彼室多摩訶摩那波帝利迦摩訶迦葉憍梵波提羅波多優樓頻螺迦葉那提迦葉伽耶迦葉舍利弗大目犍連摩訶迦旃延摩訶迦毗那真提那富樓那彌多羅尼子阿尼樓馱微妙臂須菩提薄拘羅孫陀羅難陀羅睺羅如是具壽阿羅漢有學阿難陀等各與若干百千眷屬俱各禮佛足退坐一面以下乃證信序中第五引同聞衆同聞諸衆有聖衆凡衆之分聖衆中之近眷屬衆即聲聞衆大眷屬衆即菩薩衆然此二衆中先列聲聞衆而後列菩薩衆者即因聲聞衆時常聞佛說法時常親近於佛為佛說法時之常隨衆且又依佛律儀而行而修故此名為近佛眷屬乃先敘說菩薩衆則不然因諸菩薩時時遍遊十方國土親近諸佛時時本其大悲願力普度一切衆生以及具大智慧威力法財功德莊嚴故不必常隨佛後因之立此名為大眷屬至於其餘凡衆天龍八部是佛說法時之外護眷屬而人非人等乃聽佛說法之大衆耳此諸同聞大衆今在本經之首表列出來並敘其名德者因欲舉出佛當時說法之情形使未來之人對此經典倍生信心了此經實從佛淨法界中所流出也此所列同聞大衆其文非常繁多範圍亦非常廣闊所以只把這經文讀誦一遍俾各人依此所舉出之諸衆和法會殊勝之情形各各攝心觀想於是靈山法會即顯現在各人心中所以把此同聞諸衆畫作心地觀會之曼怛囉中間是佛繞以近眷屬之聲聞及大眷屬之菩薩其次乃為天龍八部之外眷屬以至人非人等若能作此曼怛囉之觀想則法會諸衆一一明現目前矣本寺最近曾做水陸道場內壇中所陳列的諸佛菩薩聲聞等像亦即為一種之曼怛囉也心地觀會曼怛囉舉類曰大比丘衆標數曰三萬二千人明位曰皆是阿羅漢阿羅漢者此云應應受人間天上之供養故應不再受三界之生死故心善解脫下是讚阿羅漢之德經中文意甚詳今不細述總之此心善解脫者即諸聲聞衆從其因地起修至阿羅漢地所成之果德也具壽阿若憍陳如下列聲聞衆之名具壽者即是長老之義如彌陀經中之長老舍利弗亦是此具壽義因齒德俱長故名具壽或長老也阿若憍陳如者阿若此云解是名憍陳如此云火器是姓阿史彼室多此云馬勝摩訶摩那即摩訶男波帝利迦佛之堂弟皆佛成道已最初得度者也羅波多即離婆多此云星宿摩訶迦毗那即劫賓那此云房宿真提那即金毗羅此云威如王微妙臂梵云婆修𬑟此云善臂餘皆常途所知不復一一細述有學阿難陀等者有學對無學而言無學是諸漏已盡所作已辦不受後有者而此須陀洹等尤須修習方堪究竟故名有學此有學中因阿難陀多聞第一故舉之為上首以代表一切有學聲聞衆也各與若干下總結聲聞衆之有學無學三萬二千人各與其眷屬俱來佛所面禮佛足退坐一面也己二大眷屬復有菩薩摩訶薩八萬四千人俱皆是一生補處大法王子有大威德如大龍王百福圓滿身光照曜猶如千日破諸昏暗智慧澄徹逾於大海了達諸佛祕密境界然大法炬引導衆生於生死海作大船師憐愍衆生猶如赤子於一切時恆施安樂名稱普聞十方世界自在遊戲微妙神通已能善達諸總持門具四無礙辨才自在已得圓滿大願自在妙善成就事業自在已能善入三昧自在具足圓滿福德自在常為衆生不請之友經無量劫勤修六度歷事諸佛不住涅槃斷諸煩惱講說妙法無量世界化利群生制諸外道摧伏邪心離斷常因令生正見而無往來動搖之相非嚴而嚴十方佛土不說而說妙理寂然住無所住度人天衆無所不受廣大法樂披精進甲執智慧劍破魔軍衆而擊法鼓身恆遍坐一切道場吹大法螺覺悟群品一切有情悉蒙利益聞名見身無空過者具三達智悟三世法善知衆生諸根利鈍應病與藥無復疑惑布大法雲澍甘露雨轉不退轉智印法輪閉生死獄開涅槃門發弘誓願盡未來際度脫群生此諸菩薩不久當得阿耨多羅三藐三菩提其名曰無垢菩薩彌勒菩薩獅子吼菩薩妙吉祥菩薩維摩詰菩薩觀自在菩薩得大勢菩薩金剛藏王菩薩地藏王菩薩虛空藏王菩薩陀羅尼自在王菩薩三昧自在王菩薩妙高山王菩薩大海深王菩薩妙辨嚴王菩薩歡喜高王菩薩大神變王菩薩法自在王菩薩清淨雨王菩薩藥王菩薩藥上菩薩療煩惱病菩薩寶山菩薩寶財菩薩寶上菩薩寶德菩薩寶藏菩薩寶積菩薩寶手菩薩寶印手菩薩寶光菩薩寶施菩薩寶幢菩薩大寶幢菩薩寶雨菩薩寶達菩薩寶杖菩薩寶髻菩薩寶吉祥菩薩寶自在菩薩旃檀香菩薩大寶炬菩薩大寶嚴菩薩日光菩薩月光菩薩星光菩薩火光菩薩電光菩薩能念慧菩薩破魔菩薩勝魔菩薩常精進菩薩不休息菩薩不斷大願菩薩大名稱菩薩無礙辨才菩薩無礙轉法輪菩薩如是無垢菩薩摩訶薩等各與若干百千眷屬俱此列菩薩衆即是大眷屬衆也此段敘述次第和前文聲聞衆無異亦是先讚德而後列名也八萬四千者是標其總數因印度之習慣凡言數目多者皆言八萬四千如中國常言萬物等故此數目乃舉其在會菩薩衆之多非決定為八萬四千也菩薩者具足稱為菩提薩埵菩提此云覺薩埵此云有情即是上求正遍覺知之佛果而下化一切有情也此中讚德之詞義皆可知披精進甲至而擊法鼓謂菩薩度諸衆生無生不度菩薩修學法門亦是無法不學所謂難忍能忍難行能行不畏疲勞也不久當得阿耨多羅三藐三菩提者在此法會諸菩薩衆皆是已證十地位居補處如彌勒觀音等所以不久即得無上正等覺也且此不久當得亦即以此補處菩薩代表十地以及地前一切信住行向之諸菩薩衆也無垢菩薩下即列菩薩之名無垢菩薩者即華嚴經中之普賢菩薩可為一切菩薩之總稱彌勒此云慈氏是菩薩之姓阿逸多此云無能勝即娑婆世界次補佛位之菩薩也獅子吼是從喻列名喻此菩薩說法音聲與福德智慧如獅子大吼百獸生驚也妙吉祥即文殊師利維摩詰即淨名居士觀自在即觀世音得大勢即大勢至菩薩其次諸菩薩衆皆各依其德以列名也如是無垢菩薩等者即是菩薩衆中以無垢菩薩而為上首以無垢菩薩代表一切也以上所舉菩薩皆是已證補處之位行願悲智功德無量所以吾人若能誠心敬誦一遍則大獲福德智慧也戊二凡衆己一天龍八部庚一天衆辛一欲界天衆復有億萬六欲天子其名曰善住天子威德天子普光天子清淨慧天子吉祥天子大吉祥天子自在天子大自在天子日光天子月光天子如是等天子釋提桓因而為上首悉皆愛樂大乘妙法願隨奉事三世如來入不思議祕密境界莊嚴諸佛衆會道場各與若干百千眷屬俱上列聖衆皆先讚德相而後列名至此即先列名而後讚德釋提桓因而為上首者釋提桓因此云能天主居須彌山頂為三十三天之主所以標此為上首也悉皆愛樂下即讚諸天之德並標明求法之誠心以及諸天衆赴法會時之盛況也辛二色界天衆復有恆河沙色界天子其名曰大光普照天子無垢莊嚴天子神通遊戲天子三昧自在天子陀羅尼自在天子大那羅延天子圓滿上願天子無礙辨才天子吉祥福慧天子常發大願天子如是等天子光明大梵天王而為上首悉皆具足三昧神通樂說辨才歷事諸佛三世如來菩提樹下坐金剛座破魔軍已證菩提時遍至衆會皆於最初勸請如來轉妙法輪開甘露門度人天衆善悟諸佛祕密意趣於大菩提不復退轉各與若干百千眷屬俱此亦先列其名色界天有十八梵天梵者即寂靜清淨義離下界之散亂淫欲故此中光明大梵天王即初禪大梵天故為上首也悉皆具足下讚色界天衆之德然此色界天衆皆不離於靜慮所以具足神通此梵天諸衆每於十方諸佛成道之時皆請諸佛轉正法輪度脫衆生所以此梵天衆悉皆具足三昧神通辨才無礙而能深入菩提密藏破魔軍也庚二龍衆復有四萬八千諸大龍王摩那斯龍王德叉迦龍王難陀龍王跋難陀龍王阿耨達池龍王大金面龍王如意寶珠龍王雨妙珍寶龍王常澍甘雨龍王有大威德龍王彊力自在龍王如是等龍王娑竭羅龍王而為上首悉皆愛樂大乘妙法發弘誓願恭敬護持各與若干百千眷屬俱阿耨達此云無熱惱即永清涼義也娑竭羅即此鹹海之龍王故代表一切龍衆也悉皆樂說下讚歎龍衆請法之誠心亦是讚歎龍衆之功德也因龍衆有大勢力故於佛法之恭敬護持較他部衆尤為熱烈故所以法華會上有文殊菩薩入龍宮為龍衆說法佛滅七百年間印度外小正盛大法湮沒有龍樹菩薩遍覓大乘經典終不可得後得大龍菩薩導入海中遍覽龍藏而華嚴經等始流傳於世此即龍衆護持佛法之力也庚三藥叉衆復有五萬八千諸藥叉神大師子王藥叉神轉輪光照藥叉神妙那羅延藥叉神甚可怖畏藥叉神蓮華光色藥叉神諸根美妙藥叉神外護正法藥叉神供養三寶藥叉神雨衆珍寶藥叉神摩尼鉢羅藥叉神如是等諸藥叉神僧慎爾邪藥叉神而為上首悉皆具足難思智光難思智炬難思智行難思智聚而為衆生制伏惡鬼使得安樂能延福智守護大乘令不斷絶各與若干百千眷屬俱藥叉亦名夜叉此云捷疾亦云勇健能於虛空飛行自在故此藥叉神即金剛神等護法之衆也而此衆中以僧慎爾邪藥叉神而為上首悉皆具足下讚藥叉神之德力具足不可思議智光智炬破一切惡鬼而使衆生得其安樂增長福慧等以守護大乘而為義務也此藥叉衆中亦有百千藥叉衆眷屬俱也庚四乾闥婆衆復有八萬九千乾闥婆王頂上寶冠乾闥婆王普放光明乾闥婆王金剛寶幢乾闥婆王妙音清淨乾闥婆王遍至衆會乾闥婆王普現諸方乾闥婆王愛樂大乘乾闥婆王轉不退輪乾闥婆王如是等乾闥婆王諸根清淨乾闥婆王而為上首皆於大乘深生愛敬利樂衆生恆無懈倦各與若干百千眷屬俱乾闥婆此云尋香謂常尋香氣以資其身或其身即出於香故又名為尋香尋此衆以諸根清淨而為上首皆於大乘下即敘其功德也庚五阿修羅衆復有千億阿修羅王羅睺羅阿修羅王毗摩質多羅阿修羅王出現威德阿修羅王大堅固力阿修羅王美妙音聲阿修羅王光明遍照阿修羅王鬥戰恆勝阿修羅王善巧幻化阿修羅王如是等阿修羅王廣大妙辨阿修羅王而為上首善能修習離諸我慢受持大乘尊重三寶各與若干百千眷屬俱阿修羅此云非天以其無天德而好鬥爭故此衆中以廣大妙辨而為上首善能修習下以阿修羅本是我慢最大而此衆等以善心力故息一切我慢修一切善法受持大乘尊重三寶故為外眷屬而俱來佛所庚六迦樓那衆復有五億迦樓羅王寶髻迦樓羅王金剛淨光迦樓羅王速疾如風迦樓羅王虛空淨慧迦樓羅王妙身廣大迦樓羅王心不退轉迦樓羅王廣目清淨迦樓羅王大腹飽滿迦樓羅王有大威德迦樓羅王智慧光明迦樓羅王如是等迦樓羅王寶光迦樓羅王而為上首悉皆成就不起法忍善獲饒益一切衆生各與若干百千眷屬俱迦樓那此云妙翅鳥翅有五色光彩具足一切神通故悉皆成就以下讚其德也法忍者對於諸法實相深能忍可了知饒益一切有情也庚七緊那羅衆復有九億緊那羅王動地緊那羅王妙寶華幢緊那羅王寶樹光明緊那羅王善法光明緊那羅王最勝莊嚴緊那羅王火法光明緊那羅王受持妙法緊那羅王妙寶嚴飾緊那羅王成就妙觀緊那羅王如是等緊那羅王悅意樂聲緊那羅王而為上首皆悉具於清淨妙慧身心快樂自在遊戲各與若干百千眷屬俱緊那羅此云疑人因頭目手足皆與人同而頭上又多生兩角成為是人非人之形狀故名疑人也皆悉具於下讚其德也庚八摩睺羅伽衆復有九萬八千摩睺羅伽王妙髻摩睺羅伽王具大威德摩睺羅伽王莊嚴寶髻摩睺羅伽王淨眼微妙摩睺羅伽王光明寶幢摩睺羅伽王師子胸臆摩睺羅伽王如山不動摩睺羅伽王可愛光明摩睺羅伽王如是等摩睺羅伽王遊戲神通摩睺羅伽王而為上首已能修習善巧方便令諸衆生永離愛纏各與若干百千眷屬俱摩睺羅伽此云腹行即蛇神等類也已能修習下即讚其對於一切衆生使離諸煩惱之纏縛而得法自在也以上九衆乃是釋迦世尊法會之外護者即使一切魔外等不能破壞佛法而使佛法常住世間故名為外眷屬己二人非人等衆庚一人衆辛一轉輪王衆復有他方萬億國土轉輪聖王金輪轉輪聖王銀輪轉輪聖王銅輪轉輪聖王鐵輪轉輪聖王及與七寶千子眷屬莊嚴無量象馬車乘無數寶幢懸大寶幡華鬘寶蓋繒綵白拂種種珍奇妙寶瓔珞塗香末香和合萬種微妙殊香各執無價衆寶香罏燒大寶香供養世尊以妙言詞稱讚如來甚深智海而白佛言世尊我今不求三界有漏人天果報唯求出世阿耨多羅三藐三菩提所以者何三界之中人天福樂雖處尊位先世福盡還生惡趣受無量苦誰有智者樂世間樂作是語已一心合掌各與若干百千眷屬俱以下經文又一變即是從列名讚德外而復添諸恭敬供養或白佛言等句他方國土者此轉輪王衆非指此南閻浮提即十方法界一切國土中一切轉輪王衆皆來赴此法會故名他方國土也轉輪王者即有大威德有福力之人主此王有四種即金銀銅鐵四輪王鐵輪王其威德福力只能王一天下銅輪王王兩天下銀輪王王三天下金輪王其威德福力最為殊勝故王四天下也莊嚴無量下即敘述諸轉輪王各持無量衆寶香具種種象馬車乘幢幡寶蓋來供養佛所以從莊嚴無量至供養世尊皆是敘明衆寶莊嚴具也以妙言詞稱讚以下即是說明各轉輪王請佛說法和恭敬供養世尊之理由以及了知世法無常三界是苦而求無上大菩提也作是語已一心合掌默然求佛說法也辛二人王衆復有十六諸大國王迦毗羅國淨飯大王摩伽陀國頻婆娑羅王波羅奈國迦斯大王有于陀國于闡大王娑羅國主迦毗那王如是等十六大王及諸小王舍衛國主波斯匿王名曰月光而為上首悉皆具足福智神通有大威德如轉輪王一切怨敵自然降伏人民熾盛國土豐樂無量佛所種諸善根常為諸佛之所護念莊嚴劫中千佛出現如是諸王常為施主賢劫之中千佛出現如是諸王亦為施主於當來世星宿劫中千佛出現當為施主乃至未來一切諸佛出現世間如是諸王以本願力常行檀施饒益有情隨宜善入諸方便門雖作國王不貪世樂厭離生死修解脫因勤求佛道愛樂大乘化利群生不著諸相紹三寶種使不斷絶為聽法故供養如來廣修珍膳嚴持香華來至佛所各與一萬二萬乃至千萬諸眷屬俱悉皆具足下即讚諸王之德因此諸王雖為人中之王但亦具福德智慧神通饒益無量諸有情類於當來世中星宿劫千佛出世時亦為施主布施一切有情所以此王雖居王位而不貪世樂厭離生死常修一切解脫法因供養如來紹隆三寶也辛三王夫人衆復有十六大國王夫人韋提希夫人妙勝鬘夫人甚可愛樂夫人三界無比夫人福報光明夫人如意寶光夫人末利夫人妙德夫人如是等夫人殊勝妙顏夫人而為上首已能善入無量正定為度衆生示現女身以三解脫修習其心有大智慧福德圓滿無緣大慈無礙大悲憐愍衆生猶如赤子以本願力得值世尊為欲聽法來詣佛所瞻仰尊顏目不暫捨以無量種人中上供奉獻世尊及以無數妙寶瓔珞供養如來各與若干百千眷屬俱復有十六下列王夫人之名已能善入下讚王夫人之德此王夫人等實從大慈悲心示現女身度脫一切有情憐愍衆生猶如赤子也所以此王夫人已具三解脫門已能善入無量正定而今以本願力來詣佛所供養如來聽聞正法也辛四僧俗人民衆復有百千無央數人比丘比丘尼優婆塞優婆夷諸婆羅門剎帝利薜舍戌達羅及諸國界長者居士一切人民是諸大衆發清淨信起殷重心宿種善根生值佛法為求出世起難遭想來詣佛所一心合掌各與若干百千眷屬俱僧俗者以上所明僧衆乃是聖衆中之聖僧而今所說之僧衆乃指人世上之未證道果未得菩提分法者而言故與上別婆羅門剎帝利以下即是人民衆也婆羅門者印度人民階級分為四種此即第一之教士階級剎帝利為帝王階級薜舍為平民商工農人階級戌達羅為印度最下之僕役階級此四階級之高下在印度非常嚴格但在釋迦世尊之說法會上即無階級之高下皆來赴此法會以顯世尊博愛平等之大悲心也是諸大衆下即讚歎諸僧俗人民發心供養求法之心切也辛五外道衆復有無數諸外道衆苦行外道多聞外道世智外道樂遠離外道路伽耶陀外道路伽耶治迦你外道而為上首成就五通飛行自在發希有心為聽法故來詣佛所各與若干百千眷屬俱復有無數下此即舉名也外道者道即道理外於吾人所修所行真正之道理各執一不正之道故名外道也成就五通下讚外道之德因此諸外道行雖外於道理但已具足五種神通無漏盡通而發希有之想來供養佛聽求正法也庚二非人衆辛一鬼衆復有無量無數非人餓鬼謂無財鬼食人吐鬼惱衆生鬼食洟唾鬼食不飽鬼毗舍闍鬼臭極臭鬼食糞穢鬼食人胎鬼食生子鬼食不淨鬼生吉祥鬼如是諸鬼毗盧陀伽大鬼神王而為上首捨離毒心歸佛法僧悉皆衛護如來正法為聽法故來詣佛所五體投地渴仰世尊各與若干百千眷屬俱以下非人衆中即是三惡道衆其他一切經論皆不別出本經立之即顯本經被機之普遍也毗舍闍鬼即是啖精氣鬼捨離毒心下即讚鬼德因衆毒心極其猛利逼一切衆生受苦使一切衆生不安乃為鬼之特長而今此等鬼衆捨離毒心歸佛法僧護持三寶所以發希有想來詣佛所一心渴仰聽佛說法也辛二畜生衆復有無量無數禽獸諸王命命鳥王鸚鵡鳥王及師子王象王鹿王如是一切諸禽獸王金色師子王而為上首悉皆歸命如來大師為欲聽法來詣佛所各隨願力供養世尊而白佛言惟願如來哀受我等微少供養永離三塗惡業種子得受人天福樂果報開闡大乘甘露法門速斷愚癡當得解脫時諸鳥王作是語已一心合掌瞻仰如來各與若干百千眷屬俱畜生乘即是禽獸衆命命鳥即是一身兩頭之鳥悉皆歸命下是敘畜生衆請佛說法供養如來求人天善果闡大乘法門速斷愚癡出三惡道當得解脫等等之情形也辛三地獄衆復有百千琰魔羅王與無央數諸大羅剎種種形類及諸惡王幽冥官屬校計罪福獄吏刑司承佛威力捨離惡心與琰魔羅王同來聽法而白佛言一切衆生以愚癡故貪五欲樂造五逆罪入諸地獄輪轉無窮自業所因受大苦惱如世蠶繭自為縈纏惟願如來雨大法雨滅地獄火施清涼風開解脫門閉三惡趣時琰魔羅王作是語已種種珍寶供養如來一心恭敬繞百千匝與若干百千眷屬俱各禮佛足退坐一面地獄衆即是琰摩羅衆琰摩羅此云責罰較計罪福下敘地獄衆為度生之熱心和求法之懇切以及說明一切衆生造業受苦皆自纏自縛也各禮佛足下即敘述赴法會之情形丙二結成法會爾時世尊坐寶蓮華師子座上其師子座色紺琉璃種種珍奇間錯嚴飾玻璃寶珠以為其莖紫磨黃金作蓮華葉其蓮華臺以摩尼寶而為華鬚八萬四千閻浮檀金大寶蓮華而為眷屬為諸大衆前後圍繞供養恭敬尊重讚歎以下即結法會之情形也爾時者即當諸衆圍繞之時坐蓮華師子座下標明世尊為法會之主為人天之所恭敬供養以及諸聲聞菩薩等眷屬之圍繞於是共成洋洋溢溢莊嚴殊勝之法會也證信序文至此已竟但今約而言之即是若欲觀想此法會之殊勝可先讀經文一遍而後隨文入觀化作曼怛囉之形像在此曼怛囉中圖表見前先以佛為中心其次諸聲聞等內外眷屬圍繞此即第一步之觀想若再進步言之即可離去經文各各皆以自身是佛而為中心至其他大衆互相圍繞也例如在此法會之中若人人皆作此觀想即成自身是佛而他人圍繞或則他人是佛自己和大衆圍繞也然此圍繞於佛則攝自歸他若自身是佛則攝他歸自所以在會大衆若能作如是觀想即同在靈山一會親見諸聖衆無異也上面所講的證信序即證明於佛住處由很多的人組織的法會大衆所同聞同見的而可確信此經是佛所說的所以應流通於世以下是發起序為此經發起之特別的因緣乙二發起序丙一如來示相丁一處衆入定時薄伽梵於師子座結跏趺坐威儀殊特猶如四寶蘇迷盧山處於大海自然回出如百千日照曜虛空放無量光破諸昏暗亦如俱胝圓滿月輪獨處衆星放清涼光明朗世界入有頂天極善三昧名心瓔珞寶莊嚴王住此定已身心不動薄伽梵者是佛德號之一梵語因含多義故沒有相當的名詞可以代替它的意義古時佛教的經典翻來中國有很多梵語仍保存其原音的唐玄奘大師曾說有五種不翻的規範一祕密不翻如陀羅尼二含多義不翻如此中之薄伽梵因具有六義的緣故三此土向來沒有的名詞如閻浮提四順於古例不翻如阿耨菩提并不是不可翻因摩騰以來就常存有梵音五為生善不翻如般若有人聞般若二字則生信念在中國雖可譯為智慧而人對之或生輕淺意由此薄伽梵不翻的理由也就明白了其六義中之第六義為尊貴故或譯作世尊師子座乃從譬喻得名凡是佛說法的法座或是佛所坐過的總名師子座因師子乃獸中之王一吼能使百獸驚恐大地振動而如來為衆生說法之師其聲如大師子吼能感動法界一切有情覺醒轉來與佛同化故以之為喻佛在座上結跏趺坐威儀特殊格外表現一種莊嚴跏趺而坐即是盤腿而坐有單跏趺雙跏趺的差別蘇迷盧山即妙高山是四寶所成的此山處在大海之中超乎萬物之上佛亦如是這是說明佛在大衆中現象的一個比例又如百千之日光這光從真如性海的佛心所放出來的所以能破除一切黑暗俱胝者即億數此有頂天不指非想非非想天而指色界頂之色究竟天三昧即三摩地即定因為定有種種功德相所以有種種不同的名稱此名心瓔珞寶莊嚴王者佛心與衆生心平等平等然佛心無量無邊功德莊嚴之相悉皆圓滿而得自在故名瓔珞寶莊嚴王也身心不動是一種入定的狀態丁二諸天興供時無色界一切天子雨無量種微妙華香於虛空中如雲而下從文意看起來此段可分無色界色界欲界三類先看無色界天是怎樣的來興供這些天子以種種微妙花香來供養雖然他們沒有根身器界沒有業果的色法但可依定力所現出的色法為供養在我們平常的肉眼看不見唯佛菩薩等才可以明見其景況色界諸天十八梵王雨衆雜色無數天華百千萬種梵天妙香遍滿虛空如雲而下此色界諸天者共有十八天初禪有三天梵輔天梵衆天大梵天二禪三天少光天無量光天光音天三禪三天少淨天無量淨天遍淨天四禪有九天無雲天福生天廣果天無想天無煩天無熱天善見天善現天色究竟天照這樣看來初二三禪各有三天第四禪有九天所以共有十八天每天有一王所以此經謂有十八梵王以種種華香遍滿虛空來供養佛六欲諸天及天子衆以天福力雨種種華優鉢羅華波頭摩華拘物頭華芬陀利華瞻蔔迦華阿提目多華波利尸迦華蘇摩那華曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華於虛空中繽紛亂墜而供養佛及衆法寶又雨天上無價寶香其香如雲作百寶色以天神力香氣遍滿此諸世界供養大會此六欲諸天及諸天子并不必以製造出來的種種東西來供養佛只要以自己的福力就可以化現香花等而供養佛所謂優鉢羅華波頭摩華拘物頭華芬陀利華這四種是青赤黃白的蓮花瞻蔔迦華名金色華阿提目多華名苣蕂花此花可取香油波利尸迦花名雨時華或夏生花以在雨時夏時方生故蘇摩那花此花之色一天有黃白黑三種顏色變化花甚香樹高三四尺四垂似蓋四分律疏云蘇蔓那花末利花相似廣州亦有曼陀羅華此云適意見者無不心悅又云悅意花摩訶曼陀羅華摩訶者大也即大適意花曼殊沙華譯為赤團花摩訶曼殊沙華譯為大赤團花六欲諸天子不但有如是種種花來供養佛及法寶而且還有無價的寶香來供養丁三現通益物爾時世尊從三昧起即於本座復入師子奮迅三昧現大神通令此千三千大千世界六種震動謂動極動遍極動涌極涌遍極涌振極振遍極振擊極擊遍極擊吼極吼遍極吼爆極爆遍極爆又此世界東涌西沒西涌東沒南涌北沒北涌南沒中涌邊沒邊涌中沒其地嚴淨悉皆柔軟滋長卉木利益群生令三千界無有地獄餓鬼畜生及餘無暇惡趣衆生皆得離苦捨此身已生於人道及六欲天皆識宿命歡喜踴躍同詣佛所以殷重心頂禮佛足持諸珍寶無數瓔珞悟三輪空以報佛恩這裏的情形與前面大不相同了上面是住於寂靜此則由定而起依坐本座而復入師子奮迅三昧而現大神通即是由靜而動由此一動使三千大千世界有六種震動所謂動極動遍極動涌極涌遍極涌振極振遍極振擊極擊遍極擊吼極吼遍極吼爆極爆遍極爆三六有十八種不但一處動普遍皆在動此震動之相是微妙不可思議的非人間可能明瞭不過因此衆生能聞法離苦得樂而且親身供養觀所供養物皆是空的唯識所現的因現神通之故能使大地衆生皆有利益皆得歡喜丁四放光明相戊一胸間放光爾時如來於胸臆間及諸毛孔放大光明名諸菩薩遊戲神通使不退轉阿耨多羅三藐三菩提其光明色如閻浮檀金所謂放光現相正明心地觀相胸臆即表心地金色光即象徵心之自體的真實性因為一切法以心為主雖法有別而心不二其究竟真實性即所謂唯識實性諸菩薩遊戲神通而得不退轉無上正等正覺也即因此光而成勝金之色百煉而不變壞真心亦歷萬法而不變故金色光即是無分別根本智光而此無分別根本智光也即是心地觀的妙觀察智光諸法根本即真實性相亦即以此真實性相為根本心地觀戊二光中現相己一大千世界此金色光普照三千大千世界及餘他界乃至百億妙高山王一切雪山香山黑山金山寶山及彌樓山大彌樓山目真鄰陀山摩訶目真鄰陀山小鐵圍山大鐵圍山江河大海流泉浴池及以百億四大洲界日月星辰天宮龍宮諸尊神宮并諸國邑王宮聚落琰魔羅界所有一切八寒八熱諸地獄中罪業衆生受苦之相乃至十方畜生餓鬼受苦之相一切世間五趣衆生受苦樂相如是皆現於此金色大光明中上來於金色光已大體說明了從如來胸臆中所放出來的光以金色顯示不生不滅的真實性而又能普照三千大千世界所有的一切山河江海日月星辰天宮龍宮以及一切地獄畜生餓鬼五趣衆生受的苦樂之相而此一一諸相無不皆現此金色光明中在一大千世界之中有百億妙高山王以虛空中的世界很多決不能以吾人眼所看見的判斷為有無如天文學上說火星上也可能有人己二本生行相庚一總又此光中影現菩薩修行佛道種種相貌釋迦菩薩於往昔時作光明王最初發於阿耨多羅三藐三菩提心乃至菩提樹下得成佛道娑羅林中入於涅槃於其中間三僧企耶百萬劫中所有一切慈悲喜捨八萬四千波羅密此本生行相即是敘說佛的過去現在未來一一之事皆顯現於金色光中此正本經名本生之所在這是總說其大概庚二別辛一過去乃於過去作金輪王王四天下盡大海際人民熾盛國土豐樂正法化世經無量劫一切珍寶充滿國界時彼輪王觀諸世間皆悉無常厭五欲樂捨輪王位出家學道或於大國為王愛子棄捨身命投於餓虎或作尸毗王割身救鴿或救孕鹿捨鹿王身或於雪山為求半偈而捨全身這是敘說佛過去作金輪王最初發心的事因為觀見衆生受種種苦惱凡有利益衆生之事無不心從所以捨離一切王位財産盡布施於他人甚至棄捨身命投於餓虎乃至割自身的肉去救鴿或救孕鹿這無非是要求一句半偈的法義而得到自他的無上安樂過去是如此遍一切時一切處無不如此辛二現在或現受生於淨飯王家捨後宮六萬婇女及捨種種上妙妓樂踰城出家六年苦行日食麻麥降諸外道菩提樹下破魔軍已得阿耨多羅三藐三菩提有如是等百千恆沙難思行願一切相貌悉皆頓現於此金色大光明中此中敘說佛在當時降生成佛之相他雖為王子而不愛所享受的富貴捨離種種快樂去雪山修苦行有六年之久本來修學佛道不應以苦為可得道要不苦不樂之中道合理之行因印度當時都以苦行為修道故佛亦示現如此但後來終捨苦行在菩提樹下得無上菩提果所謂菩提樹者非以樹為菩提因佛在此樹下得菩提道果故名曰菩提樹辛三未來又此光中影現如來不可思議八大寶塔拘娑羅國淨飯王宮生處寶塔摩伽陀國伽耶城邊菩提樹下成佛寶塔波羅奈國鹿野園中初轉法輪度人寶塔舍衛國中給孤獨園與諸外道六月論議得一切智聲名寶塔安達羅國曲女城邊升忉利天為母說法共梵天王及天帝釋十二萬衆從三十三天現三道寶階下閻浮時神異寶塔摩竭陀國王舍城邊耆闍崛山說大般若法華一乘心地經等大乘寶塔毗舍離國菴羅衛林維摩長者不可思議現疾寶塔拘尸那國跋提河邊娑羅林中圓寂寶塔如是八塔大聖化儀人天有情所歸依處供養恭敬為成佛因如來本生的行相不但過去現在可以顯現在金色光中而未來的諸行相亦皆在此金色光中顯現出來了此中是示現佛滅度後所建立的八大紀念寶塔作為人天有情所歸依處使個個來恭敬供養正所謂為引凡入聖的標準庚三結如是音聲及諸影像而於三世難思議事悉皆影現大光明中如來本生行相所有的過去現在未來一切不可思議事皆於此金色光中一一表現出來了照這樣看來可以明白此金色光相為一攝一切一切攝一的典型不但釋尊三世不可思議的諸事皆由此金色光表現出來而且十方法界諸佛菩薩的法會相乃至三千大千世界情與無情的受苦樂相無不一一表現出來故此不但可作為研究法義之理論上的說明而且很可作為攝境歸心的觀想應先觀內無身心外無器界種種的差別一切皆空了而遍虛空界現起金色光相光中先現大千世界情非情相於一切衆生上生起大悲心以大悲心為依止而起菩提心菩提心所起方便即釋迦本生相若個個衆生都從大悲菩提現起本生相即個個衆生皆從菩薩行乃至成佛於是光光相遍一切攝一一攝一切即是十方界佛法僧相能作這樣的觀想那觀想便即是心地觀若有修習此觀者則可通達本生心地觀的意義佛即我我即佛佛與衆生平等無差別己三十方佛會又十方界三世諸佛及大菩薩道場衆會神通變化希有之事及諸如來所說妙法皆如響應於此金色大光明中無不見聞此金色光不但於如來三世不可思議諸事都一一表現出來而且十方三世諸佛以及諸大菩薩的法會道場和神通變化希有之事在此金色光相之中亦無不見聞如一室有千光相攝相入然在這裏作有一個金色光相曼怛囉表列於下戊三光瑞利益一切衆生遇此光明見彼瑞相皆發無等等阿耨多羅三藐三菩提心凡在法會的大衆於此金色光中皆見如來三世一切相好莊嚴的瑞相於是都發起與無等真如相等的無上正等正覺之心這是金色光相所生起的利益丙二會衆仰法時諸大衆睹佛神力不可思議歎未曾有各相謂言如來今日入於三昧放大光明照十方界得見如來往昔所有難思議事調伏惡世邪見衆生令生信解趣向菩提希有如來能為一切世間之父無量劫中難可得見我等纍劫修諸行願得遇三界人天大師惟願慈尊哀愍世間從定而起說甚深法示教利喜一切衆生作是語已瞻仰尊顏默然而住會衆仰法者是由於如來放光現相顯出不可思議之神通功德及佛往昔無數大劫之菩提勝因並現在出家苦行降魔入涅槃與為未來建立寶塔等無量諸事衆生見此種種諸相咸皆想慕佛有如是難思議之法力調伏一切惡見衆生令其轉生正見趨向佛果菩提實是一切世間之父能拔衆生之苦而與以安樂我等纍劫修因始得遇導師皆起難遭之想而渴仰瞻望於如來以冀其轉大法輪利益衆生丙三師吼讚請丁一長行戊一敘師吼德爾時會中有一菩薩名師子吼三僧企耶修行福智於賢劫中次補佛處受灌頂位作大法王爾時者即大衆瞻仰如來默然之時獅子吼者獅子乃獸中之王其發吼聲百獸驚恐此喻菩薩之說法言音能摧伏外道天魔令其驚恐故得名此菩薩於無數劫來已具足福德智慧菩提資糧故云三僧企耶修行福智於賢劫中至作大法王者賢劫即是現在劫此劫中有千佛出世謂此菩薩已功圓因滿即於此劫中次補佛位而證無上正遍覺知之佛果菩提也戊二告海會衆四向觀視海會大衆發大音聲而作是言我於往昔無量劫中已發阿耨多羅三藐三菩提心歷事恆沙一切諸佛曾於第一衆會道場見不思議神通變化未嘗睹此金色光明影現一切菩薩行願及現如來種種相貌令見三世難思議事惟願仁者一心合掌瞻仰尊顏從定而起授甘露藥除熱惱病令證法身常樂我淨是諸如來有二種法於三昧中不復久住一者大慈二者大悲依大慈故與衆生樂依大悲故拔衆生苦以是二法於無數劫熏修其心而成正覺世間衆生多諸苦惱以是因緣如來不久從三昧起當為演說心地觀門大乘妙法告諸大衆無求一切人天福樂速求出世阿耨多羅三藐三菩提所以者何今日世尊從胸臆中放金色光所照之處皆如金色佛所顯示意趣甚深一切世間聲聞緣覺盡思度量所不能知汝等凡夫不觀自心是故漂流生死海中諸佛菩薩能觀心故度生死海到於彼岸三世如來法皆如是放此光明非無因緣獅子吼菩薩因環觀會衆之渴仰如來便向會衆說明佛陀放金色光之意因此金色光相於佛陀在世時亦甚為希特故大會諸衆對此光相皆不知其意獅子吼已於往昔劫中歷事諸佛發菩提心並於往昔第一衆會道場中得見此不思議之金色光相彼時光相中亦現如來種種相貌難思議事惟願仁者至常樂我淨者此明獅子吼菩薩囑諸會衆至誠瞻仰世尊世尊於不久即當起定授以甘露之藥令證常樂我淨之法身甘露藥即是不死之藥能除衆生之煩惱病常樂我淨即是佛果涅槃之四德如來入於三昧亦是為度衆生而其不久住於三昧則有二種因緣一者大慈二者大悲悲愍衆生故即能拔衆生之苦惱慈愍衆生故即能與衆生樂佛之所以成正覺者因此二法然衆生尚在生死煩惱之中佛因要度衆生故不能長久入於三昧所以獅子吼菩薩能知如來不久即當從三昧起演說心地觀門大乘妙法令諸衆生直求阿耨多羅三藐三菩提不令求人天有為福樂由於此次佛陀所放之金色光相與昔日說人天乘法所放之光異故此次所顯示之光相意趣甚深又此光相即前次所明之曼怛囉不特一切世間所不能知即出世之聲聞緣覺盡其尋伺度量亦不能知汝等凡夫至到於彼岸者凡夫不觀自心不明瞭真心即是菩提故常漂沒生死大海諸菩薩如來因能觀察自心能明了自心之全體大用能了知直心即是菩提所以能至於彼岸亦能度衆生同到彼岸三世如來至非無因緣者十方三世一切諸佛所說之法悉皆如是所謂佛佛道同凡世間一切諸法不是孤立而起必皆有其因緣今佛放此光明亦非無緣者也戊三悅衆會意是諸衆會聞大士言心懷踊躍得未曾有法會大衆得聞獅子吼菩薩言知此日如來放此金色光相乃有大因緣者故會衆皆歡喜而踊躍也丁二偈頌戊一讚佛爾時師子吼菩薩摩訶薩欲重宣此義而說偈言敬禮天人大覺尊恆沙福智皆圓滿金光百福莊嚴相發起衆生愛樂心超過三界獨居尊功德最勝無倫匹普用神通自在力隨所造業現其前我以天眼觀世間一切無有如佛者希有金容如滿月希有過於優曇華無邊福智利群生大光普照如千日愚癡衆生長夜苦蒙光所照悉皆除我觀如來昔所行親近供養無數佛經歷僧祇無量劫無衆生故趣菩提常於生死苦海中作大船師濟群品演說甘露真淨法令入無為解脫門三僧祇劫度衆生勤修八萬波羅密因圓果滿成正覺住壽凝然無去來一一相好周法界十方諸佛相皆然甚深境界難思議一切人天莫能測諸佛體用無差別如千燈照互增明智慧如空無有邊應物現形如水月無邊法界常寂然如如不動等虛空如來清淨妙法身自然具足恆沙德周遍法界無窮盡不生不滅無去來法王常住妙法宮法身光明靡不照如來法性無罣礙隨緣普應利群生衆生各見在其前為我宣說甘露法隨心能滅諸煩惱人天衆苦悉皆除破有法王甚奇特光明照曜如金山為度衆生出世間能然法炬破昏暗衆生沒在生死海輪回五趣無出期善逝恆為妙法船能截愛流超彼岸大智方便不可量恆與衆生無盡樂能為世間大慈父憐愍一切諸有情如來出世甚難值無數億劫時一現譬如優曇妙瑞華一切人天所希有於無量劫時一現睹佛出世亦同然是諸衆生無福慧恆處沉淪生死海億劫不見諸如來隨諸惡業恆受苦我等無數百千劫修四無量三解脫今見大聖牟尼尊猶如盲龜值浮木願於來世恆沙劫念念不捨天人師如影隨形不暫離晝夜勤修於種智惟願世尊哀愍我常令得見大慈尊三業無倦常奉持願共衆生成正覺此讚佛中共二十一頌從敬禮天人大覺尊至功德最勝無倫匹之一頌半是總明讚佛之功德次普用神通自在力至一切無有如佛者之一頌是讚佛之神通次希有金容如滿月希有過於優曇華之半頌是讚佛之相好次無邊福智利群生至蒙光所照悉皆除之一頌是讚佛之福德智慧如千日之普照衆生蒙其福智之光而愚癡昏暗悉除次我觀如來昔所行至勤修八萬波羅密之兩頌半是讚佛於往昔劫中行菩薩道供養諸佛度脫衆生常宣清淨妙法勤修波羅密等次因圓果滿成正覺至十方諸佛相皆然之一頌是讚佛之果德次甚深境界難思議至如如不動等虛空之二頌是讚佛之體用所謂諸佛所行之境界甚深微妙非但一切人天所不能知即聲聞緣覺菩薩亦不能知而諸佛之體用悉皆等齊無有差別如一室千燈其光互照互攝而其智慧亦如法身之體性遍滿虛空無有邊際應機利物如月之普印於千江雖如來之大用普應群機然其無邊法界之法身體性亦仍寂然不動等同虛空即所謂用而常寂如如不動也次如來清淨妙法身至法身光明靡不照之一頌半是讚佛之功德明如來之一切功德無有窮盡其法體上之光明如日之舒光普被萬物如來之法身光明亦復如是然日猶有升沉不照之時而如來之功德寶光於恆恆時長長時無不普照次如來法性無罣礙至為我宣說甘露法之一頌是讚佛由法身體性無罣礙故應機現物說法利生亦隨緣感靡有不至是故衆生各得領受如來之甘露法味亦各見佛而現其前如維摩經中所謂佛以一音演說法衆生隨類各得解是也次隨心能滅諸煩惱至能截愛流超彼岸之二頌半讚佛之大悲拔苦能除衆生昏暗因衆生輪轉五趣生死無有出期如來以微妙法船令衆生超登彼岸截斷生死之愛流次大智方便不可量至憐愍一切諸有情之一頌是讚佛之大慈與樂善能觀察衆生而與以無量之樂者如世間之慈父愛念其子然次如來出世甚難值至猶如盲龜值浮木之三頌半是讚佛之出興於世甚難值遇如優鉢羅華於無量時偶爾現之而佛之出興於世亦復如是然不特衆生長汩沒生死受諸苦果不能值遇如來即今我等於無量劫前勤修慈悲喜捨之四無量心與空無願無相之種種解脫法門而得見如來亦如盲龜值遇浮木盲龜是瞎眼之龜因無眼故不能見物以無眼之龜於洋洋大海之中能值遇浮木豈非甚難之事耶今衆生之汩沒生死大海能得遇如來亦復如是次願於來世恆沙劫至願共衆生成正覺之二頌是讚佛有如上之種種功德能潤育群生故我等今日於佛陀之前發弘誓願願生生世世常得見佛與佛恆不捨離而修學佛道以期與衆生共成正覺如普賢大士之常隨佛學是也戊二重頌今者三界大導師座上跏趺入三昧獨處凝然空寂舍身心不動如須彌世間一切梵天魔莫能警覺如來定此界他方凡聖衆悉知調御住於禪廣設無邊微妙供奉獻能仁最勝德六欲諸天來供養天華亂墜遍虛空十善報應無價香變化香雲百寶色遍覆人天無量衆雨雜妙寶獻如來香氣氛氳三寶前百千妓樂臨空界不鼓自鳴成妙曲供養人中兩足尊十八梵衆雨天華及雨雜寶千萬種梵摩尼珠妙瓔珞衆寶嚴飾天妙衣大寶華幢懸勝幡持以供養牟尼尊無色界天雨寶華其華廣大如車輪雨微細香滿世界供養三昧難思議龍王修羅人非人奉獻所感珍妙寶各以供養天中人樂聞最勝菩提道時薄伽梵大醫王善治世界煩惱苦師子頻伸三昧力六種震動遍三千以此覺悟諸有緣於此無緣了不覺隨彼人天應可度見佛種種諸神通瞻仰月面牟尼尊以淨三業皆雲集如來能以無緣慈饒益衆生成勝德胸臆放此大光明名諸菩薩不退轉如無盡時七日現熾然照曜放千光世間所有諸光明不及一佛毛孔光無量無礙大神光遍照十方諸佛剎如來福智皆圓滿所放神光亦無比其光赫奕如金色遍照十方諸國土大聖金光影中現悉見世間諸色像三千大千諸世界所有一切諸山王四寶所成妙高山雪山香山七金山目真鄰陀彌樓山大鐵圍山小山等大海江河及浴池無數百億四大洲日月星辰衆寶宮天宮龍宮諸神宮國邑王宮諸聚落如是光中悉顯現又現如來往昔因積功纍德求佛道如來昔在尸毗國曾居尊位作人王國界珍寶皆充盈常以正法化於世慈悲喜捨恆無倦能捨難捨趣菩提割身救鴿嘗無悔深心悲愍救衆生時佛往昔在凡夫入於雪山求佛道攝心勇猛勤精進為求半偈捨全身以求正法因緣故十二劫超生死苦昔為摩納仙人時布髮供養然燈佛以是精進因緣故八劫超於生死海昔為薩埵王子時捨所愛身投餓虎自利利他因緣故十一劫超生死因流水長者大醫王平等救護衆生故濟魚各得生天上天雨瓔珞來報恩七日翹足讚如來以精進故超九劫昔為六牙白象王其牙殊妙無能比捨身命故投獵者求佛無上大菩提或作圓滿福智王施眼精進求佛道又作金色大鹿王捨身精進求佛道為迦尸國慈力王全身施與五夜叉又作大國莊嚴王以妻子施無吝惜或為最上身菩薩頭目髓腦施衆生如是菩薩行慈悲皆願求證菩提道佛昔曾作轉輪王四洲珍寶皆充滿具足千子諸眷屬十善化人百千劫國土安隱如天宮受五欲樂無窮盡時彼輪王覺自身及以世間不牢固無想諸天八萬歲福盡還歸諸惡道猶如夢幻與泡影亦如朝露及電光了達三界如火宅八苦充滿難可出未得解脫超彼岸誰有智者樂輪回唯有出世如來身不生不滅常安樂如是難行菩薩行一切悉現金光內又此光中現八塔皆是衆生良福田淨飯王宮生處塔菩提樹下成佛塔鹿野園中法輪塔給孤獨園名稱塔日女城邊寶階塔耆闍崛山般若塔菴羅衛林維摩塔娑羅林中圓寂塔如是世尊八寶塔諸天龍神常供養金剛密跡四天王晝夜護持恆不離若造八塔而供養現身福壽自延長增長智慧衆所尊世出世願皆圓滿若人禮拜及心念如是八塔不思議二人獲福等無差速證無上菩提道如是三世利益事於此光中無不見十方佛土諸菩薩神通遊戲衆靈仙萬億國土轉輪王尋此光明普雲集各以神力來供養雨如意寶奉慈尊諸天妓樂百千種不鼓自然出妙音天華亂墜滿虛空衆香普熏於大會寶幢無數諸瓔珞持以供養人中尊此重頌之中共有四十三頌半乃重頌前發起序與略頌證信序之二科文蓋重頌者略有二義一者因前之長行係結經所序會衆未聞故今獅子吼菩薩即事頌出二者因頌簡略而易受持故有重頌之必需此科之文義前已廣明今可再略明其大概初今者三界大導師至莫能警覺如來定之一頌半是明佛之處衆入定結跏趺坐身心如須彌之安隱非世間一切魔梵所能警覺即是頌前發起序中如來現相中入定名心瓔珞寶莊嚴王三昧之文次此界他方凡聖衆至樂聞最勝菩提道之七頌即是頌前如來示相中諸天興供之一段此中初頌是總明此界他方一切凡聖之興供養次二頌半是頌六欲諸天之興供養次一頌半是頌色界天之興供養次二頌是頌無色界天之興供養然此諸衆來此廣興供養者要皆樂聞最勝菩薩道而來者也次時薄伽梵大醫王至饒益衆生成勝德之三頌是頌前世尊從心瓔珞寶莊嚴王三昧起而復入於師子奮迅三昧現大神通令此大千世界六種震動之文即現通益物者是也次胸臆放此大光明至遍照十方諸國土之三頌即是頌前放光現相中胸間放光之一段此頌較前長行意義稍廣次大聖金光顯現中至如是光中悉顯現之三頌半即是前光中現相而顯現大千世界之一段次又現如來往昔因至一切悉現金光內之十六頌半即是頌前本生行相過去劫中行菩薩道修六度萬行種種法門之相此中所謂無想諸天八萬歲者無想有二一是色界天中之無想天二是無色界天中之非非想處天此中應是無色界中之非非想天也八萬歲應即八萬大劫次又此光中現八塔至於此光中無不見之六頌即是頌前本生行相中如來放光現建立八塔供養之一段但前長行中如來所放光明中現有如來現世八相成佛之文今此頌中略而未頌次十方佛土諸菩薩至持以供養人中尊之三頌即是略頌前證信序中同聞諸衆睹佛光明應皆雲集而興供養等事戊三請法微妙伽陀讚如來善哉能入於三昧現不思議大神力調伏難化諸有情惟願世尊從定起為諸衆生轉法輪永斷一切諸煩惱令住無住大涅槃如我等類心清淨從萬億國來聽法以三昧力常諦觀於我微供哀納受能施所施及施物於三世中無所得我等安住最勝心供養一切十方佛請法者即是請佛轉法輪因前初段頌中既已稱讚如來之一切功德又於次段頌中復為宣示如來光中所現之相故最後應請佛轉法輪而度苦惱衆生此中有四頌大意說今我獅子吼以微妙伽陀偈頌讚歎如來既讚歎已還要望世尊速從定起而與衆生轉大法輪令其斷諸煩惱住於無住之大涅槃亦如我獅子吼等心性之清淨無諸染污之法我等今從萬億佛國土而來聽受如來之教法並望世尊以三昧力而諦省觀察哀納攝受我等之希微供養我等雖供養於佛而不著於能所施之人及施物於三世之中悉皆無所得所謂三輪體空是也然不特供養此土如來即十方如來我等亦恆安住最勝之心而修供養此中所謂轉法輪者不同於世間外道邪教所說佛教所說之轉法輪即明佛陀於無量劫中積功纍德得無上覺依其所證如如之理方便施設而轉導一切衆生令其斷除煩惱得大菩提而再轉導未來如是展轉化導無有窮盡故名轉法輪也又此中所謂無住大涅槃者涅槃此云圓寂即是圓滿寂靜義此有四種一自性涅槃即是離去分別之真如實性此一涅槃在佛陀與菩薩二乘乃至一切衆生悉皆具有但衆生雖具有此涅槃然未證得故不能得受用二乘菩薩雖有未圓唯佛究竟清淨二有餘依涅槃即是斷除煩惱障盡證得生空真如二乘所依之五根身苦依尚未除滅如來之非苦依根身永不斷滅故名有餘依涅槃三無餘依涅槃即二乘滅去所依之根身而無有餘根身所依如來亦一切苦依皆盡也此二唯三乘極果有之四無住處涅槃此涅槃是斷除煩惱所知二障證得生空法空之二空真如不同於前二乘共得之二種涅槃唯除去煩惱障之一部及唯證得生空真如今佛陀與菩薩不特斷除煩惱障且亦斷除所知障不特證到生空真如且亦證得法空真如二乘雖斷除俱生我執而俱生法執未除故於法空之智未能明晰所以於生死而生畏懼於涅槃而生欣幸不知生死即涅槃煩惱即菩提之中道妙理故其入涅槃之心至切修因時期短促而所得之果位亦低下佛陀與菩薩則不然因斷除法執故能於生死涅槃明確認識其一如而不二不以生死為可厭不以涅槃為可欣即所謂生死涅槃無二無別唯其如是故雖處生死而不染於生死雖大用繁興不住涅槃而其體寂亦猶住於涅槃此即名為無住處涅槃不住生死涅槃故要之因菩薩與佛陀為欲利樂有情故其大慈悲心亦盡未來際無有窮盡者也此涅槃雖佛與菩薩皆具然菩薩其德未圓不名圓寂唯佛陀三覺圓滿萬德具足始堪稱為無住大涅槃上來第一教起因緣分訖甲二聖教正說分乙一稱性頓宣報恩品第二本經全部分成品類共有十三第一序品即教起因緣分第十三囑纍品即依教奉行分餘從報恩品以訖成佛品共有十一即聖教正說分今明此聖教正說分有稱性頓宣與應機漸說之二稱性頓宣者即報恩品首爾時世尊乃至得成阿耨多羅三藐三菩提之一節性者即一切諸法如如之真實性此一切諸法如如之真實性乃佛陀如實證得亦即本經所謂心地觀者是也唯此稱性如實之法始為一乘真實究竟之理故佛陀於菩提樹下最初三七日中轉大法輪即為菩薩頓宣一乘圓妙之法但凡小根性不能領受於是次轉四諦法輪以及隨衆生根性而宣說種種妙法今此經首便稱性頓宣佛陀自證之如實妙理亦同華嚴之僅可為地上大士而說在未證二空之二乘尚不能領受況於天龍等在凡之衆生乎故佛於爾時從三昧起即唯告彌勒等大菩薩稱其所證之如如實性而頓宣說之頓宣是直說佛果上自證自住之大乘妙法然此妙法若嚴格言之唯佛與佛乃能究竟故言頓宣是不藉位次而說者也但此心地觀之真實妙法雖唯佛與佛乃能究竟而佛與佛實無藉言說言說所為之極旨端在彌勒等十地滿心位登等覺之大士於不久期間即得成阿耨多羅三藐三菩提補於佛位故正應為之頓宣也若此會諸大菩薩可從始至終直宣其真如實性之心地觀法但此會中有妙德等之初機衆生未堪受此一乘究竟佛果之妙法故次有應機漸說始於欲界及上二界人天等之五乘共法從此品以訖離世間品皆是繼有應聲聞緣覺等之機說三乘共法從厭身品以訖功德莊嚴品皆是後乃再歸到應菩薩等之機而宣說之大乘不共法從觀心品以訖成佛品是此聖教正說分之所以有稱性頓宣與應機漸說之二科文也報恩品第二者恩即德惠之義凡於己身能有所增益之道德學問及資用等皆名之為恩彼既有恩惠於我吾人應思木本水源不能忘其根本故應知恩而報答之品即品類即是一經文義有各種之性質今將其相類之一分而合聚為一品故名報恩品此品次於前之序品故名第二恩有四種即父母衆生國王三寶是也此四種對於吾人皆有恩惠故應報之然此品初有佛從定起告彌勒菩薩一節為稱性頓宣之文雖寄在本品之前而其義固大有不同然亦因有此一節始引起下文妙德長者等所謂菩薩行果迂遲違於父母之供奉尚不及修二乘菩提於三生百劫中即能離苦得樂其報父母之恩亦易故此文雖不為報恩品之親因緣而其為增上緣則無疑矣又稱性頓宣之文少故不別立一品而攝此報恩品中猶法華頓宣諸法實相十如是之寄於方便品也爾時世尊從三昧安詳而起告彌勒菩薩摩訶薩言善哉善哉汝等大士諸善男子為欲親近世間之父為欲聽聞出世之法為欲思惟如如之理為欲修習如如之智來詣佛所供養恭敬我今演說心地妙法引導衆生令入佛智如是妙法諸佛如來過無量劫時乃說之如來世尊出興於世甚難值遇如優曇華假使如來出現於世說此妙法亦復為難所以者何一切衆生遠離大乘菩薩行願趣向聲聞緣覺菩提厭離生死永入涅槃不樂大乘常樂妙果然諸如來轉於法輪遠離四失說相應法一無非處二無非時三無非器四無非法應病與藥令得復除即是如來不共之德聲聞緣覺未得自在諸菩薩衆不共之境以是因緣難見難聞菩提正道心地法門若有善男子善女人聞是妙法一經於耳須臾之頃攝念觀心熏成無上大菩提種不久當坐菩提樹王金剛寶座得成阿耨多羅三藐三菩提爾時者即如來在三昧中受獅子吼等讚畢之時安詳而起者前如來在三昧中雖受人天等之供養及獅子吼之讚歎而不動其三昧是因說法時未至今說法正是其時故如來即從三昧安詳而起以彰顯如來之清淨業用而稱性宣說諸法實相故特以告彌勒菩薩彌勒此言慈氏名阿逸多阿逸多此言無能勝如來之所以特告彌勒者因此菩薩於不久期中即當作佛且又是在此世界繼續釋迦如來之佛位者雖尚有其他諸大菩薩然釋迦佛法之付囑即在彌勒此品末有若人流布此品命終即得往生彌勒內宮及三會龍華而得解脫等即是此意善哉善哉者是稱讚至極之詞善男子者凡一切衆生於三寶中能種諸善根者皆名之為善男子世間之父即正指如來因如來能與世間衆生以出世樂故出世之法即不可思議之妙法一切世間諸法皆不離尋思測度此尋思測度不過妄心之分別與言論之假立虛妄計度故可破壞而出世之不思議法離於虛妄計度及言說之假名乃佛陀自身所證真實常住不思議不變壞如如之理性亦即本經中之根本心地宇宙間一切諸法情與無情皆攝於此根本心地之中為此根本心地之所現析言之即以根本心地能觀之智慧而證得根本心地所觀之理體者也如如之理者即根本心地所觀之理體如如之智者即根本心地能觀之智慧今再合明之若欲思惟如如之理必先聽聞出世之法既聞出世之法已尤須勤加功用以修習如如之智如如之智既成則如如之理隨顯如是則如智即理如理即智二而不二不二而二要之即無分別之一真法界也復次為欲聽聞出世之法故親近世間之父來詣佛所恭敬供養為欲思惟如如之理故親近世間之父來詣佛所恭敬供養為欲修習如如之智故親近世間之父來詣佛所恭敬供養為欲成就聞所成慧思所成慧修所成慧故親近世間之父來詣佛所恭敬供養心地妙法即根本心地中所有微妙難思之法法華所謂我法妙難思亦此意也今此心地妙法無論其為能照如佛所放之金色光明無論其為所照如虛空等皆是能所雙亡緣觀俱寂之無分別智境非一切邪妄分別所能知因此邪妄分別建立於分別之上而根本心地之妙法乃無分別智之所行唯其如是故能與事理相符契不同於龜毛兔角之相用全無然此心地妙法固甚深微妙難可思議但欲令衆生得知此法又不能不方便善說引導衆生令其從聞而思從思而修以入於佛智亦即法華所謂如來為令一切衆生開示悟入佛之知見故出現於世者也如是妙法至時乃說之者即是說如此微妙難思非三界心心所所能知之心地妙法諸佛如來於無量劫中始偶然說之因衆生之機不堪受此大法故如來世尊至如優曇華者是說佛之出興於世如優鉢曇華之甚難值遇汝等切不可失此勝妙之時期也常樂妙果者是佛果所證常樂我淨之四德今但言常樂者是略文也前說如來出興於世亦所謂最難者也今更進一層告之佛之出現於世固屬甚難既出現已而欲求其說此大乘心地觀之妙法尤復難於佛之出世因一切衆生皆不樂大乘妙法故遠離於菩薩之行願趨向於聲聞菩提緣覺菩提之法位故於厭離生死之心如欲速脫牢籠而於欣樂涅槃之心則如獲得真寶故於三生百劫之內便速即入涅槃於大乘之常樂妙果雖美善而總覺其難行故但修四諦十二緣起等法以為究竟因此類衆生根性衆廣故佛應機而說此法之時期亦多此所以謂如來雖難逢出現於世而說此妙法尤難於如來出世也然諸如來至說相應法者相應即契合義契合衆生之心性故如來說法不惟契理而亦契合衆生之根性故言契經若一味稱性而說者則過失隨生豈得云遠離四失耶遠離四失者一無非處若以理言即是真即云真假即云假乃至有無是非無不各適於理若以事言即是佛在大衆之中凡有所言說皆適應所處之環境也二無非時若以勝義諦言即如來所說之法皆初中後善應言有為說無相之教有教及非有非空之中道教亦然若依世俗諦言即佛於鹿野苑及祇園靈鷲山等所說之法無不適宜於當時三無非器器者即是根器指受法之衆生若以勝義諦言即一切衆生皆有成佛之法器所謂一切衆生皆有佛性故佛所說之法皆適宜於衆生之心無有不令其成佛者若以世俗諦言即是未種善根者令種已種善根者令其增長已增長者令其成熟或隨其五姓所宜而說四無非法若以勝義諦言即一切皆真如皆畢竟空無願無相不生不滅不一不異等若以世俗諦言即如來所說之四諦緣起根力覺道四無量六度等法皆最清淨法界之等流亦無不令一切衆生若聲聞若緣覺若菩薩莫不各隨其所應而還歸最清淨法界應病與藥至心地法門者即說如來善能療治衆生之病雖衆生之病種類不齊而如來皆能隨其病症而療治之故衆生之病無不隨其藥而遣除此即如來不與聲聞緣覺菩薩等所共之德何則因聲聞緣覺等所發之心甚屬狹小故其所知之法亦甚狹小而所得之果亦不大菩薩所發之心雖與佛同將來所得之果亦與佛等但尚在解行修習時期於福德智慧功德尚未圓滿尚居於未得自在位此自在義於大乘莊嚴經論有其四種一分別自在菩薩在第八地捨離一切功用於一切法遠離分別故於一切法無用分別亦得自在而知二剎土自在菩薩於第八地其心清淨自在故剎土亦清淨自在三智自在菩薩於第九地得四無礙解故其說法之智亦得稱理自在而說四業自在菩薩於第十地無有煩惱惑業斷盡煩惱所知二障故於業得自在又如智度論說八地以上菩薩即得十八不共法於法自在若嚴格論之即唯等覺後之佛陀始能圓滿自在故云如來之德為不共之德不與聲聞緣覺等所共也然此中所言未得自在菩薩正指八地以前之菩薩就寬義言指地前之菩薩亦不妨由此於佛前所說之如如理如如智為一切天人之所難見難聞無上大菩提種者即是說若有衆生能於佛所說之心地妙法依如是法而作如是觀便能熏成無上大菩提種子菩提樹王者佛於此樹下得阿耨多羅三藐三菩提故得此名王者因佛於此樹下作大法王故樹亦依佛稱王如昔日君主所居之宮室亦依國王而名王宮也金剛寶座者佛入金剛喻定而坐此座成等正覺故得此名此座即在菩提樹下下極金輪之際上與地平為賢劫千佛坐此座而成菩提之處也乙二應機漸說丙一五乘共法丁一欲界人天乘之五乘共法戊一答妙德等問己一妙德念問爾時王舍大城有五百長者其名曰妙德長者勇猛長者善法長者念佛長者妙智長者菩提長者妙辨長者法眼長者光明長者滿願長者如是等大富長者成就正見供養如來及諸聖衆是諸長者聞是世尊讚歎大乘心地法門而作是念我見如來放金色光影現菩薩難行苦行我不愛樂行苦行心誰能永劫住於生死而為衆生受諸苦惱作是念已即從座起偏袒右肩右膝著地合掌恭敬異口同音前白佛言世尊我等不樂大乘諸菩薩行亦不喜聞苦行音聲所以者何一切菩薩所修行願皆悉不是知恩報恩何以故遠離父母趣於出家以自妻子施於所欲頭目髓腦隨其願求悉皆布施受諸逼惱三僧祇劫具修諸度八萬四千波羅密行越生死流方至菩提大安樂處不如趣向二乘道果三生百劫修集資糧斷生死因證涅槃果速至安樂方名報恩此敘當佛在靈山說法告彌勒菩薩之時法會大衆之中有五百多位長者共同在座聞法而且都是大富長者對於人民社會都成就以財布施所以亦來法會供養如來及諸聖衆他們於三寶已有正信正解的正見但還是人天小乘之機未能頓入心地無上菩提法門因此他們發起的報恩之念聽了如來讚歎大乘心地法門如來放光現相金色光相中所說大乘苦行因救濟衆生而代衆生受諸苦惱都不願聞亦不喜行他們以為棄捨父母恩而不報反而去代衆生受苦這是在人倫上講不過去的此種意見在中國的儒家亦謂從親而至疏先親親而後仁民愛物否則便以為不合乎倫理諸長者的用意亦如此以為父母之恩不報反而去行菩薩行代衆生受諸苦惱這不是知恩報恩的所為近人亦往往以此批評佛法不是人倫的恰與此中意義相符且進而以為就從了脫生死的出世法來說假若遠離父母棄別妻子乃至捨頭目髓腦還要經過三大劫修八萬四千法門才能超越生死苦海得大菩提也不如趨向二乘道果之為好因為辟支佛百劫聲聞三生或六十劫就可以得道果而大乘菩薩必須經過三無數劫這樣豈不是得二乘果容易嗎斷生死亦容易祇要從五停心修習乃至涅槃即可到安樂處以此而度父母方名報恩此報恩心即是欲界人天乘法亦通出世故為五乘共法這總是捨大向小并且是以極小的人乘為立論根據己二如來慰答庚一慰許爾時佛告五百長者善哉善哉汝等聞於讚歎大乘心生退轉發起妙義利益安樂未來世中不知恩德一切衆生諦聽諦聽善思念之我今為汝分別演說世出世間有恩之處世尊對於長者們報恩的議論極其讚歎并且安慰以善哉善哉以其雖因聽佛說大乘苦行而心生懼退然亦能發此妙義而使世人知恩報恩故佛再三勸他善思念之特為他們分別演說世出世間有恩的所在庚二答解辛一標釋四恩壬一總標善男子汝等所言未可正理何以故世間之恩有其四種一父母恩二衆生恩三國王恩四三寶恩如是四恩一切衆生平等荷負你所說知恩報恩的道理是片面的不使普遍完全的就報父母恩而論亦未完全明白須知世間之恩有四種所謂父母恩衆生恩國王恩三寶恩此四恩皆是平等荷負一切衆生的個個衆生皆要報此四恩壬二別釋癸一父母恩善男子父母恩者父有慈恩母有悲恩母悲恩者若我住世於一劫中說不能盡我今為汝宣說少分假使有人為福德故恭敬供養一百淨行大婆羅門一百五通諸大神仙一百善友安置七寶上妙堂內以百千種上妙珍膳垂諸瓔珞衆寶衣服栴檀沉香立諸房舍百寶莊嚴床臥敷具療治衆病百種湯藥一心供養滿百千劫不如一念住孝順心以微少物色養悲母隨所供侍比前功德百千萬分不可校量世間悲母念子無比恩及未形始自受胎經於十月行住坐臥受諸苦惱非口所宣雖得欲樂飲食衣服而不生愛憂念之心恆無休息但自思惟將欲生産漸受諸苦晝夜愁惱若産難時如百千刃競來屠割遂致無常若無苦惱諸親眷屬喜樂無盡猶如貧女得如意珠其子發聲如聞音樂以母胸臆而為寢處左右膝上常為遊履於胸臆中出甘露泉長養之恩彌於普天憐愍之德廣大無比世間所高莫過山嶽悲母之恩逾於須彌世間之重大地為先悲母之恩亦過於彼若有男女背恩不順令其父母生怨念心母發惡言子即隨墮或在地獄餓鬼畜生世間之疾莫過猛風怨念之微復速於彼一切如來金剛天等及五通仙不能救護若善男子善女人依悲母教承順無違諸天護念福樂無盡如是男女即名尊貴天人種類或是菩薩為度衆生現為男女饒益父母若善男子善女人為報母恩經於一劫每日三時割自身肉以養父母而未能報一日之恩所以者何一切男女處於胎中口吮乳根飲噉母血及出胎已幼稚之前所飲母乳百八十斛母得上味皆與其子珍妙衣服亦復如是愚癡鄙陋情愛無二昔有女人遠遊他國抱所生子渡殑伽河其水暴漲力不能前愛念不捨母子俱沒以是慈心善根力故即得上生色究竟天作大梵王以是因緣母有十德一名大地於母胎中為所依故二名能生經歷衆苦而能生故三名能正恆以母手理五根故四名養育隨四時宜能長養故五名智者能以方便生智慧故六名莊嚴以妙瓔珞而嚴飾故七名安隱以母懷抱為止息故八名教授善巧方便導引子故九名教誡以善言辭離衆惡故十名與業能以家業付囑子故善男子於諸世間何者最富何者最貧悲母在堂名之為富悲母不在名之為貧悲母在時名為日中悲母死時名為日沒悲母在時名為月明悲母亡時名為暗夜是故汝等勤加修習孝養父母若人供佛福等無異應當如是報父母恩所謂父母恩父有慈恩母有悲恩慈能與樂悲能拔苦與樂是把你教養成人給你種種家業財物學問道德使你自覺自立自治這都是父恩之處而母恩在拔苦方面尤大如在幼小時期有病及種種飢渴寒熱諸苦惱事而母一一能去其苦惱其實父母都有慈悲之恩不過在特勝的方面有父慈母悲的不同罷了在母親方面慈悲的意義格外深切往往在畜生之類只知有母而人類在理性上才知道有父的恩在社會上往往有忤逆不孝之子不但不報父母慈悲之恩而且不知父母慈悲之恩的所在甚至有去殺害父母之生命者這簡直比畜生還不如假若能知母恩即是菩提種子因為要報母恩對母即有親愛孝順之心能把利己之心轉移到知報母恩心上去則不會有極端利己的行動因為知報母恩即能稍去自私心而去孝養父母即是人間道德的根本由此推而廣之菩薩心也就是如此不惜犧牲個人的幸福而去代衆生勞苦使衆生得幸福所以大乘菩薩行是以衆生為父母由大悲心而生起救衆生苦惱之事業西藏佛教所傳修菩提心從修大悲心起這有兩種辦法一將利己精神轉移到為法為人而利他則大悲心自然生起對公共利益比個人還來得重要二知母恩而報恩凡稍有知覺的人乃至高等動物皆可感覺到母恩由母恩而推觀一切衆生皆曾為我之母皆必要使之安樂則非發大菩提心不可所以若修大悲心菩提心便會自然而生否則我愛障害雖有知識亦不會應用到善的方面去且反增長我慢等煩惱若能修大悲心自然能做出利人事業來無我不會僅是好聽的名詞若能至誠勤修大悲心我執的心也自然會消滅了也沒有惡取空的病了這才是發大菩提心的出發點今且再為種種比較令知母恩之深重假若有人以種種物品供養恭敬一切有學問有道德諸超人者不如一念住孝順心以微少物品供養母親到比前面供養諸超人等的功德要多百千萬分這是顯現供養功德的大小講到真正報母恩縱使你每天割身上肉來孝養父母亦還不能報父母一日之恩因為初在母胎中始經十月受諸苦惱既出母胎之後哺乳長養成人故這種恩德報之難盡中國向有的割股療親亦是此類了世間人子往往在生日歡樂勝過平常實不應以生日為歡樂當知生我之日即生母極苦之日能作如是想必可不作忤逆若有拂逆母意處使母生不安之念那就很容易墮落雖有金剛天人亦不能救護人生最有幸福的事即是父母在堂所以人生的幸福不幸福以父母存留為標準父母之恩很多報之難盡與其向外去供養諸上善人不如在家供養父母古云家中有二尊佛即父母之謂以供佛供母在福上沒有差別唯要求出世的法則非供佛不能癸二衆生恩善男子衆生恩者即無始來一切衆生輪轉五道經百千劫於多生中互為父母以互為父母故一切男子即是慈父一切女人即是悲母昔生生中有大悲故猶如現在父母之恩等無差別如是昔恩猶未能報或因妄業生諸違順以執著故反為其怨何以故無明覆障宿住智明不了前生曾為父母所可報恩互為饒益無饒益者名為不孝以是因緣諸衆生類於一切時亦有大恩實為難報如是之事名衆生恩吾人從無始以來流轉三界五趣生死海中輪回不息因之各個衆生皆有恩於我皆曾作過我的父母衆生皆即父母故衆生之恩即同父母之恩因為曾為父母所以一切男子是我父一切女人是我母與現在父母一樣往昔之恩未報此生應該要報在世間往往有同類相殺異類相殺好像以我為刀俎以彼為魚肉欲食則取食之沒有悲憐之念若知都有難報之恩即非起大悲心不可此衆生恩即為社會恩此中雖但由父母恩推廣來說然社會恩應包括親戚鄰里師長朋友同事同業同學同一國民同一民族同一人種同為人類同為有情等這都是有極密切關係的在有情方面說牛代耕馬代步犬司夜雞司晨總之凡是能互助增益的因緣都要順其所需而為之資助這才是報恩由此人類都要互相饒益對於社會民族都要去施與利益這種報衆生恩的心理是人人皆要具足的癸三國王恩國王恩者福德最勝雖生人間得自在故三十三天諸天子等恆與其力常護持故於其國界山河大地盡大海際屬於國王一人福德勝過一切衆生福故是大聖王以正法化能使衆生悉皆安樂譬如世間一切堂殿柱為根本人民豐樂王為根本依王有故亦如梵王能生萬物聖王能生治國之法利衆生故如日天子能照世間聖王亦能觀察天下人安樂故王失正治人無所依若以正化八大恐怖不入其國所謂他國侵逼自界叛逆惡鬼疾病國土饑饉非時風雨過時風雨日月薄蝕星宿變怪人王正化利益人民如是八難不能侵故譬如長者唯有一子愛念無比憐愍饒益常與安樂晝夜不捨國大聖王亦復如是等視群生如同一子擁護之心晝夜無捨如是人王令修十善名福德王若不令修名非福主所以者何若王國內一人修善其所作福皆為七分造善之人得其五分於彼國王常獲二分善因王修同福利故造十惡業亦復如是同其事故一切國內田地園林所生之物皆為七分亦復如是若有人王成就正見如法化世名為天主以天善法化世間故諸天善神及護世王常來加護守王宮故雖處人間修行天業賞罰之心無偏黨故一切聖王法皆如是如是聖主名正法王以是因緣成就十德一名能照以智慧眼照世間故二名莊嚴以大福智莊嚴國故三名與樂以大安樂與人民故四名伏怨一切怨敵自然伏故五名離怖能卻八難離恐怖故六名住賢集諸賢人評國事故七名法本萬姓安住依國王故八名持世以天王法持世間故九名業主善惡諸業屬國王故十名人主一切人民王為主故一切國王以先世福成就如是十種勝德大梵天王及忉利天常助人王受勝妙樂諸羅剎王及諸神等雖不現身潛來衛護王及眷屬王見人民造諸不善不能制止諸天神等悉皆遠離若見修善歡喜讚歎盡皆唱言我之聖王龍天喜悅澍甘露雨五穀成熟人民豐樂若不親近諸惡人等普利世間咸從正化如意寶珠必現王國於王鄰國咸來歸服人與非人無不稱歎若有惡人於王國內而生逆心於須臾頃如是之人福自衰滅命終當墮地獄之中經歷畜生備受諸苦所以者何由於不知聖王恩故起諸惡逆得如是報若有人民能行善心敬輔仁王尊重如佛是人現世安隱豐樂有所願求無不稱心所以者何一切國王於過去時曾受如來清淨禁戒常為人王安隱快樂以是因緣違順果報皆如響應聖王恩德廣大如是國王是國民的主導者能保護國土能建立完美的國家使人民安居樂業因此他能得人民的信仰得人民擁護這才是明主聖君非桀紂之輩可比在民國雖沒有國王主權在國民全體而統治權寄於政府則可稱為國民恩及國政恩假若政府執政者處理政治諸事得其當則國內安定而外患自然不生故各人之幸福皆托賴於國應當知恩報恩領導國民建立民主共和國家的元首如美國華盛頓國民稱他為國父孫中山今亦稱為中華民國的國父因為他能建國安民保護國土在政治上能組織政府施行政治法律一切人民的權利都有保障所以國民對於他有盛大的紀念都懷其恩而思報答假若人人都知要報國恩即是國民愛國心的表現昔君主國的國王有大福德在國界之內的山河大地盡屬國王所有而且一切以國王為根本依國王而生所以國王個人的福德勝過一切國民如梵王能生萬物梵王是小千世界之中的主宰者他有六十劫的壽命在小世界中以梵王為最先生起次生萬物乃至小世界滅亡之時先萬物滅亡最後才是梵王滅亡總之梵王在小世界之中先生而後滅國王在國民中與國的關係亦然國王能有公正的政治在國內無論什麼恐怖都沒有不但他國不能來侵害國內也沒有叛逆之徒也沒有飢饉之年乃至星宿變怪現象等八種災難都沒有所以為國王者固應以人民的苦樂為苦樂而同時為國民者所有的利益亦應以七分之二歸為國有假若為國王者沒有福德國家有不幸的事情發生其罪亦在於王所謂萬邦有罪罪在一人若國王有福德則鄰國和睦國內之叛逆惡人亦即命終而墮地獄不能為害今世界各國因沒有福德之人執政的緣故人民亦惡化了損人利己的惡劣事情差不多成為普遍的現象所以國不國民不民互相爭鬥互相慘殺鬧得滿天風雨遍地荊棘不知道在精神上物質上犧牲了多少的代價倘若真正的愛國必須要以道德為前提若應用道德於國際我想國與國會互相愛護尊重沒有互相慘殺的現象國際戰爭也就無形之中消滅了這就是治國之所在既治國以道德前提道德應以佛所說的法義為最高標準所以我們要進而信仰了解恭敬供養於佛的法義上面的三恩都是就世間法而言的所以人人都應當知恩報恩談到報恩便要以大悲為根本非發菩提心而修菩薩行不可所以下面即繼此而說三寶的不可思議恩德癸四三寶恩子一標釋三寶丑一總標善男子三寶恩者名不思議利樂衆生無有休息是諸佛身真善無漏無數大劫修因所證三有業果永盡無餘功德寶山巍巍無比一切有情所不能知福德甚深猶如大海智慧無礙等於虛空神通變化充滿世間光明遍照十方三世一切衆生煩惱業障都不覺知沈淪苦海生死無窮三寶出世作大船師能截愛流超升彼岸諸有智者悉皆瞻仰三寶功德在各經論中俱有詳細之說明但諸經論所明之三寶功德各有隱顯和淺深之不同本經中所講之三寶功德直就三寶於一切有情所有之恩德而顯所以今後諸人若欲了知三寶對於有情所有之深恩以及發心恭敬供養等皆可依經而解釋也不思議即是對前父母衆生國王之三恩而言因前三恩其恩雖重但仍屬世間有漏之法是可思議是可分別測度而此三寶之恩超一切凡夫之所計量非言語分別之能了解所以三寶之恩為不可思不可議不可說超出世間之法而又遍在世間利樂有情無有休息故名三寶為不思議恩也然此思議與不思議亦即對待與非對待有分別與無分別有言說相與無言說因對待者即世間之法非對待者即出世間法換言之對待即是思議非對待等即是不思議所以此思議與不思議亦攝盡一切世出世間之法也是諸佛身真善無漏者諸佛法身從三無數劫修因所顯一切有漏業感煩惱結纏之果皆永斷盡所以唯識頌云此即無漏界不思議善常以顯因圓果滿得菩提之法樂也諸佛因地所行乃修一切六度四無量種種法門在此三大無數劫中難行能行難忍能忍乃至頭目手足無不布施修盡一切波羅密門斷盡一切三有業果所以如來證至果地則功德寶山巍巍無量而非一切有情凡夫聲聞獨覺菩薩之所能知所謂福德智慧甚深無礙猶如大海等於虛空而神通變化光明遍照充滿世間遍十方界窮三世際無有窮盡但此三寶功德一切衆生從無始來即為煩惱之所蒙蔽都不覺知於自性之三寶功德亦不能了所以沈淪苦海永無出期世尊智觀洞照為大悲心願傾動憐愍有情於是在此三界苦海之中作大船師隨機設應三類分身永息衆生生死苦海之輪因此一切衆生因佛悲智力故即各隨機宜而得見如來之大化小化隨類化三佛身也故知三寶功德不可思議不可言宣一切衆生因障所覆不知報答而在諸有智者誰不瞻仰恭敬也丑二別釋寅一佛寶卯一正說善男子等唯一佛寶具三種身一自性身二受用身三變化身第一佛身有大斷德二空所顯一切諸佛悉皆平等第二佛身有大智德真常無漏一切諸佛悉皆同意第三佛身有大恩德定通變現一切諸佛悉皆同事以下即正釋三寶分為三段唯一佛寶具足三身者佛身開合諸經論中各有不同或唯為一即法界身或分為二即自性身和自受用身為真身餘為應身乃至華嚴經中則說為十今此經中以中庸義分為三身即自性受用變化之三身也其實所謂一身十身乃至無量亦即依此三身而開合耳所以此經說為三身最為正確而適當第一佛身以下即以三德而顯三身第一自性佛身即是斷德所顯自性者即諸法之自性此諸法實相之體離絶言語分別計度一切尋伺名相之所不能到故此自性之身在聖不增在凡不減無有生滅染淨去來之相但非三無數劫因圓果滿不能證之所以聖凡自性雖同而在佛始名為自性之身在凡不得名自性為身者即因凡夫為二障所覆結使所纏於此諸法實相不能親證不能如實了知不得自在故不名為自性身也因此自性之身即是斷二障滅十纏永盡一切有漏種法成大斷德二空者即是生空和法空之能顯智所顯者即是依能顯智所顯如如之真理換言之即觀此如如之理必起二空之智依此二空之智即遣二執除二障而顯得離言之法性也所以二空智為能顯而諸法自性真理為所顯但必須智如不二能所俱寂始證得根本無分別自性身也此自性之身體遍法界生佛平等所以一切諸佛亦皆平等共證此為清淨法界身也第二佛身以下即受用身此受用身智德所成所謂四智菩提也常者即不受熏變佛果所成無漏善法相續無間故名為常也熏變義者即菩薩至最後金剛定時仍有微細無明可斷異熟生滅可空大圓無垢可發故有熏變至佛果後即一切圓滿故名真常無漏也然此真常無漏常起應化妙用度脫衆生故此真常無漏之受用身亦即有為無漏也諸法法性之自性身則無為無漏也一切諸佛悉皆同意者此明諸佛自受用身之用各各恆審思量無我性故各各遍滿法界各各互不障礙平等無二故義如一室千燈光光遍滿光光互照而此燈光各不障礙亦不雜亂所謂不一不異不即不離其亦一亦異亦即亦離者乃諸佛因地之所修所行所發誓願各各不同故至果位自受用身有此不思議事也第三佛身下即是變化身恩德所有隨機設化利益有情故定通變現者此化身之用完全利他真所謂與樂拔苦此身起時從妙觀察成所作之二智即現大化千釋迦身小化丈六金身八相成佛以及隨類化身然此變化之身從實而言亦即自受用身之所顯現故三身體性不即不離無去來相所謂佛佛道同一即一切一切即一遍滿法界也善男子其自性身無始無終離一切相絶諸戲論周圓無際凝然常住其受用身有二種相一自受用二他受用自受用身三僧祇劫所修萬行利益安樂諸衆生已十地滿心運身直往色究竟天出過三界淨妙國土坐無數量大寶蓮華而不可說海會菩薩前後圍繞以無垢繪繫於頂上供養恭敬尊重讚歎如是名為後報利益爾時菩薩入金剛定斷除一切微細所知諸煩惱障證得阿耨多羅三藐三菩提如是妙果名現利益是真報身有始無終壽欲劫數無有限量初成正覺窮未來際諸根相好遍周法界四智圓滿是真報身受用法樂一大圓鏡智轉異熟識得此智慧如大圓鏡現諸色像如是如來鏡智之中能現衆生諸善惡業以是因緣此智名為大圓鏡智依大悲故恆緣衆生依大智故常如法性雙觀真俗無有間斷常能執持無漏根身一切功德為所依止二平等性智轉我見識得此智慧是以能證自他平等無二我性如是名為平等性智三妙觀察智轉分別識得此智慧能觀諸法自相共相於衆會前說諸妙法能令衆生得不退轉以是名為妙觀察智四成所作智轉五種識得此智慧能現一切種種化身令諸衆生成熟善業以是因緣名為成所作智如是四智而為上首具足八萬四千智門如是一切諸功德法名為如來自受用身諸善男子二者如來他受用身具足八萬四千相好居真淨土說一乘法令諸菩薩受用大乘微妙法樂一切如來為化十地諸菩薩衆現於十種他受用身第一佛身坐百葉蓮華為初地菩薩說百法明門菩薩悟已起大神通變化滿於百佛世界利益安樂無數衆生第二佛身坐千葉蓮華為二地菩薩說千法明門菩薩悟已起大神通變化滿於千佛世界利益安樂無量衆生第三佛身坐萬葉蓮華為三地菩薩說萬法明門菩薩悟已起大神通變化滿於萬佛國土利益安樂無數衆生如是如來漸漸增長乃至十地他受用身坐不可說妙寶蓮華為十地菩薩說不可說諸法明門菩薩悟已起大神通變化滿於不可說佛微妙國土利益安樂不可宣說不可宣說無量無邊種類衆生如是十身皆坐七寶菩提樹王證得阿耨多羅三藐三菩提諸善男子一一華葉各各為一三千世界各有百億妙高山王及四大洲日月星辰三界諸天無不具足一一葉上諸贍部洲有金剛座菩提樹王其百千萬至不可說大小化佛各於樹下破魔軍已一時證得阿耨多羅三藐三菩提如是大小諸化佛身各各具足三十二相八十種好為諸資糧及四善根諸菩薩等二乘凡夫隨宜為說三乘妙法為諸菩薩說應六波羅密令得阿耨多羅三藐三菩提究竟佛慧為求辟支佛者說應十二因緣法為求聲聞者說應四諦法度生老病死究竟涅槃為餘衆生說人天乘令得人天安樂妙果諸如是等大小化佛皆悉名為佛變化身善男子如是二種應化身佛雖現滅度而此佛身相續常住諸善男子如一佛寶有如是等無量無邊不可思議利樂衆生廣大恩德以是因緣名為如來應正遍知明行圓滿善逝世間解無上士調御丈夫天人師佛世尊善男子一佛寶中具足六種微妙功德一者無上大功德田二者無上有大恩德三者無足二足及以多足衆生中尊四者極難值遇如優曇華五者獨一出現三千大千世界六者世出世間功德滿一切義依具如是等六種功德常能利樂一切衆生是名佛寶不思議恩以下重明三身即是廣釋三身也自性身法體遍滿本無生滅故無始終之相性體離言唯證相應故絶一切戲論之相周圓無際凝然常住正顯法性身之遍一切法常如其性也次明二受用身一者自受用身即諸佛因地善無漏業所感別報之總果此別報總果諸佛所證各別因因地修行差別故諸佛成佛果圓之時即證此真自受用身如世人所言之即身成佛現通示相皆相似成佛唯成此自受用身始為真成佛也但此佛之真受用身尚非一切聖人之所了及最後菩薩之可比擬何況其他十地滿心即等覺菩薩但諸經論中開合不同開即十地外別立等覺合即十地滿心位即等覺也運身直往色究竟天者諸佛成正覺時皆往色究竟天坐大蓮華圓滿大覺也出過三界淨妙國土即於此色究竟天之上現起超過三界淨土乃成勝果佛也坐無量數大寶蓮花下即最後身菩薩三劫修因所得最後之利益也以無垢繒繫於頂上者即顯菩薩位中最高之頂斷一分微細無明轉成大圓鏡智獲得庵摩羅無垢識也爾時菩薩下明菩薩成佛之現果金剛定喻堅利之義即以此最堅利之定而破微細無明破無明已即得大覺妙果故名為現利益是真報身有始無終即成佛已則一切妙德無遺無缺無增無減展轉相續乃至盡未來際亦復如是故名無終然此真妙善果唯佛獨有故名真報身受用法樂也四智以下明此身即轉識所成四智大圓鏡智從喻為名因鏡能普照萬物現諸色相而此智相應之第八淨識能持一切無漏根身為一切功德之所依止故名鏡智又如明鏡能顯一切色物差別之相如來第八鏡智之中能顯衆生諸善惡業及諸菩薩信住行向自他妙果故名第八為鏡智也又地上菩薩觀諸法性不能極了即八地以上乃至等覺猶有蒙蔽而唯諸佛獨自圓明故又名大圓鏡智也異熟識有三義今空異類而熟無覆無記性故平等性智即轉第七識所成之智因有漏之第七識分別執著第八為我常與四惑相應故又名此識為我見識轉此我見斷煩惱障得我空理即證諸法自他平等無二我性成平等性智也妙觀察智即轉第六分別心識所成之智也分別識者此識分別功能最為強勝如他識只具自性分別而此第六則自性隨念計度分別悉皆具足故名分別識也此識轉成淨智之時即能觀察諸法自共等相及於衆會前說諸妙法普利群機也自相即五蘊法各別之自體共相即五蘊法共一苦無常等成所作智即前五識轉成此五識轉成淨智之時能現一切種種大化小化隨類化之無量化身成熟一切有情如是四智為一切種種智之上首與根本實則有無量智也第二他受用身他受用者如來證自受用身已從第七識之平等性智變起不可思議之大身為地上菩薩說一乘法門令諸菩薩受用法樂故名他受用身也八萬四千相好即地上菩薩所見如來他受用身所具之德相一切如來下明如來說法隨機而顯因十地菩薩各具智慧德相和斷煩惱之淺深不同故對此菩薩即顯十種身也如初地菩薩見第一佛身坐百葉蓮花聞百法明門而二地菩薩即見千葉蓮花說千法明門如是展轉增勝乃至十地菩薩即見不思議蓮花說不思議法門此即十身之差別也又此十地菩薩因聞法淺深之不同故度生放光亦異如初地悟百法明門即於百葉蓮花現百葉世界百一四天下百一化佛而百一化佛各遍滿百葉世界利益安樂無量衆生如是二地三地乃至十地展轉漸盛則成不思議蓮花不思議化佛而各遍滿不可說之世界利益安樂無量無數之有情也又初地佛身百佛世界者如大彌陀經所明極樂依正第二地之千佛者如梵網經中之盧舍那佛身乃至第十地之不思議身即如華嚴經中彌勒樓閣不思議之境界也如是十身下即總說十地佛身皆坐七寶菩提樹王而各成正覺也第三變化身佛變化身佛亦有三類如一一華葉各為一三千世界等即變化中之大身為地前菩薩也又如現八相成道丈六金身等即為二乘及人天說法之小化身也其他如在八部與三惡道中則更有隨類隨形所變化之隨類化身也如是化佛亦各於菩提樹下各成正覺各度衆生如是大小諸化佛身下即敘因機說法之差別方便如遇聲聞說四諦法遇菩薩說六度法遇緣覺說緣起法為諸資糧及四善根諸菩薩等說大乘法要皆諸佛說法及所變身隨機度生之方便也然在大乘法中皆貫通為一如說地上一乘之法在地前諸菩薩等未來即同地上菩薩所以中國古師判教分為藏通別圓或小始終頓圓分別各表菩薩斷證位次如依一大乘說則甚為不合有違佛說之意蓋就三乘根機而說故有大小乘之不同而在菩薩只僅淺深之不同而已如是二種下總明二身皆從自受用身之所顯現自受用身遍常相續次明如來恩德不可思議故具足十號以及無量德也十號者即如來應阿羅漢譯應正遍知等此十號中若開無上士調御丈夫為二即以世尊為十號之總名如合無上士調御丈夫為一則世尊亦為十號之一卯二問答爾時五百長者白佛言世尊如佛所說一佛寶中無量化佛充滿世界利樂衆生以何因緣世間衆生多不見佛受諸苦惱佛告五百長者譬如日光天子放百千光照明世界而有盲者不見光明汝善男子於意云何日光天子而有過不時長者言不也世尊佛言善男子諸佛如來常演正法利樂有情是諸衆生常造惡業都不覺知無慚愧心於佛法僧不樂親近如是衆生罪根深重經無量劫不得見聞三寶名字如彼盲者不睹日光若有衆生恭敬如來愛樂大乘尊重三寶當知是人業障銷除福智增長成就善根速得見佛永離生死當證菩提此即問答斷疑也五百長者聞佛說佛寶恩德如是之大而他受用及變化身佛又如是之多但世間衆生仍不聞不見故發疑問也佛告五百長者衆生不見佛聞法譬如盲者不見日月光等實非佛咎所以世尊又言如來常住於世演說正法但諸衆生為結使所纏常造惡業都無慚愧而不覺知於佛法僧亦不欽敬所以是諸衆生不見佛也若有衆生下明衆生若信三寶供養恭敬樂聞大乘現前即能消除罪障增長福慧未來世中當證菩提也寅二法寶諸善男子如一佛寶有無量佛如來所說法寶亦然一法寶中有無量義善男子於法寶中有其四種一者教法二者理法三者行法四者果法一切無漏能破無明煩惱業障聲名句文名為教法有無諸法名為理法戒定慧行名為行法無為妙果名為果法如是四種名為法寶引導衆生出生死海到於彼岸善男子諸佛所師即是法寶所以者何三世諸佛依法修行斷一切障得成菩提盡未來際利益衆生以是因緣三世如來常能供養諸波羅密微妙法寶何況三界一切衆生未得解脫而不能敬微妙法寶善男子我昔曾為求法人王入大火坑而求正法永斷生死得大菩提是故法寶能破一切生死牢獄猶如金剛能壞萬物法寶能照癡暗衆生如日天子能照世界法寶能救貧乏衆生如摩尼珠雨衆寶故法寶能與衆生喜樂猶如天鼓樂諸天故法寶能為諸天寶階聽聞正法得生天故法寶能為堅牢大船渡生死海到彼岸故法寶猶如轉輪聖王能除三毒煩惱賊故法寶能為珍妙衣服覆蓋無慚諸衆生故法寶猶如金剛甲胄能破四魔證菩提故法寶猶如智慧利劍割斷生死離繫縛故法寶正是三乘寶車運載衆生出火宅故法寶猶如一切明燈能照三塗黑暗處故法寶猶如弓箭矛矟能鎮國界摧怨敵故法寶猶如險路導師善誘衆生達寶所故善男子三世如來所說妙法有如是等難思議事是名法寶不思議恩法寶從佛金口所宣無漏清淨法界所流出一佛寶有無量佛故一法寶亦即有無量法而一一法中亦有無量義也所以金剛經說經典所在即為有佛若人尊敬供養即獲福無量也聲名句文是說法之四種教體聲即聲音是名句文所依之實體名句文是聲上之分位假法即以佛之音聲宣說一切教法而以名句文為能顯門也然此聲名句文為佛說法之能詮法體非常人之聲名等也因佛無漏之聲名句文所顯之教法能破衆生之煩惱能導衆生入無漏界故為法寶之教法也有無諸法明能詮聲名句文中所詮之法義依此教法所顯有無之理即理法也有即有為無為之依他圓成法無即遍計所執如龜毛兔角等戒定慧即三無漏學也即依教思理依理起修依修證果之過程亦即攝心為戒由戒生定由定發慧之三增上行無為妙果即由前三增上行而達到最後之目的即為果法由此教理行果之四法能度脫無量有情出生死海拔濟無量衆生到於彼岸包括諸佛心地法門盡故此法寶之恩亦不可思議也善男子下明法寶所以為寶之理由和勸人尊敬恭敬三世佛說之教法三世諸佛依法修行得成菩提即以法為師常能恭敬諸法寶故善男子我昔曾為下即佛舉往昔因行以身作則也如金剛下借喻以顯法寶之威力如金剛能壞萬物法寶能破愚癡寶階是諸天生天之梯法寶能導衆生出生死海轉輪聖王有大威德能使衆生安樂法寶有大法力能滅衆生之苦寅三僧寶善男子世出世間有三種僧一菩薩僧二聲聞僧三凡夫僧文殊師利及彌勒等是菩薩僧如舍利弗目犍連等是聲聞僧若有成就別解脫戒真善凡夫乃至具足一切正見能廣為他演說開示衆聖道法利樂衆生名凡夫僧雖未能得無漏戒定及慧解脫而供養者獲無量福如是三種名真福田僧復有一類名福田僧於佛舍利及佛形像并諸法僧聖所制戒深生敬信自無邪見令他亦然能宣正法讚歎一乘深信因果常發善願隨其過犯悔除業障當知是人信三寶力勝諸外道百千萬倍亦勝四種轉輪聖王何況餘類一切衆生如鬱金華雖然萎悴猶勝一切諸雜類華正見比丘亦復知是勝餘衆生百千萬倍雖毀禁戒不壞正見以是因緣名福田僧若善男子善女人等供養如是福田僧者所得福德無有窮盡供養前三真實僧寶所獲功德正等無異如是四類聖凡僧寶利樂有情恆無暫捨是名僧寶不思議恩此中所謂世出世間者即是世間出世間世者遷流變壞義間即中間謂一切有情於未得聖道之時皆墮此生滅變壞之中故名世間有情如是其所依之根身器界亦然出世間者即與世間相反因一類有情得聞佛陀之教法了知世間幻化無常而修習四諦六波羅密種種法門便出離生滅變壞之範圍或有因本人之機緣成熱不藉佛陀之教法而自身亦能修十二緣起之法以超出世間而不囿於三界生死幻化之中者其所受之身土亦隨之不墮生滅變壞而得名出世間也三種僧者一菩薩僧二聲聞僧三凡夫僧僧即衆義即是和合之衆和合有六義即戒和同修見和同解利和同均身和同住口和無諍意和同悅換言之所謂僧者與世俗之團體相同要四人以上方得名為僧否則但名苾芻或沙彌也此中菩薩僧與聲聞僧皆指證聖道者名為出世之僧若未證得聖道者則便為世間之凡夫僧以其未出三界生死故也此凡夫僧有內凡外凡之分不同於平常之凡夫因其於信心位資糧位加行位亦有相當之修習所以與平常之凡夫不同菩薩有在家出家二種今此經中所指之菩薩僧以文殊師利彌勒菩薩而為上首此二菩薩是依律儀之出家菩薩僧不同於在家菩薩之形相無定不能表顯僧相故佛陀說法時多以之為菩薩之上首此經亦復如是此二大士是出家菩薩僧中之長隨於佛者又是本土之菩薩若觀音勢至等則為他方佛土中之菩薩其來此世界赴法會否不能決定此文殊師利與彌勒菩薩是誕生於印度者其應生之處皆有史跡可考文殊師利般涅槃經云佛告跋陀波羅菩薩文殊師利有大慈心生舍衛國多羅聚落梵德婆羅門家來我所出家學道住首楞嚴三昧以此三昧力出現於十方佛滅後經四百五十歲於其本生處入滅又彌勒上生經云佛告優波離彌勒先於波羅捺國劫波利村波婆利大婆羅門家生劫後十二年二月十五日還本生處結跏趺坐如入滅定身紫金色光明艷赫如百千日上至兜率陀天故在釋迦如來所制菩薩律儀之中皆以文殊師利為羯磨阿闍黎以彌勒菩薩為教授阿闍黎有此種種關係故今但舉文殊彌勒二大士以代表一切菩薩僧文殊師利此言妙吉祥即前所列菩薩衆之妙吉祥菩薩也舍利弗目犍連是如來聲聞弟子中之上首聲聞是聽聞佛陀之音聲而得悟道者舍利此言鶖弗是弗多之略此言為子此是從母得名舍利即是母名是舍利之子故他經有言舍利子者即舍利弗也此人於佛聲聞弟子中為智慧殊勝之一人目犍連此言採菽氏上古有仙人深山靜居常採取菉豆而食便以之為姓目犍連之母即彼仙人之族裔亦是從母得名也此人為佛聲聞弟子中神通最殊勝之一人此二人者本是外道之首領對諸外典皆精通嫻熟後因遇馬勝比丘始得隨佛出家旋證無學聖果二人於佛陀法會中每為聲聞僧中之上首故今亦以此二人代表一切聲聞僧也此二人因不忍見佛之入涅槃故先佛而入滅遂由迦葉阿難傳佛法藏凡夫僧第一要成就解脫戒戒者止惡修善義即是律儀律儀有三種此即三種中之一言別解脫戒者因此戒條種類有七衆之不同對於別別所犯制定別別戒條令別別遵守之而得別別解脫者也此凡夫僧雖未證聖道若能於別解脫律儀如法受持並能具足正知正見深入於佛陀聖言量之教法而廣為衆生開演聖道之法令其得利益安樂所謂利生為事業宏法是家務如是方堪稱為真善之凡夫僧此中所言聖道法者若以三乘共修之法而言即是八聖道法或三十七菩提分法若再推廣其範圍則凡佛說之法皆可名之為聖道法由是觀之凡夫僧亦須具足成就自利利他之條件設僅具別解脫戒而不能通達佛法以化導衆生流傳社會則唯攝得止惡之自利而不能作生善之利他事業尚不能完成真善之凡夫僧資格也於此可知具足成就凡夫僧之資格亦非易事雖未能得無漏至獲福無量者即是說此凡夫僧雖未能得戒定慧及解脫解脫知見之五分無漏法身如有能廣興供養亦獲福無量等於供養出世之菩薩聲聞無有差別如是三種名真福田僧者田以生長為義如世間之田播植種子於其中到成熟之時便能獲得多數之果物今福田亦然若有能供養如是三種僧者則於將來所獲之福亦如播種於田能收獲無量之福果然世間一類有情不辨真僞之教法及教師往往誤奉於邪教邪師不但不能感福且反罹過咎今此三種僧則不然是真能生福之田故名福田僧復有一類名福田僧者此中所謂舍利不是人名即如來滅後諸大弟子焚燒其身時有堅固圓正光潔之骨子其形如珠色彩不定後分散而起塔供養今我國鄞縣育王寺所供之舍利亦即佛舍利也佛形像指佛滅雕刻金銀木石之佛像與泥塑紙畫等佛像轉輪聖王者在人壽無量歲滅至八萬歲或六萬歲四萬歲二萬歲時出世具足三十二相由大福力感得輪寶於即位時降伏四方故名轉輪聖王是轉輪王有四種金輪王統轄四洲銀輪王統轄三洲乃至銅鐵輪王統轄二洲一洲鬱金華是珍貴之華其華金色故名此文是說復有一類等而下之凡夫僧亦得名為福田僧他雖未能堅持律儀然對於如來或舍利及佛滅度後所供奉之各種形像和經典與佛當時所制之戒條或過去現在之僧伽皆能深生恭敬信仰自不生邪見誹謗亦令他人不生誹謗而生恭敬信仰且能宣說佛陀之正法讚歎大乘甚深微妙之理深信善惡因果所以常常發願願於現在未來懺滅其過犯與業障如是之人雖對於戒律未能深生防護但其能廣作利他之事業及深信三寶之力亦勝於外道百千萬倍因外道雖能勤苦修行既未能認識真理則其所修者亦勞而無功也不特勝過外道百千萬倍且亦勝過四種轉輪聖王以此深信三寶之僧伽雖於現在世中尚未完成僧格然能悔除業障種諸淨因令其無漏種子增長煩惱漸漸消滅且亦能廣傳佛法導人超出世間彼轉輪王於人中雖有大威德福力然未出三界若不求出世之法仍然輪轉五趣無有出期也轉輪王猶不及何況其餘一切衆生蓋人類無有超出轉輪王之上者再推之於人而下者之衆生更不言可知矣今且以喻明之如鬱金華是香中之最上者雖萎悴而猶能勝其他一切不正香或香甚微之華正見比丘雖以無始來之積習難除於律儀有所毀犯然對於三寶之敬信及不壞於正見之功德便能作自他出世因因此能勝一切衆生亦得名福田僧也若善男女等能供養此第二種凡夫僧其所獲得之功德仍與供養前三種僧寶所得之功德無有差別如是四類聖凡僧寶至是名僧寶不思議恩此是總結四種僧寶於衆生常施以清淨善法而利樂有情恆無捨離故僧寶對於衆生之恩亦不可思議也此上四種僧寶前二是聖僧後二是凡夫僧前二種是出世間僧寶後二種是未出世之僧寶子二問答寶義爾時五百長者白佛言世尊我等今日聞佛法音得悟三寶利益世間然今不知以何義故說佛法僧得名為寶願佛解說顯示衆會及未來世敬信三寶一切有情永斷疑網得不壞信令入三寶不思議海爾時佛告諸長者言善哉善哉汝善男子能問如來甚深妙法於未來世利益安樂一切衆生譬如世間第一珍寶具足十義莊嚴國界饒益有情佛法僧寶亦復如是一者堅牢如摩尼寶無人能破佛法僧寶亦復如是外道天魔不能破故二者無垢世間勝寶清淨光潔不雜塵穢佛法僧寶亦復如是悉能遠離煩惱塵垢三者與樂如天德瓶能與安樂佛法僧寶亦復如是能與衆生世出世樂四者難遇如吉祥寶希有難得佛法僧寶亦復如是業障有情億劫難遇五者能破如如意寶能破貧窮佛法僧寶亦復如是能破世間諸貧苦故六者威德如轉輪王所有輪寶能伏諸怨佛法僧寶亦復如是具六神通降伏四魔七者滿願如摩尼珠隨心所求能雨衆寶佛法僧寶亦復如是能滿衆生所修善願八者莊嚴如世珍寶莊嚴王宮佛法僧寶亦復如是莊嚴法王菩提寶宮九者最妙如天妙寶最為微妙佛法僧寶亦復如是超諸世間最勝妙寶十者不變譬如真金入火不變佛法僧寶亦復如是世間八風不能傾動佛法僧寶具足無量神通變化利樂有情暫無休息以是義故諸佛法僧說名為寶善男子我為汝等略說四種世出世間有恩之處汝等當知修菩薩行應報如是四種之恩在佛說畢三寶恩之時妙德等五百長者因明寶義故重問如來我等現在雖聞音教得以明瞭佛法僧利益世間之恩惠但還不知以何意義而說佛法僧為寶惟願如來為我等解釋其義令在會諸衆得知並於今後此法寶流行時亦能使未來世敬信三寶之有情不壞正信斷除煩惱所知之障以入於三寶不思議海此不思議海唯信能入無信則不能入蓋信為無上菩提之根本也故修淨土法門者以信為三種資糧之一乃至一切法門無不以信為基礎也前說四恩由於妙德等長者之問而生起今此長者等既明四恩之義又進問三寶得名為寶之意義一方面為除自疑一方面是使現在及未來衆生皆得利益故佛稱讚其能問如來甚深妙法於未來世利益安樂一切衆生世間第一珍寶具足十義佛法僧寶亦復如是具足十義莊嚴饒益即是寶之業用國界即國土有情即是人民佛法僧之所以喻為寶者寶是世間極珍貴之物有情得之便能利益安樂佛法僧之利益世間安樂有情亦然能使其離苦得樂故佛法僧得名為寶然世間之寶虛僞之寶終非究竟或有因之而受纍者唯佛法僧方堪稱為真實之寶能令衆生畢竟安樂故此下別說十種寶義一者堅牢摩尼此言如意此寶之體性最為堅硬無有人能破壞佛法僧寶亦復如是雖有邪見邪分別之外道及具有大威德之邪勢力而常破壞正見正行之天魔亦不能破壞真實之三寶外道天魔尚不能破則凡夫更不能破矣二者無垢前義顯示堅牢此第二義表顯無垢凡殊勝希有之寶其體性皆清淨光潔而不為塵垢污穢之所雜染今佛法僧寶亦復如是不但佛寶法寶清淨光潔遠塵離垢即未證聖果未出世間之凡夫僧能嚴持別解脫戒則亦能遠離煩惱染污法之垢穢因持戒便能生定由定而能生慧則便能證得出世清淨善法在佛陀說法之本懷固一音演說衆生雖以根器不同受法之程度亦千差萬別然究竟皆導歸清淨無漏法界世間之聖帝賢王其治世雖有若何之善美如我國書詩記其盛事等亦難免淫殺等之染污唯佛法僧寶能絶無染污所以名之為寶三者與樂天德瓶是由天福德所感之瓶能滿足世間衆生之所需求因此瓶如摩尼珠於欲求財者即能生出財寶乃至衣服飲食屋舍於世間衆生之所需求無不滿足佛法僧寶亦復如是欲求聲聞菩提者便能與以聲聞菩提乃至緣覺菩提佛果菩提亦皆隨其所應而得之四者難遇吉祥寶是希有難得之寶佛法僧寶亦是最難遭遇之寶如業障最重之有情不特不能親遇佛法僧寶即連佛法僧寶之名亦難得聞如地獄內之衆生即是世人對於佛陀之教法往往不生敬信不特不生敬信或反生相違之見此種人雖得見佛聞法然由業障深厚等於未見佛聞法也五者能破如意寶即前之摩尼珠其性質亦與天德瓶相似能破除衆生之貧窮求衣食得衣食舉凡世間諸事皆可滿足衆生之願望佛法僧寶亦如是凡衆生有正當之願望能隨心而得如欲求智求道乃至求福求健康佛法僧寶皆能一一與之六者威德輪寶即前所說轉輪王由福力所感得之輪寶形如車輪故名輪寶轉輪王征討四方之時其輪寶必自前導而威伏四方四種轉輪王所有之輪皆然佛法僧寶亦復如是由於具有天眼天耳乃至漏盡等六種之神通便能降伏煩惱五蘊等四魔七者滿願此與前第三第五義略同即說摩尼珠能滿足衆生之願望而佛法僧寶亦能滿足衆生之善願所謂咸令果遂決定無疑能使速獲三乘早登佛地八者莊嚴世間珍寶能使國土莊嚴置之於王宮則能使王宮尊貴佛法僧寶亦復如是能莊嚴法王之菩提寶宮使一切衆生皆於菩提寶宮之法王座上成等正覺九者最妙天妙寶雖微妙但不過是世間之寶而已佛法僧寶為超世間之妙寶是出世間之最勝功德非世寶能喻十者不變世間真金入火煆煉之時其色仍不變壞佛法僧寶亦復如是不為世間八風之所傾動八風者即利衰毀譽稱譏苦樂之八法其所以名為風者因世上一切有情常被苦樂憎愛等擾動其心如風之動物故名之為八風利是得可意之事衰是遇著不可意之事毀是背地排斥譽是為世譽讚稱是當前讚美譏是當前誹謗苦是逼迫損惱於心樂是身心順適此八法為世人常有之事且世人無不以之而轉移其心志惟佛法僧則不為此之所動搖自佛法僧寶至說名為寶此是總結佛法僧由於具足無量神通種種變化常於世間饒益有情所以得名為寶善男子以下總結前來所明應報答之四恩在世間常人若皆能知報恩則舉世皆能作損己利他之事業其道德亦因而顯現但報恩之性質有寬狹不同若其所知恩小則其所報之恩亦小今特為舉出報恩之大小以擴衆生之心量使知恩德遍於世出世間也世間一類衆生僅知父母之恩故唯在父母之前承事供養或求功名光大門庭使父母常生歡樂此雖是報答恩德而其範圍甚狹若發菩提心依於佛法而報恩德則便能知自他一切有情從無始以來流轉五趣生死皆曾互為父母妻子眷屬親朋而有恩惠於我者但因煩惱深厚未能證得宿命通不知往昔之事設證宿命通之聖者於往昔之事便能了了分明若再進而推之於社會國家從古至今皆是有恩惠於我者前之三種恩德尚是世間之恩還有三寶恩乃不思議之大恩非平常小知小見所能見知故佛法無論所談何事皆可談到廣大無極如此所談報恩之事也如來於此總結四種世出世間恩中開示妙德長者等不應限於唯知報答現身父母之恩且亦須報後三種之恩惠既須報後三種恩惠則非凡夫及小乘之所能報唯有發菩提心修習六度萬行以至成等正覺始能究竟報答一切恩惠故佛囑其修菩薩行而報答四恩也辛二示報恩行爾時五百長者白佛言世尊如是四恩甚為難報當修何行而報是恩佛告諸長者言善男子為求菩提有其三種十波羅密一者十種布施波羅密多二者十種親近波羅密多三者十種真實波羅密多若有善男子善女人發阿耨多羅三藐三菩提心能以七寶滿於三千大千世界布施無量貧窮衆生如是布施但名布施波羅密多不名真實波羅密多若有善男子善女人發大悲心為求無上正等菩提以自妻子施與他人心無吝惜身肉手足頭目髓腦乃至身命施來求者如是布施但名親近波羅密多未名真實波羅密多若善男子善女人發起無上大菩提心住無所得勸諸衆生同發此心以真實法一四句偈施一衆生使向無上正等菩提是名真實波羅密多前二布施未名報恩若善男子善女人能修如是第三真實波羅密多乃名真實能報四恩所以者何前二布施有所得心第三施者無所得心以真法施一切有情令發無上大菩提心是人當得證菩提時廣度衆生無有窮盡紹三寶種使不斷絶以是因緣名為報恩此報恩品法門在上總科中是攝於五乘共法若衆生能知報答父母之恩雖未即報後三種恩亦能種人天乘之福業但佛之本意在出世之大乘法使衆生得出世之涅槃其人天乘法雖未屬於出世清淨之行然亦是出世之基礎凡佛說法從大乘而生終亦能達到大乘之究竟地也妙德等五百長者請問如來此四種恩既非世間小知小行所能報答則應當修何行而始能報答此甚為難報之四恩耶如來答妙德等欲報如是四種恩德非發菩提心而修菩薩行不可如衆生無始即有恩於我非成佛時以無邊大慈悲大智慧方便等力量而救拔濟度則不足以廣報衆恩然欲成佛須修三種十波羅密三種十波羅密者第一即是但名字布施等十種波羅密第二即是布施等十種親近波羅密第三即是布施等十種真實波羅密波羅密此言到彼岸即是從此生死之岸而到彼涅槃之岸此到彼岸之方法有其十種即是十種到彼岸以有情之程度不同故有三種十到彼岸第一十種波羅密多者即是布施持戒忍辱精進靜慮慧方便願力智之十種後兩種十波羅密亦然不過淺深不同耳在程度最低者即是但名布施等十種是布施住布施相即是名字波羅密第二十種親近波羅密多者即是布施親近波羅密多乃至智親近波羅密多第三十種真實波羅密多者與二種義同即是真實布施到彼岸乃至真實智到彼岸由程度淺深之不同不特應修布施等十種波羅密多且須要修到十真實如初發心菩薩於初發心時即要修此第一十種波羅密多即是外凡位十信菩薩此則名為名字波羅密以隨分決定而未能行故若到資糧位加行位則為十種親近波羅密多因他有勝解力而真能修行故再由解行入於初地通達諸法體性空寂即是通達真如實性其所行之法即是十種真實波羅密多一但名布施波羅密多即明一種衆生發菩提心又能以遍大千世界之七寶而施諸貧窮衆生即是外財布施但可名為十波羅密多不得名為親近波羅密與真實波羅密二親近波羅密多即明內身布施者一類有情因發無上大菩提心能以妻子與自身手足乃至生命皆能施之於求者而無悔吝之心較之第一種行菩薩布施者固然強勝然亦但可名為親近波羅密多尚不得名為真實波羅密多三真實波羅密多此是明以法布施並勸衆生同發此心以期共證菩提則非前二種所能同日而語也如前二種以身物而施於衆生之利樂不過暫時而第三種是住於無所得是施衆生以法令發大心成等正覺皆是真實究竟之法故名真實波羅密多此中布施義略與金剛經布施波羅密之語意相同彼經之要義在於觸無所得亦以受持一四句偈或為人演說勝於前之二種布施如彼經初有二重以外財施校若人滿三千大千世界七寶以用布施其福德雖多不如有人於經中受持乃至四句偈等為他人說其福勝彼後又以二重以內身施較若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多平常人讀之往往覺其文重復若細讀之則便可明了初以外財校次以內身校有漸漸勝進義今此經明十信發心漸入資糧加行及入初地通達真如實性觸無所得唯識頌謂現前立少物謂是唯識性以有所得故非實住唯識此即明未入真見道心猶有所得則不名為住唯識性以有所得故證到初地之菩薩於自他都無所得方得名為真住唯識在平常有能所變緣之相則不名無所得要在入真見道證入無分別智以無所得故亦可名無所住平常心有對相則便心有所住可名之為住某境心若到能所雙亡便名無所得心始稱為真實法地上菩薩說法利生皆說此真實法亦使衆生皆入於真實之法性亦即使衆生修此三種波羅密多然波羅密雖有三種若要究竟報恩須修第三真實波羅密多由於前二種波羅密多心有所得則有限量不能真實報恩心無所得而修波羅密多是則名為真實報恩佛之說明報恩亦是使衆生皆得到安樂若僅能使自身之父母安樂一切衆生猶不能普受其利益故修第三種波羅密多方是真實能報恩之法能以真實之法施之於衆生並令其發無上心而成佛果如是展轉度衆生無有窮盡而紹隆三寶亦不少其人也此真實波羅密多雖要在初地始能實現而初發心菩薩亦須理解其義以作為理想之目的否則連名字波羅密親近波羅密亦將不能修習遑論達到真實也耶己三說法利益爾時五百長者從佛聞是昔所未聞報恩之法心懷踴躍得未曾有發心求趣無上菩提得忍辱三昧入不思議智永不退轉爾時會中八萬四千衆生發菩提心得堅固信及此三昧海會大衆悉得金剛忍辱三昧悟無生忍及柔順忍或證初地得不起忍無量衆生發菩提心住不退位爾時佛告五百長者未來世中一切衆生若有得聞此心地觀報四恩品受持讀習解說書寫廣令流布如是人等福智增長諸天衛護現身無疾壽命延長若命終時即得往生彌勒內宮睹白毫相超越生死龍華三會當得解脫十方淨土隨意往生見佛聞法入正定聚速成阿耨多羅三藐三菩提如來智慧佛說第一會報恩品畢時在會諸衆大得利益妙德等於昔日未曾得聞有所謂四恩者今忽得聞佛所說報答四恩之法於心之歡樂暢快昔未曾有便發菩提心以立大乘之志向並得忍辱三昧三昧即是禪定忍是忍可即依如來所說之法義能忍可於心而得安樂並於此三昧之境契解無分別不思議之智而永不退轉不退轉即十信中第六之信不退或是十住中第一住發心不退會中有八萬四千衆生亦發菩提心得堅固信第十信中信不退亦得前五百長者等所得之忍辱三昧海會大衆至得不起忍者此明將登地之菩薩及地上菩薩所獲之益然此中所說之忍諸經各有不同今可總言之等覺菩薩得金剛忍八地菩薩得無生忍地前菩薩得柔順忍初地菩薩得不起忍又不退在初發心菩薩得十信中第六心信不退進之則十住中初住發心不退第七行不退初地菩薩得證不退八地菩薩得念不退次明未來世衆生流通此經之利益彌勒內宮即兜率內院現為彌勒補處菩薩所居故云彌勒內宮內宮簡外院因兜率有內院外院之分外院為諸天所居非極清淨三會龍華當得解脫即是於未來彌勒如來世界中彌勒菩薩於龍華菩提樹下三番說法度衆生而得解脫正定聚之聚即是類義正定聚是三聚中之一此大小乘皆通小乘在五停心以上大乘在初住以上其邪定聚即是畢竟不證入者其不定聚即在二者之間此三聚略同法相唯識所謂之五姓如彼之聲聞種姓菩薩種姓則可攝此正定聚中彼中不定種姓亦同此不定聚彼中無姓是此中邪定聚如表菩薩正定緣覺正定五姓聲聞正定三聚不定不定無姓邪定戊二答智光等問己一智光趨問庚一趨敬爾時王舍大城東北八十由旬有一小國名增長福於彼國中有一長者名曰智光其年衰邁唯有一子其子惡性不順父母所有教誨皆不能從遙聞釋迦牟尼如來在王舍城耆闍崛山為濁惡世無量衆生宣說大乘報恩之法父母及子並諸眷屬為聽法故齊持供具來詣佛所供養恭敬王舍城是地名在中印度摩伽陀國關於他的名稱來源在上面曾有講過由旬又作俞旬揄旬由延或踰闍那踰繕那與中國驛站名相符為計里程的數目中四十里小二十里大八十里八十由旬約計有兩千里當佛在王舍城說法之際在城之東北約去二千餘里有個小國此國中有長者名曰智光年已衰邁了有一子性情惡劣非常不但不孝敬父母而且父母之言概不遵從處處都是拂逆父母之意因此在離王舍城二千餘里之外傳聞釋迦牟尼佛今正為五濁惡世的衆生宣講大乘報恩之法釋迦能的意義是其族姓牟尼此云寂即寂默寂靜形容佛之德相的這有兩種解說不同一就事而言太子始入劫毗羅城時使諸釋子寂靜無言後出家修禪行而寂默無言前者是父王附以牟尼之名後者是當時的人民尊以牟尼之名仁王經合疏云牟尼者此云寂默三業俱寂默也理趣釋下云牟尼者寂靜義身口意寂靜故稱牟尼二就理而言佛與三乘聖人所證之法名寂默因之稱佛為牟尼成唯識論卷十云大覺世尊成就無上寂默法故名大牟尼俱舍論十六云無學身語業名身語牟尼意牟尼即無學意何故牟尼唯在無學以阿羅漢是實牟尼諸煩惱言永寂靜故廣如毗奈耶雜事二十佛本行集經二十大日經疏一十二十三宗輪論述記唯識述記十末等解智光長者既遙聞佛在王舍城說法而且說的是大乘報恩之法他以為他的不受父母教誨的逆子因為沒有聽聞報恩法的緣故所以不知恩亦不報恩為要使之聽聞教法於是夫婦二人及子并諸眷屬生大歡喜之心齊持供具從二千里之外來詣佛所供養恭敬冀佛可以教化他的惡子使他能知恩而報恩依此經文看起來前二卷可作第一會從此起可作第二會第一會是佛在金色光相中為妙德長者說報四恩法而聞法之人便展轉流通開去所以有智光長者為逆子不孝順之故而遠來請佛說法於是有此第二會産生的緣因這是很值得注意的庚二問求而白佛言我有一子其性弊惡不受父母所有教誨今聞佛說報四種恩為聽法故來諧佛所惟願世尊為我等類及諸眷屬宣說四恩甚深妙義令彼惡子生孝順心此世當生令得安樂智光長者既到了佛前便問佛世尊我有個兒子他的性情非常惡劣不受為父母的教誨如今在遠處聽聞佛說報四恩法所以特來佛前懇求世尊為我們宣說四恩法義可以教訓我的惡子使他孝順有恩德人今生及後世可增福報皆得安樂這是智光長者站在父親的立場因為惡子無法教誨的緣故而來佛前求法與前面妙德長者從為人子者必定要怎樣才報父母之恩而請佛說法這是兩者不同之動機己二如來慰答庚一宣慰爾時佛告智光善哉善哉汝為法故來至我所供養恭敬樂聞是法汝等諦聽善思念之若有善男子善女人發菩提心為聞法要舉足下足隨其遠近所踐之地微塵數量以是因緣感得金輪轉輪聖王聖王報盡作欲天王欲天報盡作梵天王見佛聞法速證妙果汝大長者及餘衆等為於法故來至我所如是經過八十由旬大地微塵一一塵數能感人天輪王果報既聞法已當來證得阿耨多羅三藐三菩提我雖先說甚深四恩微妙義趣今復為汝重宣此義而說偈言智光長者僕僕遠來他不像平常人那樣的喜悅因為他有逆子不孝順父母憂愁之苦深刻於心於是佛便這樣安慰他道善哉善哉使他歡喜這在智光當然從來不曾感受到的愈快吧而且佛對他說倘若有人發菩提心為求無上妙法舉足動步皆能感得金輪聖王乃至能證出世之妙果不但能感化惡子而且得大菩提此四恩之法義我雖然在前已經說過如今不妨更為一說在智光的本心不過因惡子忤逆不孝而來求佛說法教化別無他意更沒有想求出世果的願望在佛呢並許聞法之後能證得出世的菩提妙果這的確是智光等意外的收獲庚二頌答辛一頌佛二德壬一自證實德最勝法王大聖主一切人天非等倫具諸相好以嚴身智海如空無有量自他利行皆圓滿名稱普聞諸國土永斷煩惱餘習氣善持密行護諸根百四十種不共德廣大福海悉圓滿三昧神通皆具足八自在宮常遊樂智光長者既來求佛說報四恩法而報四恩法在前已經說過然又不得不為重說所以祇有以頌文為說此中的頌文有重頌增頌的差別已經散文中有過的在這里略示段落即是重頌前散文中沒有過的即是增頌因智光才到靈山法會所以佛特為他說此重頌比方今在南普陀講大乘本生心地觀經已有八天其有今天才加入法會者雖沒有聽過前幾天所說還可以聽到重頌這也是難得的因緣有一般人有愛廣義而不愛略義的教法有愛略義而不愛廣義的教法所以長行與頌文有廣略的差別這樣看來這正是對機說法的特色自證實德者明如來為法王大聖主至尊且貴的人非是一切天人等可以比倫的誰也知道他是三覺圓滿者他的密行非是菩薩所能推測有百四十種不共之德行所謂三十二相八十種好十力四無所畏及十八不共諸法等等以及三昧神通皆具足這些皆是如來自己所親證實有的德相所以非菩薩及二乘聖者所能尋思推測得到的壬二化他權德十方人天及外道無有能難調御師金口能宣無礙辨雖無能問而自說如大海潮時不失亦如天鼓稱天心如是自在唯佛有非五通仙魔梵等難思劫海修行願證獲如是大神通我入三昧大寂室觀察諸根及藥病自出禪定而讚歎三世佛法心地門時諸長者退大心樂住二乘自利行我開大智方便教引入三空解脫門如來意趣莫能量唯佛能知真祕密利根聲聞及獨覺勤求不退諸菩薩十二劫數共度量無有能知其少分假使十方凡聖智受與一人為智者如是智者如竹林不能測量其少分如來善能教化他人誰也不是他的對手因為他是法無礙辨義無礙辨辭無礙辨樂說無礙辨者縱然沒有人能去請問自己也可以說法利生他的高尚志氣猶如不退的海潮那樣的雄壯像這樣親證得來的大神通唯佛獨有他有時深入三昧禪定觀察諸衆生的病脈對症施醫可使死者復活固然大乘法門難行有時難免有人生退悔之心自願做個消極的二乘聖者但佛的智海流出來的教法能引使悟入三空法門三空者即生空法空空空因此如來的祕密奧妙之處是不可捉摸的佛說法利他的威德是聲聞菩薩所不可思議的辛二重頌四恩壬一總標世間凡夫無慧眼迷於恩處失妙果五濁惡世諸衆生不悟深恩恆背德我為開示於四恩令入正見菩提道這世間最可憐的是沒有慧眼的凡夫總是一味地虛僞頑劣不知恩不報恩對前輩有德的長者時常背逆如來觀察人間衆生道德上的大缺陷很是悲痛特為我輩衆生開示四恩使之得入正見的法門這是特別給人們底福音壬二別釋癸一父母恩子一重頌慈父悲母長養恩一切男女皆安樂慈父恩高如山王悲母恩深如大海若我住世於一劫說悲母恩不能盡我今略說於少分猶如蚊虻飲大海假使有人為福德供養淨行婆羅門五通神仙自在者大智師長及善友安置七珍為堂殿及以牛頭栴檀房療治萬病諸湯藥盛滿金銀器物中如是供養日三時乃至數盈於百劫不如一念申少分供養悲母大恩田福德無邊不可量算分喻分皆無比世間悲母孕其子十月懷胎長受苦於五欲樂情不著隨時飲食亦同然晝夜常懷悲愍心行住坐臥受諸苦若正誕其胎藏子如攢鋒刃解肢節迷感東西不能辨遍身疼痛無所堪或因此難而命終六親眷屬咸悲惱如是衆苦皆由子憂悲痛切非口宣若是平復身安樂如貧獲寶喜難量顧視容顏無厭足憐念之心不暫捨母子恩情常若是出入不離胸臆前母乳猶如甘露泉長養及時曾無竭慈念之恩實難比鞠育之德亦難量世間大地稱為重悲母恩重過於彼世間須彌稱為高悲母恩高過於彼世間速疾唯猛風舉心一念過於彼若有衆生行不孝令母暫時起恨心怨念之辭少分生子乃隨言遭苦難一切佛與金剛天神仙祕法無能救若有男女依母教承順顏色不相違一切災難盡消除諸天擁護常安樂若能承順於悲母如是男女悉非凡大悲菩薩化人間示現報恩諸方便若有男子及女人為報母恩行孝養割肉剌血常供給如是數盈於一劫種種勤修於孝道猶未能報暫時恩十月處於胎藏中常銜乳根飲胎血自為嬰孩及童子所飲母乳百斛餘飲食湯藥妙衣服子先母後為常則子若愚癡人所惡母亦恩憐不棄遺昔有女人抱其子渡於恆河水瀑流以沈水故力難前與子俱沒無能捨為是慈念善根力命終上生於梵天長受梵天三昧樂得遇如來受佛記一名大地二能生三能正者四養育五與智者六莊嚴七名安隱八教授九教誡者十與業餘恩不過於母恩何法世間最富有何法世間最貧無母在堂時為最富母不在時為最貧母在之時為日中悲母亡時為日沒母在之時皆圓滿悲母亡時悉空虛這段頌文的意義上面長行裏已經講過不過在這里再略說所以謂之重頌父母的恩即是慈悲之恩慈能與樂悲能拔苦慈恩是父最勝此恩高如大山王悲恩是母最勝此恩深如大海倘佛常住在世間講說父母之慈悲恩尤其是母的悲恩還講不完若為求福德而以種種的貴重品物供養諸有德者不如以微分少物供養悲母其福德的無邊不可限量非可計算比喻得到為人子者當知悲母十月懷胎之苦乃至為嬰兒時所飲母乳使母受盡種種苦痛這種種苦痛一一聯想起來倘若你對父母曾有過不孝順的地方應該要至誠洗心懺悔要知恩報恩世間無論什麼恩決沒有超越父母恩以上若世人能報父母之恩這在人間的確曾受到他人讚美的子二增頌世間一切善男子恩重父母如丘山應當孝敬恆在心知恩報恩是聖道不惜身命奉甘旨未曾一念虧色養如其父母奄喪時將欲報恩誠不及佛昔修行為慈母感得相好金色身名聞廣大遍十方一切人天咸稽首人與非人皆恭敬自緣往昔報慈恩我升三十三天宮三月為母說真法令母聽聞歸正道悟無生忍常不退如是皆為報悲恩雖報恩深猶未足神通第一目犍連已斷三界諸煩惱以神通力觀慈母見在受苦餓鬼中目連自往報母恩救免慈親所受苦上生他化諸天衆共為遊樂處天宮當知父母恩最深諸佛聖賢咸報德若人至心供養佛復有精勤修孝養如是二人福無異三世受報亦無窮世人為子造諸罪墮在三塗長受苦男女非聖無神通不見輪回難可報哀哉世人無聖力不能拔濟於慈母以是因緣汝當知勤修福利妙功德以其男女追勝福有大金光照地獄光中演說深妙音開悟父母令發意憶昔所生常造罪一念悔心悉除滅口稱南無三世佛得脫無暇苦難身往生人天長受樂見佛聞法當成佛或生十方淨土中七寶蓮華為父母華開見佛悟無生不退菩薩為同學獲六神通自在力得入菩提微妙宮皆是菩薩為男女乘大願力化人間是名真報父母恩汝等衆生共修學當知父母之恩重若丘山應當知恩報恩這是為人子者應盡的天職假若你的良心還沒有死的話如果父母在生不孝養死了的時候受良心所責而要報恩真所謂悔之晚矣了佛在過去曾為報慈母的恩而修行所以今感得金色滿身的相好莊嚴為人天所尊敬也是往昔報父母恩的緣故既成佛後復往三十三天為母說法雖不過三個月的時間但能使母悟無生忍不退菩提像這樣的報恩佛尚感覺到沒有滿足在我們又感覺到怎樣呢神通第一的目連以神通力而觀察母在餓鬼裏受諸苦痛自己不能救母求仗佛的威力為救度倘若目連的母親沒有生得目連又怎能出離餓鬼之苦呢所以要能報恩必須以智慧來觀察真理否則不能究竟拔濟於慈母呵因之以大悲菩提心為根本而勤修諸功德供養恭敬如來口稱南無佛這才能脫離無暇的苦難無暇者謂修道業無閒暇也有八無暇即是八難一地獄二餓鬼三畜生四鬱單越即北拘盧洲以樂而無苦佛不出現五長壽天色界無色界長受安穩之處六聾盲瘖啞七世智辨聰八佛前佛後若能口稱南無三世佛可免離三途八難諸苦往生人天長受安樂見聞佛法早生十方淨土這些法門若真正要報父母的恩決定要精勤共同修學癸二衆生恩子一重頌有情輪回生六道猶如車輪無始終或為父母為男女世世生生互有恩如見父母等無差不證聖智無由識一切男子皆是父一切女人皆是母如此未報前世恩卻生異念成怨嫉常須報恩互饒益不應打罵致怨嫌如人到了某個時代或某個地方就變換了式樣與顏色便認不清楚本來的面目或人間或天上今生在這里來世在那里輪回於六道之間出沒於生死之海生生世世展轉無窮在這六道之中的衆生曾作過我的父母或兒女可憐我們沒有慧眼不能辨別誰是父誰是母所以一切男子是我父一切女人是我母他們對于我都有恩德我都要一一報恩報恩於已往的一切子二增頌若欲增修福智門畫夜六時當發願願我生生無量劫得宿住智大神通能知過去百千生更相憶識為父母循環六趣四生中令我一念常至彼為說妙法離苦因使得人天長受樂勸發堅固菩提願修行菩薩六度門永斷二種生死因疾證涅槃無上道假若你想報恩必須首先勸修福德與智慧然福德智慧成之不易應當發菩提大願才可得大神通為六道父母說法若自他能發菩提大願而修六度萬行法門這才能永斷分段生死和變易生死的因速證無上妙道癸三國王恩子一重頌十方一切諸國王正法化人為聖主國王福德為最勝所作自在名為天三十三天及餘天恆將福力助王化諸天擁護如一子以是得稱天子名世間以王為根本一切人民為所依猶如世間諸舍宅柱為根本而成立王以正法化人民如大梵王生萬物王行非法無政理如琰魔王滅世間王所容受姦邪人象踏華池等無異如日天子照世間國王化世亦如是日光夜分雖不照能使有情得安樂王以非法化於世一切人民無所依世間所有諸恐怖依王福力不能生人民所成安隱樂當知是王福所及世間所有勝妙華依王福力而開敷世間所有妙園林依王福力皆滋茂世間所有諸藥草依王福力差諸疾世間百穀及苗稼依王福力皆成實世間人民受豐樂依王福力常自然譬如長者有一子智慧端嚴世無比父母恩愛如眼目晝夜常生護念心國大聖王亦如是愛念衆生如一子養育耆年拯孤獨賞罰之心常不二如是仁王為聖主群生敬仰等如來仁王化治國無災萬姓恭勤常安隱國王無法化於世疾疫流行災有情如是一切人非人罪福昭然無所覆善惡法中分七分造者獲五王得二園林田宅悉皆然所稅等分亦如是轉輪聖王出現時分作六分王得一時諸人民得五分善惡業報亦皆然若有人王修正見如法化世名天主以依天法化世間毗沙門王常擁護及餘三天羅剎衆皆得守護聖王宮聖王出世理國時饒益衆生成十德一名能照於國界二名莊嚴於國土三名能與諸安樂四名能伏諸怨敵五名能遮諸恐怖六名修集諸聖賢七名諸法為根本八名護持於世間九名能作造化功十名國界人民主若王成就十勝德梵王帝釋及諸天夜叉羅剎鬼神王隱身常來護國界龍王歡喜降甘雨五穀成熟萬姓安國中處處生珍寶人馬彊力無怨敵如意寶珠現王前境外諸王自賓伏若生不善於王國一念起心成衆惡是人命終墮地獄受苦永劫無出期若有勤神助國王諸天護念增榮祿國王是一國的國民代表者國家的平安與否都歸於國王所以國王要有福德然福德從持戒而來而持戒即為倫理道德之根本建立換言之持戒即為倫理道德的實行假若沒有道德則不能使人民信仰但是國王既為國民代表者當然對內對外都負有保護人民的重責所以國家以王為根本一切人民都以王為依止王既有恩於民人民當知恩報恩不過在這民主時代講起來國王恩者即國政恩在國家政治設施得宜我們完全在國政的保護之下過生活所以我們要愛國以報國恩這些在上面長行已經講得很詳細了子二增頌丑一廣明戒德寅一舉因明果智光長者汝應知一切人王業所感諸法無不因緣成若無因緣無諸法說無生天及惡趣如是之人不了因無因無果大邪見不知罪福生妄計王今所受諸福樂往昔曾持三淨戒戒德熏修所招感人天妙果獲王身智光要知道這世間一切的人王皆是許多福業所感得來的從佛教宇宙觀為出發點來說假若沒有一切諸法為增上緣而成功具體的一物是不可能的不過因是特殊各別的而緣又要很多如草木的種因是各別的假若沒有陽光水土種種為他的增上緣決定是不能生長人若不了知因緣的意義則成為無因無果的大邪見者所以王之所以為王乃是他的往昔因中受持淨戒因戒德熏習種種的業因成熟了招感福德之果才有這王位的幸運到來寅二辨別戒品若人發起菩提心願力資成無上果堅持上品清淨戒起居自在為法王神通變化滿十方隨緣普濟諸群品中品受持菩薩戒福德自在轉輪王隨心所作盡皆成無量人天悉遵奉下上品持大鬼王一切非人咸率伏受持戒品雖缺犯由戒勝故得為王下中品持禽獸王一切飛走皆歸伏於清淨戒有缺犯由戒勝故得為王下下品持琰魔王處地獄中常自在雖毀禁戒生惡道由戒勝故得為王王的福果是往昔的福因得來的而福又要由持戒而來戒有上中下三品之別上品戒由發菩提心和大悲願力而成為上上品戒這是佛才有的至於上中品戒是地上菩薩上下品戒是地前菩薩上中下三品戒每品之中皆可分為上中下三品在上面所講的三品為上品的三品受持中品三品及下品三品菩薩戒的人他的福德還是能招感王位下品的雖然關於清淨戒難免有所缺之處但他因戒勝的緣故亦能得王位不過中三品能在天上人間為王而下三品僅為鬼畜地獄的王寅三標因示果以是義故諸衆生應受菩薩清淨戒善能護持無缺犯隨所生處作人王若有不受如來戒尚不能得野干身何況能感人天中最勝快樂居王位是故王者非無因戒業精勤成妙果國王自是人民主慈恤如母養嬰兒如是人王有大恩撫育之心難可報以是因緣諸有情若能修證大菩提於諸衆生起大悲應受如來三聚戒要有持菩薩戒的因可得人王等的福德之果因此一切衆生應該要受菩薩清淨戒倘善能護持隨時隨地皆有走上王的幸運道路否則不但為王不可能做畜生還不夠當知為王者不是天然得來的也不是命定的是由各人努力勤修戒業而收獲的妙果所以一切衆生要發菩提心大悲願受持如來的清淨戒來世生在人天才得到自由與心神的愈快寅四教修懺法卯一勸應懺罪若欲如法受戒者應當懺罪令消滅起罪之因有十緣身三口四及意三生死無始罪無窮煩惱大海深無底業障峻極如須彌造業由因二種起所謂現行及種子藏識持緣一切種如影隨形不離身一切時中障聖道近障人天妙樂果遠障無上菩提果在家能招煩惱因出家亦破清淨戒若能如法懺悔者所有煩惱悉皆除猶如劫火壞世間燒盡須彌并巨海懺悔能燒煩惱薪懺悔能往生天路懺悔能得四禪樂懺悔雨寶摩尼珠懺悔能延金剛壽懺悔能入常樂宮懺悔能出三界獄懺悔能開菩提華懺悔見佛大圓鏡懺悔能至於寶所要受持清淨戒必須先要懺罪使罪消滅起罪之事有十種即身三殺盜淫口四妄語兩舌惡口綺語意三貪瞋癡然造業招果依於二法即現行和種子展轉熏習於藏識之中而藏識能持緣一切種藏識即第八識有能藏所藏執藏一切種是第八識的因相此識能執持一切諸法種子令不失故由一切種能生起一切諸法現行的果故種子為因現行為果此因果均攝藏於第八識無始來造有不良的業到了相當的時期就要發生作用這就是業障無論什麼時候影也似的不離開你的身畔而始終跟著你這便糟了什麼人天妙樂果無上菩提果遠的或近的都被阻隔而不能相近了所以要悔除往昔因中的業障才能受持佛戒才能到寶所不懺悔則罪不能滅一懺悔則業障即滅如鍋蓋揭開熱氣即泄出了卯二示懺罪法若能如法懺悔者當依二種觀門修一者觀事滅罪門二者觀理滅罪門觀事滅罪有其三上中下根為三品若有上根求淨戒發大精進心無退悲淚泣血並精懇哀感遍身皆血現繫念十方三寶所并餘六道諸衆生長跪合掌心不辭發露洗心求懺悔惟願十方三世佛以大慈悲哀愍我我處輪回無所依生死長夜常不覺我在凡夫具諸縛狂心顛倒遍攀緣我處三界火宅中妄染六塵無救護我生貧窮下賤家不得自在常受苦我生邪見父母家造罪依於惡眷屬惟願諸佛大慈尊哀愍護念如一子一懺不復造諸罪三世如來當證明如是勇猛懺悔者名為上品求淨戒若淚交橫不覺知遍身流汗哀求佛發露無始生死業願大悲水洗塵勞滌除罪障淨六根施我菩薩三聚戒我願堅持不退轉精修度脫苦衆生自未得度先度他盡未來際常無斷如是精勤勇猛者不惜身命求菩提若有下根求淨戒發是無上菩提心涕淚悲泣身毛豎於所造罪深慚愧對於十方三寶所及以六道衆生前至誠發露無始來所有惱亂諸衆生起於無礙大悲心不惜身命悔三業已作之罪皆發露未作之惡更不造如是三品懺諸罪皆名第一清淨戒以慚愧水洗塵勞身心俱為清淨品諸善男子汝當知已說淨觀諸懺悔於其事理無差別但以根緣應不同若於修習觀正理遠離一切諸散亂著新淨衣跏趺坐攝心正念離諸緣常觀諸佛妙法身體性如空不可得一切諸罪性皆如顛倒因緣妄心起如是罪相本來空三世之中無所得非內非外非中間性相如如俱不動真如妙理絶名言唯有聖智能通達非有非無非有無非不有無離名相周遍法界無生滅諸佛本來同一體惟願諸佛垂加護能滅一切顛倒心願我早悟真性源速證如來無上道若有清信善男子日夜能觀妙理空一切罪障自消除是名最上持淨戒若人觀知實相空能滅一切諸重罪猶如大風吹猛火能燒無量諸草木諸善男子真實觀名為諸佛祕要門若欲為他廣分別無智人中勿宣說一切凡愚衆生類聞必生疑心不信若有智者生信解念念觀察悟真如十方諸佛皆現前菩提妙果自然證滿心充塞了罪業的時候要能夠如法如儀的懺悔滅罪當依二種觀法觀事滅罪觀理滅罪觀事滅罪有三即上中下根求三品戒假若是個上根利智求淨戒的人該是號啕痛哭跪在十方三寶前求哀懺悔惟願十方諸佛以大慈悲心哀愍於我因為處在這六道輪回之中吃不少的苦這世界是火宅是傷身亡命之所是魔窟沒有一時一刻不是造業的時候造惡業得惡果這是不可避免的事因果律大家都承認是有的到了懺悔的時候更不要躊躇應勇猛懺悔哀請十方諸佛證明加被這才是不平凡的上品求戒者中品與下品求淨戒的也不容易若以為這世間還有什麼可戀而不悲痛洗心懺悔自身的諸罪決不能出輪回苦證入菩提妙果總之不能發菩提心大悲心沒有慚愧心決定沒有得清淨戒的希望事懺有上中下三品的差別以勇猛精進程度的高低為標準還有理懺之法雖有觀事觀理兩門但事理之能懺悔滅罪無有差別不過以其根緣不同罷了若能觀察正理不但能遠離一切的散亂而得到定力而且身與心內外清淨觀心正念觀諸佛自性身體性如空了不可得觀罪生性亦不可得從第一義觀一切諸法皆空即是諸法真實性正所謂如如不動不取於法既觀罪性不可得罪相亦不可得離四句絶百非無一法不即真如但諸法有生滅真如無生滅想悟入這真如性的本源所以要觀正理而修習於定定由戒而生所以要持戒持戒要先能懺滅一切罪業所以應該作如是觀理的懺法這是諸佛祕密的法門應廣事流通宣說但不可為諸愚癡者講說此真實觀卯三結修懺益善男子等我滅後未來世中淨信者於二觀門常懺悔當受菩薩三聚戒若我滅後未來的衆生有正信正見者若已能修事理之懺悔當可受持此菩薩淨戒寅五示受戒儀若欲受持上品戒應請戒師佛菩薩請我釋迦牟尼佛當為菩薩戒和尚龍種淨智尊王佛當為淨戒阿闍黎未來導師彌勒佛當為清淨教授師現在十方兩足尊當為清淨證戒師十方一切諸菩薩當為修學戒伴侶釋梵四王金剛天常為學戒外護衆奉請如是佛菩薩及以現前傳戒師普為報於四恩故發起清淨菩提心應受菩薩三聚戒饒益一切有情戒修攝一切善法戒修攝一切律儀戒如是三聚清淨戒三世如來所護念無聞非法諸有情無量劫中未聞見唯有過去十方佛已受淨戒常護持二障煩惱永斷除獲證無上菩提果未來一切諸世尊守護三聚淨戒寶斷除三障并習氣當證正等大菩提現在十方諸善逝俱修三聚淨戒因永斷生死苦輪回得證三身菩提果前面曾說過受持淨戒不是容易的事尤其是求上品戒懺罪之時必須請十方三世諸佛證明加被這便應知受戒壇場的布置是怎樣的儀式正中應供奉釋迦牟尼佛為菩薩戒和尚得戒和尚在上首應供文殊菩薩為淨戒阿闍黎羯磨和尚在下首應供彌勒菩薩為清淨教授師教授和尚並請十方諸佛為尊證十方菩薩為學戒伴侶四天王八金剛為外護衆不但要以上的諸佛菩薩為加被還要請現前的傳授師親為傳授這是受戒儀式的設置今作一菩薩戒曼怛囉於此於此戒壇內乃可受菩薩三聚戒所謂饒益一切有情戒修攝一切善法戒修攝一切律儀戒這三戒是三世諸佛所護念的為什麼饒益有情戒在第一呢這是菩薩戒特點的所在所以在次序上與別處不同這三聚戒一切有情從來沒有見聞過唯有過去諸佛因受此戒斷煩惱所知二障而證得無上菩提果未來諸佛因守護此戒斷除三障煩惱障業障報障和習氣而證正等大菩提現在諸善逝因修此戒斷生死輪回苦而證得三身菩提果這不是理想是在事實上確有證明的寅六喻明戒德超越生死深大海菩薩淨戒為船筏永斷貪瞋癡繫縛菩薩淨戒為利劍生死嶮道諸怖畏菩薩淨戒為舍宅息除貧賤諸苦因淨戒能為如意寶鬼魅所著諸疾病菩薩淨戒為良藥你要渡過生死的大海菩薩戒為船筏你要永斷三毒的束縛菩薩戒為利劍你怕走生死的險路菩薩戒可作為舍宅住你要避免貧賤的諸苦因菩薩戒可為如意寶隨心所欲要什麼有什麼你身上有什麼疾病菩薩戒可為良藥丑二勸應受持人天為王得自在三聚淨戒作良緣及餘四趣諸王身淨戒為緣獲勝果是故能修自在因當得為王受尊貴應先禮敬十方佛日夜增修清淨戒諸佛護念當受持戒等金剛無破壞三界諸天諸善神衛護王身及眷屬一切怨敵皆歸伏萬姓歡娛感王化是故受持菩薩戒感世出世無為果國王之所以得到自由即是以三聚戒作他的良緣乃至非人類的王無不是淨戒作他的良緣而獲得的我們不為人所尊貴這只怪自己不曾修持戒因所以必要轉向勤修戒的道路走才有光明若想得出世的妙果應當敬禮十方諸佛日夜努力勤修清淨的菩薩戒諸佛便都來護持國王也因為受持淨戒所以諸佛菩薩都來護持一切怨敵皆不得害他人民皆受他的感化這就是修清淨戒所得的良果如今一般人僅僅口頭上叫喊要救國救民雖然心高志大因沒有福德費了不少的歲月結果只有失敗墮落這是多麼可憐真叫人悲感哩癸四三寶恩子一增頌總相三寶常住化於世恩德廣大不思議過未及現劫海中功德利生無休息佛日千光恆照世利益群生度有緣無緣不睹佛慈光猶如盲者無所見法寶一味無變易前佛後佛說皆同如雨一味普能霑草木滋榮大小別衆生隨根各得解草木稟潤亦差殊菩薩聲聞化衆生如大河水流不竭衆生無信化不被如處幽冥日難照如來月光甚清涼能除衆暗亦如是猶如覆盆月不照迷惑衆生亦如是法寶甘露妙良藥能治一切煩惱病有信服藥證菩提無信隨緣墮惡道菩薩聲聞常在世無數方便度衆生若有衆生信樂心各入三乘安樂位如來不出於世間一切衆生入邪道永離甘露飲毒藥長溺苦海無出期佛日出現三千界放大光明照長安衆生如睡不覺知蒙光得入無為室如來未說一乘法十方國土悉空虛發心修行成正覺一切佛土皆嚴淨一乘法寶諸佛母三世如來從此生般若方便無間修解脫道成登妙覺若佛菩薩不出現世間衆生無導師生死嶮難無由過如何得至於寶所以大願力為善友常說妙法令修行趣向十地證菩提善入涅槃安樂處大悲菩薩化世間方便引導衆生故內祕一乘真實行外現緣覺及聲聞鈍根小智聞一乘怖畏發心經多劫不知身有如來藏唯欣寂滅厭塵勞衆生本有菩提種悉在賴耶藏識中若遇善友發大心三種鍊磨修妙行永斷煩惱所知障證得如來常住身菩提妙果不難成真善知識實難遇一切菩薩修勝道四種法要應當知親近善友為第一聽聞正法為第二如理思量為第三如法修證為第四十方一切大聖主修是四法證菩提汝諸長者大會衆及未來世清信士如是四法菩薩地要當修習成佛道以下頌三寶恩此中分為兩段第一增頌總相總相者即前長行中總標三寶之文但前總標科文非常短少而此頌中文義甚多故名增頌總相三寶常住化於世四句即和前長行總標中文義無別是頌過去未來現在三世三寶之恩德最為甚深佛日千光恆照世四句頌讚佛之恩德如千日出世但度有緣衆生無緣者即不能見佛如盲者不見日光之無異也法寶一味無變易六句頌明法寶住世佛佛道同而恩澤普被群生如春雨然能增長草木茂盛但被潤澤者因各自根種有特殊之不同故潤有大小之別法寶潤澤有情亦復如是因隨衆生根性各得解故菩薩聲聞化衆生四句頌僧寶教化有情如大海之常流無有間斷時但衆生若無信心如處幽冥不能為日光所照也如來月光甚清涼四句又重頌佛之恩德慧光能除衆生熱惱但無緣者即不能受其清涼之安樂也菩薩聲聞常在世四句頌僧寶常在世無論何時衆生若深信之即能入三乘之安樂位如來不出於世間八句明佛不出世一切衆生如處於幽冥飲鴆溺苦海之無異如來若出世間光明普照即一切昏暗衆生蒙佛光澤而得入無為室也如來未說一乘法四句明大乘法之寶貴世間若沒有大乘法國土即成空虛有佛法則一切土悉嚴淨也一乘法寶諸佛母四句頌三世如來皆依薩婆若海無間修行而成正覺也若佛菩薩不出現八句頌衆生依佛為導師佛若不出世衆生即失去導師無由得至寶所也以大願力為善友四句即諸佛以大悲願力為衆生善友常說妙法令得涅槃境也大悲菩薩化世間四句頌佛說法度生時菩薩有大方便內修菩薩行外現聲聞身常時利樂一切有情也鈍根小智聞一乘六句此即小機衆生恐怖大法如妙德長者而不知自己身中本有如來藏清淨菩提種子藏在賴耶識中故欣樂涅槃而厭塵勞也賴耶識者即能藏一切法種之識也若遇善友發大心六句明一切衆生若能遇善友開導即能發大心斷二障證菩提因之成妙果非難而遇真善知識實難也三種練磨者為對治三種退屈之心第一引他既證大菩提而練磨自心以此對治菩提廣大屈第二省己意樂而練磨自心對治萬法難修屈第三引他之粗善比己之妙因而練磨自心以對治轉依難證屈由此三種練磨心法於一切善法即得不退故能修妙行也一切菩薩修勝道六句頌菩薩修行有四種法要善友正法修行證果即因親善友能聞正法由聞正法如理修思由修行故即得妙果也十方一切大聖主六句是勸修奉行也子一重頌三寶丑一佛寶善男子等應諦聽如來所說四恩者佛寶之恩最為上為度衆生發大心三僧企耶大劫中具修百千諸苦行功德圓滿遍法界十地究竟證三身法身體遍諸衆生萬德凝然性常住不生不滅無來去不一不異非常斷法界遍滿如虛空一切如來共修證有為無為諸功德依止法身常清淨法身本性如虛空遠離六塵無所染法身無形離諸相能相所相悉皆空如是諸佛妙法身戲論言辭相寂滅遠離一切諸分別心行處滅體皆如為欲證得如來身菩薩善修於萬行智體無為真法性色心一切諸佛同譬如飛鳥至金山能使鳥身同彼色一切菩薩如飛鳥法身佛體類金山自受用身諸相好一一遍滿十方剎四智圓明受法樂前佛後佛體皆同雖遍法界無障礙如是妙境不思議是身常住報佛土自受法樂無間斷他受用身諸相好隨機應現無增減為化地上諸菩薩一佛現於十種身隨所應現各不同展轉倍增至無極稱根為說諸法要令受法樂入一乘彼獲神通漸增長所悟法門亦如是下地菩薩起智慧不能了達於上地能化所化隨地增各隨本緣為所屬或一菩薩多佛化或多菩薩一佛化如是十佛成正覺各坐七寶菩提樹前佛入滅後佛成不同化佛經劫現十佛所坐蓮華臺周遍各有百千葉一一葉中一佛土即是三千大千界一一界中有百億日月星辰四大洲六欲諸天及四禪空處識處非想等其四洲中南贍部一一各有金剛座及以菩提大樹王爾所變化諸佛身一時證得菩提道轉妙法輪於大千菩薩緣覺及聲聞隨所根宜成聖果如是所說三身佛最上無比名為寶以下重頌別讚三寶今頌中先讚佛寶善男子等應諦聽八句頌明如來所說之恩以佛恩最為第一因佛發心修行度諸衆生已經三無數劫所修種種因行已滿十地究竟證三身果故名為最法身體遍諸衆生十六句讚如來法身之德即體非生滅斷常而為一切有為無為功德之所依止以及法身體性本淨無有塵染遠離一切戲論相也為欲證得如來身八句頌菩薩為欲得如來法身故修行菩薩萬行但知法身本體真常空寂諸佛共證入地分證故地上菩薩即為法身大士譬如飛鳥下喻顯菩薩稱如來法身修行體即等於如來之法身如飛鳥至金山體即類於金山色也自受用身諸相好八句重頌自受用身德自受用者即四智菩提住清淨微妙報佛國土受無間斷常相續之妙樂他受用身諸相好二十句重頌他受用身文意如長行中說前佛入滅後佛成者即如極樂淨土彌陀入滅觀音即成佛等非如化佛國土之中經無量劫或無有佛也十佛所坐蓮花臺十六句重頌化身德即由十佛蓮花各現百千佛身成正覺等也如是所說三身佛兩句總頌三身以顯明佛為寶之理由丑二法寶應化二身所說法教理行果為法寶諸佛以法為大師修心所證菩提道法寶三世無變易一切諸佛皆歸學我今頂禮薩婆若故說法寶為佛師或入猛火不能燒應時即得真解脫法寶能摧生死獄猶如金剛碎萬物法寶能作堅牢船能渡愛河超彼岸法寶能與衆生樂譬如天鼓應天心法寶能濟衆生貧如摩尼珠雨衆寶法寶能為三寶階聞法修因生上界法寶金輪大聖王以大法力破四魔法寶能為大寶車能運衆生出火宅法寶能為大導師能引衆生至寶所法寶能吹大法螺覺悟衆生成佛道法寶能為大法燈能照生死諸黑暗法寶能為金剛箭能鎮國界伏諸怨三世如來所說法能利衆生脫苦縛引入涅槃安樂城是名法寶恩難報如來自受用身不說法他受用身所說之教法亦不在世間因超過世間故如中本華嚴經等世間所無故世間所有之教法即應化身佛所說教理行果是也諸佛以法下即明法寶為三世如來之母及法寶無遷變義我今頂禮下即佛自身以薩婆若為師修學一切薩婆若法而成正覺尊重一切薩婆若法一切猛火所不能燒也法寶能摧生死獄二十六句以喻重顯法寶之恩深三世如來下總明法寶為三世如來所說利益衆生導衆生入涅槃城也丑三僧寶寅一重頌總標智光長者汝諦聽世出世僧有三稱菩薩聲聞聖凡衆能益衆生為福田此即總標僧寶有三種菩薩聲聞凡僧而此三種僧寶能增長衆生福德能滅除衆生熱惱故名為世間福田如田能生長穀物故寅二增頌二聖文殊師利大聖尊三世諸佛以為母十方如來初發心皆是文殊教化力一切世界諸有情聞名見身及光相并見隨類諸化現皆成佛道難思議彌勒菩薩法王子從初發心不食肉以是因緣名慈氏為欲成熟諸衆生處於第四兜率天四十九重如意殿晝夜恆說不退行無數方便度人天八功德水妙華池諸有緣者悉同生我今弟子付彌勒龍華會中得解脫於末法中善男子一搏之食施衆生以是善根見彌勒當得菩提究竟道以下別頌二聖即讚彌勒文殊之德彌勒文殊二菩薩在菩薩會中為如來之上首如聲聞衆中迦葉阿難等為上首無異也文殊師利大聖尊八句頌文殊之德文殊師利即妙吉祥在菩薩衆中代表諸菩薩之根本智一切菩薩皆由此根本智而修行證果故為三世如來之母世間一切有情若聞名見相讚歎供養以及或見隨類化形皆獲無量福德當來世中皆成佛道故文殊聖僧恩德實難思議也彌勒菩薩法王子八句即別讚彌勒德也彌勒此云慈氏言慈氏者有二種因緣一者以居胎時母性轉慈得名二者以往昔因中為智光仙人誓戒肉食故名慈氏中國佛教徒不食肉之特殊情況尤近慈氏遺風如西藏錫蘭等則不斷肉食也兜率天四十九重之內院彌勒上生經言之甚詳今不繁述彌勒因欲普度人天故處兜率內院恆說不退轉心地法門也八功德水下頌明彌勒內院亦有八功德池池中有蓮凡有緣上生者悉於中化生如極樂淨土無異也我今弟子下是佛以弟子付屬彌勒也釋尊遺教中之一切弟子皆當於龍華三會得解脫也於末法中善男子四句即末法世中凡有衆生若能施一搏之食於龍華三會即得解脫詳言之即凡在釋迦文佛正像末法之中持五戒者初會解脫受三皈者二會解脫乃至舉手低頭一稱佛名者第三會中亦皆解脫以彌勒菩薩承釋迦佛之遺囑發有如是大願故寅三重頌聖凡舍利弗等大聲聞智慧神通化群生若能成就解脫戒真是修行正見人為他說法傳大乘如是福田為第一或有一類凡夫僧戒品不全生正見讚詠一乘微妙法隨犯隨悔障消除為諸衆生成佛因如是凡夫亦僧寶如鬱金華雖萎悴猶勝一切諸妙華正見比丘亦如是四種輪王所不及如是四類聖凡僧利樂有情無暫歇稱為世間良福田是名僧寶大恩德舍利弗等及聲聞兩句重頌聖僧因有神通變化利樂一切有情故舍利弗此云鶖子是智慧第一也若能成就別解脫四句即重頌凡僧凡僧中有兩種此乃成就別解脫者即是具足正見正戒之凡僧若說大乘法利益有情即為世間之第一福田也或有一類凡夫僧十句即重頌第二類具正見而不具正戒之凡僧因常毀犯淨戒故但此凡僧雖毀犯而能懺悔又能闡揚大乘微妙之法利益有情故亦為世間之福田如鬱金花下以喻明具正見凡僧威德之殊勝超過四種輪王因佛無漏智中之所攝故如是四種聖凡僧四句即總明四僧為寶之義四僧即聖凡各有二種僧也辛三總結四恩如我所說四恩義是名能造世間田一切萬物從是生若離四恩不可得譬如世間諸色塵能造四大而得生有情世間亦復然由彼四恩得安立以下總結四恩如我所說四恩義四句即明四恩能造世間福田如一切五穀皆從田所生以顯一切善法若離四恩即不能生長也譬如世間下如色香味觸諸塵依四大所生故四大為能造色香味為所造若離能造之法則所造色等即不能生起如是四恩與衆生安樂亦復如是四大者就具體說即地水火風就特性說即堅濕暖動也己三問答報恩爾時智光長者及諸子等聞佛所說四種大恩得未曾有歡喜合掌而白佛言善哉善哉大慈世尊為濁惡世不信因果不孝父母邪見衆生說真妙法利樂世間惟願世尊說報恩義我等既悟甚深四恩而今未知修何善業而報是恩佛告長者善男子等我為五百長者先已廣說而今為汝略說少分若善男子善女人為得阿耨多羅三藐三菩提精勤修行十波羅密若有所得未名報恩若人須臾能行一善心無所得乃名報恩所以者何一切如來觸無所得乃成佛道化諸衆生若有淨信善男子等得聞是經信解受持解說書寫以無所得三輪體空竊為一人說四句法除邪見心趣向菩提是即名為報於四恩何以故是人當得無上菩提展轉教化無量衆生令入佛道三寶種子永不斷絶智光長者聞佛所說四種大恩即歡喜踴躍歎未曾有讚歎世尊說此報恩之法利樂一切有情但智光長者等雖知四恩之義尚不知以何法修行修行何業而報四恩故發問也佛告長者下即世尊答智光長者之問義若有所得未名報恩即是欲報廣大四恩必發大菩提心勤修十種波羅密法但修波羅密時了達三輪體空觸無所得方名報恩若有所得即不明真報恩也因如來觸無所得故而成正覺觸無所得故而度諸衆生無有衆生之相所以金剛經說滅度一切衆生而實無有衆生度者若有淨心善男子下即明若人能得聞是經書寫解說是經以了達無所得意斷除邪見身心即名真報四恩以了達實義即能趣向大菩提故趣向菩提即能展轉教化一切衆生使一切衆生有依所止修行於三寶功德種子永不斷絶故己四聞法獲益爾時智光長者聞是偈已得忍辱三昧厭離世間得不退轉時諸子等八千人俱得此三昧皆發無等等阿耨多羅三藐三菩提心四萬八千人亦證三眛遠塵離垢得法眼淨以下即智光長者等聞佛說四恩法所獲得之利益也忍辱三昧即是得法忍三昧時諸子等亦得法忍三昧也遠塵離垢即了知心性空寂故客塵煩惱垢無所依處而遠離也既了達性寂故能於諸法相得法眼而明見清淨也丁二色無色天乘之三乘共法戊一出家戒之超欲界法十信己一厭捨出家厭捨品第三厭捨即是出家之法即厭捨人間俗家而趨向于佛法之出家法進一步言即是捨五欲之法亦即是厭捨欲界法如以最廣義之厭捨而論即是厭三界之法而依于出世間法依此以厭捨作出家解即有如下三義一出人間俗家二出欲界五欲家三出世間三界家此中所著重者即在厭捨人間俗家之法同時亦厭捨欲界五欲之法此厭捨之所以得名在前總科五乘共法中第二色無色天乘之三乘共法從天乘法以明如所謂福業非福業不動業福業即是欲界人天法非福業即是三惡趣法不動業即是色無色界天之禪定業而成超欲界之上二界法今此色無色天乘之三乘共法所包括之經文有厭捨品無垢性品阿蘭若品離世間品之四皆是持戒修定之法在厭捨無垢性之二品正明持戒之法後二品正明修定之法此中所說之戒即出家戒出家戒要離去五欲而修梵行梵行即是淨行亦即色無色界之行故出家之戒直接為離欲界而超升色無色界之行展轉增上亦即為由色無色界而超出世間之行修戒如是修定亦然如四禪八定為三乘聖人所共修之法然亦正是色無色界所修者但色無色界亦不離梵行之戒法亦以戒為基礎要離去欲界之五欲始成色無色界四禪八定之不動業由此出家法一方面可超出欲界一方面又能成就出世之基此四品所明之戒定明色無色界天乘之法亦即是三乘學無學道共修之法然所謂三乘共修之法不但戒定其最重者則在于修慧戒定不過三乘法之基礎若非有出世三乘之聞思修慧則唯名人天乘法不得名出世之三乘法蓋人天法以戒定為本而出世三乘法則以四諦十二緣起六波羅密法而為本但戒定是出世慧之基礎設無此戒定為基則出世之思慧修慧即不能成立由是而觀戒定為色無色以及出世三乘之所必需而為超過人乘之四乘共法被超即是人乘未超則仍通五乘今正就超欲界色無色界天乘之三乘共法以明之此中分二一出家戒之超欲界法此中所明出家之戒是超欲界之戒法此超欲之戒法若真能受持則可以超出欲界之家欲界最重之根本在男女之欲故欲界即由于男女之欲而釀成出家之戒正除去男女之欲故此厭捨無垢性二品正明超欲界之法二阿蘭若品與離世間品正明超欲界後所修禪定以入色無色界再依戒定修出世慧以超色無色界乃入于無漏之出世間戒定慧也厭捨無垢性二品在前總科之旁加有十信者可作另一看法大科以五乘共法三乘共法大乘不共法而為分劃若如此看則本品是五乘共法若依注有十信之另一看法則本經專明大乘法如前之報恩品在勸一般凡夫未發心者引之欣慕發菩提心而出家戒之超欲界法即在欣求發心而未能發心之間學習修養發菩提心的菩薩十信心位故前報恩品是勸發菩提心此即是學習菩提心要之此厭捨無垢性之二品即是正明學習菩提心者以前報恩品唯勸發菩提心而未能學習而今明學習菩提心須專到佛法中去修養要精進修習隨順清淨無漏慧等法以開發菩提心故有此菩薩十信之位此如華嚴經淨行品等智首菩薩與文殊菩薩互相問答皆明得成出家菩薩十信之法亦即明超欲界家而到出三界家之法由有此旁科與正科之二種看法故今于此經之大綱可再明之一大乘包括世出世間之五乘所以得名大乘法由此法能自悟悟他以大乘自悟以五乘悟他雖人天乘法未能出世然亦為大乘利他之方便故大乘法應包括五乘之法故分為五乘共法三乘共法大乘不共法二五乘法實即是大乘大乘之極位雖不與他乘共然亦由凡夫初發心而歷經諸修行位展轉增上展轉勝進而後方至其極果如在初學之時即明如何報恩如何利衆生如何發無上大心即是初學菩薩從報恩發心展轉增進以至修學出家戒法培養十種信心乃入十住而真正發菩提心此如華嚴經梵行品等所明在本經即阿蘭若品離世間品之所明也故五乘法即是大乘法展轉增進之歷程雖亦得名五乘共法而實即大乘菩薩法也由此而觀則第一種之大乘法亦可說是五乘法第二種之五乘法亦可說是唯一之大乘法明此二種看法則對于全部經文更可了然矣庚一智光陳疑請決辛一敘今所願爾時智光長者承佛威神即從座起頂禮佛足恭敬合掌而白佛言世尊我今從佛聞是報恩甚深妙法心懷踴躍得未曾有如饑渴人遇甘露食我今樂欲酬報四恩投佛法僧出家修道常勤精進希證菩提爾時即如來說報四恩將畢之時智光長者于前報恩法會中已獲忍辱三昧今以自心尚有疑惑未決而一方面欲令會衆獲益決疑故從座起合掌至誠恭敬而白于佛常人得見佛像經法能合掌低頭皆植福無量乃至畢竟得證佛果菩提今於此廣大法會之中能一請一問則其值福豈可以言喻耶世尊至希證菩提正明智光長者自述本人于今時法會中之願望智光長者于前報恩法會中得聞佛說廣報四恩之法故言我今從佛聞是報恩甚深妙法一般人唯知父母始有恩于我不能推及其他報恩之範圍甚屬狹小不得名甚深微妙唯佛陀所說之報恩法方堪稱甚深微妙之法因佛陀所明之報恩不但報答于父母及衆生國王乃至出世三寶更有不可思議之恩于我也此報恩法為昔之所未聞故快樂之心亦勝于昔日如饑渴人遇甘露食甘露是不死之藥此為上界諸天之物饑渴之人無論遇到若何飲食亦可止渴充饑而況甘露耶此甘露喻報恩法之上上者智光長者因聞如來說報恩要出家修道始能究竟故今亦白佛而樂欲出家修道以求證得佛果菩提廣報四恩也辛二述昔所聞佛大慈悲於此一時在毗舍離城為無垢稱說甚深法汝無垢稱以清淨心為善業根以不善心為惡業根心清淨故世界清淨心雜穢故世界雜穢我佛法中以心為主一切諸法無不由心汝今在家有大福德衆寶瓔珞無不充足男女眷屬安隱快樂成就正見不謗三寶以孝養心恭敬尊親起大慈悲給施孤獨乃至螻蟻尚不加害忍辱為衣慈悲為室尊敬有德心無憍慢憐愍一切猶如赤子不貪財利常修善捨供養三寶心無厭足為法捨身而無吝惜如是白衣雖不出家已具無量無邊功德汝於來世萬行圓滿超過三界證大菩提汝所修心即真沙門亦婆羅門是真比丘是真出家如是之人此則名為在家出家世尊或有一時於迦蘭陀竹林精舍為其惡性六群比丘說教誡法而告之言汝等比丘諦聽諦聽入佛法海信為根本渡生死河戒為船筏若人出家不護禁戒貪著世樂毀佛戒寶或失正見入邪見林引無量人墮大深坑如是比丘不名出家非是沙門非婆羅門形似沙門心常在家如是沙門無遠離行遠離之行有其二種一身遠離二心遠離身遠離者若人出家身處空閒不染欲境名身遠離身雖離故心貪欲境如是之人不名遠離若淨信男及淨信女身居聚落發無上心以大慈悲饒益一切如是修行名真遠離於是六群惡性比丘聞是法音得柔順忍智光長者來此會中唯得聞此報恩之重頌而佛在毗舍離為無垢稱說法以及迦蘭陀竹林為六群比丘所說之法則在此法會之前或由法會中之他人處展轉傳聞而聽得佛大慈悲即讚佛能方便善巧而使衆生離苦得樂也一時乃毗舍離城說法之時以說法完畢為限毗舍離此言廣博嚴淨即廣博嚴淨之城在中印度國無垢稱即維摩詰居士又譯淨名居士甚深法即不可思議之勝義諦法智光長者述昔傳聞佛說之法與今佛說要出家始能報恩之義相違故舉出以質之於佛此段在維摩詰經佛國品有此意義而文不全同汝無垢稱至無不由心者明宇宙一切諸法皆不離我自心之作為所謂三界唯心者也不特世間如是即佛出世聞法亦以心為根本而由之轉變一切故清淨心為善業之根本不善心為惡業之根本而世界之淨穢皆隨心為之轉移心雖亦為萬法之一但較他法之勢力強勝就其強勝作用而能轉變一切故得名之為主一切諸法無不由心也汝今在家有大福德總明其福力道德之深厚其形式是在家故財寶充足而家屬安樂即是在家之圓滿成就正見不謗三寶明其知見之純正以孝養心恭敬尊親明其能孝親敬長起大慈悲至尚不加害明其能恩及孤獨乃至最微小之螻蟻尚愍恤而不加害忍辱為衣慈悲為室明其具慈悲心與行忍辱波羅密衣如鎧甲既被忍辱之鎧甲則不為怨恨之魔軍所喪尊敬有德心無憍慢明其心不高舉故能尊敬有德之人憐愍一切猶如赤子明其慈愛衆生如自嬰孩不貪財利常修善捨明其不特不好財寶物利且常修布施而捨物於人供養三寶心無厭足明其能於三寶前常修供養而心無厭離滿足為法捨身而無吝惜明其為法之精誠而能犧牲生命凡行菩薩道者皆能如是故釋迦如來昔行菩薩道時為求一四句偈而割截身體又如法華經中藥王菩薩為求法故而能用火鍛鍊其身以供養于佛如是白衣至無邊功德明其形式雖是白衣而未服沙門之色服但其所具足之功德亦與大菩薩所具相等汝於來世至證大菩提明其於未來世待所修之六度萬行福德智慧滿足時即超三界而證佛果汝所修心至在家出家是明其形式上雖是白衣之人而其心之作用則是沙門亦是婆羅門是則名為真實之比丘真實之出家者換言之是一在家出家者沙門此言勤息勤修出要息滅煩惱此為出家修行之通稱不限於佛徒婆羅門此言淨行為印度四姓中之最尊貴者彼計其種族是大梵天之口所生彼即奉大梵天而修淨行故得此名比丘此言乞士上乞佛法以修心下乞飲食以資身故也尚有殺賊怖魔等義次明佛有時於迦蘭陀竹林精舍為六群比丘說教誡法迦蘭陀竹林精舍在摩竭陀國佛常於此竹林中說法令諸比丘精進修學故名精舍惡性者是根性之不善六群不是一人之名其性惡之衆有六類故名六群比丘有不正當之行為重加訶斥是名教誡若平常循循善誘而為衆生說法者則名教授汝等比丘至名真遠離正是佛教誡六群比丘之文此中入佛法海至戒為船筏明若欲深入佛陀之法藏則當具足信根否則連接近都不能何能知悉既不能知悉尚能深入於法藏耶然深入法藏不過明解而已尚不是度生死之河而到彼岸真實度生死之河而到彼岸者則必以戒而為船筏蓋戒為無上菩提本即三世諸佛亦乘此戒之船筏而得到彼岸者夫人之出家正為遠離世間之貪欲在家常在五欲之中世世生生輪轉不息皆由於不覺既得出家則應知世間虛妄無可為樂堅持於淨戒以令其無有失犯若不能如是而反貪著世俗樂味以至於毀如來之戒法則何得名為出家耶出家者於佛之禁戒有所毀犯則其知見亦不純正故言或失正見入邪見林邪見為根本煩惱之一通即十使中之五利使別即謗因謗果謗作用者林喻邪見之非一種如森林之稠密既自失於正見則如盲者不見於道路反以盲引盲墮落深坑深坑重則三途輕則五趣不護禁戒之出家者既貪著五欲而又破佛之禁戒入於邪見之林不能與衆生之福反而使之墮落如是比丘其形雖光沙門而其心與作用皆與俗無異所以不得名出家不得名沙門亦不得名婆羅門出家淺則出欲界人天之欲樂家深則出三界之家如是沙門至名真遠離者次以二種遠離行而明修學之真僞第一身遠離即明前出家而不防護如來禁戒及入邪見者此輩身雖出家而處於空曠清靜之地與塵囂相隔然其心則非處於空閒常追逐於世俗貪欲之境雖身遠離而心未遠離第二心遠離此即學佛之人身雖處於市廛之聚但心則是清淨無染且發菩提心而常以大慈悲饒益一切有情者故形式雖不出家而其內心與行為則是出家如淨名居士即是故此即是真出家真遠離於是六群比丘得柔順忍明智光長者說彼六群比丘於聞法時所獲之益柔順忍即是心柔智順而忍可佛之誡法於心也此即第二對六群比丘所說之法與今佛說要出家報恩之說相違辛三正陳疑意然今我等雖信佛說各各懷疑意未決定善哉世尊能斷世間一切疑者於一切法得自在者真實語者無二語者是知道者是開道者惟願如來為我等輩及未來世一切有情捨於方便說真實法永離疑悔令入佛道今此會中有二菩薩一者出家二者在家是二菩薩善能利樂一切有情而無休息如我惟忖出家菩薩不及在家修菩薩行所以者何昔有金輪轉輪王發阿耨多羅三藐三菩提心厭離世間無常苦空捨輪王位如棄洟唾清淨出家入於佛道是時後宮夫人婇女八萬四千見王出家各懷戀慕心生號慟生大逼惱起愛別離如地獄苦金輪聖王初受位時所感寶女及王千子大臣眷屬共傷離別捨位王家號泣之聲滿四天下此諸眷屬各作是言我王福智無量無邊如何見棄捨我出家哀哉苦哉世界空虛從今已去無依無怙若有淨信善男子善女人歸佛法僧發菩提心捨離父母出家入道父母憐愍恩念情深離別悲哀感動天地如凅轍魚宛轉於地愛別離苦亦復如是如彼輪王眷屬之心出家菩薩饒益衆生云何嬈害父母妻子令無量人受大苦惱以是因緣出家菩薩無慈無悲不利衆生是故非如在家菩薩具大慈悲憐愍衆生利益一切智光長者於此報恩法會中聽聞如來所說之法要人出家發菩提心以期成等正覺始能究竟報恩其說既如此而如來前為無垢稱所說即不必出家亦可是真出家及對六群比丘等所說即雖是出家亦同在家其說又如彼如是種種異說殊令人懷疑不決而不知所從今我等雖信佛說但終疑惑不免耳故望佛說真實法令現前會衆及未來世衆生斷除疑惑得自在即是我為法王於法自在真實語即虛僞之反無二語即是說一不二知道即證知一切諸法如如之體開道即開示真實正道今此會中以下智光長者以二種菩薩推測而出本人之意見斷定出家菩薩不如在家菩薩且引昔事以證明轉輪王為四種輪王之通名今冠以金輪者即是別於銀銅鐵三輪王也厭離世間無常苦空者即一切有為之法皆是無常苦空非究竟之法故應厭離此即小乘中之三法印以此三法印證宇宙之一切法凡有為者皆是無常苦空彼金輪王捨輪王之尊榮而出家學道致後宮之夫人婇女以及王子大臣等受諸苦痛所謂愛別離苦令人卒不忍睹愛別離苦為世間八苦之一人之所最親愛者莫如父母妻子今轉輪王既捨俗出家而遺其親以世俗觀之當然是最慘痛之事然若如彼轉輪王之已明世間無常等則又最平常之事也若有淨信以下智光長者重以捨離父母出家為不可因父母之情最為深厚其離別之悲哀可以動天地而泣鬼神既出家原是饒益衆生則反而嬈害於父母妻子豈非乾坤倒置長者綜以前所舉之諸事證明出家菩薩之慈悲度生不及在家菩薩利樂憐愍衆生之強勝庚二如來因問廣說辛一因問總非爾時佛告智光長者善哉善哉汝大慈悲勸請我說出家在家二種勝劣汝今所問出家菩薩不如在家是義不然所以者何出家菩薩勝於在家無量無邊不可為比何以故出家菩薩以正慧力微細觀察在家所有種種過失智光長者聽聞佛說報恩之後即欲出家修菩薩行期成正覺而報衆恩但因感覺如來前後說法之矛盾故特以之質問如來及以除會衆之疑惑而利及將來今如來正答其所問之不然蓋如來雖於毗舍離城為無垢稱說法而讚他是真沙門但無垢稱是十地菩薩權現之在家菩薩不能代表人世一切之俗人世俗之常人皆為父母妻孥衣食住等之所營擾其心之紛亂豈能與出家者同日而語耶又如來於迦蘭陀竹林精舍為六群比丘說法教誡其非法之行為由彼形雖出家而心同世俗故佛斥其尚不及在家之發大心而饒益有情者然此是訓斥非法之比丘不及在家真實修行者非真實出家修行比丘不如在家修行者故佛於此中說汝今所問出家菩薩不如在家是義不然由於出家菩薩其心清淨由清淨故則能發生智慧之力彼在家者常為家屬等之纍故其心不能清淨則出家菩薩之勝於在家不亦顯然耶出家菩薩由此有智慧之力觀察在家有種種之過失故不應言出家菩薩不及在家也辛二廣說九喻壬一大海不知滿足喻所謂世間一切舍宅積聚其中不知滿足猶如大海容受一切大小河水未曾滿足善男子香山之南雪山之北有阿耨池四大龍王各居一角東南龍王白象頭西南龍王水牛頭西北龍王師子頭東北龍王大馬頭各從四角涌出大河一殑伽河其水所至白象隨出二信渡河其水所至水牛隨出三縛芻河其水所至師子隨出四私陀河其水所至大馬隨出如是大河一一河各有五百中河中河各有無量小河是大中小一切衆水皆入大海然此大海未曾滿足世間衆生所有一切居處舍宅亦復如是聚諸珍寶從四方來悉入宅中未曾滿足多求積聚造種種罪無常忽至棄捨故宅是時宅主隨業受報經無量劫終無所歸善男子所謂宅者即五蘊身其宅主者是汝本識誰有智者樂有為宅唯有菩提安樂寶宮離老病死憂悲苦惱若有利根淨信深厚善男子等欲度父母妻子眷屬令入無為甘露宅者須歸三寶出家學道爾時如來重說偈言出家菩薩勝在家算分喻分莫能比在家逼迫如牢獄欲求解脫甚為難出家閒曠若虛空自在無為離繫著諦觀在家多過失造諸罪業無有邊營生會求恆不足猶如大海難可滿阿耨達池龍王等四角涌出四大海大中小河所有水晝夜流注無暫歇然彼大海未嘗滿所貪舍宅亦如是在家多起諸惡業未嘗洗懺令滅除空知愛念危脆身不覺命隨朝露盡琰魔使者相催逼妻子屋宅無所隨幽冥黑暗長夜中獨往死門隨業受諸佛出現起悲愍欲令衆生厭世間汝今已獲難得身當勤精進勿放逸在家屋宅深可厭空寂寶舍難思議永離病苦及憂惱諸有智者善觀察當來淨信善男女欲度父母及眷屬令入無為甘露城願求出家修妙道漸漸修行成正覺當轉無上大法輪所謂世間至未曾滿足總明世人之貪心為家業計為子孫謀其心貪戀不足如大海之容納百川猶不見其滿足香山或即我國所謂之崑崙山雪山在北印度近人稱為希馬拉雅山阿耨池此言無熱惱此池在香山之南雪山之北周有八百餘里為南贍部洲之最高水源處四大龍王各居一角謂此池之四角各有一龍王居守東南龍王白象頭即是東南角上龍王鎮守之處名白象頭餘三可類推各從四角涌出大河即謂從四角涌出之水成為四大河殑伽河又云恆河其水所至之處多産白象餘三可類推此四河各發出大小無量水派皆流入大海而大海猶未滿足如今之太平洋大西洋等從原始至今猶未滿足世間衆生亦爾備經諸樂尚未知足多求集聚至棄捨故宅此明由心貪戀不足故仍求積聚不畏造業但無常忽來不特不能將衆寶帶去即舍宅亦捨離是時宅主終無所歸即是說萬般將不去唯有業隨身窮經萬劫亦不能再反其故宅上之所謂宅舍者即色等五蘊身是也宅主者即是各人精神主體之阿賴耶識隨業受報無有已時誰有智者至憂悲苦惱謂世間衆生因生活之需求而發生種種戰爭誰有智者而去作有為無常之事業而甘居於五蘊幻化之宅耶由此衆生之希望皆要達到離去人間諸苦而不至菩提寶宮不止若有利根欲令父母妻子等捨去有為之宅而入無為之宅必須投佛出家學道始能究竟達到其目的非智光長者所謂出家不如在家也重頌中初半頌頌長行出家勝於在家等文次一頌重申出家勝於在家之理由次半頌頌長行出家有慧力能觀察在家過失等文次半頌頌長行世間舍宅如大海不滿足等文次一頌單一句頌長行阿耨池流出大小諸河入於大海未曾滿足等文次四頌單一句頌長行世間衆生之離老死憂悲苦惱等文次一頌半頌長行若有利根至出家學道等文壬二石火能燒草木喻復次善男子出家菩薩觀世舍宅猶如石火深生厭患何以故譬如微火能燒一切諸草木等世間舍宅亦復如是貪心求覓馳走四方若有所得受用不足於一切時追求無厭若無所得心生熱惱日夜追求是故世間一切舍宅能生無量煩惱之火為起貪心恆無知足世間財寶猶如草木貪欲之心如世舍宅以是因緣一切諸佛說於三界名為火宅善男子出家菩薩能如是觀厭離世間名真出家爾時如來重說偈言出家菩薩觀世宅猶如人間微少火一切草木漸能燒世宅當知亦如是衆生所有衆財寶更互追求常不足求不得苦恆在心老病死火無時滅以是因緣諸世尊說於三界為火宅若欲超過三界苦應修梵行作沙門三昧神通得現前自利利他悉圓滿假如能甚深底觀察這家世俗家五欲家三界家有種種的禍患而想避免牠那便非要出家不可出家的菩薩才能有這樣微細的觀察力觀察這家猶如擊石所生的微火能燒盡山林的草木在這三界之內無論有怎樣底能力終難得完全的自由所謂三界無安猶如火宅此中所謂石火如五欲草木如世間情器人真像做長期的大夢勞碌了一生只為貪求財産奔走四方如旅客在沙漠中採覓寶物若有所得心中還不滿足還要長期的苦苦追求不捨若沒有所得呢不消說增加許多憂悲苦惱起來了這都為了家産不滿足之故阿所以這世間的家能生無量之苦無量之煩惱貪心又為諸煩惱的首領因貪世間財寶不知足所以迷茫在這世間而為世間的囚徒了如法華經云三界之生貪欲為本如果是個真正的菩薩能作此種的觀察應當早點離開這世間這世間實是可厭的穢窟值不得我們留戀講到出家是出五欲之家修梵行而作沙門出家這本不是佛教獨有的如印度婆羅門教耆那教與西洋的羅馬教和中國道教都有出家的事實但他們與佛教的出家形式上雖沒有什麼不同然他們最多不過能超出欲界而佛教徒以無漏涅槃為目的要出三界家這是與其他宗教徒出家不同之所在但這不是容易的事必須要勤修梵行三昧到無漏慧現前的時候才能達到自利利他的果位壬三深山戀寶喪身喻復次善男子愛樂出家當觀舍宅如彼深山石窟之中有大寶藏譬如長者唯有一子其家大富財寶無量奴婢僕從象馬無數其父於後忽遭重病名醫良藥不能救療長者自知將死不久即命其子而告之言凡我所有一切財寶付囑於汝勤加守護勿令漏失既付囑已即便命終時長者子不順其命恣行放逸既損家業財物散失僮僕逃逝而無所依時彼老母心懷憂惱逐得重病即便終歿其子貧窮無所恃怙逐投山谷拾薪採果貨鬻自給彼時遇雪入石窟中權自憩息然此窟中是昔國王藏七寶所無能知者經數百千年回絶人跡時彼貧人業因緣故偶入窟中見無量金心大歡喜得未曾有因而分割若干分金造立舍宅若干分金為娶妻財如是奴婢如是象馬隨心所欲皆如其意作是計時有諸群賊為趁走鹿到於窟前見此貧人以金分配逐捨其鹿殺人取金愚癡凡夫亦復如是深著世樂不樂出離深山石窟如世舍宅伏藏金寶猶如善根琰魔使者即是群賊隨業受報墮三惡道不聞父母三寶名字喪失善根以是因緣應當厭離發於無上大菩提心出家修道希成妙覺爾時如來重說偈言愛樂在家諸菩薩觀於舍宅如寶藏譬如長者有一子其家大富饒財寶奴婢僕從及象馬一切所須無不豐於後長者身有病舉世良醫皆拱手臨終告命諸親族付囑家財與其子教誨令存孝養心當勤享祀無斷絶是時其子違父命廣縱愚癡多放逸老母懷憂疾病身又因惡子尋喪逝眷屬乖離無所託捨薪貨鬻以為常往彼山中遇風雪入於石窟而暫息窟中往昔藏妙寶已經久遠無人知樵人得遇真金藏心懷踊躍生希有尋時分配真金寶隨意所欲悉用之或以造舍或妻財奴婢象馬并車乘校計未來無能捨群賊因鹿到其前是彼怨家會遇時逐殺貧人取金去愚癡衆生亦如是石窟猶如世間宅伏藏真金比善根魔鬼使如劫賊以是因緣諸佛子早趣出家修善品應觀身命類浮泡勤修戒忍波羅密當詣七寶菩提樹金剛座上證如如常住不滅難思議轉正法輪化群品善男子如果有歡喜出家者應觀察舍宅猶如深山石窟中的財寶因貪戀財寶的緣故致傷身失命這人間財寶的貪欲猶如豺狼毒蛇從前有個長者唯有一個兒子他家財産很豐富奴婢象馬車乘不可數計後來長者得了一種名醫良藥不能救療的病自知不久死神到來將一切財寶付囑於兒子即便死了他的兒子太放逸太不知父親的慈蔭凡是下流事真是無所不為結果不但財寶完全蕩盡甚至高堂老母睹此悽慘情狀亦因憂悲太過而死了兒子無所依靠於是終日在山中把拾薪採果所得來的代價維持生命一日因避風雪而入石窟中憩息此石窟乃從前國王貯藏七寶的所在歷時既久無人知曉這兒子看見有這麼多的財寶心大歡喜但這卻就是他傷身失命的境遇因為他將此財寶分作數分自說自應的作理想中的種種分配或建舍宅或買妻奴等正是歡喜不知怎樣才好的時候恰有很多追鹿的強盜到來看見他獨自分配金銀財寶於是捨鹿而殺人奪取金銀去了這比方世間的人因為貪財迷色而沒有善巧方便所以有傷身失命之虞這人天五欲之樂本為善根所招致的福報但對此福報當以智慧力去觀察施用不可為他所迷否則就要喪命故人有福報應恭敬三寶孝順父母若對三寶不恭敬父母不孝順則善根所致的福報享盡了不免墮諸畜類這多麼的危險因此這世間五欲之樂出家菩薩應當要捨離掉發起菩提心求究竟妙覺講到貪欲本指在家俗人而言出家人只有三衣一鉢根本沒有貪不貪可說了但如今的中國僧伽住叢林的比較貪心要小一點住小庵的僧伽往往貪著金錢和衣服等與在家的俗人差不多若對於佛法有正信正見應該去勤修戒忍種種波羅密行速求證得自覺覺他圓滿的佛果壬四飲雜毒露得吐喻復次善男子世間所有一切舍宅猶如雜毒甘露飲食譬如長者唯有一子聰慧利根達迦樓羅祕密觀門能辨毒藥善巧方便父母恩憐愛念無比時長者子為有事緣往至肆未及歸家爾時父母與諸親族歡喜晏樂具設甘膳時有怨家密以毒藥致飲食中無人覺知是時父母不知食中有雜毒藥逐令長幼服雜毒食其子後來父母歡喜所留飲食賜與其子是長者子未須飲食念迦樓羅祕密觀門便知食中有雜毒藥其子雖知父母服毒而不為說誤服毒藥所以者何若覺服毒更加悶亂毒氣速發必令人死即設方便白父母言我且不食如是飲食暫往市中卻來當食何以故我先買得無價寶珠留在匱中而忘封閉於是父母聞說寶珠生歡喜心任子所往子遂馳走詣醫王家求阿伽陀解毒妙藥既得此藥疾走還家乳酥糖三味合煎和阿伽陀作是藥已白父母言惟願父母服是甘露此是雪山阿伽陀藥所以者何父母向來誤服毒藥我所暫出本為父母及諸人等求得如是不死妙藥於是父母及衆人等心大歡喜得未曾有即服妙藥吐諸毒氣便得不死更延壽命出家菩薩亦復如是過去父母沉淪生死現在父母不能出離未來生死難可斷盡現在煩惱難可伏除以是因緣為度父母及諸衆生激發同體大慈悲心求大菩提出家入道善男子是名舍宅如雜毒藥入甘美食爾時如來重說偈言世間所有諸舍宅說名雜毒甘美食譬如長者有一子聰明利智復多才善迦樓羅祕密門能辨毒藥巧方便子有事緣往𨞬肆暫時貨易未還家父母宴樂會諸親百味珍羞皆具足有一惡人持毒藥密來致之於飲食其子是時不在家父母為兒留一分舉家誤服雜毒藥子念觀門知有毒即便奔馳到醫所求得伽陀不死藥三味和煎藥已成逐白諸親速令服如是所服如甘露差諸雜毒皆安樂一切信心善男子出家修道亦如是為濟父母及衆生所服煩惱諸毒藥狂心顛倒造諸罪永沉生死憂悲海割愛辭親入佛道得近調御大醫王所修無漏阿伽陀還生父母三界宅令服法藥斷三障當證無上菩提果盡未來際常不滅能度衆生作歸依畢竟處於大涅槃及佛菩提圓鏡智這是說出了家即是吐了毒在世間沒有出家者則中了毒而還沒有吐出來甘露食即是最好的飲食但有毒雜在其中世人受五欲之樂如食甘露但因此而生種種煩惱可見得不是究竟之樂前段明愚癡的在俗人此中明聰慧的出家人迦樓羅鳥名舊譯金翅鳥新譯妙翅鳥他能食消龍魚七寶等凡是有毒的食物到了妙翅鳥的腹中有毒化為無毒此鳥能除毒蛇等之害迦樓羅觀謂觀自身如迦樓羅能消諸毒有個長者也只有一個兒子極其聰慧他能知迦樓羅觀能辨別毒物毒藥父母非常恩憐愛護如掌中珠他到街坊去了父母邀友人宴會不防備在座上遇著怨家了在食物中暗裏下了毒藥誰也不知道大家都吃下腹去了長者留少分與子子回了家恐怕所留食物靠不住清淨於是修迦樓羅觀法便知道食中有毒但不能即為父母告知父母受毒不得不想法安慰救濟於是假說他在外有許多體面事使父母歡喜趕快去求阿伽陀藥又跑回來了阿伽陀者此云普去無價無病或不死藥丸如云言投此藥普去衆疾服此藥已更無有病此藥有起死回生之功此子既得藥回家之後用乳酥粆糖三樣調合阿伽陀藥才對父母說他檢查父母誤吃了毒藥我因為要醫除所以去覓得雪山妙藥既服此藥毒物便吐出來了也就沒有死出家菩薩亦復如是因為出家菩薩以過去現在未來三世衆生認為皆是他的父母衆生的憂悲苦惱即是自身的憂悲苦惱這即是同體大悲佛與衆生同體不二不過衆生為個人而佛菩薩為一切衆生因衆生貪財色所以沉淪生死苦海得五趣之苦菩薩目的在得究竟安樂所以發菩提心而出家了差者即病醫好了三障即惑業報惑即漏體惑斷則漏業也沒有漏業沒有則業報也沒有阿羅漢有有餘涅槃只斷惑障而業報未斷佛也有有餘涅槃但與阿羅漢不同佛位三障永斷不過以轉得的淨依名有餘依壬五妄想猛風不起喻復次善男子出家菩薩常觀世間一切舍宅猶如大風不能暫住何以故善男子在家之心恆起妄想執著外境不能了真無明昏醉顛倒觸境亦常不住惡覺易起善心難生由妄想緣起諸煩惱因衆煩惱造善惡業依善惡業感五趣果如是如是生死不斷唯有正見不顛倒心作諸善業因三善根及以信等增長無漏法爾種子能起無漏三昧神通如是如是證聖相續若伏妄想修習正觀一切煩惱永盡無餘爾時智光長者白佛言世尊修習正觀有無量門修何等觀能伏妄想爾時世尊告長者言善男子應當修習無相正觀無相能伏妄想唯觀實性不見實相一切諸法體本空寂無見無知是名正觀若有佛子安住正念如是觀察長時修習無為妄想猛風寂然不動聖智現觀證理圓成善男子是名賢聖是名菩薩是名如來阿耨多羅三藐三菩提以是因緣一切菩薩為伏妄想永不起故為報四恩成就四德出家修學息妄想心經無量劫成就佛道爾時如來重說偈言出家菩薩觀在家猶如暴風不暫住亦如妄執水中月分別計度以為實水中本來月影無淨水為緣見本月諸法緣生皆是假凡愚妄計以為我即此從緣法非真妄想分別計為有若能斷除於二執當證無上大菩提凡情妄想如黑風吹生死林念念起四顛倒鬼常隨逐令造五種無間因三不善根現為纏生死輪回鎮相續若人聞經深信解正見能除顛倒心菩提種子念念生大智神通三昧起若能修習深妙觀惑業苦果無由起唯觀實相真性如能所俱亡離諸見男女性相本來空妄執隨緣生二相如來永斷妄想因真性本無男女相菩提妙果證皆同妄計凡夫生異相三十二相本非相了相非相為實相若人出家修梵行攝心寂靜處空閒是為菩薩真淨心不久當證菩提果這煩惱的人間因為有舍宅在猶如狂風無有止息之時如想永遠的超脫這煩惱的人間妄想的狂風一切平靜則非出家不可在家人的心上免不了時起種種的妄想即是五欲之境或苦或樂輾轉推測無時不在圈子裏轉但為什麼有這樣固執的五欲之境呢如果你用鋭利的目光去解剖一下也不難窺見原來人在生活線上要過日子阿肚子餓了則取食物來充飢身上寒冷則取衣服來遮體風雨襲來則取磚瓦木料建造房屋要出門則取舟車以代步這些人生生活需要的無一不是求之於外在畜類比較簡單而人類有了此還要彼格外的積蓄格外的貪求不厭不但為自身的幸福計而且還要為子孫的萬年幸福計養兒防老積穀防飢所以要有子孫要有家産於是將整個的精神趨向外境拚命的貪求所以在哲學上有唯物論社會學上有唯物史觀這種種的議論為的全部生活都依賴於外境到了無可奈何的時候只有向外益加妄想貪求這妄想便是遍計所執中的增益妄執有了妄執則不能了知真實法相所以顛倒於觸受之境這就是邪見邪見生起正見潛伏妄想者即是執著外境分別計執無我則計執有我無常則計執常也可以作為我法二執看因有二執則二障生起這就是煩惱業苦的纏縛一切法在佛法上看都是十二因緣在那里流轉周而復始因果循環但十二因緣由無明發業弄得人生常在長夜裏倣徨飄泊遇善則感報在人天遇惡則感報在三途要清除妄想唯有正見當前才使它不能掙扎無聲息的消滅下去了世間諸法如夢如幻唯心所造若能明白諸法實相真理這就是善業的推動驅使者但斷除諸煩惱所造惡業的形體而且法爾無漏種子漸漸增長起來了由此入真見道通達位現起無漏三昧神通出世的真無漏禪定三善根者即無貪無瞋無癡無漏法爾種子的增長乃由資糧加行福智善根熏習而來這就是善業感善果的進路證聖相續即初地以上地地增進乃至成佛之謂但這不是容易的事若不清除妄想則沒有證聖的希望所以這又要借重正觀的工夫才能永斷一切妄想與煩惱智光長者聽了斷煩惱必須要修習正觀的時候在他心裏有千萬思潮起伏因為所謂正觀也者有很多法門不知究竟什麼觀法而能伏妄想佛言要修無相正觀要觀五欲外境皆空了不可得要觀離相實性不見形形色色的一點實相一切諸法露珠也似的幻滅根本無體質可言所以一切法體皆空既諸法體空則相亦空相境空故心識亦空能所雙亡這就是正觀現前若能實現這正觀的智光徹悟了無為之法妄想猛風才可以消滅聖智圓明超脫一切籠蓋一切掃蕩一切吞吐一切聖智即如理智照真諦離虛妄分別名為聖智維摩經肇序云聖智無知而萬品俱照法身無象而殊形並應往生論注下云法性無相故理智無知這就是菩薩的境界佛的境界衆生之所以不能悟入聖智也就因生活上不能滿足生活不得滿足欲望不得滿足內心裏就形成了妄想的現象因為惡習慣惡見已經熏成了根深蒂固的種子時時要去找到外境的生活在貪求不得的時候就不由的感到深刻的煩悶吾人現前之所以趨外境者大概是生活所致的所以佛在世的時候出家比丘只有三衣一鉢就可以滿足生活的所需沒有奢望沒有煩惱鬱結也就沒有妄想顛倒邪見生起了若要使心不趣外境這要有常虛其心的修養還要有實其腹的生活使其無所欲求若能有以實其腹使其不患飢寒則生活之事不致於常感困難所以佛以三衣一鉢為生活以戒貪求本來五欲之境實在令人可怕物質文明是人生不幸中的不幸也即是人生不安的病源老子云五色令人目盲五音令人耳聾五味令人口爽馳騁畋獵令人心發狂難得之貨令人行妨是以聖人為腹不為目故去彼取此此是老子社會生活的主張既知貪求五欲是由妄想而發出來的苦源所以要出家修無相法門才是對症施針可有成佛的希望四顛倒者即於生死之無常無樂無我無淨而計執常樂我淨這是凡夫的四倒還有於涅槃之常樂我淨計執為無常無樂無我無淨這是二乘的四倒五種無間因即五逆罪所謂殺父殺母殺阿羅漢出佛身血破和合僧深妙觀即觀實相真性男女性相本來空以男女性別也只就相而言真正大乘佛性中沒有男女相的差別但從世間法說極注重男女相的差別因為世間家俗之法由男女性建設起來的倫理道德亦由此而建立的男女的心行亦為倫理的道德律所支配否則在世間法上便成為混亂的社會壬六煩惱衆苦生處喻復次善男子出家菩薩日夜恆觀世間舍宅一切皆是煩惱生處何以故如有一人造立舍宅以諸寶物而自莊嚴造此宅已而作是念今此舍宅是我所有不屬他人唯我舍宅最為吉祥他人舍宅所不能及如是執著能生煩惱由煩惱故我我所執而為根本八萬四千諸塵勞門更相競起充滿宅中所以者何在家凡夫深著五欲妻子眷屬奴婢僕使悉皆具足以是因緣生老病死憂悲苦惱怨憎合會恩愛別離貧窮諸衰求不得苦如是衆苦如影隨形如響應聲世世相續恆不斷絶如是衆苦非無所因大小煩惱而為根本一切財寶追求而得若無先因不可追求假使追求亦無所獲善男子以是義故一切煩惱追求為本若滅追求無量煩惱悉皆斷盡然今是身衆苦所依諸有智者當生厭離如是去世迦葉如來為諸禽獸而說偈言是身為苦本餘苦為枝葉若能斷苦本衆苦悉皆除汝等先世業造罪心不悔感得不可愛雜類受苦身若起殷重心一念求懺悔如火焚山澤衆罪皆銷滅是身苦不淨無我及無常汝等咸應當深生厭離心爾時無量諸禽獸等聞此偈已於一念心至誠懺悔便捨惡道生第四天奉覲一生補處菩薩聞不退法究竟涅槃善男子以是因緣今此苦身猶如舍宅一切煩惱即為宅主是故淨信善男子等發菩提心出家入道必得解脫一切衆苦皆當成就阿耨多羅三藐三菩提爾時如來重說偈言出家菩薩恆觀察舍宅所生諸煩惱如有一人造舍宅種種珍寶以嚴飾自念壯麗無能比不屬他人唯我有工巧所修最殊妙世間舍宅無能及如是分別生執著以我我所為根本八萬四千諸煩惱充滿舍宅以為災世間一切諸男女六親眷屬皆圓滿以是因緣生衆苦所謂生老及病死憂悲苦惱常隨逐如影隨形不暫離諸苦所因貪欲生若斷追求盡諸苦是身能為諸苦本勤修厭離趣菩提三界身心如舍宅煩惱宅主居其中汝等應發菩提心捨離凡夫出三界生處指在家舍宅為一切煩惱發生之所衆苦逼迫聚集之藪故若欲離此禍患不為一切煩惱之所拘縛則先非離此煩惱之地不可所以出家菩薩了知家宅為衆苦之本五蘊色身為諸苦所依故即捨離五欲厭棄色身而獨處空寂修出世行也凡九喻所明之義我輩出家僧伽固應常常觀察此理復應將此理宣講於欲出家之人俾生正確之觀察在家出家及欲出家之人若能於此觀察明晰了知九喻之法各能得隨機所宜之益也復次善男子下即是出家菩薩觀在家舍宅為一切煩惱發生之地何以故下廣明其義如有財寶之人造屋宅等而作是念者如造屋之人在已造或未造之間即作是計此屋最妙最為吉祥一切他人舍宅所不能及而復又執此屋是我所有不屬他人由執著我故一切貪求利養之事從此而生由執著為我所故世間一切不平等事即從此生起以及追求不遂互相殘殺一切鬥爭壓迫等事亦從此而起故名能生煩惱由煩惱故我我所見而為根本八萬四千塵勞之門即更互競起也我我所執著我即五蘊之身等我所即我所有之物總言之即六煩惱中第六不正見我即薩迦耶之身見我所即身外之物但細言之有粗細執著之不同粗者即常人執五蘊身是我身外是我所有細者則更有哲學和宗教家及以團體國家等執我之異如哲學家之唯物論者以物質之體為實我其餘受苦樂想是非以及知識等等皆是依物質所起之作用故以精神作用為物質之所有物質為我而精神為我所也宗教之唯心論者即執肉體有一靈魂或精神是我至於身體物質上之苦樂等是我之所受用故名此為我所在此宗教家和哲學家執我以外還有另一種主張為國家而犧牲為團體以及民族或社會等而犧牲此即執團體國家等為我而以自身及他物等為此大我所屬有之分子是為擴大我執和深細我執之異也以我我所本依五蘊假立分別如團體依衆緣聚集而立無異故無定相唯是假名若實堅執為我則有諸煩惱生起也且放觀之微細分析此所執之我體皆不過諸細胞或電子等聚集而成之團體假相決無實在之我體可見故佛法以我我所但是從假相而安立之假名也八萬四千塵勞門者八萬四千乃通稱之多數但在法數上分為貪瞋癡分及等分之四分各具二萬一千共成為八萬四千如頌云十使互具成一百歷十法界成一千身口七支為七千三世共成二萬一四心各具二萬一共成八萬四千數塵勞者即煩惱之別名故八萬四千塵勞門即八萬四千煩惱門也又塵者垢穢之意及飄蕩不定之意勞即勞碌不休疲勞不安之義也總之八萬四千煩惱有一起時即擾動其他之煩惱俱起如此波動彼波彼波又動彼波即波波不息浪浪相續也所以者何下說明因貪五欲之樂心恆不足故在眷屬分離以及求之不得怨家相逢等等之時即有八苦無量諸苦和死死生生輪回相續無間斷也五欲有通別不同通者即五根所緣之色聲香味觸五法此五法為欲界人天諸趣之所共著故別者即財色名食睡之五事此五事別為人類之所希求故怨瞋合會者即是怨家相遇之時兩兩所生之苦恩愛別離者如妻子骨肉等之恩愛臨死別生離時所生之苦貧窮諸衰者世間貧富不等故窮者受飢寒之逼迫即現衰相之苦求不得苦因所求之法不能隨心而生之苦生老病死者即生有生苦老有老苦病有病苦死有死苦也如是衆苦下就佛法之因果而言一切貧窮富貴等非無因生所以世間上於一切之功名富貴能享受安樂者乃由往昔造善因之所招感反之一切衆苦亦復如是如影隨形如響聲應所以若無先因不可追求假使追求亦無所獲善男子下即勸出離茍能息止一切追求之想即能斷盡無量煩惱然今是身者即說身為衆苦所依之處為一切煩惱過患發源之地故有智者應厭離此身之煩惱藪也過去迦葉如來為禽獸說法而禽獸能以一念之誠心即消釋前愆故即以此證成發心出家修菩提道能證解脫果也此迦葉如來是釋迦以前過去之古佛非指佛弟子之大迦葉迦葉是姓故過去古佛亦可與現在之大迦葉同姓耳是身為苦本四句明八苦中有五陰熾盛苦此五陰身苦為一切苦之所依一切我我所執皆依此五陰身苦而生起即未現過去三世輪回之苦惱亦由貪著此五陰身等而造諸惡業之所招感故此五陰身苦為一切苦之根本一切苦是此身苦之枝葉苦本若斷枝葉自然無也汝等先世業八句明禽獸身之不可愛果乃由先世所造罪業而不知懺悔故招此不可愛之報受茲雜染苦果之身反之若於造罪之後茍發起誠懇殷重之心即能懺悔除滅一切罪惡如擊石出火其火雖微但焚著草木之時即能燒盡山澤也是身苦不淨四句勸厭離禽獸之身此禽獸身是苦是不淨是無我是無常何以故因諸禽獸於業報之五蘊身上亦堅執為我為我所故故深勸觀苦無常等生厭離也爾時無量諸禽獸等下明聞法之益當時迦葉世尊說此偈已諸禽獸等此一念誠懇懺悔之心便捨惡道而得生兜率陀天面禮補處菩薩聞法證果不退第四天即兜率陀天迦葉佛時之補處菩薩名曰善慧即今之釋迦世尊也善男子下即勸信出家以是因緣者如迦葉如來所說之言故此苦身為衆苦之本造一切煩惱之工具又此苦身猶如舍宅一切煩惱即為舍宅之主故應發心出家修菩提道而解脫此苦本也重頌前義今不繁釋出家菩薩恆觀察八句是明為造舍宅而生執著之因如是分別執著生六句明因有我我所執為根本則一切煩惱悉皆具足也以是因緣生衆苦六句明由追求故衆苦隨逐能斷盡追求即能斷盡煩惱也是身能為諸苦本六句勸出家修行厭離衆苦之本了知三界身心猶如舍宅也壬七愚子違教敗家喻復次善男子出家菩薩常觀在家猶如大國有一長者其家豪富財寶無量於多劫中父子因緣相襲不斷修諸善行名稱遠聞是大長者所有財寶皆分為四一分財寶常求息利以贍家業一分財寶以充隨日供給所須一分財寶惠施孤獨以修當福一分財寶拯濟宗親往來賓旅如是四分曾無斷絶父子相承為世家業後有一子愚癡弊惡深著五欲恣行放逸違父母教不依四業起諸舍宅七層樓觀倍於常制衆寶嚴飾琉璃為地寶窗交映龍首魚形無不具足微妙音樂晝夜不絶受五欲樂如忉利天鬼神憎嫌人天遠離於是鄰家忽然火起猛焰熾盛隨風蔓延焚燒庫藏及諸樓臺時長者子見是猛火起大瞋心速命妻子奴婢眷屬入於重舍閉樓閣門以愚癡故一時俱死在家凡夫亦復如是世間愚人如長者子諸佛如來猶如長者不順佛教造作惡業墮三惡道受大苦惱以是因緣出家菩薩當觀在家如長者子不順父母為火所燒妻子俱死善男子等應生厭離人天世樂修清淨行當證菩提爾時如來重說偈言出家菩薩觀在家猶如長者生愚子其家富有諸財寶久遠相承無闕乏先世家業傳子孫一切資産為四分常修勝行無過惡名稱遍滿諸國土金銀珍寶數無邊出入息利遍他國慈悲喜捨心無倦惠施孤貧常不絶長者最後生一子愚癡不孝無智慧年齒已邁筋力衰家財內外皆付子子違父命行放逸四業不紹墮於家造立七層珍寶樓用紺琉璃作窗牖歌吹管絃曾不歇常以不善師於心受五欲樂如天宮一切龍神皆遠離鄰家欻然災火起猛焰隨風難可禁庫藏珍財及妻子層樓舍宅悉焚燒積惡招殃遂滅身妻子眷屬同殞歿三世諸佛如長者一切凡夫是愚子不修正道起邪心命終墮在諸惡趣長劫獨受焚燒苦如是展轉無盡期在家佛子汝當知不貪世樂勤修證厭世出家修梵行山林寂靜離諸緣為報四恩修勝德當於三界為法王盡未來際度衆生作不請友常說法永截愛流超彼岸住於清淨涅槃城愚子違教敗家喻者譬如有一長者生一愚子違背父教恣行放縱深著五欲以至蕩盡家産亡家失命而不知悟此明人天有情皆為佛子但不依佛教而行故常在生死海中受盡三惡趣之苦而敗盡功德法財也所以在此喻中應認識人生之價值與創造新生命改善人心之工作如人在成年之後即是有為之時人類在初生之際沒有自主之力和創造之知識經驗至老年之時又受衰老苦相之逼迫亦無有作事自在之能力故在壯年之際若不能聞解正法而信崇三寶改造身心由黑暗而向光明由窄狹而至廣大於此生命海中不思人生難得佛法難聞不能提高生命之人格反使生命轉墮於黑暗即所謂一生空過毫無利益猶如敗家之愚子蕩盡法財受苦無窮而不知也喻如長者之家在許多劫中都是修行善法名稱遠聞而父子相承因緣相續曾無斷絶之時皆分為四者即大富長者將所有財寶分為四分一分財寶以為資本以生利息使家業充盛無有空乏之虞又一分財寶以供家常日用之費又一分財寶以為惠施拔濟貧苦之用所謂撫養教育憐幼恤貧等事以此惠施而求當來之福又一分財寶以為宗親賓朋孝敬恭養等用即所謂報答有恩尊重有德迎賓往來等以上四分若常人持家具有前之二者即為妥善而可免傾敗之虞若就三世業果及世界之安寧而言即必須更具下二義方為完美因惠施於人即種未來之善根生未來善法之利息因救濟宗親善為往來即免現時盜劫橫災之虞長者恆時具此四法所以福德不斷智慧不斷生産不斷受用不斷而能和睦宗親調洽友鄰也後有一子下即長者生一愚子其性弊惡愚癡不靈不能依父遺四分之法而恣行放逸深著五欲貪求妻子奴婢起諸樓觀七寶舍宅一切嚴飾資具無不倍越常情所謂以人間之身享天上之福致鬼神共瞋人天咸怒所以鄰家起火即燒盡其倉庫財寶復以愚癡故而起顛倒之見將一切妻子奴婢等一時俱閉死火中也在家凡夫下即合法顯義人天愚癡凡夫猶如佛之愚子不依佛教造諸業罪受三塗之苦也以是因緣下正顯出家菩薩為厭離在家法故為證大菩提故所以發心出家也爾時如來下重頌前義出家菩薩觀在家十二句明大富長者善具四分之法以及名稱遠聞也長者最後生一子下八句重頌愚子不依父教不紹四業而反恣行放逸等也三世諸佛如長者六句即顯法也世人如愚子佛為長者不依佛教墮苦海也在家佛子汝當知八句是勸厭離世樂而修行善法以及為報四恩故發心出家勤修勝德為三界衆生之法王度盡有情作不請友超脫彼岸住涅槃城也世樂者即欲界之樂厭此欲樂修上界之禪定而出世也愛流者即三界貪愛所成生死之流也壬八童女夢子生死喻復次善男子出家菩薩觀於世間一切舍宅猶如大夢譬如長者有一童女年始十五端正殊妙爾時父母處三層樓將其愛女受諸歡樂於夜分中母女同宿在一寶床而共安寢於是童女夢見父母娉與夫家經歷多年遂生一子端正殊妙有聰慧相日漸恩養能自行步處在高樓因危墮落未至於地見有餓虎接而食之是時童女倍復驚怖舉聲號哭遂便夢覺爾時父母問其女言以何因緣忽然驚怖時女羞恥不肯說之其母殷勤竊問其故時女為母密說如上所夢之事善男子世間生死有為舍宅長處輪回未得真覺爾所分位恆處夢中生老病死三界舍宅如彼童女處於夢中虛妄分別亦復如是琰魔鬼使忽然而至如彼餓虎於虛空中接彼嬰孩而噉食之一切衆生念念無常老病死苦亦復如是誰有智者愛樂此身以是因緣觀於生死長夜夢中發菩提心厭離世間當得如來常住妙果此明世間一切有情處於生死大夢之中而不覺知出家菩薩則能觀察一切有情處於三界宅舍如處於夢中而不自知者也譬如長者至端正殊妙此下正出譬喻蓋譬喻為如來十二分教中之一分因教理微妙聽者不易了知故特以喻顯之俾聽者豁然譬如大富長者有一個十五歲之妙齡童女其形相甚為端正殊妙端正殊妙是勝於平常之美好故父母甚愛惜之此女子之父母處於三層樓上亦使其愛女於樓上娛樂晚間又使其與母同宿一處彼時童女眠熟夢見其父母將他嫁與夫家在夫家數年之久便生一聰明端正之孩兒好為撫養久之便能自行但因處在高樓小孩不知危險便從墮下尚未及地又被餓虎接而食之童女因其子墮下被虎食去因驚駭號哭而便夢覺因童女夢中號哭將父母驚醒其父母以事甚奇故問其何緣如是以未出閣之女子夢見最羞愧之事故不肯說之但其母再隱問之故不得已將上事密露上正是以夢喻下以法合如來告智光長者等言世間是生死無常之舍宅衆生既不知覺故衆生亦因之而輪轉五趣無有息期凡恆處於三界夢中為生老病死等之所纏縛者皆未得真覺者之所不免如彼童女於夢中夢見自身適人以及生子乃至子死並號哭驚怖等虛妄分別在夢中以為是實亦如衆生之處於世間夢寐不知然如彼童女者所謂夢中復夢者也此與我國唐時有盧生於邯鄲逆旅夢得自身娶妻生子乃至拜相名滿天下年八十而卒及醒時旅主所蒸之黃粱未熟略與此同此中所謂長處輪回者即說衆生不求出世之法以致長墮於五趣四生之中俄焉而天而人乃至餓鬼地獄或胎生卵生乃至化生如車之輪展轉不已真覺有淺深之分位不同如成唯識論所謂滿分清淨者是也此真覺可以三位明之一圓滿真覺即是自覺覺他覺行圓滿從金剛心後空去異熟以至於妙覺位而成萬德具足之佛陀二將滿真覺即從八地以至金剛心之菩薩因無始來之微細煩惱所知二障未能盡除故其第八識尚是異熟識未能與大圓鏡智相應但自初地以來亦證得根本後得智以及於第八地末那不執為我亦可得名真覺不過稍遜於佛而已三少分真覺即是登地菩薩證得根本無分別智而緣真如法界明得一切諸法如如理體及已轉第七識為平等性智轉得第六識為妙觀察智故亦得名少分真覺位因無始來之習氣尚深厚從證得根本智第二剎那起後得智時恰如人才從夢覺而復入夢但亦不如世間衆生之大夢不覺而已有不可抑伏之少分覺力以此少分之覺力便能展轉增進到八地故真覺在各人修習時間不齊其地位有如是之三種爾所是指未得真覺之時就是說未得真覺分位之時皆在三界大夢之中而不覺察處於夢中虛妄分別者夢中分別亦有識之作用即是第六夢中獨頭意識而在平常之虛妄分別則有第七末那虛妄分別而執第八見分為我第六意識虛妄分別而執外根身器界為我我所琰魔鬼使即是無常此喻有情於一期生中由少而壯而老而死於其中間終難免於無常好似有鬼使攝去故言無常鬼使要之無常鬼使不期而來如彼童女夢見餓虎忽然將其子接而食之而衆生之於世間剎那剎那將此少壯之年華轉瞬而變為老病死之苦狀亦如彼琰魔鬼使與餓虎忽然而至智者即指世間有智之人即是說誰有智慧之人而愛樂此五蘊和合之假身應發菩提心而厭離世間之生死長夢以求如來常住之妙果常住妙果即是不思議善常安樂之涅槃妙果爾時如來重說偈言佛子至求無上道當觀舍宅如夢中譬如富貴大長者有一童女妙端嚴隨其父母上高樓觀視遊從甚歡樂女向樓中作是夢分明夢見適他人後於夫家誕一子其母愛念心憐愍子上樓臺耽喜樂因危墬墮於虎口遂乃失聲從夢覺方知夢想本非真無明暗障如長夜未成正覺如夢中生死世間常不實妄想分別亦如是唯有四智大圓明破暗稱為真妙覺無常念念如餓虎有為虛假難久停宿鳥平旦各分飛命盡別離亦如是往來任業受諸報父母恩情不相識哀哉凡夫生死身輪轉三塗長受苦若知善惡隨業感應當懺悔令消滅一切人天妙樂果慚愧正見為所因應發堅固菩提心被精進甲勤修學此中初半頌頌善男子至猶如大夢等文次半頌頌譬如長者至端正殊妙等文次一頌頌爾時父母至娉與夫家等文次一頌頌經歷多年至接而食之等文次半頌頌是時童女至所夢之事等文次一頌頌善男子至虛妄分別亦復如是等文次半頌是增文以明真覺爾所分位者次二頌頌琰魔鬼使至亦復如是等文並有增潤長行之文後一頌半頌誰有智者至常住妙果等文頌文所謂四智大圓明者四智即是大圓境智平等性智妙觀察智成所作智大圓明即指四智中之大圓鏡智謂其圓滿明潔如鏡而能照物也此四智在初地轉第七識為平等性智轉第六識為妙觀察智在金剛後心之妙覺位轉第八識為大圓鏡智轉前五識為成所作智也宿鳥平旦各自飛命盡別離亦如是者此喻人類父母妻子聚集一堂之時正如宿巢之鳥子母等相聚一巢但到得平明晨旦之時不能誰顧於誰而各自分飛而人類之命盡亦復如是各自分離不能誰替於誰一切人天妙樂果慚愧正見為所因者即說雖未出三界之有為樂果亦由於往昔具足慚愧正見而為其因故今始感得人天之樂果被甲精進勤修學者此言出家學佛之人應如古來之將士被堅固之鐵甲與敵戰鬥而無退怯為出家佛子者亦應被精進之甲勤修佛學而戰勝煩惱生死之魔軍者也壬九牝馬口海出險喻復次善男子出家菩薩觀於舍宅如牝馬口海出於猛焰吞納四瀆百川衆流無不燒盡譬如往昔羅陀國中有一菩薩名妙得彼岸然是菩薩有慈悲心常懷饒益有諸商人入海採寶將是菩薩同載船舶皆達寶洲度於嶮難而無所礙到於彼岸後時菩薩年漸衰老已經百歲起坐扶策力不能前有一商主詣菩薩所禮拜供養白菩薩言我欲入海求諸珍寶永離貧窮得大富貴今請菩薩與我同住爾時菩薩告商主言我今衰老筋力微弱不能入海商主復言惟願大士不捨慈悲哀受我請於我舶中但自安坐是我所願爾時菩薩受商人請乘大船舶入於大海向東南隅詣其寶所時遇北風漂墮南海猛風迅疾晝夜不停經於七日見大海水變為金色猶如鎔金爾時衆商白菩薩言以何因緣水變金色有如是相菩薩告言汝等當知我今已入黃金大海無量無邊紫磨真金充滿大海金寶交映有如是相汝等既能超過正路墮此海中各自勤求設諸方便還歸北方復經數日見大海水變為白色猶如珂雪菩薩告言汝等當知我今已入真珠大海白玉真珠充滿海中珠映水色有如是相汝當盡力設諸方便還歸北方復經數日大海之水變為青色如青琉璃菩薩告言我及汝等已入青玻璃海無量無邊青玻璃寶充滿大海玻璃之色交映如是復經數日大海之水變為紅色猶如血現菩薩告言我及汝等已入紅玻璃海無量無邊紅玻璃寶充滿大海寶色紅赤交映如是復經數日水變黑色猶如墨汁遙聞猛火爆烈之聲猶如大火燒乾竹林熾然烽㶿甚可怖畏如是相貌曾未見聞又見大火起於南方猶如攢峰高逾百丈焰勢飛空或合或散光流掣電如是之相未曾見聞我等身命實難可保於是菩薩告衆人言汝等今者甚可怖畏何以故我等已入牝馬口海皆被燒盡所以者何由諸衆生業增上力自然天火能燒海水若是天火不燒海水一日夜中一切陸地變成大海所有衆生悉皆漂沒然今我等遇大黑風漂流如是牝馬口海我今衆人餘命無幾爾時舶船有千餘人同時發聲悲號啼哭或自拔髮或自投身作如是言我等今者為求珍寶入於大海遇此險難哀哉苦哉以何方便得免是難時千人等至誠歸命或稱悲母或稱慈父或稱梵天或稱摩醯首羅天王或稱大力那羅延天或有歸命得岸菩薩敬禮大士而作是言惟願菩薩濟我等輩爾時菩薩為是衆人離諸恐怖而說偈言世間最上大丈夫雖入死門不生畏汝若憂悲失智慧應當一心設方便若得善巧方便門離諸八難超彼岸是故安心勿憂懼應當懇念大慈尊於是菩薩說此偈已燒衆名香禮拜供養十方諸佛發是願言南無十方諸佛南無十方諸佛諸大菩薩摩訶薩衆四向四果一切賢聖有天眼者有天耳者知他心者衆自在者我為衆生運大悲心棄捨身命濟諸苦難然今我身有一善根受持如來不妄語戒無量生中未曾缺犯若我一生有妄語者今此惡風轉加增盛如是戒德非虛妄者願以此善回施一切我與衆生當成佛道若實不虛願此惡風應時休息如意便風隨念而至然諸衆生即是我身衆生與我等無差別是大菩薩發起如是同體大悲無礙願已經一念頃惡風尋止便得順風解脫衆難得至寶所獲諸珍寶爾時菩薩告商人言如是珍寶難逢難遇汝等先世廣行檀施得值如是衆妙珍寶昔修施時心有吝惜以是因緣遇是惡風汝諸商人所得珍寶須知限量無使多取以縱貪心後招大難汝等當知衆寶之中命寶為最若存其命是無價寶時商人等蒙菩薩教生知足心不敢多取爾時衆人得免災難獲大珍寶遠離貧窮到於彼岸諸善男子出家菩薩亦復如是親近諸佛善友知識如彼商人得遇菩薩永離生死到於彼岸猶如商主獲大富貴世間所有有為舍宅如牝馬口海能燒衆流出家菩薩亦復如是審諦觀察在家過失汝善男子不染世間諸五欲樂厭離三界生死苦難得入清涼安樂大城此明出家菩薩觀於三界舍宅如牝馬口海之出猛火能燒盡四瀆以及百川衆流前童女夢子生死喻明不出家則無有依怙在生死長夜大夢之中不能脫險此明出家者有所依怙雖遇到十二萬分之危險卒能脫離如此中商人依於菩薩者是也牝馬口海此是海名即牝馬口之海此海是常出火焰而能燒乾海水者倣佛從遠東由海道到歐洲所經過之紅海在紅海中非常燥熱常有人於彼熱死者兩岸數千里全是無草木之大沙漠此海在阿剌伯與非洲之間經過此海要三天三夜其熱度常將海水變成蒸氣遍散四方至數千里外為水降下此海雖不即為牝馬口海然亦可以此證明昔日之事四瀆在我國即所謂江淮河濟此四瀆在昔皆能直流入海但因山河之變遷今則濟水下遊為黃河之所奪而淮水亦僅能流入運河不能直入於海現能直入於海者唯有長江與黃河耳譬如往昔至到於彼岸下正以喻顯即是說往昔陀羅國有一妙得彼岸菩薩常以慈悲而饒益衆生能將衆商人導入寶所而脫離一切險難妙得彼岸菩薩後因年老起坐尚要扶策不能再作領導商人入海採寶之事業但仍有一商人要請菩薩同去採寶以求離去貧窮菩薩因年衰老之故辭不能去但商主堅要請菩薩同去以滿其願望謂但請菩薩坐於舶中足矣菩薩因商人求請之誠懇便滿足其要求坐船向東南之寶所而去開船之時突遇北風將本來要向東南海隅之船直漂墮南海其風迅疾日夜無有停息經七日之久便見海水突變為鎔金色衆商人因見海水變成金色以事希奇故問於菩薩菩薩答謂今者我等已入黃金海因有紫磨金充滿其中而映成此水色既汝等越過正道則應當設法還歸北方始名為妙紫磨金為金之上上者紫是青赤相合之顏色磨表示無垢之意前因衆商人無有能力雖菩薩囑其設法轉還北方以商人無力不能北返於是又入於白色大海菩薩示以因此海裏有白玉珍珠充滿其中故海水亦映成是相珂雪是海之貝殼其色如雪故名復經數日到青色海菩薩告以有青玻璃在內所映如是琉璃又名吠琉璃此言青色寶玻璃又名頗胝迦此言水晶即此方之水晶此寶有碧紫紅白之四色復經數日到紅色之海菩薩告以有紅玻璃在內故映成如是相復經數日又到黑水海遙聞有猛火之聲如燒乾竹林而勢焰之烽㶿實在令人驚畏此是商人有生以來所未見聞之事又見大火至未曾見聞者前是聞得猛火爆裂之聲今已與大火相近見得火山叢聚一般高出於百丈之外其焰勢飛空散合有如光流電掣之迅速此種相亦是見所未見聞所未聞攢峰謂此火焰相倚叢聚如衆山峰船舶已入牝馬口海有性命難保之虞故菩薩告言今者已入牝馬口海我等皆要被火燒盡此海是衆生之業力而為其增上緣故有自然天火燒此海水設不燒此海水則大地皆變為海而漂沒衆生今我等既入如是火海於性命甚為危險此時船上一千餘商人聞妙得彼岸菩薩之言皆發聲悲泣甚至有拔髮投身者皆作如是言今我等為求寶而遇此難不知有甚方法可免然亦別無他法唯有仗父母或天或菩薩之力加被故於彼時千餘商人皆至誠歸命有稱悲母者有稱慈父者有稱梵天者乃至皈命得岸菩薩以求其濟拔梵天即是初禪第三天大梵天主印度外道多計其是主宰宇宙有大勢力者故商人於此亦至誠皈命摩醯首羅具足應言摩醯伊濕伐羅摩醯此言大伊濕伐羅此言自在即是大自在天王居色界之頂因其有大自在之力故得此名大力那羅延天又名毗紐天此言力士或言堅固大約居於欲界天中此天王有大神力故言大力得岸菩薩即是妙得彼岸菩薩爾時菩薩說偈安慰衆人令其離諸怖畏世間最上大丈夫雖入死門不生畏者此最上大丈夫可言是佛菩薩因佛是世間之尊此即如來十號之一十號中之無上士調御丈夫皆與此名同其次則為大菩薩因有大悲無畏之心故雖入死門亦不生畏如地藏菩薩之本願地獄未空誓不成佛而佛亦嘗說我不入地獄誰入地獄等言或此亦可即世俗有義勇之士如昔時為國為民之忠勇將士及平常俠義之士專為人而不顧身者皆有大丈夫視死如歸等語汝若憂悲失智慧應當一心設方便者即是說不必驚恐憂懼若驚恐憂懼則反失去智慧之能力但一心設法可也若得善巧方便門離諸八難超彼岸者即是說如果心不亂則其心便有主宰之智能便能設法離八難以超越彼岸八難者即是地獄餓鬼畜生北俱盧洲長壽天盲聾瘖啞世智辨聰佛前佛後此八種皆難於見佛聞法或雖見佛聞法而不生敬信故得此名依上所說道理不必憂懼但安心勤懇而稱念大慈尊大慈尊即是如來如來最為慈愍衆生而能拔苦與樂者故名大慈尊於是菩薩為救濟衆商人之苦難乃啓告於十方諸佛菩薩聲聞賢聖之前此中重稱南無十方諸佛者是懇求之急切四向四果者即是須陀洹向果斯陀含向果阿那含向果阿羅漢向果須陀洹此言預流預入聖之流類者斯陀含此言一來即是一來於人間天上者阿那含此言不還即是斷盡欲惑再不還生欲界者阿羅漢此言殺賊或言不生或言應供即是殺盡煩惱之賊斷盡三界見修二惑更不來生三界之家應受人間天上之供養也向者即趨向於果位故每一向皆有一果位向即是果之因因將圓時而轉向於果者也所謂預流向果者即是斷盡三界見惑從欲界苦法智忍之第一心以訖上二界道法智忍之第十五心即名預流向道類智十六心滿即名預流果又一來向果者此位斷去欲界五品修惑即名一來向斷去六品時即名一來果不還向果者此位斷去欲界八品修惑名不還向斷盡九品修惑名不還果又阿羅漢向果者此位更斷除上二界七十一品修惑名阿羅漢向若更將最後一品修惑斷除即名阿羅漢果四向四果皆為聲聞乘所修學者也我為衆生至濟諸苦難者正明啓告十方諸佛菩薩賢聖僧者為衆生故而犧牲自己生命以濟諸衆生脫離苦難菩薩於無量生中能持如來不妄語戒若所持之不妄戒不實者則此黑風可愈轉增若菩薩之戒不妄者則以此功德回施有情當來同成佛道若菩薩之戒德不妄者願惡風頓息而順風隨生前雖為衆生而懇求諸佛賢聖彼時尚有菩薩衆生之分今則更進一步說即我身是衆生身衆生身即是我身未來同體無二無別菩薩發是願已即滅惡風而為順風脫險難以到寶所同體大悲即所謂然諸衆生即是我身衆生與我等無差別是衆生心佛皆同一真如法體也無礙願即願以此善回施一切等是因不著於自他功德故能自在無礙或同體大悲與無礙願可合為一句讀爾時菩薩至是無價寶者此是說汝諸商人雖是值遇如是珍寶亦由往昔行檀波羅密所感得但因彼時行施心有所慳吝故今遇此險難然今所重要者即汝等應當知足不可過於貪取以免再罹不測而損衆寶中最尊貴之命寶衆商人遵菩薩教免難得寶到於彼岸上明往昔事畢下以法合諸善男子至獲大富貴者此明出家有所依怙故雖有危險而亦得免能離世間生死而到於彼岸世間所有至在家過失此明超出三界之菩薩觀於三界之舍宅其過失無量無邊亦如牝馬口海之能燒衆流汝善男子至安樂大城者此是說若人能離諸欲樂厭離生死便能到涅槃大城爾時如來重說偈言出家菩薩觀舍宅如牝馬海燒衆流譬如往昔羅陀國有一菩薩名得岸具大富智巧方便無緣慈悲攝有情得是菩薩乘舶船商人獲寶超彼岸然是大士年衰老不樂利他好禪寂有一商主請菩薩欲入大海求真寶惟願大士受我請令我富饒無闕乏於是菩薩運大悲即便受請乘舶船時張大帆遇順風直往東南詣寶所忽遇暴風吹舶船漂墮南海迷所往經過七日大海水悉皆變作黃金色紫磨黃金滿海中寶映光現真金色復經數日大海水變為白色如珂雪真珠珍寶滿海中所以海水成白色又經數日大海水變作紺青如琉璃青玻璃珠滿大海所以水作紺青色又經數日大海水悉皆變作紅赤色紅玻璃珠滿海中故變水色同於彼復經數日大海水變為黑水如墨汁如是天火所焚燒海水盡皆如墨色此海名為牝馬口吞納四海及衆流一切船舶若經過有人到此多皆死天火熾盛如山積爆裂之聲如雷震衆人遙見心驚怖號叫捶胸白大師於是菩薩起慈悲不惜身命垂救護暴風尋止順風起渡於險難至寶所各獲珍琦達彼岸永離貧窮受安樂出家菩薩亦如是親近諸佛如商主永離火宅超真覺猶如商人歸本處世間所有諸宅舍如彼牝馬大口海出家常厭於在家不染世間離五欲樂住空閒心不動善達甚深真妙理或處人間聚落中如蜂採華無所損四威儀中恆利物不貪世樂及名聞口中常出柔軟音粗鄙惡言斷相續知恩報恩修善業自他俱得入真常此中初半頌頌長行復次善男子至無不燒盡等文次一頌半頌長行譬如往昔至到於彼岸等文次一頌半頌長行後時菩薩至是我所願等文次一頌頌長行爾時菩薩至詣其寶所等文次一頌半頌長行時遇北風至還歸北方等文次一頌頌長行第一復經數日至還歸北方等文次一頌頌長行第二復經數日至交映如是等文次一頌頌長行第三復經數日至交映如是等文次二頌半頌長行第四復經數日餘命無幾等文次半頌頌長行爾時舶船至濟我等輩等文次半頌頌長行爾時菩薩至等無差別等文次半頌頌長行是大菩薩至獲諸珍寶等文次半頌頌長行爾時菩薩至到於彼岸等文次一頌半頌長行諸善男子至在家過失等文次三頌頌長行汝善男子至安樂大城等文並有增頌頌中所謂超真覺者真覺即上童女夢子生死喻中之三種真覺超乃超過三界火宅而到於真覺並非再超過真覺也五欲者廣言之即是色聲香味觸之五塵狹小者則為財色名食睡眠因此二種五法皆生世間衆生之貪欲有貪欲故則不能脫離世間之生死樂住空閒心不動善達甚深真妙理者即是說出家住於空曠之地其心少染五欲故其心清淨心清淨故則易達到諸法如如之真實妙理或處人間聚落中如蜂採華無所損者即是說不處於空閒之處而處於市廛聚落之中時刻防守五欲侵害如蜂採華亦無所損蜂即喻人華喻人間換言之如鵝之處於水中不為水之沉溺不特不為水之所沉溺且亦不染於水出家菩薩亦應如是此即喻人如鵝水如五欲者也然真能作到此步工夫非地上大士不處於生死不住於涅槃而濟度衆生者不為功初心菩薩果能時刻防備亦可無所損也四威儀者即行住坐臥之四皆有儀範威德可觀不如世人之萎靡不振者能如是作去則無漏善法亦可從此而生蓋此為比丘戒中之最重要者得入真常者即前長行中之清涼安樂大城庚三當機出家獲益爾時智光及諸長者一萬人俱異口同音而白佛言善哉世尊希有善逝如是如是世尊所說微妙第一善巧方便饒益有情如佛所說我今悉知世間宅舍猶如牢獄一切惡法從舍宅生出家之人實有無量無邊勝利由是我等深樂出家現在當來恆受法樂爾時世尊告諸長者善哉善哉汝等發心樂欲出家若善男子善女人發阿耨多羅三藐三菩提心一日一夜出家修道二百萬劫不墮惡趣常生善處受勝妙樂遇善知識永不退轉得值諸佛受菩提記坐金剛座成正覺道然出家者持戒最難能持戒者是真出家時諸長者白佛言世尊我等持戒修諸梵行願我速出生死苦海願我速入常樂寶宮願我廣度一切衆生願我疾證於無生智爾時世尊告彌勒菩薩及文殊師利如是長者付囑汝等勸令出家受持淨戒時九千人於彌勒前出家修道受持佛戒七千人俱於文殊前出家修道受佛禁戒如是人等既得出家成就法忍入於如來祕密境界不復退轉無量萬人發菩提心至不退轉位無數人天遠塵離垢得法眼淨智光長者前以自心推測以為在家菩薩勝於出家菩薩今得如來廣以九喻而比較在家出家之優劣於是智光長者等一萬人俱皆得明了出家之勝利功德而厭離世間樂於出家故皆白佛而求佛度脫出家爾時世尊許其出家並囑其發菩提心則能成等正覺佛告智光長者等汝等出家猶是易事而其所最難者則在持戒如前所引六群比丘等形雖出家而不能防護如來之禁戒則亦與在家無異今汝等出家若能堅持於律儀始得名為真實出家者也智光長者等出家之心真堅故答佛決定持戒決定修清淨行而又發四種大願常樂寶宮即無住涅槃此具有常樂我淨之四德故言寶宮無生智即無分別智因此智能證諸法不生不滅之實性也爾時世尊因智光長者等既堅決要出家故佛令彌勒文殊師利二大菩薩與其剃度而授其戒法時九千人至受佛禁戒者此正明於兩位大士之前出家修道持佛禁戒之人數如是人等至不復退轉者正明在兩位菩薩前出家者所獲之利益成就法忍者即是將如來所說之法忍可於心而不再如前之疑惑祕密境界者即是不思議境此為不可報告於人表顯於人者此但為本人之所悟入故不能告示表顯於他人者也不復退轉者謂其所修之法不復退失轉墮也別有無量人發菩提心並得不退轉更有無數人天獲益遠塵離垢得法眼淨者塵垢即粗煩惱以得法眼淨而遠離即於佛法得決定解淨無疑惑故粗浮之煩惱垢因以遠離也
