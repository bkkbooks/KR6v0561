body:
  text: 出生菩提心經講記二十二年春在奉化雪竇寺講懸論一釋題甲經題分釋一佛二說三出生四菩提五心六經合釋乙譯題二出旨甲明體乙明宗丙明用釋經甲一證發分乙一證信序宗綱懸論一釋題甲經題分釋一佛佛者中國人幾無不知之如婦孺之拜佛念佛供養佛等然叩其含意能明白答出者雖學者亦未必能也故有詳細解釋之必要梵音佛或佛陀具足應云佛陀耶古亦云休屠浮圖浮頭勃陀勃馱部陀母陀沒馱佛馱皆口音之輕重致有此別而佛陀浮圖二音用者居多今英譯梵文則作布達音此為五不翻中之尊重不翻或順古不翻亦即翻譯四料簡中譯音不譯義也其含意為覺者之義但尋常譯為覺頗乖原義因菩提古雖譯道而新譯則名覺若菩提與佛皆可譯覺其分別何在故佛陀耶應譯覺者菩提譯覺亦猶瑜祇譯相應者瑜伽則惟譯相應蓋者字為代名辭即指有此覺德之人格而言凡夫以有漏五蘊色受想行識為和合假者以有漏諸法和合所成故佛陀則為清淨無漏五蘊之和合者以能變所變皆清淨故亦有以五分戒定慧解脫解脫知見法蘊為言者此則通大小乘依前義為覺之者是有財釋釋以有四智之覺德故四智攝一切功德盡故如因地一切不離識故亦如世間有學問者稱學者有賢聖之德者稱聖者賢者故就有覺德者稱覺者依後義為覺者慧解脫解脫知見皆覺攝故由戒生定由定發慧戒定皆以慧為主體故而台宗從因至果依證未證理而判六即實則惟究竟名佛蓋非泛泛可稱覺者如聲聞緣覺覺雖覺矣然偏覺生空而猶昧法空是則偏而不遍菩薩進覺生法空矣然智證未圓等覺後心尚感歉然是則覺猶有上而非無上凡外邪解者亦嘗自命為覺矣然險徑自擾蒸沙徒勞均是邪覺而非正覺人間亦有先覺覺後覺之稱要皆為進化途上未究竟之覺未達無上正遍之覺也其能不愧稱覺者者惟證窮法性之無上遍正覺者耳然佛為通名彼東方阿閦西方彌陀等皆稱佛凡具足十種如來應供正遍知明行足善逝世間解無上士調御丈夫天人師世尊德號者一律稱佛例如十方諸佛法華經等皆明其意然經中往往但稱佛者以此娑婆世界現為釋迦牟尼攝化土燃燈過去彌勒未來出現此世界而說此經者惟大牟尼故此經題佛字乃確指釋迦牟尼而言念誦時稱本師者因此土教法皆出其口聖者結集流傳至今追流溯源我等得聞法以發菩提心重新估定人生者不啻從佛口生從法化生而得佛法之氣分故稱本師以表極親近愛戴渴仰之誠意也二說先聖後聖其道同其軌一諸佛土莊嚴同所證法性同機同則說亦同故深密等明佛土十八莊嚴相法華說三乘諸佛同讚歎攝論載五業諸佛皆平等是以一佛所說法不異諸佛所說法諸佛所說法不異一佛所說法以是義故楞伽等有不說一字之語此語之解釋多義如法性不可說等其中一義即為此佛所說法罔一字非諸佛所說者非離諸佛已說之法外另有一字可說也表法爾如是之理若佛出世與不出世皆無變異故諸佛所說法亦皆同也以此佛所說法確實可信以諸佛為真語者實語者不異語者不誑語者證明說稱機說究竟說決定說如證而說故有教無類故如諸法性決定說故有所說法必有所為佛果為何而起說耶以先知覺後知以先覺覺後覺佛為先覺既知衆生皆具如來智慧德相特以衣珠自窮若不為說則永劫不知法相不證法相無由出離且諸如來因地發大悲願一時成佛自為一般所應攝化之機而興言說即由諸佛之悲願而攝化諸佛心內之衆生復由衆生渴哀戀慕之誠而感動衆生心中之諸佛互為本質影像故互為增上緣而二識成決定故由佛之大悲願力為近因以衆生之渴誠哀仰為疏緣而擊發佛果菴摩羅識中已圓滿清淨之無漏名句文種子親因起現行於如來識上有此無漏名句文聲之影像受化衆生由極誠懇之善法欲為近因以佛之大悲願力為疏緣而托如來識上之無漏名句文聲為本質於自識上而有似無漏名句文聲之影像顯現以本質雖無漏而自識未淨故影像熏習故親因雖為有漏而推功歸本皆為佛說凡經佛印可者無論其為菩薩說化人說二乘說人非人等說一律稱經故佛未雙林示寂之前經通五人說雙林而後縱有卓見闊論祇得以論名如瑜伽論中論等未可以名經也三出生出生二字尋常連讀並無分別二字含義之界說如說生出生起等實則二字有嚴格之界說茲引中論釋八不中之不生與不出之意曰本無今有為生如瓶自因緣和合而有生是為生義本無內出為出如蛇從穴出現世間學者謂此地球初凝結之時其生命種子或謂自另一世界而來者是為來義或謂即此地球之內含有此生命種子時至自內而出者是為出義此中所示出生者為菩提心而出生各有二義出二義者一顯出義指不生不滅之法性而言為菩提心之本體亦即一切法一切衆生平等之體因二障所覆不復現露一朝障盡如雲中月雲盡月現故顯現名出二長出義依種種勝善功德而增固有之無漏清淨菩提種子此則由增上緣而助長因緣義也然此二義有其差別顯出之菩提心體是無為無漏清淨法是大總相體是為無為漏無漏之平等性或曰實相或曰法性或曰實際或曰真如等皆其異名長出之菩提心種是有為無漏清淨法是佛果功德之總包亦即一切功德之所自出以智現故然勤勇因基於證得因勤勇因雖為直接長出菩提之必要條件證得因亦為間接長出菩提之必要條件攝論有言佛得無別無量因有情若捨勤功用證得恆時不成因斷如是因不應理是則無為無漏亦為長出菩提心種之緣也或問曰此經則有出有生中論則無出無生同是聖典何有無不相侔耶答曰不相違也有出有生者因緣而出因緣而生無出無生者因緣和合空無自性以無自性故生即無生出即無出且法性無生出性相皆同中論不生出意在於此乃就第一義諦言也是則中論與此經不但不相違而且相成生二義者一從種子而生現行有為法皆有生住異滅之四相本無今有為生本有今無為滅故生義限於有為出則通乎無為此中明生亦即依菩提心明也然則從何而明耶則從一切有為無漏清淨現行法明生一切衆生為無明煩惱之牽使生死輪回流轉不斷皆為有漏當其初發菩提心而未登地則無漏清淨有為種子未逢最勝之增上緣故未起現行然既發菩提心則其行事皆以菩提心為準則而有隨順無漏之有漏善法種子生起現行若登初歡喜地則有本有無漏種子生起無漏現行無論其為有漏無漏皆自種子而生現行名生此則三種菩提中但就阿耨菩提言也二從現行而熏生種子即依所起順無漏之有為有漏善法現行及初地以上所起之有為無漏清淨法現行復熏生有為有漏善法種子及有為無漏法種子是為現行熏生義四菩提菩提為梵音此為翻音不翻義如現譯之意大利美利堅等約義菩提新翻為覺古或翻道此有四義一菩提自性此有二義菩提即自性即以智為自體持業釋也此智即佛果四智大圓鏡智平等性智妙觀察智成所作智以凡夫論則以別境中慧心所為體但是佛果以智為主以八識成四智凡所施皆為智之作用一切功德皆以智為主體神通莊嚴皆智之所變故修行者惟以一切智智為所趣也智既為王則餘為相應在凡則以識為王有漏染淨不離於識升沉苦樂皆識之所變聖教有勸依智不依識者勉其捨凡入聖也然識智又可互通凡聖未可定執一是如佛果位之清淨菴摩羅識加行位中之四如實智皆互通之例也特凡位中之別境慧通於善惡無記之三性雜而不純不能轉一切法而為一切法之所轉故發菩提心云者欲以類似乎智之慧心所挾有力之善法欲而起以擊起本有之無漏菩提種子耳非初發心者即真有菩提現行也而佛果之智雖亦不離別境慧然其王所皆為大光明藏智且王既成智則一切相應皆為智之附屬者故其作用能轉一切法而不為一切法所轉得自在故惟是無漏善淨雖有漏善且莫能望其項背況餘惡無記法所可擬哉菩提之自性即以一切法之自性為自性真如依主釋故此諸法之自性為無為漏無漏不增不滅若佛出世與不出世窮三世而不變歷萬象而湛然生佛一體木石皆具是為大總相法門體二菩提所現此有二義現有為無漏法十八界皆在大圓鏡智相應心品之中猶如影像而分別顯現鏡智雖無能取所取一異分別之相而有一切所知影像顯現即盡未來際救度衆生之事業如淨佛國土等莫非此智之功用推而廣之菩提既為四智之綜合則平等性智之為地上菩薩現盧舍那即毗盧遮那身成所作智之現三類化身妙觀察智之應機說法無一而非菩提之所現此猶拘乎有為無漏之後得智而言者也或曰隨類所現無乃通乎惡何以稱為純善無漏者也答曰此天台之所以有性具善惡之說也諸佛大悲願力神通智慧不可思議外現明王等相無一非同體大悲之表現也相似有漏而體是上淨無漏如慈父為令子出火宅而誘之以良辰美境可娛樂之所或威之以鞭杖斧鉞可畏懼之具及火宅既出而子得安穩快樂且諸佛於因地中法門無量誓願學者皆為達到此目的耳故金剛明王毋寧謂為大悲之實際也現無為無漏法四智菩提雖有謂後得智四智皆有根本智則為成所作智所無然根本智實為菩提之正體根本智緣真如挾帶真如而起亦有親疏所緣緣義特以挾帶故或謂有見無相有相無見見相皆有皆無之異而後得智或加行智上疏所緣緣之真如既為菩提之實體其根本智上親所緣緣之真如非菩提所現而何此覽所緣緣論可見也且變相觀空惟後得果中猶自不詮真為成所作智所顯現之影像真如則餘三後得智或加行智亦有變相觀空而不詮真之影像真如顯現明矣此皆菩提所現之無為無漏法也三菩提相應四智各有二十一法相應連智王則成二十二法即五遍行觸作意受想思四別境欲勝解念定十一善法信慚愧無貪無瞋無癡勤安不放逸行捨不害加所轉之淨識則成二十二法也此二十二法法爾皆善故得與菩提智境相應四菩提等起菩提心者萬德之總樞自初發信心起至未入見道位止依菩提心所起之有漏善法皆為隨順無漏法者加行位中有漏善法隨菩提心而增長殊勝以之激起入見道之菩提現行見道位後直至成佛無漏日增有漏日減以資糧加行位中之有漏善法而感十王寄位或變易身或意生身之增上果無漏日增增之極而佛果圓有漏日減減之極以至永無是則無論隨順無漏之有漏善法與夫純無漏清淨法皆必待菩提為之前導而後可有成功也故菩提圓則有漏永無而無漏功德皆圓佛果一切不可思議方便用莫非菩提所起是為菩提等起菩提自性菩提所現菩提所應菩提等起皆攝於菩提之中然此經所說菩提通於三乘則其自性所現相應等亦可以三乘義分別推知然考此經旨趣所在則獨在發大乘佛果菩提心餘二附帶而言之耳五心心非肉體中之肉團心亦非八識心王之心亦非第八識心之心亦非心心所法之心又非真如心之心的指此心之體性則為志字或意字之義發菩提心者即發菩提志或發菩提意即立志願之義然志願之自體為五別境中之欲心所依願望而立決定堅固之志此欲心所即為發菩提心之心字的正當解釋也然別境欲心所通於三性此菩提志願欲在初發起時即為有為有漏善法之隨順無漏法者以為求得佛果菩提故而發生此欲則大乘佛果無盡功德法皆此欲心之所起也故尋常所謂四弘誓願正即此心字之自性地此謂心即自性乃持業釋至其共同之體性亦即真如則為心之自性依主釋也至其所現則為上求下化之境等起則為隨順無漏功德法相應則為善心心所其義皆可類推不復一一再進一步討論菩提心之體則具欲勝解念定慧之五法且如十信位之前初發意菩薩固以欲望心為其體性逮至十住十行位中則其住住行行莫不以勝解為前導故此過程中則以勝解為其菩提心之自體而十回向念念回向佛果回向衆生回向法界則宜以念為自體及至四加行暖頂位中證明得定明增定而忍世第一位之四如實智皆由前二定而發則四加行宜以定為自體一登初地見道而後菩提智覺之觀行既已生起直至佛果則應以慧為自體然初地以上皆分證菩提佛果究竟證菩提剋論其自體雖為智覺而相隨則以一切功德為體也故以經歷之位次論則菩提心之體通乎五別境及一切功德至尋常所謂之菩提心剋論其自體確以欲望為心體也六經經字梵語修多羅亦以別乎論律據中國經字之意通四海而皆遵亙三世而不變佛說之教法亦為三世諸佛之共說又為十方衆生之所必遵無別字義可以形容其勝乃以經字代之故稱經也合釋分釋既畢加以合釋乃能貫顯其義菩提心者非泛常心亦非經歷位次中勝解念定慧之心剋體言之乃最初發心之欲望心即志願心也菩提者非二乘菩提隨順言之通大乘地上分證之菩提剋體言之惟佛果位上之究竟菩提也故今宜解為菩提之心即求證菩提之欲望心或志願心依主釋也若到佛果菩提即為一切功德之綜合故於究竟菩提位中宜以菩提即心或心即菩提為義持業釋也出生菩提心者即依本有求證菩提的希望心之種子而發起求證菩提心的希望心之現行故宜作出生之菩提心或菩提心之出生依主釋也出生菩提心經者所出生之菩提為所詮義依所詮義而名能詮之經即出生菩提心之經依主釋出生菩提心義即為此經即義名經亦可持業釋也記者按大辭典謂緣事菩提心緣理菩提心行願菩提心勝義菩提心三摩菩提心緣事即四宏誓願之善法欲緣理即緣真如之勝解心行願即合上緣事緣理之念心勝義為根本後得之智慧心三摩地即定也深密不捨阿耨多羅三藐三菩提願為住是亦其體即欲顯揚所謂發心者謂諸菩薩發菩提心若諸菩薩住菩薩法性為欲利益十方世界所有有情依彼行相強盛因緣於無上菩提發大誓願受發心法謂我必定當證無上菩提為度十方一切有情令離諸煩惱故及離諸苦難故此受發心復有二種一世俗發心謂如有一隨智者前恭敬而住起增上意發誓願言長者憶念或言聖者憶念或言塢波陀耶此云親教我如是名從今日始發無上菩提心為欲饒益諸有情故從今已往凡我所修六度之行一切皆為證得無上菩提故我今與諸菩薩摩訶薩和合出家願尊證知我是菩薩第二第三亦復如是二證法性發心謂如已過第一劫阿僧祇耶證得菩薩初極喜地乃至由如是故於大菩提願不退轉是名證法性發心初世俗即願欲理應通在家證法性發心即根本智菩提即心乙譯題大隋北印度三藏闍那崛多譯大隋在唐朝以前六朝之末闍那崛多此云德志五印度之北印度度犍陀羅國人通達經律論故稱三藏之德號華梵音異故須譯也凡經論必載明譯題者一為表彰前賢之德勞而起後學難遭希有尊重之想二為避免邪說撓正之弊而堅後學之信仰如現世學者往往因經論譯人不明而發生疑誤德志剎帝利種姓昆仲五人身居最小周明帝武成年初留長安止草堂寺旋明帝為造天王寺譯十一面觀音及金剛問經等後任蜀龍淵寺主持譯觀音揭佛語經武帝毀佛不屈愍其貞而赦之即適北狄弘化後大興善寺曇延等復奏文帝同任校證音義之職開皇二十年物故春秋七十有八譯經凡三十七部一百七十六卷此經即譯於大興善寺者也二出旨上已釋題繼應出旨出旨者即以簡明之方式表出此經之大旨也天台以五重玄義華嚴用十重懸談現在不必固守五時八教或三時五教而配釋之至於此經之藏乘三藏中屬經藏五乘中屬大乘顯而易見不必多釋茲扼其體宗用之要旨言之甲明體先明經體體有通別通體者為一切有為有漏有為無漏法共同之體即一切諸法皆以真如實性而為其體最極真實常如其性故一切諸法皆攝於如故故此經能詮所詮皆以真如為體又不惟此經如是乃至餘經及一切人物等亦皆以真如為體然此經之特殊體性若以假從實則用聲為體離聲以外無別名句字故以體從用則名句文為體名詮自性句詮差別而文為名句之所依故假實相藉則名句文聲為體名句文為假依聲實故隨闕一種則此所說必不能成也聲名文句雖為諸經之所共然因所詮有殊致能詮亦異故可謂別中之通體然則此經之特殊體性又在於所詮義也此經所詮義即是菩提故以菩提為此經之特殊體性所出生者為菩提心所緣者為菩提境所修者為菩提行所證者為菩提果從始至終莫不以菩提為其體此則剋言其自體也乙明宗宗亦有通別通宗者貫通佛所說一切法之宗也如法華經為令衆生開示悟入佛之知見故出現於世此則為一切經根本宗要亦通始終因果以隨佛平等意樂現種種相說種種法皆為令衆生入於佛慧雖隨機淺深而有大小偏圓之不同在佛本意要惟以自證法開示於人而無差別故此經亦得以開示悟入佛之知見為宗也別宗者則以菩提心為宗也求得菩提之心即是決定求菩提之志願經中菩提雖通三乘而正宗所在惟大乘佛果菩提也若於欲勝解念定慧證六種菩提重重增進自因至果則攝全經宗要故惟以菩提心為此經之別宗也丙明用用亦有通別通用者通於一切法故能所詮皆有功用當時之說此經聞者斷疑生信及解即為經之功用前所明宗亦為此經之功用特宗廣用狹故須另詳總之從說此經至結集翻譯流傳迄今凡依此經而起信解行證者皆功用也故一切經大抵有流通分或有皆大歡喜信受奉行之結句者即此通用之證明也凡欲聞法者未聞或疑惑不了既聞則心開意解故在講說或聽誦之間以斷疑生信及解為一切經之通用理至當也如在座廳者即可為明證而此經之別用亦極明顯即以出生菩提心為此經之別用也如大迦葉夢華光等相即為善根發現相迦葉因不知而問佛佛為決疑則謂定成調御使迦葉生起發趣菩提之決心亦因迦葉自具之本有無漏種漸增而出此則就當機聞此法而有之功要亦即此經特殊之功用所在如今在座聽說或讀誦或講演者能因此經而出生菩提心則即斯經之別用也上以體宗用略明此經大旨簡言之以菩提為體菩提心為宗出生菩提心為用也釋經甲一證發分乙一證信序證信序者說我聞等令世人證信故又名通序諸經同有故又名經後序雙林最後說故又名阿難序阿難請說故然此序真諦開為七事龍猛開為六義或名六種成就親光攝為五義即名五種證信茲依親光佛地論釋之如是我聞者親聞證信謂如是一部出生菩提心經是我結集流傳者之所親聞聞者由耳根發耳識有同時意識生具足應八緣而成聞然聞屬五蘊假和合者故以我表其親聞之意蓋此經非展轉自他而聞亦非自造而無稟承確為我所親聞也一時者說時證信現時講演録則注明年月日時經中但稱一時者因佛說經典單就人間而論當時世界即無共遵之曆法如印度以中國初一為十六以十五為三十各國紀年之不同亦然況佛說遍於天上龍宮者哉以無固定之時故但稱一時然又非一剎那或一年一月一日等即以說此經之始終總稱一時也時乃假法依色心生滅相續上而顯現或依因緣和合有說法聽聞等事即於其相續上而立時之假相也薄伽婆者說主證信涅槃經佛地論合具七義智度論具四義五不翻中多含不翻以中國無此多含之字意代之也然此名乃結集者尊重之稱如學者稱孔子為聖人等十號中之世尊即薄伽婆之譯意以諸意義中皆有尊貴義故如開會紀録有某人主席等敘經亦然必有其說經之主此名通於諸佛不限釋迦以皆具衆德故然於此土現在佛教中則指釋迦為教主無二佛並現故結集流傳者意謂非吾所造亦非常人所說乃具衆德之釋迦佛陀耶所親口說出者故足以增人之信也在王舍城之竹園舉說處以證信在為前置介詞八囀聲中為所於聲王舍城是中印度摩竭陀國之都城為該國首善之區頻婆娑羅王宮之所在迦蘭陀竹園即他經所稱之竹林精舍位在王舍城之毗近頻婆娑羅王請佛轉法輪於此迦蘭陀是鳥名梵土含義未考特知其為佛說法極有名之處耳與大比丘衆至來集者舉聞衆證信前者為比丘衆亦稱常隨衆不離佛住故後者為菩薩衆亦稱行化衆隨處隨形而行教化去止自由故與為接續詞接前後詞故亦即六離合釋中相違釋也比丘具破惡怖魔乞士等義以能破煩惱障故伏死魔故財法兼資故舉因以彰果也餘經稱阿羅訶阿羅漢阿盧漢者囀聲別故如次即應供無生殺賊三義以具生空智斷應受人天供故分段已盡不受後有故斷生死因去涅槃礙故舉果以彰因也定性二乘永滯化城雖為此經所被然焦芽之類王道不由大乘所鄙茲所列者盡是不定類皆為獅子兒故冠之以大衆形容大比丘之多或為簡初發心比丘也百千其大比丘衆之數也俱共義無量阿僧祇不可說者皆印度計數之名詞僧祇譯無數疊層狀之無數狀不可說無量狀無數不可說言其數之多也菩薩菩提薩埵之略譯稱覺有情當體得名持業釋也覺即有情故亦有情識故從德立稱有財釋也有覺德之有情故有覺餘有情之德故大為簡初發意取已入僧祇或已入地菩薩也所謂下應有列名如華嚴等十方來集譯者略也寶忍記見海刊十五期二卷宗綱佛教文化社近將出生菩提心經講録再版流通中國佛學會乃公請重講就此經題解釋之後即題出旨以顯此經即以菩提三乘真性菩提及大乘的圓明具德菩提為體菩提心從初發四宏誓願歷勝解念定慧以至福智滿足為宗出生菩提心為用從聞信解顯出并生起菩提心外並依全經文義舉綱領如下甲一序分乙一證信序乙二發起序甲二正宗分乙一向大利答發菩提心丙一正勸發菩提心丙二問答發心福聚乙二問答菩提解脫差別丙一菩提有三丙二解脫無別乙三問答修大乘菩提行丙一先四攝丙二次三行丙三廣六度乙四證成發心讚經勝德丙一證驗發心丙二讚顯經德甲三流通分乙一問障顯魔乙二破魔說咒乙三廣顯咒功乙四結衆法喜見海刊第二十七卷第十二期
